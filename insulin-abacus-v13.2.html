<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsulinTrack - Insulin Action Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* -- Design tokens ----------------------------------------------------------- */
    :root {
      --bg: #0a0e1a;
      --s1: #111827;
      --s2: #1a2235;
      --bd: #1e2d45;
      --ac: #00d4ff;
      --r: #ff6b6b;
      --g: #4ade80;
      --y: #fbbf24;
      --p: #a78bfa;
      --o: #fb923c;
      --tx: #e2e8f0;
      --td: #64748b;
      --tm: #334155;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --rad: 12px;
      --glow: 0 0 20px rgba(0, 212, 255, .15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 10%, rgba(0, 212, 255, .04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(255, 107, 107, .03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* -- Header ------------------------------------------------------------------ */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 0 22px;
      border-bottom: 1px solid var(--bd);
      margin-bottom: 18px;
    }

    .hl {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .hdr-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-left: auto;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--ac), #0077ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(0, 212, 255, .3);
    }

    .at {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .05em;
      color: var(--ac);
    }

    .as {
      font-size: 11px;
      color: var(--td);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* -- Tabs -------------------------------------------------------------------- */
    .tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rad);
      padding: 4px;
      margin-bottom: 18px;
    }

    .tab {
      flex: 1;
      padding: 9px 8px;
      border: none;
      background: none;
      color: var(--td);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }

    .tab.on {
      background: var(--s2);
      color: var(--ac);
      box-shadow: var(--glow);
    }

    .tab:hover:not(.on) {
      color: var(--tx);
    }

    /* -- Card -------------------------------------------------------------------- */
    .card {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rad);
      padding: 20px;
      margin-bottom: 14px;
    }

    .ct {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--td);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ct::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bd);
    }

    /* -- Form fields ------------------------------------------------------------- */
    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media(max-width:520px) {

      .fg,
      .sg,
      .pag,
      .pal2,
      .pal3,
      .pal4 {
        grid-template-columns: 1fr !important;
      }
    }

    .fi {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fi label {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--td);
      font-weight: 500;
    }

    .fi input,
    .fi select {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      color: var(--tx);
      font-family: var(--mono);
      font-size: 15px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
      -webkit-appearance: none;
    }

    .fi input:focus {
      border-color: var(--ac);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, .1);
    }

    .fi input::placeholder {
      color: var(--tm);
    }

    .inerr {
      color: var(--r);
      font-size: 11px;
      font-family: var(--mono);
      line-height: 1.35;
    }

    /* -- Button-group selectors (activity / stress / hydration) ------------------ */
    .pal4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .pal3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .pal2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .pab {
      padding: 7px 4px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
      color: var(--td);
      font-family: var(--sans);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      line-height: 1.4;
    }

    .pab i {
      font-size: 16px;
      display: block;
      margin-bottom: 2px;
      font-style: normal;
    }

    .pab.on {
      border-color: var(--ac);
      color: var(--ac);
      background: rgba(0, 212, 255, .08);
    }

    .pab.on-y {
      border-color: var(--y);
      color: var(--y);
      background: rgba(251, 191, 36, .08);
    }

    .pab.on-r {
      border-color: var(--r);
      color: var(--r);
      background: rgba(255, 107, 107, .08);
    }

    /* -- Toggle switches --------------------------------------------------------- */
    .slp {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
      cursor: pointer;
      transition: all .2s;
    }

    .slp.on {
      border-color: var(--p);
      background: rgba(167, 139, 250, .08);
    }

    .slp.blue-on.on {
      border-color: var(--ac);
      background: rgba(0, 212, 255, .08);
    }

    .trk {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--bd);
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }

    .trk.on {
      background: var(--p);
    }

    .trk.blue-on.on {
      background: var(--ac);
    }

    .thm {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform .2s;
    }

    .trk.on .thm {
      transform: translateX(16px);
    }

    .slplbl {
      font-size: 13px;
      color: var(--td);
    }

    .slp.on .slplbl {
      color: var(--p);
    }

    .slp.blue-on.on .slplbl {
      color: var(--ac);
    }

    /* -- Sleep quality slider ---------------------------------------------------- */
    .sq-wrap {
      margin-top: 8px;
      padding: 9px 13px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
    }

    .sq-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sq-row input[type=range] {
      flex: 1;
      accent-color: var(--p);
    }

    .sq-lbl {
      font-size: 11px;
      color: var(--p);
      font-family: var(--mono);
      min-width: 44px;
      text-align: right;
    }

    /* -- BG Zone banner ---------------------------------------------------------- */
    .bgz {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid var(--bd);
      margin-top: 11px;
    }

    .bgz.low {
      border-color: #ff6b6b44;
      background: #ff6b6b0a;
    }

    .bgz.ok {
      border-color: #4ade8044;
      background: #4ade800a;
    }

    .bgz.high {
      border-color: #fbbf2444;
      background: #fbbf240a;
    }

    .bgdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bgz.low .bgdot {
      background: var(--r);
    }

    .bgz.ok .bgdot {
      background: var(--g);
    }

    .bgz.high .bgdot {
      background: var(--y);
    }

    .bgztxt {
      font-size: 12px;
      color: var(--td);
      flex: 1;
    }

    .bgzv {
      font-family: var(--mono);
      color: var(--tx);
    }

    /* -- Dose result box --------------------------------------------------------- */
    .rbox {
      background: var(--s2);
      border: 1px solid var(--ac);
      border-radius: var(--rad);
      padding: 15px 18px;
      margin: 13px 0;
      box-shadow: var(--glow);
    }

    .warn-full {
      border: 1px solid #f59e0b66;
      background: rgba(251, 191, 36, .12);
      color: #fcd34d;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 11px;
      font-size: 12px;
      font-family: var(--mono);
      line-height: 1.45;
    }

    .crit-full {
      border: 1px solid #ef444466;
      background: rgba(239, 68, 68, .12);
      color: #fecaca;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      font-family: var(--mono);
      line-height: 1.45;
    }

    .hypo-screen {
      border: 1px solid #ef444466;
      background: linear-gradient(145deg, rgba(239, 68, 68, .18), rgba(127, 29, 29, .1));
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      margin-bottom: 10px;
    }

    .hypo-screen .title {
      color: #fecaca;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .hypo-screen .msg {
      color: #fee2e2;
      font-size: 13px;
      line-height: 1.45;
    }

    .rtop {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .rv {
      font-family: var(--mono);
      font-size: 40px;
      color: var(--ac);
      text-shadow: 0 0 20px rgba(0, 212, 255, .4);
      line-height: 1;
    }

    .rl {
      font-size: 11px;
      color: var(--td);
      margin-bottom: 3px;
    }

    .rb {
      flex: 1;
      font-size: 11px;
      color: var(--td);
      line-height: 2;
      font-family: var(--mono);
    }

    .rmn {
      font-size: 10px;
      color: var(--tm);
      font-family: var(--mono);
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--bd);
    }

    /* -- Modifier panel ---------------------------------------------------------- */
    .mp .mst {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--tm);
      margin: 9px 0 5px;
    }

    .mr {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 3px 0;
    }

    .mlbl {
      font-size: 10px;
      color: var(--td);
      min-width: 96px;
      font-family: var(--mono);
    }

    .mbar {
      flex: 1;
      position: relative;
    }

    .mbg {
      height: 5px;
      background: var(--bg);
      border-radius: 3px;
      border: 1px solid var(--bd);
      position: relative;
      overflow: visible;
    }

    .mfill {
      height: 100%;
      border-radius: 3px;
      transition: width .35s ease;
    }

    .mctr {
      position: absolute;
      left: 50%;
      top: -2px;
      width: 1px;
      height: 9px;
      background: rgba(255, 255, 255, .12);
      z-index: 1;
      pointer-events: none;
    }

    .mv {
      font-family: var(--mono);
      font-size: 10px;
      min-width: 32px;
      text-align: right;
    }

    .msum {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      padding: 9px 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--bd);
      margin-bottom: 8px;
    }

    .msi {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--td);
    }

    .msi strong {
      color: var(--tx);
    }

    /* -- Active Insulin (IOB) ---------------------------------------------------- */
    .iobh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .iobv {
      font-family: var(--mono);
      font-size: 50px;
      line-height: 1;
      color: var(--ac);
      text-shadow: 0 0 30px rgba(0, 212, 255, .4);
    }

    .iobu {
      font-size: 12px;
      color: var(--td);
    }

    .iobb {
      flex: 1;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .iobbl {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--td);
      font-family: var(--mono);
    }

    .iobbt {
      height: 8px;
      background: var(--s2);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--bd);
    }

    .iobbf {
      height: 100%;
      background: linear-gradient(90deg, var(--ac), #0077ff);
      border-radius: 4px;
      transition: width .6s;
      box-shadow: 0 0 8px rgba(0, 212, 255, .5);
    }

    .iobd {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 150px;
      overflow-y: auto;
    }

    .iobdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--td);
      font-family: var(--mono);
      padding: 6px 10px;
      background: var(--s2);
      border-radius: 6px;
      border: 1px solid var(--bd);
    }

    /* -- Body memory state variables --------------------------------------------- */
    .svg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0;
    }

    .svc {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 11px;
      text-align: center;
    }

    .svv {
      font-family: var(--mono);
      font-size: 22px;
      margin-bottom: 2px;
    }

    .svl {
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--td);
    }

    .svb {
      height: 4px;
      border-radius: 2px;
      margin-top: 7px;
      background: var(--bd);
    }

    .svbf {
      height: 100%;
      border-radius: 2px;
      transition: width .5s;
    }

    /* -- Forecast tiles ---------------------------------------------------------- */
    .projg {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .projgi {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--bd);
      background: var(--s2);
      min-width: 80px;
    }

    .projgt {
      font-family: var(--mono);
      font-size: 20px;
    }

    .projgl {
      font-size: 10px;
      color: var(--td);
      text-align: center;
    }

    /* -- Chart sub-tabs ---------------------------------------------------------- */
    .chart-tabs {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 16px;
    }

    .chart-tab {
      flex: 1;
      padding: 6px 6px;
      border: none;
      background: none;
      color: var(--td);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .chart-tab.on {
      background: var(--s1);
      color: var(--ac);
      box-shadow: var(--glow);
    }

    .chart-tab:hover:not(.on) {
      color: var(--tx);
    }

    /* -- Chart ------------------------------------------------------------------- */
    .chwrap {
      position: relative;
      height: 260px;
    }

    /* -- Log table --------------------------------------------------------------- */
    .lt {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .lt th {
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--td);
      padding: 7px 10px;
      border-bottom: 1px solid var(--bd);
    }

    .lt td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--bd);
      color: var(--tx);
      font-family: var(--mono);
      font-size: 11px;
    }

    .lt tr:last-child td {
      border-bottom: none;
    }

    .lt tr:hover td {
      background: var(--s2);
    }

    .lscroll {
      max-height: 300px;
      max-width: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .lscroll .lt {
      min-width: 980px;
    }

    .table-scroll {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-scroll .lt {
      min-width: 560px;
    }

    /* -- Settings ---------------------------------------------------------------- */
    .sg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sst {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ac);
      margin: 16px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--bd);
    }

    .avt {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--td);
      padding: 7px 0;
      user-select: none;
    }

    .avt:hover {
      color: var(--tx);
    }

    /* -- BPM Monitor modal -------------------------------------------------------- */
    .bpm-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(10, 14, 26, .75);
      backdrop-filter: blur(4px);
      animation: tIn .2s ease;
    }

    .bpm-modal {
      background: #111827;
      border: 1px solid var(--bd);
      border-radius: 18px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
    }

    .bpm-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--bd);
    }

    .bpm-hdr-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: .06em;
      color: var(--tx);
    }

    .bpm-close {
      background: none;
      border: none;
      color: var(--td);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      transition: color .15s;
    }

    .bpm-close:hover {
      color: var(--tx);
    }

    .bpm-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }

    .bpm-info {
      background: rgba(0, 212, 255, .06);
      border: 1px solid rgba(0, 212, 255, .15);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 12px;
      color: var(--td);
      line-height: 1.8;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bpm-info-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .bpm-info-icon {
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--ac);

    .bpm-countdown-num {

      color: var(--r);

    .bpm-countdown-lbl {
      font-size: 13px;
      color: var(--td);
      margin-bottom: 16px;

    .bpm-rec-stats {

      width: 100%;

    .bpm-stat {

      font-family: var(--mono);
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--s2);
      border: 1px solid var(--bd);

    .bpm-stat.beats {
      color: var(--r);
      border-color: rgba(255, 107, 107, .3);
      background: rgba(255, 107, 107, .07);
    }

    .bpm-heart-btn {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: rgba(255, 107, 107, .1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--r);

      -webkit-tap-highlight-color: transparent;
      user-select: none;

    .bpm-heart-btn:active,
    .bpm-heart-btn.pop {
      transform: scale(.87);
      background: rgba(255, 107, 107, .25);
    }

    .bpm-heart-btn svg {
      width: 64px;
      height: 64px;
      fill: currentColor;

    .bpm-tap-hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--tm);

    .bpm-result-lbl {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--td);
      margin-bottom: 8px;

    .bpm-result-val {
      font-family: var(--mono);
      font-size: 64px;
      font-weight: 900;
      color: var(--ac);
      text-shadow: 0 0 30px rgba(0, 212, 255, .4);
      line-height: 1;
    }

    .bpm-result-unit {
      font-size: 20px;
      color: var(--td);
      margin-left: 4px;
    }

    .bpm-result-note {

      border: 1px solid rgba(74, 222, 128, .2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--g);
      font-family: var(--mono);
      margin-top: 16px;
      text-align: center;

    .bpm-ftr {

      background: var(--bg);
      border-top: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      gap: 8px;

    .hr-field-wrap {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .hr-field-wrap input {
      flex: 1;
    }

    .bpm-trigger {
      flex-shrink: 0;
      padding: 0 12px;
      background: rgba(255, 107, 107, .1);
      border: 1px solid rgba(255, 107, 107, .25);

      display: flex;
      align-items: center;
      gap: 5px;

      font-family: var(--mono);

      background: rgba(255, 107, 107, .2);
      border-color: rgba(255, 107, 107, .45);
    }

    .bpm-trigger svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    @keyframes bpmPulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .7;
        transform: scale(.94);
      }
    }

    .upl {
      border: 2px dashed var(--bd);
      border-radius: var(--rad);
      padding: 26px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      display: block;
    }

    .upl:hover {
      border-color: var(--ac);
      background: rgba(0, 212, 255, .03);
    }

    /* -- Buttons ----------------------------------------------------------------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 17px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .bp {
      background: linear-gradient(135deg, var(--ac), #0077ff);
      color: #000;
      box-shadow: 0 0 16px rgba(0, 212, 255, .3);
    }

    .bp:hover {
      box-shadow: 0 0 24px rgba(0, 212, 255, .5);
      transform: translateY(-1px);
    }

    .bg_ {
      background: var(--s2);
      color: var(--td);
      border: 1px solid var(--bd);
    }

    .bg_:hover {
      color: var(--tx);
    }

    .bd_ {
      background: rgba(255, 107, 107, .1);
      color: var(--r);
      border: 1px solid rgba(255, 107, 107, .2);
    }

    .bd_:hover {
      background: rgba(255, 107, 107, .2);
    }

    .bsm {
      padding: 5px 11px;
      font-size: 12px;
    }

    .bfw {
      width: 100%;
      justify-content: center;
    }

    /* -- Status tags ------------------------------------------------------------- */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-family: var(--mono);
    }

    .tl {
      background: rgba(255, 107, 107, .15);
      color: var(--r);
    }

    .tn {
      background: rgba(74, 222, 128, .15);
      color: var(--g);
    }

    .th {
      background: rgba(251, 191, 36, .15);
      color: var(--y);
    }

    /* -- Toast ------------------------------------------------------------------- */
    .tst {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 13px;
      color: var(--tx);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      z-index: 1000;
      animation: tIn .25s ease;
      max-width: 300px;
    }

    .tst.ok {
      border-color: rgba(74, 222, 128, .4);
      color: var(--g);
    }

    .tst.err {
      border-color: rgba(255, 107, 107, .4);
      color: var(--r);
    }

    @keyframes tIn {
      from {
        transform: translateY(12px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* -- Light Mode -------------------------------------------------------------- */
    html[data-theme="light"] {
      --bg: #f0f4f8;
      --s1: #ffffff;
      --s2: #e8edf3;
      --bd: #c4cdd8;
      --ac: #0077cc;
      --r: #dc2626;
      --g: #16a34a;
      --y: #b45309;
      --p: #7c3aed;
      --o: #c2410c;
      --tx: #0f172a;
      --td: #475569;
      --tm: #94a3b8;
      --glow: 0 0 20px rgba(0, 119, 204, .15);
    }

    html[data-theme="light"] body {
      background: var(--bg);
    }

    html[data-theme="light"] body::before {
      background: radial-gradient(ellipse at 20% 10%, rgba(0, 119, 204, .05) 0%, transparent 50%),

    html[data-theme="light"] .rv,

    html[data-theme="light"] .logo {
      background: linear-gradient(135deg, var(--ac), #005599);

    html[data-theme="light"] .bpm-overlay {
      background: rgba(224, 232, 240, .85);
    }

    html[data-theme="light"] .bpm-modal {
      background: #ffffff;
    }

    html[data-theme="light"] .bp {
      background: linear-gradient(135deg, var(--ac), #005599);
      color: #fff;
      box-shadow: 0 0 16px rgba(0, 119, 204, .3);
    }

    html[data-theme="light"] .bp:hover {
      box-shadow: 0 0 24px rgba(0, 119, 204, .5);
    }

    html[data-theme="light"] .iobbf {
      background: linear-gradient(90deg, var(--ac), #005599);
    }

    html[data-theme="light"] .fi input:focus {
      border-color: var(--ac);
      box-shadow: 0 0 0 2px rgba(0, 119, 204, .15);
    }

    /* -- High Visibility Mode ----------------------------------------------------- */
    html[data-theme="high-vis"] {
      --bg: #000000;
      --s1: #0d0d0d;
      --s2: #1a1a1a;
      --bd: #ffffff;
      --ac: #00ffff;
      --r: #ff4444;
      --g: #00ff66;
      --y: #ffff00;
      --p: #cc88ff;
      --o: #ff8800;
      --tx: #ffffff;
      --td: #dddddd;

      --glow: 0 0 24px rgba(0, 255, 255, .3);
    }

    html[data-theme="high-vis"] body::before {
      background: none;
    }

    html[data-theme="high-vis"] .rv,
    html[data-theme="high-vis"] .iobv,
    html[data-theme="high-vis"] .bpm-result-val {
      text-shadow: 0 0 24px rgba(0, 255, 255, .7);
    }

    html[data-theme="high-vis"] .logo {
      background: linear-gradient(135deg, var(--ac), #0077ff);
      box-shadow: 0 0 24px rgba(0, 255, 255, .5);
    }

    html[data-theme="high-vis"] .fi input,
    html[data-theme="high-vis"] .fi select,
    html[data-theme="high-vis"] .pab,
    html[data-theme="high-vis"] .slp,
    html[data-theme="high-vis"] .card,
    html[data-theme="high-vis"] .tabs {
      border-width: 2px;
    }

    html[data-theme="high-vis"] .btn.bp {
      background: linear-gradient(135deg, var(--ac), #0077ff);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 255, .5);
    }

    html[data-theme="high-vis"] .rbox {
      border-width: 2px;
    }

    html[data-theme="high-vis"] .bpm-overlay {
      background: rgba(0, 0, 0, .88);
    }

    html[data-theme="high-vis"] .bpm-modal {
      background: #0d0d0d;
      border: 2px solid var(--bd);
    }

    html[data-theme="high-vis"] .iobbf {

    html[data-theme="high-vis"] .lt th,

    /* -- Misc helpers ------------------------------------------------------------ */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {

    }

    ::-webkit-scrollbar-thumb {

      border-radius: 3px;
    }

    .div {
      height: 1px;
      background: var(--bd);
      margin: 14px 0;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sp {
      flex: 1;
    }

    .es {
      text-align: center;
      padding: 30px;
      color: var(--tm);
      font-size: 13px;
    }

    .es .ei {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .note {
      font-size: 11px;
      color: var(--td);
      font-family: var(--mono);
      line-height: 1.8;
    }

    .fl-label {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--td);
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
    }

    /* -- Simple / Advanced mode toggle ------------------------------------------- */
    .app.simple .advanced-only {
      display: none;
    }

    .mode-btn {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      color: var(--td);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .mode-btn:hover {
      color: var(--tx);
    }

    .mode-btn.is-simple {
      border-color: var(--ac);
      color: var(--ac);
      background: rgba(0, 212, 255, .08);
    }

    .mode-btn.is-custom {
      border-color: var(--p);
      color: var(--p);
      background: rgba(167, 139, 250, .08);
    }

    /* -- Custom UI modal --------------------------------------------------------- */
    .cui-overlay {
      position: fixed;
      inset: 0;
      z-index: 240;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;

      backdrop-filter: blur(5px);
      animation: tIn .2s ease;

    .cui-modal {

      flex-direction: column;
      overflow: hidden;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, .6);
    }

    .cui-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--bd);

    .cui-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cui-title {
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ac);
    }

    .cui-sub {
      font-size: 12px;
      color: var(--td);
      line-height: 1.45;
    }

    .cui-close {
      border: none;
      background: none;
      color: var(--td);
      font-size: 24px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }

    .cui-close:hover {
      color: var(--tx);
      background: rgba(255, 255, 255, .04);
    }

    .cui-body {
      padding: 14px 20px 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .cui-note {
      font-size: 12px;
      color: var(--td);
      line-height: 1.55;
      padding: 12px 14px;
      border: 1px solid var(--bd);
      border-radius: 12px;
      background: rgba(255, 255, 255, .03);
    }

    .cui-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cui-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .cui-row:last-child {
      border-bottom: none;
    }

    .cui-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .cui-label {
      font-size: 13px;
      color: var(--tx);
      font-weight: 600;
    }

    .cui-help {
      font-size: 11px;
      color: var(--td);
      line-height: 1.4;
    }

    .cui-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--bd);
      border-radius: 10px;
      background: var(--s2);
      padding: 7px 10px;
      flex-shrink: 0;
    }

    .cui-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .22);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .12);
      flex-shrink: 0;
    }

    .cui-hex {
      width: 74px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--tx);
      text-transform: uppercase;
      text-align: right;
    }

    input[type="color"] {
      width: 28px;
      height: 28px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 6px;
    }

    input[type="color"]::-moz-color-swatch {
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 6px;
    }

    .cui-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 8px;
    }

    .cui-footer-note {
      font-size: 11px;
      color: var(--tm);
      text-align: right;
    }

    @media (max-width: 560px) {
      .cui-row {
        grid-template-columns: 1fr;

      .cui-picker {
        justify-content: space-between;

      .cui-actions {
        justify-content: stretch;
      }

      .cui-actions .btn,
      .cui-actions .bp {

        justify-content: center;
      }

      .cui-footer-note {
        text-align: left;
      }

    @media (max-width: 720px) {
      .hdr-actions {
        width: 100%;
        margin-left: 0;
        justify-content: flex-start;
      }

      .tab,
      .chart-tab {
        flex: 0 0 auto;
        min-width: 120px;
      }

      .hr-field-wrap {
        flex-wrap: wrap;
      }

      .bpm-trigger {
        width: 100%;
        justify-content: center;
      }
    }

    /* -- CGM Live Feed (Nightscout) ----------------------------------------------- */
    .cgm-badge {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 100%;
      padding: 5px 11px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1;
      transition: all .3s;
    }

    .cgm-badge.live {
      background: rgba(0, 212, 255, .08);
      border: 1px solid rgba(0, 212, 255, .28);
    }

    .cgm-badge.stale {
      background: rgba(251, 191, 36, .08);
      border: 1px solid rgba(251, 191, 36, .28);
    }

    .cgm-badge.error {
      background: rgba(255, 107, 107, .08);
      border: 1px solid rgba(255, 107, 107, .28);
    }

    .cgm-badge.polling {
      background: rgba(100, 116, 139, .06);
      border: 1px solid rgba(100, 116, 139, .2);
    }

    .cgm-trend-bar-wrap {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 28px;
    }

    .cgm-trend-bar {
      border-radius: 2px 2px 0 0;
      min-height: 3px;
      transition: height .3s;
    }

    .cgm-field-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 8px;
      background: rgba(0, 212, 255, .06);
      border: 1px solid rgba(0, 212, 255, .2);
      margin-bottom: 6px;
      font-family: var(--mono);
      font-size: 12px;
      flex-wrap: wrap;

    @keyframes cgmPulse {

      0%,
      100% {

    .input-unit-wrap {

      align-items: stretch;
      gap: 6px;
    }

    .input-unit-wrap input,
    .input-unit-wrap select {
      flex: 1;
    }

    .input-unit-suffix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 0 10px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--bg);
      color: var(--td);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // -------------------------------------------------------------------------------
    //  A.  CONSTANTS / DEFAULTS
    //
    //  Three flat objects — profile (slower-moving clinical/demographic settings),
    //  sim params (physiologic coefficients), and ui prefs (display toggles).
    //  Each new feature adds keys here first, then flows through the vertical slice.
    // -------------------------------------------------------------------------------

    // Clinical and demographic profile — things a care team would adjust.
    const DEFAULT_PROFILE = {
      // Dosing
      carbRatio: 12,    // g carbs per unit of insulin
      corrFactor: 50,    // mg/dL blood sugar drop per unit (correction factor)
      targetBG: 100,    // target blood sugar, mg/dL
      insulinDur: 4,    // base insulin duration, hours
      lowBG: 70,    // low threshold, mg/dL
      highBG: 180,    // high threshold, mg/dL
      basalRate: 0.8,    // basal insulin rate, units/hr (pump or long-acting background)
      maxDose: 50,    // hard cap for a single suggested/logged bolus, units
      // Injection site absorption multipliers — per-dose, stored per log entry.
      // Abdomen = fastest; thigh = slowest due to lower local blood flow.
      siteMult_abdomen: 1.00,

    // -------------------------------------------------------------------------------
    //  A2. GLUCOSE–INSULIN SIMULATION MODULE
    //
    //  Subsystem classes (each owns one concern):
    //    InsulinPK          — two-compartment subcutaneous depot → plasma PK
    //    SensitivityModel   — 4 sensitivity factors, S_active vs S_future
    //    PDLayer            — PD: effect and IOB from PK state + sensitivity
    //    CorrectionEngine   — stateless correction-dose calculations (consumes PD outputs)
    //    CarbAbsorption     — gut reservoir → blood glucose transfer
    //    BasalModel         — continuous basal infusion into depot
    //    GlucoseSimulator   — glucose state variable with Euler integration
    //
    //  BloodGlucoseInsulinModel — orchestrator.
    //  Public API preserved from v1; new methods added below.
    // -------------------------------------------------------------------------------

    // -- InsulinPK ------------------------------------------------------------------
    // Two-compartment model: subcutaneous depot D (U) → plasma P (U).
    // Absorption uses Michaelis-Menten saturable kinetics:
    //   k_a(D) = k_a_max × D / (K_M + D)   [min⁻¹]
    //   dD/dt  = –k_a(D) × D
    //   dP/dt  =  k_a(D) × D – k_e × P
    // Simultaneous Euler: both ODEs use D_old to avoid order-of-update bias.
    class InsulinPK {
      constructor({ k_a_max = 0.03, K_M = 5.0, k_e = 0.01 } = {}) {
        this.k_a_max = k_a_max; // min⁻¹  max saturable absorption rate
        this.K_M = K_M;     // U      Michaelis-Menten half-saturation
        this.k_e = k_e;     // min⁻¹  plasma elimination rate
        this.D = 0;             // U  subcutaneous depot
        this.P = 0;             // U  plasma compartment
      }

      addBolus(amount) { this.D += Math.max(0, Number(amount) || 0); }

      // Advance by dtMin minutes. Returns absorption flux (U/min) for glucose coupling.
      step(dtMin) {
        const D0 = this.D;
        const k_a = this.k_a_max * D0 / (this.K_M + D0 + 1e-9); // min⁻¹
        const flux = k_a * D0;                                     // U/min leaving depot
        this.D = Math.max(0, D0 - flux * dtMin);
        this.P = Math.max(0, this.P + (flux - this.k_e * this.P) * dtMin);
        return flux;
      }

      get totalInsulin() { return this.D + this.P; }

      getState() { return { depot: this.D, plasma: this.P, totalInsulin: this.totalInsulin }; }

      clone() {
        const c = new InsulinPK({ k_a_max: this.k_a_max, K_M: this.K_M, k_e: this.k_e });
        c.D = this.D; c.P = this.P;
        return c;
      }
    }

    // -- SensitivityModel -----------------------------------------------------------
    // Manages four orthogonal insulin sensitivity factors.
    //
    // S_active = product of ALL four factors (sensitivity right now).
    // S_future = configurable subset of factors, each with an optional weight.
    //            Answers: "what sensitivity should I expect when bolus insulin peaks?"
    //
    // Default: only circadianSensitivityFactor contributes at weight 1.
    // Example overrides:
    //   model.setFutureFactorNames(['circadianSensitivityFactor','exerciseSensitivityFactor'])
    //   model.setFutureFactorWeights({ exercise: 0.6 })  // expect 60% of exercise uplift to persist
    //
    // Weight formula: blended = 1 + w × (factor − 1)
    //   w=1 → full factor preserved; w=0 → excluded (contributes 1.0); w=0.5 → half of deviation
    //   This is linear interpolation from the neutral baseline of 1, symmetric for both
    //   upward (exercise boost) and downward (stress penalty) factors.
    class SensitivityModel {
      constructor({ minSensitivity = 0.1, maxSensitivity = 3.0,
        futureFactorNames = null, futureFactorWeights = null } = {}) {
        this.minSensitivity = minSensitivity;
        this.maxSensitivity = maxSensitivity;
        this.factors = {
          circadianSensitivityFactor: 1.0, // age, sex, sleep, dawn — slow-moving baseline
          exerciseSensitivityFactor: 1.0, // acute exercise window
          stressSensitivityFactor: 1.0, // stress, illness, travel, substances
          glucoseSensitivityFactor: 1.0, // current BG level, recent lows/highs, BMI
        };
        // Per-factor physiologic clamp bounds
        this._bounds = {
          circadianSensitivityFactor: [0.3, 2.0],
          exerciseSensitivityFactor: [0.2, 2.5],
          stressSensitivityFactor: [0.2, 2.0],
          glucoseSensitivityFactor: [0.3, 2.0],
        };
        // Which factors contribute to S_future (default: circadian only)
        this._futureNames = futureFactorNames ?? ['circadianSensitivityFactor'];
        // Per-factor weights for S_future (default: all included names at weight 1)
        // Key can be full name or short alias (circadian / exercise / stress / glucose)
        this._futureWeights = futureFactorWeights ?? {};
      }

      // -- Factor updates ------------------------------------------------------------
      setFactors(newFactors = {}) {
        for (const [key, [lo, hi]] of Object.entries(this._bounds)) {
          const shortKey = key.replace('SensitivityFactor', '');
          const val = newFactors[key] ?? newFactors[shortKey] ?? this.factors[key];
          this.factors[key] = Math.min(hi, Math.max(lo, Number(val) || 1));
        }
      }

      // -- Future sensitivity configuration (2.3) ------------------------------------
      // Set which factors contribute to S_future.
      // names: array of full factor names or short aliases.
      // e.g. ['circadian', 'exercise']
      setFutureFactorNames(names) {
        this._futureNames = names.map(n =>
          n.endsWith('SensitivityFactor') ? n : `${n}SensitivityFactor`
        ).filter(n => n in this._bounds);
      }

      // Set per-factor weights for S_future (2.4 — linear interpolation).
      // weights: { circadian: 1, exercise: 0.4, stress: 0.2 }
      // A factor not listed uses weight 1.0 if in futureNames, or is excluded.
      setFutureFactorWeights(weights = {}) {
        // Normalise short aliases to full names
        const normalised = {};
        for (const [k, v] of Object.entries(weights)) {
          const fullKey = k.endsWith('SensitivityFactor') ? k : `${k}SensitivityFactor`;
          normalised[fullKey] = Math.max(0, Math.min(1, Number(v) || 0));
        }
        this._futureWeights = normalised;
      }

      // -- Computed sensitivities ----------------------------------------------------
      get S_active() {
        const raw = this.factors.circadianSensitivityFactor
          * this.factors.exerciseSensitivityFactor
          * this.factors.stressSensitivityFactor
          * this.factors.glucoseSensitivityFactor;
        return Math.min(this.maxSensitivity, Math.max(this.minSensitivity, raw));
      }

      // S_future: product of weighted blends of the configured future factors.
      // blended(factor, weight) = 1 + weight × (factor − 1)
      get S_future() {
        let product = 1;
        for (const name of this._futureNames) {
          const f = this.factors[name] ?? 1;
          const w = this._futureWeights[name] ?? 1;
          product *= 1 + w * (f - 1); // linear blend from neutral baseline
        }
        return Math.min(this.maxSensitivity, Math.max(this.minSensitivity, product));
      }

      getState() {
        return {
          ...this.factors,
          S_active: this.S_active,
          S_future: this.S_future,
          futureFactorNames: [...this._futureNames],
          futureFactorWeights: { ...this._futureWeights },
        };
      }
    }

    // -- PDLayer --------------------------------------------------------------------
    // Pharmacodynamics: maps PK state (D, P) + sensitivity to insulin effect and IOB.
    // All methods are pure/stateless. PK knows nothing about sensitivity — that boundary
    // is enforced here.
    class PDLayer {
      // Current insulin effect: plasma concentration scaled by active sensitivity.
      // Units: U*(sensitivity) — fed into GlucoseSimulator as the disposal driver.
      static currentEffect(P, S_active) {
        return P * S_active;
      }

      // Physically interpretable IOB credit.
      // Re-expresses plasma in subq-equivalent units, discounted when future
      // sensitivity is expected to be lower than current sensitivity.
      static effectiveSubqIob(D, P, S_active, S_future) {
        const plasmaSubqEquiv = P * (Math.max(0.01, S_future) / Math.max(0.01, S_active));
        return Math.max(0, D + plasmaSubqEquiv);
      }

      // Heuristic weighted IOB credit.
      // Depot is partially credited (40% by default) because it has not yet reached plasma.
      static weightedIobCredit(D, P, S_active, depotWeight = 0.4, plasmaWeight = 1.0) {
        return (depotWeight * D + plasmaWeight * P) * S_active;
      }
    }

    // -- CorrectionEngine -----------------------------------------------------------
    // Stateless correction-dose calculations — pure functions, no instance needed.
    // Consumes pre-computed PD outputs; never touches raw PK values (D, P) directly.
    class CorrectionEngine {
      // Recommend a correction dose.
      // expectedFutureISF: baseISF * S_future — computed by the orchestrator before calling here.
      // iobCredit: U from PDLayer.effectiveSubqIob or PDLayer.weightedIobCredit.
      static recommend(glucose, target, expectedFutureISF, iobCredit) {
        const rawCorrection = Math.max(0, (glucose - target) / Math.max(0.1, expectedFutureISF));
        const recommendedCorrection = Math.max(0, rawCorrection - iobCredit);
        // Keep dynamicISF as a backward-compatible alias for existing consumers.
        return { expectedFutureISF, dynamicISF: expectedFutureISF, rawCorrection, iobCredit, recommendedCorrection };
      }
    }

    // -- CarbAbsorption -------------------------------------------------------------
    // Two-compartment gut model: D_g (gut reservoir, g) → R_c (transit, g) → blood.
    //   dD_g/dt = –k_ge × D_g
    //   dR_c/dt =  k_ge × D_g – k_abs × R_c
    // Returns blood glucose flux (g/hr) at each step for coupling to GlucoseSimulator.
    class CarbAbsorption {
      constructor({ k_ge = 2.0, k_abs = 1.5 } = {}) {
        this.k_ge = k_ge;  // hr⁻¹ gastric emptying rate
        this.k_abs = k_abs; // hr⁻¹ gut→blood transfer rate
        this.D_g = 0;       // g   food in stomach/gut
        this.R_c = 0;       // g   glucose in transit to blood
      }

      addMeal(carbs_g, k_ge = null) {
        this.D_g += Math.max(0, carbs_g);
        if (k_ge != null) this.k_ge = k_ge;
      }

      // Advance by dtMin minutes. Returns blood glucose flux (g/hr).
      step(dtMin) {
        const dtHr = dtMin / 60;
        const emptying = this.k_ge * this.D_g;
        const transfer = this.k_abs * this.R_c;
        this.D_g = Math.max(0, this.D_g + (-emptying) * dtHr);
        this.R_c = Math.max(0, this.R_c + (emptying - transfer) * dtHr);
        return transfer; // g/hr entering blood
      }

      getState() { return { gut: this.D_g, transit: this.R_c, total: this.D_g + this.R_c }; }

      clone() {
        const c = new CarbAbsorption({ k_ge: this.k_ge, k_abs: this.k_abs });
        c.D_g = this.D_g; c.R_c = this.R_c;
        return c;
      }
    }

    // -- BasalModel -----------------------------------------------------------------
    // Continuous basal insulin infusion. Adds a steady trickle to the depot each step.
    class BasalModel {
      constructor({ basalRate = 0.0 } = {}) {
        this.basalRate = basalRate; // U/hr
      }
      // Returns U to add to depot over dtMin.
      step(dtMin) { return this.basalRate * (dtMin / 60); }
    }

    // -- GlucoseSimulator -----------------------------------------------------------
    // Single-compartment glucose model for forward projection simulations.
    // Not used during IOB credit calculation (live BG comes from CGM/log entries).
    //   dG/dt = G_prod – ISF × k_e × P × S_active – k_basal × (G – G_target) + carb_effect
    class GlucoseSimulator {
      constructor({ targetGlucose = 100, baseISF = 40, k_e = 0.01,
        G_prod = 0.0, k_basal = 0.008 } = {}) {
        this.targetGlucose = targetGlucose;
        this.baseISF = baseISF;   // mg/dL per U
        this.k_e = k_e;      // plasma elimination (min⁻¹ — same as InsulinPK)
        this.G_prod = G_prod;   // mg/dL/hr hepatic output
        this.k_basal = k_basal;  // hr⁻¹ mean reversion toward target
        this.G = targetGlucose;  // mg/dL current glucose
      }

      // Advance by dtMin.
      // insulinEffect = PDLayer.currentEffect(P, S_active) — passed in by the orchestrator.
      // carbFlux_gPerHr = g/hr of glucose entering from gut.
      step(dtMin, { insulinEffect, carbFlux_gPerHr = 0 }) {
        const dtHr = dtMin / 60;
        // Insulin-mediated disposal: ISF × k_e × insulinEffect  (mg/dL / hr)
        const disposal = this.baseISF * this.k_e * insulinEffect * 60;
        // Mean reversion toward target
        const reversion = this.k_basal * (this.G - this.targetGlucose);
        // Carb absorption (g/hr × ~18 mg/dL per g for 5L glucose volume of distribution)
        const carbEffect = carbFlux_gPerHr * 18;
        const dG = (this.G_prod - disposal - reversion + carbEffect) * dtHr;
        this.G = Math.min(500, Math.max(40, this.G + dG));
        return this.G;
      }

      getState() { return { glucose: this.G }; }

      clone() {
        const c = new GlucoseSimulator({
          targetGlucose: this.targetGlucose, baseISF: this.baseISF,
          k_e: this.k_e, G_prod: this.G_prod, k_basal: this.k_basal,
        });
        c.G = this.G;
        return c;
      }
    }

    // -- BloodGlucoseInsulinModel (orchestrator) ------------------------------------
    //
    //  Wires all subsystems behind a single event-driven API.
    //
    //  Preserved API (v1 compatible):
    //    addBolus(amount, time)
    //    setSensitivityFactors(time, factors)
    //    getState(time)               → { physical, clinical, factors, ... }
    //    getCorrectionRecommendation  → { expectedFutureISF, rawCorrection, ... }
    //
    //  New API (Phase 1 additions):
    //    addMeal(carbs_g, k_ge, time)              — queue carb absorption event
    //    project(durationMin, opts)                — non-mutating forward simulation trace
    //    snapshot()                                — serialise full state to plain object
    //    restore(snap)                             — restore from snapshot
    //    reset()                                   — zero all compartments
    //    setFutureFactorNames(['circadian','exercise'])
    //    setFutureFactorWeights({ exercise: 0.6 }) — partial contribution to S_future
    class BloodGlucoseInsulinModel {
      constructor(params = {}) {
        this.baseISF = params.baseISF ?? 40;
        this.targetGlucose = params.targetGlucose ?? 100;
        this.depotWeight = params.depotWeight ?? 0.4;
        this.plasmaWeight = params.plasmaWeight ?? 1.0;

        this._pk = new InsulinPK({
          k_a_max: params.k_a_max ?? 0.03,
          K_M: params.K_M ?? 5.0,
          k_e: params.k_e ?? 0.01,
        });
        this._sens = new SensitivityModel({
          minSensitivity: params.minSensitivity ?? 0.1,
          maxSensitivity: params.maxSensitivity ?? 3.0,
        });
        this._carbs = new CarbAbsorption({
          k_ge: params.k_ge ?? 2.0,
          k_abs: params.k_abs ?? 1.5,
        });
        this._basal = new BasalModel({ basalRate: params.basalRate ?? 0.0 });
        this._glucose = new GlucoseSimulator({
          targetGlucose: this.targetGlucose,
          baseISF: this.baseISF,
          k_e: params.k_e ?? 0.01,
          G_prod: params.G_prod ?? 0.0,
          k_basal: params.k_basal ?? 0.008,
        });

        this.lastUpdateTime = Date.now();
      }

      // -- Event-driven API --------------------------------------------------------
      addBolus(amount, time = Date.now()) {
        this._advanceTo(time);
        this._pk.addBolus(amount);
      }

      // NEW: add a carbohydrate meal event.
      // k_ge overrides gastric emptying rate for this meal (null = use current default).
      addMeal(carbs_g, k_ge = null, time = Date.now()) {
        this._advanceTo(time);
        this._carbs.addMeal(carbs_g, k_ge);
      }

      setSensitivityFactors(time, newFactors = {}) {
        this._advanceTo(time);
        this._sens.setFactors(newFactors);
      }

      // -- Query API ---------------------------------------------------------------
      // Returns the same shape as v1 for backward compatibility + glucose/carbs fields.
      getState(time = Date.now()) {
        this._advanceTo(time);
        const pkS = this._pk.getState();
        const { S_active, S_future } = this._sens;
        const currentEffect = PDLayer.currentEffect(pkS.plasma, S_active);
        const effectiveSubqIob = PDLayer.effectiveSubqIob(pkS.depot, pkS.plasma, S_active, S_future);
        const weightedIobCredit = PDLayer.weightedIobCredit(pkS.depot, pkS.plasma, S_active, this.depotWeight, this.plasmaWeight);
        const expectedFutureISF = this.baseISF * Math.max(0.1, S_future);
        return {
          timestamp: this.lastUpdateTime,
          physical: pkS,
          clinical: { S_active, S_future, expectedFutureISF, currentEffect, weightedIobCredit, effectiveSubqIob },
          factors: { ...this._sens.factors },
          glucose: this._glucose.getState(),
          carbs: this._carbs.getState(),
        };
      }

      getCorrectionRecommendation(glucose, time = Date.now(), target = this.targetGlucose, method = 'effectiveSubq') {
        const state = this.getState(time);
        const { expectedFutureISF, weightedIobCredit, effectiveSubqIob } = state.clinical;
        // Consume PD-layer outputs only; no raw PK values in correction logic.
        const iobCredit = method === 'weighted'
          ? weightedIobCredit
          : effectiveSubqIob;
        const rec = CorrectionEngine.recommend(glucose, target, expectedFutureISF, iobCredit);
        return { glucose, target, creditMethod: method, state, ...rec };
      }

      // -- Simulation layer --------------------------------------------------------
      // Forward projection — does NOT mutate the current instance.
      // Returns an array of snapshot objects at intervalMin resolution.
      // opts.glucoseStart: override starting glucose (default: last known G)
      // opts.stepMin:      Euler step size in minutes (default: 1)
      // opts.intervalMin:  output resolution in minutes (default: 5)
      project(durationMin = 240, { intervalMin = 5, stepMin = 1, glucoseStart = null } = {}) {
        // Clone all mutable subsystems so this instance is untouched
        const pk = this._pk.clone();
        const carbs = this._carbs.clone();
        const glucose = this._glucose.clone();
        const basal = new BasalModel({ basalRate: this._basal.basalRate });
        if (glucoseStart != null) glucose.G = glucoseStart;
        const { S_active, S_future } = this._sens; // sensitivity is assumed constant over projection

        const pts = [{
          t: 0, G: glucose.G, depot: pk.D, plasma: pk.P,
          iob: PDLayer.effectiveSubqIob(pk.D, pk.P, S_active, S_future),
        }];

        let elapsed = 0;
        let nextOutput = intervalMin;
        while (elapsed < durationMin) {
          const dt = Math.min(stepMin, durationMin - elapsed);
          pk.D += basal.step(dt);                                         // basal trickle into depot
          pk.step(dt);                                                     // insulin PK (pure)
          const carbFlux = carbs.step(dt) * 60;                           // g/min → g/hr
          const insulinEffect = PDLayer.currentEffect(pk.P, S_active);    // PD: effect = P × S_active
          glucose.step(dt, { insulinEffect, carbFlux_gPerHr: carbFlux });
          elapsed += dt;
          if (elapsed >= nextOutput || elapsed >= durationMin) {
            pts.push({
              t: Math.round(elapsed), G: glucose.G, depot: pk.D, plasma: pk.P,
              iob: PDLayer.effectiveSubqIob(pk.D, pk.P, S_active, S_future),
            });
            nextOutput += intervalMin;
          }
        }
        return pts;
      }

      // -- State persistence -------------------------------------------------------
      snapshot() {
        return {
          time: this.lastUpdateTime,
          pk: { D: this._pk.D, P: this._pk.P },
          factors: { ...this._sens.factors },
          carbs: { D_g: this._carbs.D_g, R_c: this._carbs.R_c },
          glucose: { G: this._glucose.G },
        };
      }

      restore(snap) {
        this.lastUpdateTime = snap.time ?? Date.now();
        this._pk.D = snap.pk?.D ?? 0;
        this._pk.P = snap.pk?.P ?? 0;
        if (snap.factors) this._sens.setFactors(snap.factors);
        this._carbs.D_g = snap.carbs?.D_g ?? 0;
        this._carbs.R_c = snap.carbs?.R_c ?? 0;
        if (snap.glucose?.G != null) this._glucose.G = snap.glucose.G;
      }

      reset() {
        this._pk.D = 0; this._pk.P = 0;
        this._carbs.D_g = 0; this._carbs.R_c = 0;
        this._glucose.G = this.targetGlucose;
        this.lastUpdateTime = Date.now();
      }

      // -- Configurable future sensitivity (delegated to SensitivityModel) ----------
      setFutureFactorNames(names) { this._sens.setFutureFactorNames(names); }
      setFutureFactorWeights(weights) { this._sens.setFutureFactorWeights(weights); }

      // -- Backward-compatibility static -------------------------------------------
      static defaultGlucoseSensitivityFactor(glucose, glucoseRate) {
        if (glucose < 70 && glucoseRate < -1) return 0.8;
        if (glucose > 180 && glucoseRate > 0) return 1.2;
        return 1.0;
      }

      // -- Internal ----------------------------------------------------------------
      // Advance PK and CarbAbsorption subsystems to targetTime.
      // GlucoseSimulator is NOT advanced here — live BG readings drive glucose,
      // not the model (callers pass measured values into getCorrectionRecommendation).
      // Use project() when you want a fully integrated glucose trajectory.
      _advanceTo(targetTime) {
        if (targetTime <= this.lastUpdateTime) return;
        let remaining = (targetTime - this.lastUpdateTime) / 60_000;
        const step = 1.0; // 1-minute Euler steps
        while (remaining > 1e-6) {
          const dt = Math.min(step, remaining);
          this._pk.step(dt);
          this._carbs.step(dt);
          remaining -= dt;
        }
        this.lastUpdateTime = targetTime;
      }
    }

    // -------------------------------------------------------------------------------
    //  B.  UTILITY FUNCTIONS
    // -------------------------------------------------------------------------------

    // Clamp a number between lo and hi.
    function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

    // Linear interpolation between a and b by factor t ∈ [0,1].
    function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }

    // Gaussian bell curve: 1 at x=mu, falls off with width sigma.
    function gauss(x, mu, sigma) { return Math.exp(-Math.pow(x - mu, 2) / (2 * sigma * sigma)); }

    // Parse a number safely; return fallback if the result is NaN or ≤ 0.
    function safeNum(v, fallback = 0) { const n = parseFloat(v); return isNaN(n) ? fallback : n; }

    // Parse optional numeric input: empty -> null, invalid -> null.
    function parseOptNum(v) {
      if (v == null || v === '') return null;
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : null;
    }

    // ── Unit conversion layer ───────────────────────────────────────────────────
    // All internal values (profile, logs, model) stay in mg/dL.
    // Only the UI converts using these helpers.
    const MGDL_PER_MMOL = 18;

    function isMmol(ui) { return ui?.glucoseUnit === 'mmol'; }

    function formatBgForDisplay(mgdl, ui, digits) {
      if (mgdl == null || !Number.isFinite(Number(mgdl))) return '';
      if (isMmol(ui)) return (Number(mgdl) / MGDL_PER_MMOL).toFixed(digits ?? 1);
      return String(Math.round(Number(mgdl)));
    }

    function parseBgFromDisplay(raw, ui) {
      if (raw == null || raw === '') return null;
      const n = parseFloat(raw);
      if (!Number.isFinite(n)) return null;
      return isMmol(ui) ? Math.round(n * MGDL_PER_MMOL) : n;
    }

    function formatCorrFactorForDisplay(mgdlPerU, ui) {
      if (mgdlPerU == null || !Number.isFinite(Number(mgdlPerU))) return '';
      return isMmol(ui)
        ? (Number(mgdlPerU) / MGDL_PER_MMOL).toFixed(1)
        : String(Math.round(Number(mgdlPerU)));
    }

    function parseCorrFactorFromDisplay(raw, ui) {
      if (raw == null || raw === '') return null;
      const n = parseFloat(raw);
      if (!Number.isFinite(n)) return null;
      return isMmol(ui) ? n * MGDL_PER_MMOL : n;
    }

    function bgUnitLabel(ui) { return isMmol(ui) ? 'mmol/L' : 'mg/dL'; }
    function corrUnitLabel(ui) { return isMmol(ui) ? 'mmol/L/u' : 'mg/dL/u'; }

    function formatBgRange(loMgdl, hiMgdl, ui) {
      if (isMmol(ui))
        return `${(loMgdl / MGDL_PER_MMOL).toFixed(1)}–${(hiMgdl / MGDL_PER_MMOL).toFixed(1)} mmol/L`;
      return `${loMgdl}–${hiMgdl} mg/dL`;
    }

    // Centralized validation for entry BG/carb fields.
    // bg/fs are strings in the user's display unit; ui.glucoseUnit determines parsing.
    function validateEntryInputs({ bg, fs, crbs, dualBg, ui }) {
      const bgV = parseBgFromDisplay(bg, ui);
      const fsV = parseBgFromDisplay(fs, ui);
      const carbV = parseOptNum(crbs);

      let bgErr = null;
      let fsErr = null;
      let carbErr = null;

      if (bgV != null && (bgV < BG_ENTRY_MIN || bgV > BG_ENTRY_MAX))
        bgErr = `BG must be ${formatBgRange(BG_ENTRY_MIN, BG_ENTRY_MAX, ui)}.`;
      if (dualBg && fsV != null && (fsV < BG_ENTRY_MIN || fsV > BG_ENTRY_MAX))
        fsErr = `Fingerstick must be ${formatBgRange(BG_ENTRY_MIN, BG_ENTRY_MAX, ui)}.`;
      if (carbV != null && (carbV < CARB_ENTRY_MIN || carbV > CARB_ENTRY_MAX))
        carbErr = `Carbs must be ${CARB_ENTRY_MIN}–${CARB_ENTRY_MAX}g.`;

      const effBg = dualBg && fsV != null ? fsV : bgV;
      let doseBlockReason = null;
      if (!bgErr && !fsErr && effBg != null && effBg > BG_DOSING_MAX)
        doseBlockReason = `Dose calculation disabled above ${formatBgForDisplay(BG_DOSING_MAX, ui, isMmol(ui) ? 1 : 0)} ${bgUnitLabel(ui)}.`;
      if (!carbErr && carbV != null && carbV > CARB_ENTRY_MAX)
        doseBlockReason = `Dose calculation disabled above ${CARB_ENTRY_MAX}g carbs.`;

      const canCompute = !bgErr && !fsErr && !carbErr && effBg != null && !doseBlockReason;
      return { bgV, fsV, carbV, effBg, bgErr, fsErr, carbErr, doseBlockReason, canCompute };
    }

    // k_clear is stored in hr^-1. These helpers make unit intent explicit.
    function kClearPerHour(sim) {
      return Math.max(0.001, safeNum(sim.k_clear, 0.5));
    }
    function kClearPerMinute(sim) {
      return kClearPerHour(sim) / 60;
    }

    // Hours elapsed between two ISO timestamps (positive = log is in the past).
    function hoursBetween(isoA, isoB) {
      return (new Date(isoB).getTime() - new Date(isoA).getTime()) / 3_600_000;
    }

    // Exponential decay: value * e^(-hours / tau).
    // Used to compute how much a past event still matters right now.
    function rollingDecay(value, hoursAgo, tau) {
      return value * Math.exp(-hoursAgo / tau);
    }

    // Convert a 0–N enum index to a normalised 0–1 scalar.
    function enumToScalar(index, max) { return clamp(index / max, 0, 1); }

    // Colour for a modifier bar (green = normal, red/purple = far from 1.0).
    function modColor(v) {
      if (v < 0.60) return '#ef4444';
      if (v < 0.80) return '#f97316';
      if (v < 0.92) return '#fbbf24';
      if (v <= 1.08) return '#4ade80';
      if (v <= 1.25) return '#38bdf8';
      return '#a78bfa';
    }

    // BG-value colour (red/yellow/green).
    function bgColor(bg) { return bg < 70 ? '#ef4444' : bg > 180 ? '#fbbf24' : '#4ade80'; }

    // BG zone string.
    function zone(bg, p) { return bg < p.lowBG ? 'low' : bg > p.highBG ? 'high' : 'ok'; }

    // Forecast risk label for the end of the projection.
    function projLabel(bg, p) {
      return bg < p.lowBG ? '🔴 Hypo risk' : bg > p.highBG ? '🟡 Elevated' : '🟢 In range';
    }

    // Format an ISO timestamp as "HH:MM".
    function fmtT(iso) { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    // Format as "Mon D".
    function fmtD(iso) { return new Date(iso).toLocaleDateString([], { month: 'short', day: 'numeric' }); }
    // Format as "Mon D HH:MM".
    function fmtDT(iso) { return `${fmtD(iso)} ${fmtT(iso)}`; }
    // Current time as ISO string.
    function nowISO() { return new Date().toISOString(); }
    // Current local time as YYYY-MM-DDTHH:mm for <input type="datetime-local">.
    function nowLocalInput() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    // Parse datetime-local string to ISO; returns null if invalid.
    function localInputToISO(v) {
      if (!v) return nowISO();
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d.toISOString();
    }

    function isPlainObject(value) {
      if (!value || typeof value !== 'object' || Array.isArray(value)) return false;
      const proto = Object.getPrototypeOf(value);
      return proto === Object.prototype || proto === null;
    }

    function toEpochMs(value, fieldName = 'timestamp') {
      if (value == null || value === '') throw new Error(`${fieldName} is missing`);

      if (typeof value === 'number') {
        if (!Number.isFinite(value)) throw new Error(`${fieldName} is not finite`);
        return value;
      }

      if (typeof value === 'string') {
        const ms = Date.parse(value);
        if (!Number.isFinite(ms)) throw new Error(`${fieldName} is invalid: ${value}`);
        return ms;
      }

      if (value instanceof Date) {
        const ms = value.getTime();
        if (!Number.isFinite(ms)) throw new Error(`${fieldName} is invalid Date`);
        return ms;
      }

      throw new Error(`${fieldName} has unsupported type: ${typeof value}`);
    }

    function tryToEpochMs(value, fieldName = 'timestamp') {
      try { return toEpochMs(value, fieldName); }
      catch { return NaN; }
    }

    function getLogTimestampMs(log) {
      const timestampMs = Number(log?.timestampMs);
      return Number.isFinite(timestampMs)
        ? timestampMs
        : tryToEpochMs(log?.timestamp, 'timestamp');
    }

    function normalizeTimePoint(raw, valueKey = 'y', timeKey = 'x') {
      if (!isPlainObject(raw)) throw new Error(`Point for ${timeKey}/${valueKey} must be an object`);
      const x = toEpochMs(raw[timeKey] ?? raw.time ?? raw.timestamp, timeKey);
      const y = Number(raw[valueKey] ?? raw.y ?? raw.value);

      if (!Number.isFinite(y)) throw new Error(`Invalid numeric value for ${valueKey}`);

      return { x, y };
    }

    function normalizeMetricTimePoint(raw, {
      label = 'point',
      timeKey = 't',
      numericKeys = [],
    } = {}) {
      if (!isPlainObject(raw)) throw new Error(`${label} must be an object`);
      const point = { ...raw, [timeKey]: toEpochMs(raw[timeKey] ?? raw.time ?? raw.timestamp, timeKey) };
      numericKeys.forEach(key => {
        const value = Number(point[key]);
        if (!Number.isFinite(value)) throw new Error(`${label}.${key} is invalid`);
        point[key] = value;
      });
      return point;
    }

    function mergeSeriesByTime(series, timeKey = 'x', mergePoint = (_prev, next) => next) {
      if (!Array.isArray(series) || series.length < 2) return Array.isArray(series) ? series : [];
      const merged = [series[0]];
      for (let i = 1; i < series.length; i++) {
        const point = series[i];
        const last = merged[merged.length - 1];
        if (Number(point?.[timeKey]) === Number(last?.[timeKey])) {
          merged[merged.length - 1] = mergePoint(last, point);
        } else {
          merged.push(point);
        }
      }
      return merged;
    }

    // -- Nightscout / CGM utilities ------------------------------------------------

    // SHA-1 hex digest — required by Nightscout API-secret header spec.
    // Uses Web Crypto API (SubtleCrypto), available in all modern browsers.
    async function sha1Hex(str) {
      const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Build auth headers / URL for a Nightscout request.
    async function buildNSAuth(cfg, url) {
      const headers = {};
      let finalUrl = url;
      if (cfg.authMethod === 'secret' && cfg.apiSecret) {
        headers['api-secret'] = await sha1Hex(cfg.apiSecret);
      } else if (cfg.authMethod === 'token' && cfg.token) {
        const sep = finalUrl.includes('?') ? '&' : '?';
        finalUrl += `${sep}token=${encodeURIComponent(cfg.token)}`;
      }
      return { finalUrl, headers };
    }

    // Fetch the most-recent CGM entry from Nightscout.
    async function fetchNSLatest(cfg) {
      const base = cfg.url.replace(/\/+$/, '');
      const { finalUrl, headers } = await buildNSAuth(cfg, `${base}/api/v1/entries/current.json`);
      let res;
      try {
        res = await fetch(finalUrl, { headers, mode: 'cors' });
      } catch (netErr) {
        const msg = netErr.message || '';
        if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('network')) {
          throw new Error('cors_or_network');
        }
        throw new Error(netErr.message || 'Network error');
      }
      if (res.status === 401) throw new Error('Auth failed — check your API secret or token');
      if (res.status === 403) throw new Error('Forbidden — API secret may be wrong');
      if (res.status === 404) throw new Error('Not found — check the Nightscout URL');
      if (!res.ok) throw new Error(`Server error (HTTP ${res.status})`);
      const raw = await res.json();
      const e = Array.isArray(raw) ? raw[0] : raw;
      if (!e || !e.sgv) throw new Error('No CGM reading in response');
      const mills = e.mills || e.date || Date.now();
      return {
        sgv: Math.round(e.sgv),
        direction: e.direction || 'Flat',
        device: (e.device || 'cgm').toLowerCase(),
        noise: e.noise ?? 0,
        timestamp: e.dateString || new Date(mills).toISOString(),
        mills,
      };
    }

    // Fetch last N CGM entries for the mini-trend display (non-fatal on error).
    async function fetchNSHistory(cfg, count = 12) {
      const base = cfg.url.replace(/\/+$/, '');
      const { finalUrl, headers } = await buildNSAuth(cfg, `${base}/api/v1/entries.json?count=${count}`);
      const res = await fetch(finalUrl, { headers, mode: 'cors' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      return (Array.isArray(raw) ? raw : [raw])
        .filter(e => e && e.sgv)
        .map(e => ({
          sgv: Math.round(e.sgv),
          direction: e.direction || 'Flat',
          mills: e.mills || e.date || Date.now(),
          timestamp: e.dateString || new Date(e.mills || e.date).toISOString(),
        }))
        .sort((a, b) => a.mills - b.mills);
    }

    // Friendly device label from the raw Nightscout device string.
    function deviceLabel(device = '') {
      const d = device.toLowerCase();
      if (d.includes('libre')) return '🩺 FreeStyle Libre';
      if (d.includes('dexcom')) return '🟢 Dexcom';
      if (d.includes('medtronic')) return '🔵 Medtronic';
      if (d.includes('xdrip') || d.includes('xdripjs')) return '📱 xDrip+';
      if (d.includes('spike')) return '📱 Spike';
      if (d.includes('tidepool')) return '🌊 Tidepool';
      if (d) return `📡 ${device}`;
      return '📡 CGM';
    }


    // -------------------------------------------------------------------------------
    //  C.  PHYSIOLOGIC MODEL FUNCTIONS
    //
    //  Each function is a pure computation — no React, no side effects.
    //  Input objects carry exactly the fields each function needs.
    // -------------------------------------------------------------------------------

    // -- C1. Absorption modifier k_abs(t) -----------------------------------------
    // Returns how fast insulin will be absorbed given current conditions.
    // Result > 1 = faster than baseline; result < 1 = slower.
    // mealType (0–2) and fiberClass (0–2) are optional; when carbs > 0 they
    // further slow the effective absorption via gastric content feedback.
    function calcKabs(inp, profile, sim) {
      const { bmi, hr, pa, sleep, sleepQ, hydration, carbs = 0, mealType = 0, fiberClass = 0 } = inp;

      // BMI penalty: extra body mass slows subcutaneous absorption.
      const fBMI = Math.exp(-sim.alpha * Math.max(0, bmi - profile.BMI_ref));

      // Heart rate boost: elevated pulse increases blood flow to the injection site.
      const rawHR = 1 + sim.beta * (hr - profile.HR_ref) / profile.HR_ref;
      const fHR = clamp(rawHR, 1 - sim.beta_max, 1 + sim.beta_max);

      // Activity boost: movement drives faster absorption.
      const fPA = 1 + sim.gamma * Math.max(0, pa);

      // Sleep penalty: absorption slows during sleep; poor quality deepens the effect.
      const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
      const fSleep = Math.max(0.05, 1 - sim.delta * sleep * qualityAmplifier);

      // Hydration: dehydration reduces reliability of absorption.
      const fHydration = 1 - sim.h_hd * hydration;

      // Meal type & fiber slow factors (2.2): when a meal is present, the gastric
      // content slows effective insulin–glucose interplay in the absorption window.
      const mealSlowLookup = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp];
      const fiberSlowLookup = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high];
      const fMealSlow = carbs > 0 ? (mealSlowLookup[mealType] ?? 1.0) : 1.0;
      const fFiberSlow = carbs > 0 ? (fiberSlowLookup[fiberClass] ?? 1.0) : 1.0;

      const mult = fBMI * fHR * fPA * fSleep * fHydration * fMealSlow * fFiberSlow;
      return {
        kabs: sim.k_abs0 * mult,
        kabs_mult: mult,
        fBMI, fHR, fPA, fSleep, fHydration, fMealSlow, fFiberSlow,
      };
    }

    // -- C2. Sensitivity multiplier S_eff(t) --------------------------------------
    // Returns how strongly 1 unit of insulin lowers blood sugar right now.
    //
    // η₀ — demographic baseline: age and sex are slow-moving profile constants
    // that set the ceiling for how sensitive the patient can ever be.
    // Dynamic factors then modulate η₀ up or down in real time.
    //
    // Model:
    //   η0 = corrFactor * fBMI * fAge * fSex
    //   S_eff = η0 * fBG * fEx * fDawn * fLow * fHigh * fSlp * fStress * fIllness * fTravel
    function calcSeff(inp, sv, profile, sim) {
      const { bmi, bg, sleep, sleepQ, stress, illness, travelDay = 0 } = inp;
      const { E_ex, L, H } = sv;

      // -- Demographic baseline (η₀ factors) ------------------------------------
      // BMI penalty: excess adiposity reduces receptor-level sensitivity.
      const fBMI = Math.exp(-sim.theta * Math.max(0, bmi - profile.BMI_ref));

      // Age penalty: ~0.07 per decade after 30 — reflects declining muscle mass
      // and intracellular lipid accumulation independent of BMI.
      const fAge = Math.max(0.1, 1 - sim.age_penalty * Math.max(0, profile.age - 30) / 10);
