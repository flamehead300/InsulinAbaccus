      // that factor already accounts for the current BG in the correction formula.
      // Age and sex are now embedded in sm.eta0, so we use that as the base rather
      // than reconstructing from corrFactor alone.
      const seffDose = sm.eta0 *
        sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness;
      const corrDoseBase = bg > profile.targetBG ? (bg - profile.targetBG) / Math.max(1, seffDose) : 0;
      const pkIobCredit = Math.max(0, Number(pkCorrRec?.iobCredit) || 0);
      const pkExpectedFutureISF = Number(pkCorrRec?.expectedFutureISF);
      // Safe correction path: apply PK-derived IOB credit whenever available.
      const corrDoseSafe = (pkCorrRec && bg > profile.targetBG)
        ? Math.max(0, (Number(pkCorrRec.rawCorrection) || 0) - pkIobCredit)
        : corrDoseBase;
      const corrDose = Math.min(corrDoseBase, corrDoseSafe);
      // Effective carb ratio scales inversely with all sensitivity factors (inc. age/sex via eta0).
      const allDynamic = sm.fBMI * sm.fAge * sm.fSex *
        sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness;
      const effCR = profile.carbRatio / Math.max(0.05, allDynamic);
      const carbDose = carbs > 0 ? carbs / Math.max(0.5, effCR) : 0;
      const total = Math.max(0, corrDose + carbDose);
      return {
        corrDoseBase: Math.round(corrDoseBase * 100) / 100,
        corrDose: Math.round(corrDose * 100) / 100,
        carbDose: Math.round(carbDose * 100) / 100,
        total: Math.round(total * 100) / 100,
        effCR: Math.round(effCR * 10) / 10,
        seffDose: Math.round(seffDose),
        corrSensitivity: Math.round(((pkExpectedFutureISF > 0 ? pkExpectedFutureISF : seffDose)) * 10) / 10,
        iobCredit: Math.round(pkIobCredit * 100) / 100,
        correctionBlockedByIob: corrDoseBase > 0 && corrDose <= 0 && pkIobCredit > 0,
      };
    }

    // ── C8. Forward glucose simulation ───────────────────────────────────────────
    // Euler-integrates the glucose ODE 4 hours ahead at 5-minute steps.
    // Now includes:
    //   • ongoing basal insulin delivery (B_bas)
    //   • gastric emptying two-compartment model (D_g → R_c → G)  [2.3]
    //   • fat/protein delayed glucose release (delayedMeal → G)   [2.1]
    //   • travel uncertainty band (grows linearly over projection) [3.2]
    function simulateProjection(startG, pkState, sv0, currentInputs, profile, sim, hoursAhead = 4, mealState = {}) {
      const DT = 5 / 60;
      const steps = Math.round(hoursAhead / DT);
      const tNow = new Date().getHours() + new Date().getMinutes() / 60;
      const kS = profile.corrFactor * sim.k_clear;

      let { Q_sc, Q_p } = pkState;
      let { E_ex, L, H } = sv0;
      let G = startG;

      // Initialise meal absorption state (2.1 + 2.3).
      let delayedMeal = mealState.delayedMeal ?? 0;
      let D_g = mealState.D_g ?? 0;
      let R_c = mealState.R_c ?? 0;

      const travelDay = currentInputs.travelDay ?? 0;
      const alcoholLevel = currentInputs.alcoholLevel ?? 0;
      const stimulantLevel = currentInputs.stimulantLevel ?? 0;
      const depressantLevel = currentInputs.depressantLevel ?? 0;
      const nicotineLevel = currentInputs.nicotineLevel ?? 0;
      const thcLevel = currentInputs.thcLevel ?? 0;

      // Gastric-emptying rate for the current meal context (constant over projection).
      const mT = currentInputs.mealType ?? 0;
      const fC = currentInputs.fiberClass ?? 0;
      const fat_g = currentInputs.fat_g ?? 0;
      const protein_g = currentInputs.protein_g ?? 0;
      const carbs_ctx = currentInputs.carbs ?? 0;
      const totalMacro = fat_g + protein_g + carbs_ctx;
      const fatNorm = fat_g / (totalMacro + 1);
      const protNorm = protein_g / (totalMacro + 1);
      const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mT] ?? 1.0;
      const fiberFactor = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][fC] ?? 1.0;
      const k_ge = sim.k_ge_base * mealTypeFactor * fiberFactor *
        (1 - sim.k_ge_fat_factor * fatNorm) *
        (1 - sim.k_ge_prot_factor * protNorm) *
        (1 - sim.alcohol_gastric_slow * alcoholLevel)    // 4.1 alcohol slows gastric emptying
        * (1 - sim.depress_gastric_slow * depressantLevel)  // 4.3 CNS relaxation
        * (1 - sim.thc_gastric_slow * thcLevel);        // 4.5 CB1 activation slows motility

      // 4.1 Hepatic glucose output is suppressed by alcohol: the liver prioritises
      // ethanol metabolism over gluconeogenesis, removing the background glucose drip.
      // 4.2 Stimulants transiently boost G_prod via glycogenolysis (mild adrenaline surge).
      const G_prod_eff = sim.G_prod * (1 - sim.alcohol_hep_suppress * alcoholLevel)
        - sim.alcohol_hep_suppress * alcoholLevel * 0.4  // net negative contribution
        + sim.stim_hep_boost * stimulantLevel;            // 4.2 glycogenolysis boost

      // ── 5.1 Uncertainty scalar U — weighted sum of all active stressors ─────
      // U_scalar is time-invariant; the band width grows as U_scalar · u_base · √t
      // so compounding errors widen exponentially with horizon, as they do clinically.
      const substanceSum = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
      const overlapScore = ((mealState.D_g ?? 0) > 5 ? 1 : 0)
        + ((mealState.R_c ?? 0) > 5 ? 0.5 : 0)
        + ((mealState.delayedMeal ?? 0) > 5 ? 0.5 : 0);
      const iobContrib = Math.min(pkState.Q_p ?? 0, 5);
      const U_scalar = 1
        + (sim.u_stress ?? 0.30) * ((currentInputs.stress ?? 0) / 3)
        + (sim.u_illness ?? 0.50) * (currentInputs.illness ?? 0)
        + (sim.u_travel ?? 0.40) * travelDay
        + (sim.u_overlap ?? 0.25) * overlapScore
        + (sim.u_substances ?? 0.15) * substanceSum
        + (sim.u_iob ?? 0.10) * iobContrib;

      const pts = [{
        t: 0, G: Math.round(G), Qp: Math.round(Q_p * 100) / 100, u: 0,
        band_upper: Math.round(G), band_lower: Math.round(G)
      }];

      for (let i = 1; i <= steps; i++) {
        const tHr = ((tNow + i * DT) % 24 + 24) % 24;
        const inp = {
          bmi: currentInputs.bmi,
          hr: currentInputs.hr,
          pa: currentInputs.pa,
          sleep: currentInputs.sleep,
          sleepQ: currentInputs.sleepQ,
          hydration: currentInputs.hydration,
          stress: currentInputs.stress,
          illness: currentInputs.illness,
          travelDay,                            // 3.2
          alcoholLevel,                         // 4.1
          stimulantLevel,                       // 4.2
          depressantLevel,                      // 4.3
          nicotineLevel,                        // 4.4
          thcLevel,                             // 4.5
          bg: G,
          timeHour: tHr,
        };

        const km = calcKabs(inp, profile, sim);
        const sm = calcSeff(inp, { E_ex, L, H }, profile, sim);
        const ka = km.kabs;

        // Basal delivery adds a small continuous input to the subcutaneous pool.
        const basalInput = profile.basalRate * DT;

        // Insulin PK.
        const dQsc = -ka * Q_sc + basalInput;
        const dQp = ka * Q_sc - sim.k_clear * Q_p;
        const insulinEffect = kS * sm.seff_mult * Q_p;

        // 2.1 Fat/protein delayed release — reservoir decays into glucose.
        const fpRelease = delayedMeal * (1 - Math.exp(-sim.lambda_FP * DT));

        // 2.3 Gastric emptying — stomach→gut→blood.
        const dDg = -k_ge * D_g;
        const dRc = k_ge * D_g - sim.k_carb_abs * R_c;
        const carbGlucoseRate = sim.k_carb_abs * R_c;

        // Net glucose rate.
        const dG = G_prod_eff
          - insulinEffect
          - sim.k_basal * (G - profile.targetBG)
          + carbGlucoseRate
          + fpRelease / DT;

        const dEex = (currentInputs.pa - E_ex) / sim.tau_ex;
        const dL = (Math.max(0, profile.lowBG - G) - L) / sim.tau_low;
        const dH = (Math.max(0, G - profile.highBG) - H) / sim.tau_high;

        // Euler update.
        Q_sc = Math.max(0, Q_sc + dQsc * DT);
        Q_p = Math.max(0, Q_p + dQp * DT);
        G = clamp(G + dG * DT, 40, 500);
        E_ex = Math.max(0, E_ex + dEex * DT);
        L = Math.max(0, L + dL * DT);
        H = Math.max(0, H + dH * DT);
        delayedMeal = Math.max(0, delayedMeal - fpRelease);
        D_g = Math.max(0, D_g + dDg * DT);
        R_c = Math.max(0, R_c + dRc * DT);

        if (i % 6 === 0) {
          // 5.1 Uncertainty band grows as U_scalar · u_base · √tElapsed.
          // A √t profile matches the diffusion-like compounding of prediction error
          // (biologically: each uncertain step adds variance, not a fixed offset).
          const tElapsed = i * DT;
          const u = Math.round(U_scalar * (sim.u_base ?? 18) * Math.sqrt(tElapsed));
          pts.push({
            t: i * DT,
            G: Math.round(G),
            Qp: Math.round(Q_p * 100) / 100,
            u,
            band_upper: Math.min(500, Math.round(G + u)),
            band_lower: Math.max(40, Math.round(G - u)),
            U_scalar,
          });
        }
      }
      return { pts, U_scalar };
    }


    // ═══════════════════════════════════════════════════════════════════════════════
    //  D.  LOG / PERSISTENCE FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════════════════

    // Build a complete, normalised log entry from raw form state.
    // This is the single place that knows the log schema.
    function makeLogEntry(formState, dose, liveMod) {
      const { bgV, fsV, cV, hrNum, paNum, slp, sleepQ, stress, illness, hydration,
        site, siteMultiplier, fatV, proteinV, mealType, fiberClass,
        travelDay, alcoholLevel, stimulantLevel, depressantLevel, nicotineLevel, thcLevel,
        timestampIso, not } = formState;
      return {
        id: Date.now().toString(),
        timestamp: timestampIso || nowISO(),
        // BG
        bloodSugar: fsV || bgV,
        cgm: bgV,
        fingerstick: fsV,
        // Nutrition
        carbs: cV,
        fat_g: fatV,       // 2.1
        protein_g: proteinV,   // 2.1
        mealType: mealType,   // 2.2
        fiberClass: fiberClass, // 2.2
        // Dosing
        insulinDose: dose.total,
        // Physiologic context
        hr: hrNum,
        pa: paNum,
        sleep: slp,
        sleepQ: sleepQ,
        stress: stress,
        illness: illness,
        hydration: hydration,
        travelDay: travelDay,   // 3.2
        alcoholLevel: alcoholLevel, // 4.1
        stimulantLevel: stimulantLevel ?? 0, // 4.2
        depressantLevel: depressantLevel ?? 0, // 4.3
        nicotineLevel: nicotineLevel ?? 0,  // 4.4
        thcLevel: thcLevel ?? 0,       // 4.5
        // Injection site — stored per-dose; used in reconstructPK and iobForDose
        site: site,
        siteMultiplier: siteMultiplier,
        // Computed at log time (continuous modifiers only — does NOT include site)
        kabs_rel: Math.round(liveMod.kabs_mult * 100) / 100,
        seff_mult: Math.round(liveMod.seff_mult * 1000) / 1000,
        notes: not.trim(),
      };
    }

    // Normalise an imported or old log entry so all fields exist with safe types.
    // This is where forward-compatibility lives: old logs missing new fields get defaults.
    function normalizeLogEntry(raw, i) {
      const numFields = [
        'bloodSugar', 'cgm', 'fingerstick', 'carbs', 'insulinDose',
        'hr', 'pa', 'sleep', 'sleepQ', 'stress', 'illness', 'hydration',
        'travelDay', 'alcoholLevel',                // 3.2 / 4.1
        'stimulantLevel', 'depressantLevel', 'nicotineLevel', 'thcLevel', // 4.2–4.5
        'siteMultiplier',
        'fat_g', 'protein_g', 'mealType', 'fiberClass',
        'kabs_rel', 'seff_mult',
      ];
      const out = { id: raw.id || `i${i}`, ...raw };
      numFields.forEach(k => {
        out[k] = raw[k] !== '' && raw[k] != null ? parseFloat(raw[k]) : null;
      });
      // Defaults for fields that didn't exist in older log versions.
      if (out.sleepQ == null) out.sleepQ = 4;
      if (out.stress == null) out.stress = 0;
      if (out.illness == null) out.illness = 0;
      if (out.hydration == null) out.hydration = 0;
      if (out.travelDay == null) out.travelDay = 0;
      if (out.alcoholLevel == null) out.alcoholLevel = 0; // 4.1 — off by default for old logs
      if (out.stimulantLevel == null) out.stimulantLevel = 0; // 4.2
      if (out.depressantLevel == null) out.depressantLevel = 0; // 4.3
      if (out.nicotineLevel == null) out.nicotineLevel = 0; // 4.4
      if (out.thcLevel == null) out.thcLevel = 0; // 4.5
      // Fat/protein/meal fields default to 0 so old logs still simulate correctly.
      if (out.fat_g == null) out.fat_g = 0;
      if (out.protein_g == null) out.protein_g = 0;
      if (out.mealType == null) out.mealType = 0;
      if (out.fiberClass == null) out.fiberClass = 0;
      // Site: string field with its own default path.
      if (!out.site) out.site = 'abdomen';
      if (out.siteMultiplier == null) out.siteMultiplier = 1.0;
      return out;
    }

    // Validate a single imported row. Returns an error string or null if valid.
    function validateImportedRow(row) {
      if (!row.timestamp) return 'missing timestamp';
      if (isNaN(new Date(row.timestamp).getTime())) return 'invalid timestamp';
      if (row.bloodSugar != null && (row.bloodSugar < 20 || row.bloodSugar > 800))
        return `BG value out of range: ${row.bloodSugar}`;
      return null;
    }

    // Serialise logs to CSV text.
    function toCSV(logs) {
      const rows = logs.map(l =>
        CSV_COLUMNS.map(k => {
          const v = l[k];
          if (v == null) return '';
          if (typeof v === 'string') return `"${v.replace(/"/g, '""')}"`;
          return v;
        }).join(',')
      );
      return [CSV_COLUMNS.join(','), ...rows].join('\n');
    }

    // Parse CSV text back into normalised log entries.
    function fromCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim());
      const results = [];
      lines.slice(1).forEach((line, i) => {
        const vals = line.split(',');
        const raw = {};
        headers.forEach((h, j) => { raw[h] = (vals[j] || '').trim().replace(/^"|"$/g, ''); });
        const err = validateImportedRow(raw);
        if (!err) results.push(normalizeLogEntry(raw, i));
      });
      return results;
    }

    // Trigger a CSV file download.
    function dlCSV(logs) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([toCSV(logs)], { type: 'text/csv' }));
      a.download = `insulin-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Load a stored JSON value from localStorage; return fallback on error.
    function loadStored(key, fallback) {
      try { return { ...fallback, ...JSON.parse(localStorage.getItem(key) || '{}') }; }
      catch { return fallback; }
    }


    // ═══════════════════════════════════════════════════════════════════════════════
    //  E.  UI COMPONENTS
    //
    //  Each component receives exactly what it needs via props — no global reads.
    // ═══════════════════════════════════════════════════════════════════════════════

    // ── E0. Toast notification ────────────────────────────────────────────────────
    function Toast({ msg, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
      return <div className={`tst ${type}`}>{msg}</div>;
    }

    // ── E1. Modifier bar (single row in the modifier panel) ───────────────────────
    function ModBar({ label, value }) {
      const c = modColor(value);
      return (
        <div className="mr">
          <div className="mlbl">{label}</div>
          <div className="mbar">
            <div className="mbg">
              <div className="mfill" style={{ width: `${Math.min(100, (value / 2) * 100)}%`, background: c }} />
              <div className="mctr" />
            </div>
          </div>
          <div className="mv" style={{ color: c }}>{value.toFixed(2)}×</div>
        </div>
      );
    }

    // ── E2. Modifier panel (absorption + sensitivity + metabolic output) ──────────
    function ModPanel({ mod }) {
      const hasMetabolic = mod.metabolic && Object.keys(mod.metabolic).length > 0;
      const confidencePct = Math.round((mod.confidenceFactor ?? 1) * 100);
      const uScalar = mod.U_scalar ?? 1;
      const confColor = modColor(mod.confidenceFactor ?? 1);

      // Confidence label: maps the scalar to a human word.
      const confLabel = uScalar < 1.15 ? 'High'
        : uScalar < 1.4 ? 'Good'
          : uScalar < 1.7 ? 'Fair'
            : uScalar < 2.2 ? 'Low'
              : 'Very Low';

      return (
        <div className="mp">
          <div style={{ fontSize: '11px', color: 'var(--td)', marginBottom: '6px', fontFamily: 'var(--sans)' }}>
            What affects insulin right now:
          </div>
          <div className="msum">
            <span className="msi"
              title="Absorption rate — how fast insulin gets into your bloodstream">
              Absorption: <strong style={{ color: modColor(mod.kabs_mult) }}>{mod.kabs.toFixed(2)} hr⁻¹</strong>
              <span style={{ color: 'var(--tm)' }}> ({Math.round(mod.kabs_mult * 100)}%)</span>
            </span>
            <span className="msi"
              title="Sensitivity — how far 1 unit of insulin drops your blood sugar">
              Sensitivity: <strong style={{ color: modColor(mod.seff_mult) }}>{Math.round(mod.seff)} mg/dL/u</strong>
              <span style={{ color: 'var(--tm)' }}> ({Math.round(mod.seff_mult * 100)}%)</span>
            </span>
            <span className="msi"
              title="Model confidence — how reliable the 4-hour forecast is given current stressors">
              Confidence: <strong style={{ color: confColor }}>{confLabel}</strong>
              <span style={{ color: 'var(--tm)' }}> ({confidencePct}%)</span>
            </span>
          </div>

          <div className="mst">Absorption speed factors</div>
          {Object.entries(mod.absorption).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}

          <div className="mst">Sensitivity factors</div>
          {Object.entries(mod.sensitivity).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}

          {/* ── 5.2 Metabolic output section — always rendered ── */}
          <div className="mst" style={{ color: 'var(--ac)' }}>Metabolic output &amp; confidence</div>
          <ModBar label="Hepatic Output" value={mod.hepaticOutputFactor ?? 1} />
          <ModBar label="Gastric Emptying" value={mod.gastricEmptyingFactor ?? 1} />
          {/* Confidence bar: 1/U_scalar, where lower = less confident */}
          <ModBar label="Model Confidence" value={mod.confidenceFactor ?? 1} />

          {hasMetabolic && (<>
            <div className="mst" style={{ color: 'var(--o)' }}>Substance sensitivity effects</div>
            {Object.entries(mod.metabolic).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}
          </>)}
        </div>
      );
    }

    // ── E3a. BPM Monitor modal ─────────────────────────────────────────────────────
    // Four-phase heart rate measurement: idle → countdown → recording → result.
    // onConfirm(bpm) writes the measured value back into the HR field.
    function BpmMonitor({ onConfirm, onClose }) {
      const [phase, setPhase] = useState('idle');   // idle|countdown|recording|result
      const [countdown, setCountdown] = useState(3);
      const [timeLeft, setTimeLeft] = useState(30);
      const [beatCount, setBeatCount] = useState(0);  // display only
      const beatRef = useRef(0);                       // authoritative count (no re-render side-effects)
      const [bpm, setBpm] = useState(0);
      const [popping, setPopping] = useState(false);

      // Countdown phase: tick from 3 → 0 then hand off to recording.
      useEffect(() => {
        if (phase !== 'countdown') return;
        if (countdown > 0) {
          const t = setTimeout(() => setCountdown(c => c - 1), 1000);
          return () => clearTimeout(t);
        }
        setPhase('recording');
        setTimeLeft(30);
      }, [phase, countdown]);

      // Recording phase: 30-second timer; when it hits 0, compute BPM and advance.
      // beatCount is intentionally NOT a dependency — taps must not reset the timer.
      useEffect(() => {
        if (phase !== 'recording') return;
        if (timeLeft > 0) {
          const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
          return () => clearTimeout(t);
        }
        setBpm(beatRef.current * 2);  // 30-s window → × 2 = per-minute rate
        setPhase('result');
      }, [phase, timeLeft]); // eslint-disable-line react-hooks/exhaustive-deps

      const reset = () => {
        setPhase('idle'); setCountdown(3); setTimeLeft(30);
        setBeatCount(0); beatRef.current = 0; setBpm(0);
      };

      const handleHeartClick = () => {
        if (phase !== 'recording') return;
        beatRef.current += 1;
        setBeatCount(beatRef.current);  // update display counter
        setPopping(true);
        setTimeout(() => setPopping(false), 150);
      };

      const handleConfirm = () => { onConfirm(bpm); onClose(); };

      // Heart-beat SVG path (standard filled heart shape)
      const HeartPath = () => (
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402
               0-3.791 3.068-5.191 5.281-5.191
               1.312 0 4.151.501 5.719 4.457
               1.59-3.968 4.464-4.447 5.726-4.447
               2.54 0 5.274 1.621 5.274 5.181
               0 4.069-5.136 8.625-11 14.402z"/>
        </svg>
      );

      // Zone label for the final BPM result
      const hrZone = bpm < 60 ? { label: 'Below normal', c: 'var(--ac)' }
        : bpm <= 100 ? { label: 'Normal range', c: 'var(--g)' }
          : bpm <= 120 ? { label: 'Elevated', c: 'var(--y)' }
            : { label: 'High', c: 'var(--r)' };

      return (
        <div className="bpm-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="bpm-modal">

            {/* Header */}
            <div className="bpm-hdr">
              <div className="bpm-hdr-title">
                <span style={{ color: 'var(--r)', fontSize: '16px' }}>♥</span>
                BPM Monitor
              </div>
              <button className="bpm-close" onClick={onClose}>✕</button>
            </div>

            {/* Body */}
            <div className="bpm-body">

              {/* ── IDLE ── */}
              {phase === 'idle' && (
                <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  <div className="bpm-info">
                    <div className="bpm-info-row">
                      <span className="bpm-info-icon">ⓘ</span>
                      <span>With one hand, feel your pulse by placing your index and middle fingers on the side of your lower neck, next to the windpipe. Press lightly until you feel a beat.</span>
                    </div>
                    <div className="bpm-info-row">
                      <span className="bpm-info-icon" style={{ color: 'var(--r)' }}>♥</span>
                      <span>With your other hand, tap the heart button each time you feel a beat. A 30-second timer will count your taps and calculate your BPM.</span>
                    </div>
                  </div>
                  <button className="btn bp bfw" onClick={() => setPhase('countdown')}>
                    I'm ready — start timer
                  </button>
                </div>
              )}

              {/* ── COUNTDOWN ── */}
              {phase === 'countdown' && (
                <div style={{ textAlign: 'center' }}>
                  <div className="bpm-countdown-lbl">Get ready to tap…</div>
                  <div className="bpm-countdown-num">{countdown}</div>
                </div>
              )}

              {/* ── RECORDING ── */}
              {phase === 'recording' && (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%' }}>
                  <div className="bpm-rec-stats">
                    <span className="bpm-stat" style={{ color: 'var(--td)' }}>⏱ {timeLeft}s left</span>
                    <span className="bpm-stat beats">♥ {beatCount} beats</span>
                  </div>
                  <button
                    className={`bpm-heart-btn${popping ? ' pop' : ''}`}
                    onClick={handleHeartClick}
                  >
                    <HeartPath />
                  </button>
                  <div className="bpm-tap-hint">Tap once for every heartbeat you feel</div>
                </div>
              )}

              {/* ── RESULT ── */}
              {phase === 'result' && (
                <div style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                  <div className="bpm-result-lbl">Your heart rate</div>
                  <div>
                    <span className="bpm-result-val" style={{ color: hrZone.c }}>{bpm}</span>
                    <span className="bpm-result-unit">BPM</span>
                  </div>
                  <div className="bpm-result-note">
                    {beatCount} beats in 30 seconds · {hrZone.label}
                  </div>
                  <button className="btn bg_ bfw" style={{ marginTop: '14px' }} onClick={reset}>
                    ↺ Measure again
                  </button>
                </div>
              )}
            </div>

            {/* Footer */}
            <div className="bpm-ftr">
              {phase === 'result' && (
                <button className="btn bp bfw" onClick={handleConfirm}>
                  ✓ Use this value ({bpm} BPM)
                </button>
              )}
              <button className="btn bg_ bfw" onClick={onClose}
                style={{ fontSize: '12px', padding: '7px' }}>
                Cancel &amp; close
              </button>
            </div>

          </div>
        </div>
      );
    }

    // ── E3. Entry form ────────────────────────────────────────────────────────────
    // All form fields live here as controlled inputs.
    // Props: form state + setters, profile/ui prefs for conditional rendering.
    function EntryForm({
      bg, setBg, fs, setFs, crbs, setCrbs, hr, setHr,
      fat, setFat, protein, setProtein,
      mealType, setMealType, fiberClass, setFiberClass,
      paiX, setPaiX, slp, setSlp, sleepQ, setSleepQ,
      stress, setStress, illness, setIllness,
      hydration, setHydration,
      travelDay, setTravelDay,
      dawnEffect, setDawnEffect,
      siteIdx, setSiteIdx, siteName, siteMultiplier,
      entryTime, setEntryTime,
      not, setNot,
      dualBg, HR_ref, targetBG,
      bgZone, effBgNum,
      doseRes, liveMod, totalIOB,
      cgmReading,
      onLog,
    }) {
      const [bpmOpen, setBpmOpen] = useState(false);
      // Stress button colour class
      const stressClass = (i) => {
        if (stress !== STRESS_LEVELS[i].value) return 'pab';
        if (i === 0) return 'pab on';
        if (i <= 1) return 'pab on-y';
        return 'pab on-r';
      };

      return (
        <div className="card">
          <div className="ct">➕ New Entry</div>

          {/* ── CGM live reading pill (shown when Nightscout feed is active) ── */}
          {cgmReading && (
            <div className="cgm-field-pill">
              <span className="cgm-dot" style={{ background: (Date.now() - cgmReading.mills) < 10 * 60_000 ? '#00d4ff' : '#fbbf24' }} />
              <span style={{ color: 'var(--ac)', fontWeight: 600 }}>{cgmReading.sgv}</span>
              <span style={{ color: NS_ARROW_CLR[cgmReading.direction] || 'var(--td)' }}>{NS_ARROW[cgmReading.direction] || '→'}</span>
              <span style={{ color: 'var(--td)' }}>{deviceLabel(cgmReading.device)}</span>
              <span style={{ color: 'var(--tm)', marginLeft: 'auto', fontSize: '11px' }}>
                {Math.round((Date.now() - cgmReading.mills) / 60_000)} min ago
              </span>
              <button className="btn bg_ bsm" style={{ padding: '3px 9px', fontSize: '11px' }}
                onClick={() => setBg(String(cgmReading.sgv))}>
                Use
              </button>
            </div>
          )}

          {/* ── BG / Carbs / HR ── */}
          <div className="fg">
            <div className="fi">
              <label>{dualBg ? 'Blood Sugar (CGM)' : 'Blood Sugar'}</label>
              <input type="number" inputMode="decimal" placeholder="e.g. 145"
                value={bg} onChange={e => setBg(e.target.value)} />
            </div>
            {dualBg && (
              <div className="fi">
                <label>Fingerstick (if different from CGM)</label>
                <input type="number" inputMode="decimal" placeholder="Overrides CGM"
                  value={fs} onChange={e => setFs(e.target.value)} />
              </div>
            )}
            <div className="fi">
              <label>Carbs (g)</label>
              <input type="number" inputMode="decimal" placeholder="e.g. 45"
                value={crbs} onChange={e => setCrbs(e.target.value)} />
            </div>
            <div className="fi">
              <label>Entry Time (optional) <span title="If blank, current device time is used. Set this when traveling or correcting a bad device clock." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <input type="datetime-local"
                value={entryTime}
                onChange={e => setEntryTime(e.target.value)} />
            </div>
            <div className="fi advanced-only">
              <label>Fat (g) <span title="Fat slows gastric emptying and causes a delayed late glucose rise." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <input type="number" inputMode="decimal" placeholder="optional, e.g. 20"
                value={fat} onChange={e => setFat(e.target.value)} />
            </div>
            <div className="fi advanced-only">
              <label>Protein (g) <span title="Protein is partially converted to glucose over several hours." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <input type="number" inputMode="decimal" placeholder="optional, e.g. 30"
                value={protein} onChange={e => setProtein(e.target.value)} />
            </div>
            <div className="fi">
              <label>Heart Rate (bpm) <span title="Used to estimate how fast insulin is absorbed." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="hr-field-wrap">
                <input type="number" inputMode="decimal" placeholder={`e.g. ${HR_ref}`}
                  value={hr} onChange={e => setHr(e.target.value)} />
                <button type="button" className="bpm-trigger" onClick={() => setBpmOpen(true)}
                  title="Measure your heart rate with a guided 30-second tap test">
                  <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z" /></svg>
                  Measure
                </button>
              </div>
              {bpmOpen && (
                <BpmMonitor
                  onConfirm={v => setHr(String(v))}
                  onClose={() => setBpmOpen(false)}
                />
              )}
            </div>
            <div className="fi" style={{ gridColumn: dualBg ? '1 / -1' : 'auto' }}>
              <label>Notes</label>
              <input type="text" placeholder="Meal, context…"
                value={not} onChange={e => setNot(e.target.value)} />
            </div>
          </div>

          {/* ── Meal type + Fiber (2.2) ── */}
          <div className="fg" style={{ marginTop: '11px' }}>
            <div className="fi">
              <label>Meal Type <span title="Fast carbs spike BG quickly. High fat/protein meals absorb slowly." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {MEAL_TYPES.map((m, i) => (
                  <button key={i} className={`pab ${mealType === m.value ? 'on' : ''}`}
                    onClick={() => setMealType(m.value)}>
                    <i>{m.icon}</i>{m.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="fi">
              <label>Fiber <span title="Higher fiber content further slows carbohydrate absorption." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {FIBER_CLASSES.map((f, i) => (
                  <button key={i} className={`pab ${fiberClass === f.value ? 'on' : ''}`}
                    onClick={() => setFiberClass(f.value)}>
                    <i>{f.icon}</i>{f.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── Physical activity ── */}
          <div className="fi" style={{ marginTop: '11px' }}>
            <label>Physical Activity</label>
            <div className="pal4">
              {ACTIVITY_LEVELS.map((a, i) => (
                <button key={i} className={`pab ${paiX === i ? 'on' : ''}`}
                  title={`${a.mets} METs`}
                  onClick={() => setPaiX(i)}>
                  <i>{a.icon}</i>{a.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── Stress level (NEW) ── */}
          <div className="fi" style={{ marginTop: '11px' }}>
            <label>Stress Level <span title="Physical or emotional stress raises counterregulatory hormones, which can reduce how well insulin works." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
            <div className="pal4">
              {STRESS_LEVELS.map((s, i) => (
                <button key={i}
                  className={stressClass(i)}
                  onClick={() => setStress(s.value)}>
                  <i>{s.icon}</i>{s.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── Sleep state + quality + dawn ── */}
          <div style={{ marginTop: '9px' }}>
            <label className="fl-label">Sleep State</label>
            <div className={`slp ${slp ? 'on' : ''}`} onClick={() => { setSlp(v => v ? 0 : 1); if (!slp) setDawnEffect(0); }}>
              <div className={`trk ${slp ? 'on' : ''}`}><div className="thm" /></div>
              <span className="slplbl">{slp ? '🌙 Sleeping / Overnight' : '☀️ Awake'}</span>
            </div>

            {/* Sleep quality — shown when asleep */}
            {slp === 1 && (
              <div className="sq-wrap">
                <div style={{ fontSize: '11px', color: 'var(--td)', marginBottom: '6px' }}>
                  Sleep quality <span title="Poor sleep quality amplifies the insulin-reduction effect of sleep." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span>
                </div>
                <div className="sq-row">
                  <input type="range" min={0} max={4} step={1} value={sleepQ}
                    onChange={e => setSleepQ(parseInt(e.target.value))} />
                  <span className="sq-lbl">{SLEEP_QUALITY_LABELS[sleepQ]}</span>
                </div>
              </div>
            )}

            {/* Dawn phenomenon — shown only when awake (just woke up / early morning) */}
            {slp === 0 && (
              <div className={`slp ${dawnEffect ? 'on' : ''}`}
                style={{
                  marginTop: '6px',
                  borderColor: dawnEffect ? 'var(--y)' : undefined,
                  background: dawnEffect ? 'rgba(251,191,36,.08)' : undefined,
                }}
                onClick={() => setDawnEffect(v => v ? 0 : 1)}>
                <div className={`trk ${dawnEffect ? 'on' : ''}`}
                  style={{ background: dawnEffect ? 'var(--y)' : undefined }}>
                  <div className="thm" />
                </div>
                <span className="slplbl" style={{ color: dawnEffect ? 'var(--y)' : undefined }}>
                  {dawnEffect ? '🌅 Dawn phenomenon active' : '🌅 Dawn phenomenon'}
                </span>
              </div>
            )}
            {slp === 0 && dawnEffect ? (
              <div className="note" style={{ marginTop: '4px', color: 'var(--y)' }}>
                Early-morning cortisol and growth hormone surge reduces insulin sensitivity. Flag this when you've just woken and are seeing higher-than-expected BG.
              </div>
            ) : null}
          </div>

          {/* ── Hydration (NEW) ── */}
          <div className="fi" style={{ marginTop: '11px' }}>
            <label>Hydration <span title="Dehydration can slow insulin absorption and affect blood sugar readings." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
            <div className="pal3">
              {HYDRATION_LEVELS.map((h, i) => (
                <button key={i} className={`pab ${hydration === h.value ? 'on' : ''}`}
                  onClick={() => setHydration(h.value)}>
                  <i>{h.icon}</i>{h.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── Illness toggle ── */}
          <div style={{ marginTop: '9px' }}>
            <div className={`slp ${illness ? 'on' : ''}`} style={{ borderColor: illness ? 'var(--r)' : undefined, background: illness ? 'rgba(255,107,107,.08)' : undefined }}
              onClick={() => setIllness(v => v ? 0 : 1)}>
              <div className={`trk ${illness ? 'on' : ''}`} style={{ background: illness ? 'var(--r)' : undefined }}><div className="thm" /></div>
              <span className="slplbl" style={{ color: illness ? 'var(--r)' : undefined }}>
                {illness ? '🤒 Feeling sick or unwell' : '🙂 Feeling well'}
              </span>
            </div>
          </div>

          {/* ── Travel day toggle (3.2) ── */}
          <div style={{ marginTop: '9px' }}>
            <div className={`slp ${travelDay ? 'on-y on' : ''}`}
              style={{ borderColor: travelDay ? 'var(--y)' : undefined, background: travelDay ? 'rgba(251,191,36,.08)' : undefined }}
              onClick={() => setTravelDay(v => v ? 0 : 1)}>
              <div className={`trk ${travelDay ? 'on' : ''}`}
                style={{ background: travelDay ? 'var(--y)' : undefined }}>
                <div className="thm" />
              </div>
              <span className="slplbl" style={{ color: travelDay ? 'var(--y)' : undefined }}>
                {travelDay
                  ? '✈️ Travel day / Routine disrupted — projection widened'
                  : '🏠 Normal routine'}
              </span>
            </div>
            {travelDay ? (
              <div className="note" style={{ marginTop: '4px', color: 'var(--y)' }}>
                Circadian misalignment and journey stress raise cortisol and epinephrine, reducing sensitivity by ~20% and making absorption less predictable. ±uncertainty bands shown on forecast tiles.
              </div>
            ) : null}
          </div>

          {/* ── Injection site (1.5 NEW) ── */}
          <div className="fi" style={{ marginTop: '11px' }}>
            <label>Injection Site <span title="Different sites absorb insulin at different speeds. Abdomen is fastest; thigh is slowest." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
            <div className="pal4">
              {INJECTION_SITES.map((s, i) => (
                <button key={i} className={`pab ${siteIdx === i ? 'on' : ''}`}
                  onClick={() => setSiteIdx(i)}>
                  <i>{s.icon}</i>{s.label}
                </button>
              ))}
            </div>
            {siteMultiplier < 1.0 && (
              <div className="note" style={{ marginTop: '4px' }}>
                {siteName} absorbs at {Math.round(siteMultiplier * 100)}% of abdominal speed — IOB will last a bit longer.
              </div>
            )}
          </div>

          {/* ── BG zone banner ── */}
          {bgZone && (
            <div className={`bgz ${bgZone}`}>
              <div className="bgdot" />
              <div className="bgztxt">
                {bgZone === 'low' ? '⚠️ Low BG — your body is stressed. Insulin may work stronger right now.' :
                  bgZone === 'high' ? '⬆️ High BG — insulin may work weaker right now.' :
                    '✅ In range — insulin is working normally.'}
              </div>
              <div className="bgzv">{effBgNum} mg/dL</div>
            </div>
          )}

          {/* ── Dose result ── */}
          {doseRes ? (
            <div className="rbox">
              <div className="rtop">
                <div>
                  <div className="rl">Suggested Dose</div>
                  <div className="rv">{doseRes.total}<span style={{ fontSize: '18px', color: 'var(--td)' }}>u</span></div>
                </div>
                <div className="rb">
                  {doseRes.corrDoseBase > 0 && <>{`Correction: (${effBgNum} - ${targetBG}) / ${doseRes.corrSensitivity} = +${doseRes.corrDoseBase}u`}<br /></>}
                  {doseRes.iobCredit > 0 && <>{`PK IOB credit: -${doseRes.iobCredit}u -> correction ${doseRes.corrDose}u`}<br /></>}
                  {doseRes.correctionBlockedByIob && <span style={{ color: 'var(--r)' }}>Correction blocked by active IOB.</span>}
                  {doseRes.carbDose > 0 && <>{`Carbs: ${crbs}g ÷ ${doseRes.effCR}g/u (adjusted ratio) = +${doseRes.carbDose}u`}<br /></>}
                  {totalIOB > 0 && <span style={{ color: 'var(--y)' }}>⚠ {totalIOB}u IOB active — check Active Insulin tab for PK model credit</span>}
                  <details style={{ marginTop: '7px', cursor: 'pointer' }}>
                    <summary style={{ fontSize: '10px', color: 'var(--td)', fontFamily: 'var(--mono)', outline: 'none' }}>Why this dose?</summary>
                    <div className="rmn" style={{ marginTop: '4px' }}>
                      Sensitivity: {doseRes.seffDose} mg/dL/u ({Math.round(liveMod.seff_mult * 100)}% of your base {liveMod.seff > 0 ? Math.round(liveMod.seff / liveMod.seff_mult) : '—'})
                      · Absorption rate: {liveMod.kabs.toFixed(2)} hr⁻¹ ({Math.round(liveMod.kabs_mult * 100)}% of base)
                      · Injection site: {siteName} ({siteMultiplier.toFixed(2)}× — affects IOB curve, not this dose size)
                    </div>
                  </details>
                </div>
              </div>
              <ModPanel mod={liveMod} />
            </div>
          ) : (
            <div style={{ marginTop: '13px' }}>
              <div className="ct" style={{ marginBottom: '8px' }}>📡 Current Modifiers</div>
              <ModPanel mod={liveMod} />
            </div>
          )}

          <button className="btn bp bfw" style={{ marginTop: '13px' }} onClick={onLog}>
            + Log Entry
          </button>
        </div>
      );
    }

    // ── E3b. Advanced Daily Modifiers tab ────────────────────────────────────────
    // Gated behind ui.showAdvancedModifiers. Contains 4.x features that require
    // clinical awareness — surfaced separately so they don't clutter the main form.
    function AdvancedModifiersTab({
      alcoholLevel, setAlcoholLevel,
      stimulantLevel, setStimulantLevel,
      depressantLevel, setDepressantLevel,
      nicotineLevel, setNicotineLevel,
      thcLevel, setThcLevel,
      liveMod,
    }) {
      return (
        <div>
          {/* ── Alcohol (4.1) ── */}
          <div className="card">
            <div className="ct">🍷 Alcohol / Hepatic Suppression</div>
            <div className="note" style={{ marginBottom: '12px', color: 'var(--r)', borderLeft: '2px solid var(--r)', paddingLeft: '10px' }}>
              ⚠ High risk. Alcohol inhibits hepatic gluconeogenesis — the liver stops its background glucose drip. Delayed severe hypoglycemia is common 8–12 hours after drinking, often during sleep. Do not dose aggressively after alcohol.
            </div>

            <div className="fi" style={{ marginBottom: '14px' }}>
              <label>Alcohol Intake <span title="Maps to hepatic glucose suppression, gastric emptying slowdown, and a mild direct sensitivity effect. The main danger is overnight hypo from loss of hepatic glucose release." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {ALCOHOL_LEVELS.map((a) => (
                  <button key={a.value}
                    className={`pab ${alcoholLevel === a.value
                      ? (a.value === 0 ? 'on' : a.value < 1 ? 'on-y on' : 'on-r on')
                      : ''}`}
                    style={alcoholLevel === a.value && a.value > 0 ? {
                      borderColor: a.value < 1 ? 'var(--y)' : 'var(--r)',
                      color: a.value < 1 ? 'var(--y)' : 'var(--r)',
                      background: a.value < 1 ? 'rgba(251,191,36,.08)' : 'rgba(255,107,107,.08)',
                    } : {}}
                    onClick={() => setAlcoholLevel(a.value)}>
                    <i>{a.icon}</i>{a.label}
                  </button>
                ))}
              </div>
            </div>

            {alcoholLevel > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <div className="bgz" style={{
                  borderColor: alcoholLevel >= 1 ? 'rgba(255,107,107,.4)' : 'rgba(251,191,36,.4)',
                  background: alcoholLevel >= 1 ? 'rgba(255,107,107,.06)' : 'rgba(251,191,36,.06)',
                }}>
                  <div className="bgdot" style={{ background: alcoholLevel >= 1 ? 'var(--r)' : 'var(--y)' }} />
                  <div className="bgztxt">
                    {alcoholLevel >= 1
                      ? '🍻 Heavy intake — hepatic glucose output significantly suppressed. High overnight hypo risk. Consider reducing or omitting correction bolus.'
                      : '🍷 Moderate intake — hepatic suppression active. Monitor BG closely in next 8–12 hours.'}
                  </div>
                </div>
                <div className="note" style={{ fontFamily: 'var(--mono)', color: 'var(--td)' }}>
                  Hepatic suppression: <strong style={{ color: 'var(--r)' }}>{Math.round(30 * alcoholLevel)}%</strong> reduction in basal glucose output
                  &nbsp;·&nbsp; Gastric emptying: slowed by <strong style={{ color: 'var(--y)' }}>{Math.round(20 * alcoholLevel)}%</strong>
                  &nbsp;·&nbsp; Sensitivity shift: <strong style={{ color: 'var(--ac)' }}>{(liveMod.fAlcohol * 100).toFixed(0)}%</strong>
                </div>
              </div>
            )}
          </div>

          {/* ── Stimulants (4.2) ── */}
          <div className="card">
            <div className="ct">☕ Stimulants (Caffeine / Prescribed)</div>
            <div className="note" style={{ marginBottom: '12px', color: 'var(--y)', borderLeft: '2px solid var(--y)', paddingLeft: '10px' }}>
              Caffeine acts as an adenosine receptor antagonist, triggering epinephrine release. Studies (Lane et al.) show acute caffeine reduces insulin sensitivity by 15–30% and elevates postprandial blood glucose. Prescribed stimulants (e.g. amphetamines for ADHD) produce a similar, often sustained, effect.
            </div>

            <div className="fi" style={{ marginBottom: '14px' }}>
              <label>Stimulant Level <span title="Maps to a sensitivity penalty via epinephrine release and a transient hepatic glucose boost from mild glycogenolysis." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal4">
                {STIMULANT_LEVELS.map((s) => (
                  <button key={s.value}
                    className={`pab ${stimulantLevel === s.value
                      ? (s.value === 0 ? 'on' : s.value <= 0.3 ? 'on-y on' : 'on-r on')
                      : ''}`}
                    style={stimulantLevel === s.value && s.value > 0 ? {
                      borderColor: s.value <= 0.3 ? 'var(--y)' : 'var(--r)',
                      color: s.value <= 0.3 ? 'var(--y)' : 'var(--r)',
                      background: s.value <= 0.3 ? 'rgba(251,191,36,.08)' : 'rgba(255,107,107,.08)',
                    } : {}}
                    onClick={() => setStimulantLevel(s.value)}>
                    <i>{s.icon}</i>{s.label}
                  </button>
                ))}
              </div>
            </div>

            {stimulantLevel > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <div className="bgz" style={{
                  borderColor: stimulantLevel >= 0.7 ? 'rgba(255,107,107,.4)' : 'rgba(251,191,36,.4)',
                  background: stimulantLevel >= 0.7 ? 'rgba(255,107,107,.06)' : 'rgba(251,191,36,.06)',
                }}>
                  <div className="bgdot" style={{ background: stimulantLevel >= 0.7 ? 'var(--r)' : 'var(--y)' }} />
                  <div className="bgztxt">
                    {stimulantLevel >= 0.7
                      ? '💊 Prescribed stimulant — sustained epinephrine elevation. Insulin may be significantly less effective. Monitor closely.'
                      : '☕ Caffeine active — expect mildly elevated postprandial BG and a small hepatic glucose boost.'}
                  </div>
                </div>
                <div className="note" style={{ fontFamily: 'var(--mono)', color: 'var(--td)' }}>
                  Sensitivity penalty: <strong style={{ color: 'var(--r)' }}>÷{(1 + 0.2 * stimulantLevel).toFixed(2)}×</strong>
                  &nbsp;·&nbsp; Hepatic boost: <strong style={{ color: 'var(--y)' }}>+{(0.1 * stimulantLevel).toFixed(2)} mg/dL/hr</strong> G_prod
                  {liveMod.fStimulant != null && <>&nbsp;·&nbsp; Model factor: <strong style={{ color: 'var(--ac)' }}>{(liveMod.fStimulant * 100).toFixed(0)}%</strong></>}
                </div>
              </div>
            )}
          </div>

          {/* ── Depressants (4.3) ── */}
          <div className="card">
            <div className="ct">💤 Depressants (Benzodiazepines / Sleep Aids)</div>
            <div className="note" style={{ marginBottom: '12px', color: 'var(--p)', borderLeft: '2px solid var(--p)', paddingLeft: '10px' }}>
              Direct glycemic impact is modest compared to stimulants. However, deep CNS depression alters growth hormone secretion (which peaks in deep sleep and causes resistance) and causes smooth-muscle relaxation that slows gastric emptying. The chief clinical risk is behavioural: diminished hypoglycemia awareness.
            </div>

            <div className="fi" style={{ marginBottom: '14px' }}>
              <label>Depressant Level <span title="Amplifies sleep-related sensitivity reduction and slows gastric emptying via CNS and smooth-muscle relaxation." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {DEPRESSANT_LEVELS.map((d) => (
                  <button key={d.value}
                    className={`pab ${depressantLevel === d.value
                      ? (d.value === 0 ? 'on' : 'on-y on')
                      : ''}`}
                    style={depressantLevel === d.value && d.value > 0 ? {
                      borderColor: 'var(--p)', color: 'var(--p)', background: 'rgba(167,139,250,.08)',
                    } : {}}
                    onClick={() => setDepressantLevel(d.value)}>
                    <i>{d.icon}</i>{d.label}
                  </button>
                ))}
              </div>
            </div>

            {depressantLevel > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <div className="bgz" style={{ borderColor: 'rgba(167,139,250,.4)', background: 'rgba(167,139,250,.06)' }}>
                  <div className="bgdot" style={{ background: 'var(--p)' }} />
                  <div className="bgztxt">
                    💤 Depressant active — sleep sensitivity effect amplified and gastric motility reduced. Hypo-awareness may be blunted.
                  </div>
                </div>
                <div className="note" style={{ fontFamily: 'var(--mono)', color: 'var(--td)' }}>
                  Sleep effect amplified by <strong style={{ color: 'var(--p)' }}>+{Math.round(30 * depressantLevel)}%</strong>
                  &nbsp;·&nbsp; Gastric emptying slowed by <strong style={{ color: 'var(--y)' }}>{Math.round(15 * depressantLevel)}%</strong>
                </div>
              </div>
            )}
          </div>

          {/* ── Nicotine (4.4) ── */}
          <div className="card">
            <div className="ct">🚬 Nicotine</div>
            <div className="note" style={{ marginBottom: '12px', color: 'var(--o)', borderLeft: '2px solid var(--o)', paddingLeft: '10px' }}>
              Smoking is a known cause of insulin resistance. Studies (Eliasson et al.) demonstrate acute smoking impairs insulin-mediated glucose disposal by up to 20%. Nicotine-driven vasoconstriction also reduces peripheral blood flow, potentially slowing subcutaneous insulin absorption and extending the active IOB curve.
            </div>

            <div className="fi" style={{ marginBottom: '14px' }}>
              <label>Nicotine Level <span title="Vasoconstriction impairs peripheral glucose disposal at the receptor level, reducing insulin-mediated muscle uptake by ~15–20%." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {NICOTINE_LEVELS.map((n) => (
                  <button key={n.value}
                    className={`pab ${nicotineLevel === n.value
                      ? (n.value === 0 ? 'on' : n.value < 1 ? 'on-y on' : 'on-r on')
                      : ''}`}
                    style={nicotineLevel === n.value && n.value > 0 ? {
                      borderColor: 'var(--o)', color: 'var(--o)', background: 'rgba(251,146,60,.08)',
                    } : {}}
                    onClick={() => setNicotineLevel(n.value)}>
                    <i>{n.icon}</i>{n.label}
                  </button>
                ))}
              </div>
            </div>

            {nicotineLevel > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <div className="bgz" style={{
                  borderColor: 'rgba(251,146,60,.4)', background: 'rgba(251,146,60,.06)',
                }}>
                  <div className="bgdot" style={{ background: 'var(--o)' }} />
                  <div className="bgztxt">
                    🚬 Nicotine active — peripheral glucose utilisation reduced via vasoconstriction. Insulin correction may be less effective than expected.
                  </div>
                </div>
                <div className="note" style={{ fontFamily: 'var(--mono)', color: 'var(--td)' }}>
                  Peripheral disposal penalty: <strong style={{ color: 'var(--o)' }}>÷{(1 + 0.15 * nicotineLevel).toFixed(2)}×</strong>
                  {liveMod.fNicotine != null && <>&nbsp;·&nbsp; Model factor: <strong style={{ color: 'var(--ac)' }}>{(liveMod.fNicotine * 100).toFixed(0)}%</strong></>}
                </div>
              </div>
            )}
          </div>

          {/* ── THC / Cannabis (4.5) ── */}
          <div className="card">
            <div className="ct">🌿 THC / Cannabis</div>
            <div className="note" style={{ marginBottom: '12px', color: 'var(--g)', borderLeft: '2px solid var(--g)', paddingLeft: '10px' }}>
              Endocannabinoid receptors (CB1) are densely expressed in the enteric nervous system. Acute activation significantly slows gastric motility. The primary glycemic risk is a flattened but extended meal absorption curve — creating an early post-bolus low followed by a stubborn late high.
            </div>

            <div className="fi" style={{ marginBottom: '14px' }}>
              <label>THC Level <span title="CB1 activation slows gastric emptying (k_ge) by 20–30%, delaying carbohydrate absorption and increasing late hyperglycemia risk." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {THC_LEVELS.map((t) => (
                  <button key={t.value}
                    className={`pab ${thcLevel === t.value
                      ? (t.value === 0 ? 'on' : 'on-y on')
                      : ''}`}
                    style={thcLevel === t.value && t.value > 0 ? {
                      borderColor: 'var(--g)', color: 'var(--g)', background: 'rgba(74,222,128,.08)',
                    } : {}}
                    onClick={() => setThcLevel(t.value)}>
                    <i>{t.icon}</i>{t.label}
                  </button>
                ))}
              </div>
            </div>

            {thcLevel > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <div className="bgz" style={{ borderColor: 'rgba(74,222,128,.4)', background: 'rgba(74,222,128,.06)' }}>
                  <div className="bgdot" style={{ background: 'var(--g)' }} />
                  <div className="bgztxt">
                    🌿 THC active — gastric motility slowed. Meal BG rise will be delayed and prolonged. Early post-bolus low is possible, followed by a late elevated plateau.
                  </div>
                </div>
                <div className="note" style={{ fontFamily: 'var(--mono)', color: 'var(--td)' }}>
                  Gastric emptying slowed by <strong style={{ color: 'var(--g)' }}>{Math.round(25 * thcLevel)}%</strong>
                  &nbsp;·&nbsp; k_ge multiplier: <strong style={{ color: 'var(--ac)' }}>{(1 - 0.25 * thcLevel).toFixed(2)}×</strong>
                </div>
              </div>
            )}
          </div>

          {/* Current modifiers panel so user can see combined effect */}
          <div className="card">
            <div className="ct">📡 Current Modifiers (with active substances)</div>
            <ModPanel mod={liveMod} />
          </div>
        </div>
      );
    }

    // ── E4. Settings panel ────────────────────────────────────────────────────────
    function SField({ label, k, s, set, step = 'any' }) {
      return (
        <div className="fi">
          <label>{label}</label>
          <input type="number" inputMode="decimal" step={step} value={s[k]}
            onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) set(x => ({ ...x, [k]: v })); }} />
        </div>
      );
    }

    function SettingsPanel({ profile, setProfile, sim, setSim, ui, setUi, logs, showT, cgmCfg, setCgmCfg }) {
      const [showAdv, setAdv] = useState(false);

      return (
        <div className="card">
          {/* UI prefs */}
          <div className="sst">🖥 Display Preferences</div>
          <div className="sg">
            <div className={`slp blue-on ${ui.dualBg ? 'on' : ''}`} style={{ gridColumn: '1/-1' }}
              onClick={() => setUi(x => ({ ...x, dualBg: !x.dualBg }))}>
              <div className={`trk blue-on ${ui.dualBg ? 'on' : ''}`}><div className="thm" /></div>
              <span className="slplbl">Enable Dual Input (CGM reading + Fingerstick override)</span>
            </div>
            <div className={`slp blue-on ${ui.showAdvancedModifiers ? 'on' : ''}`} style={{ gridColumn: '1/-1', borderColor: ui.showAdvancedModifiers ? 'var(--o)' : undefined, background: ui.showAdvancedModifiers ? 'rgba(251,146,60,.08)' : undefined }}
              onClick={() => setUi(x => ({ ...x, showAdvancedModifiers: !x.showAdvancedModifiers }))}>
              <div className={`trk blue-on ${ui.showAdvancedModifiers ? 'on' : ''}`} style={{ background: ui.showAdvancedModifiers ? 'var(--o)' : undefined }}><div className="thm" /></div>
              <span className="slplbl" style={{ color: ui.showAdvancedModifiers ? 'var(--o)' : undefined }}>
                🧪 Enable Advanced Daily Modifiers tab (alcohol, Phase 4 features)
              </span>
            </div>
            {ui.showAdvancedModifiers && (
              <div className="note" style={{ gridColumn: '1/-1', color: 'var(--o)' }}>
                Advanced modifiers involve substances with complex, multi-pathway effects on glucose. Use with clinical awareness. The tab will appear alongside Log, IOB, Charts, and Settings.
              </div>
            )}
          </div>

          {/* Personal profile */}
          <div className="sst">👤 Personal Profile</div>
          <div className="sg">
            <SField label="BMI (kg/m²)" k="bmi" s={profile} set={setProfile} step="0.1" />
            <SField label="Age (years)" k="age" s={profile} set={setProfile} step="1" />
            <div style={{ display: 'flex', alignItems: 'flex-end', paddingBottom: '2px' }}>
              <span className="note">Affects both absorption speed and insulin sensitivity. Reference = {profile.BMI_ref} kg/m².</span>
            </div>
            <div className="fi">
              <label>Sex <span title="Affects baseline insulin sensitivity. Females tend toward slightly higher peripheral sensitivity on average." style={{ cursor: 'help', opacity: .7 }}>ⓘ</span></label>
              <div className="pal3">
                {[['M', '♂ Male'], ['F', '♀ Female'], ['other', '⚧ Other']].map(([val, lbl]) => (
                  <button key={val}
                    className={`pab ${profile.sex === val ? 'on' : ''}`}
                    onClick={() => setProfile(x => ({ ...x, sex: val }))}>
                    {lbl}
                  </button>
                ))}
              </div>
              {profile.sex === 'F' && (
                <div className="note" style={{ marginTop: '4px' }}>
                  Female baseline applies a sensitivity multiplier of {sim.sex_factor_F}×. Cyclical (luteal-phase) resistance modelling coming in a future update.
                </div>
              )}
            </div>
          </div>

          {/* Clinical dosing */}
          <div className="sst">💊 Dosing Settings</div>
          <div className="sg">
            <SField label="Carb Ratio (g/unit)" k="carbRatio" s={profile} set={setProfile} />
            <SField label="Correction Factor (mg/dL/u)" k="corrFactor" s={profile} set={setProfile} />
            <SField label="Target BG (mg/dL)" k="targetBG" s={profile} set={setProfile} />
            <SField label="Base Insulin Duration (hr)" k="insulinDur" s={profile} set={setProfile} step="0.5" />
            <SField label="Low BG threshold (mg/dL)" k="lowBG" s={profile} set={setProfile} />
            <SField label="High BG threshold (mg/dL)" k="highBG" s={profile} set={setProfile} />
            <SField label="Basal Rate (units/hr)" k="basalRate" s={profile} set={setProfile} step="0.05" />
          </div>

          {/* Advanced coefficients */}
          <div className="avt" onClick={() => setAdv(v => !v)}>
            <span>{showAdv ? '▼' : '▶'}</span>
            <span>🔬 Advanced Parameters (for parents/clinicians)</span>
          </div>
          {showAdv && (<>
            <div className="sst" style={{ fontSize: '10px', marginTop: '4px' }}>Absorption Details — how fast insulin enters the bloodstream</div>
            <div className="sg">
              <SField label="k_abs0 — base absorption rate (hr⁻¹)" k="k_abs0" s={sim} set={setSim} step="0.05" />
              <SField label="α — how much BMI slows absorption" k="alpha" s={sim} set={setSim} step="0.01" />
              <SField label="β — how much HR speeds absorption" k="beta" s={sim} set={setSim} step="0.05" />
              <SField label="β_max — HR effect ceiling" k="beta_max" s={sim} set={setSim} step="0.05" />
              <SField label="γ — activity boost (per MET)" k="gamma" s={sim} set={setSim} step="0.01" />
              <SField label="δ — sleep slowdown factor" k="delta" s={sim} set={setSim} step="0.05" />
              <SField label="h_hd — dehydration absorption penalty" k="h_hd" s={sim} set={setSim} step="0.01" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Injection Site Multipliers — absorption speed by site (1.0 = abdomen baseline)</div>
            <div className="sg">
              <SField label="Abdomen (fastest, default)" k="siteMult_abdomen" s={profile} set={setProfile} step="0.05" />
              <SField label="Arm" k="siteMult_arm" s={profile} set={setProfile} step="0.05" />
              <SField label="Thigh (slowest)" k="siteMult_thigh" s={profile} set={setProfile} step="0.05" />
              <SField label="Other" k="siteMult_other" s={profile} set={setProfile} step="0.05" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Insulin Clearance — how fast insulin leaves the bloodstream</div>
            <div className="sg">
              <SField label="k_clear — plasma clearance rate (hr⁻¹)" k="k_clear" s={sim} set={setSim} step="0.05" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Nonlinear PK Model — saturable absorption (BloodGlucoseInsulinModel)</div>
            <div className="sg">
              <SField label="k_a_max — max absorption rate (min⁻¹)" k="k_a_max" s={sim} set={setSim} step="0.001" />
              <SField label="K_M — half-saturation depot (U)" k="K_M" s={sim} set={setSim} step="0.5" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  Michaelis-Menten absorption: k_a(D) = k_a_max × D / (K_M + D).
                  At D = K_M, absorption runs at half the maximum rate. Lower K_M = saturation at smaller doses (faster peak).
                  k_a_max of 0.03 min⁻¹ ≈ 1.8 hr⁻¹ effective peak; at 5U depot this gives ≈0.015 min⁻¹, matching the linear model's baseline.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Sensitivity Details — what makes insulin stronger or weaker</div>
            <div className="sg">
              <SField label="θ — how much BMI reduces sensitivity" k="theta" s={sim} set={setSim} step="0.01" />
              <SField label="σ_BG — BG range where sensitivity is best" k="sigma_bg" s={sim} set={setSim} />
              <SField label="κ — exercise sensitivity boost (per MET)" k="kappa" s={sim} set={setSim} step="0.01" />
              <SField label="d_dawn — dawn effect strength when flagged (0–1)" k="d_dawn" s={sim} set={setSim} step="0.05" />
              <SField label="ρ — low-BG blunting strength" k="rho" s={sim} set={setSim} step="0.005" />
              <SField label="σ_H — high-BG resistance strength" k="sigma_h" s={sim} set={setSim} step="0.005" />
              <SField label="η — sleep sensitivity reduction" k="eta" s={sim} set={setSim} step="0.05" />
              <SField label="η_q — sleep quality amplifier" k="eta_q" s={sim} set={setSim} step="0.05" />
              <SField label="h_U — stress sensitivity reduction" k="h_U" s={sim} set={setSim} step="0.01" />
              <SField label="h_K — illness sensitivity reduction" k="h_K" s={sim} set={setSim} step="0.01" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Age &amp; Sex Baseline (3.1) — demographic sensitivity adjustment</div>
            <div className="sg">
              <SField label="age_penalty — sensitivity lost per decade &gt;30" k="age_penalty" s={sim} set={setSim} step="0.01" />
              <SField label="sex_factor_F — female sensitivity multiplier" k="sex_factor_F" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  age_penalty of 0.07 ≈ 7% lost per decade after 30 (calibrated from glucose disposal rate studies).
                  sex_factor_F of 0.95 means female patients require ~5% less correction insulin on average at baseline.
                  Cyclical luteal-phase resistance is not yet modelled here.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Travel &amp; Routine Disruption (3.2) — jet lag and circadian misalignment</div>
            <div className="sg">
              <SField label="travel_sens_penalty — sensitivity reduction (fraction)" k="travel_sens_penalty" s={sim} set={setSim} step="0.05" />
              <SField label="travel_uncertainty — ±band growth (mg/dL per hour)" k="travel_uncertainty" s={sim} set={setSim} step="0.05" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  travel_sens_penalty of 0.20 reduces effective sensitivity by ~17% when active — consistent with acute cortisol and epinephrine elevation observed in jet-lag studies.
                  travel_uncertainty grows the ±forecast band linearly: at 0.30, a 4-hour projection carries a ±12 mg/dL band by hour 4.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Alcohol — Hepatic Suppression (4.1)</div>
            <div className="sg">
              <SField label="alcohol_hep_suppress — hepatic output reduction (fraction)" k="alcohol_hep_suppress" s={sim} set={setSim} step="0.05" />
              <SField label="alcohol_gastric_slow — gastric emptying slowdown (fraction)" k="alcohol_gastric_slow" s={sim} set={setSim} step="0.05" />
              <SField label="alcohol_sens_effect — direct sensitivity perturbation" k="alcohol_sens_effect" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  alcohol_hep_suppress of 0.30 represents ~30% suppression of hepatic gluconeogenesis at heavy intake — consistent with literature on acute ethanol effects. Heavy drinking can reach 50%+.
                  alcohol_gastric_slow of 0.20 delays gut delivery of carbs, flattening post-meal peaks but extending the absorption window.
                  alcohol_sens_effect of 0.10 models a mild direct reduction in peripheral insulin action at the receptor level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Stimulants — Epinephrine / Counter-Regulation (4.2)</div>
            <div className="sg">
              <SField label="stim_sens_penalty — sensitivity reduction per level" k="stim_sens_penalty" s={sim} set={setSim} step="0.01" />
              <SField label="stim_hep_boost — hepatic G_prod increase per level" k="stim_hep_boost" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  stim_sens_penalty of 0.20 is calibrated to the Lane et al. caffeine studies showing 15–30% acute insulin sensitivity reduction.
                  stim_hep_boost of 0.10 represents mild glycogenolysis from the adrenaline surge — adds ~0.1 mg/dL/hr to net glucose production per unit of stimulant level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Depressants — CNS / Gastric Slowing (4.3)</div>
            <div className="sg">
              <SField label="depress_sleep_amplify — amplifies sleep sensitivity effect" k="depress_sleep_amplify" s={sim} set={setSim} step="0.05" />
              <SField label="depress_gastric_slow — gastric emptying slowdown" k="depress_gastric_slow" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  Keep these coefficients subtle. depress_gastric_slow of 0.10–0.15 is realistic — reflects general CNS and smooth-muscle relaxation rather than a direct glucose pathway effect.
                  depress_sleep_amplify of 0.30 amplifies the sleep Î· factor when depressants are active, modelling deepened GH-mediated resistance.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Nicotine — Peripheral Disposal Penalty (4.4)</div>
            <div className="sg">
              <SField label="nicotine_util_penalty — peripheral glucose disposal reduction" k="nicotine_util_penalty" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  nicotine_util_penalty of 0.15 aligns with Eliasson et al. data: acute smoking impairs insulin-mediated glucose disposal by ~15–20% via vasoconstriction at both the receptor and absorption level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>THC / Cannabis — Gastric Motility (4.5)</div>
            <div className="sg">
              <SField label="thc_gastric_slow — gastric emptying reduction per level" k="thc_gastric_slow" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  thc_gastric_slow of 0.20–0.30 is highly realistic given CB1 receptor density in the enteric nervous system.
                  This flattens the meal absorption curve, raising early post-bolus hypo risk followed by a stubborn late hyperglycemic plateau.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Uncertainty Scoring (5.1) — confidence band coefficients</div>
            <div className="sg">
              <SField label="u_base — base band (±mg/dL per √hr at U=1)" k="u_base" s={sim} set={setSim} step="1" />
              <SField label="u_stress — stress contribution to scalar" k="u_stress" s={sim} set={setSim} step="0.05" />
              <SField label="u_illness — illness contribution to scalar" k="u_illness" s={sim} set={setSim} step="0.05" />
              <SField label="u_travel — travel/disruption contribution" k="u_travel" s={sim} set={setSim} step="0.05" />
              <SField label="u_overlap — per active meal reservoir" k="u_overlap" s={sim} set={setSim} step="0.05" />
              <SField label="u_substances — per unit of total substance level" k="u_substances" s={sim} set={setSim} step="0.05" />

              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  Band formula: ±(U_scalar × u_base × √t) mg/dL at horizon t hours.
                  The √t growth matches clinical prediction error, which compounds like a random walk rather than growing linearly.
                  On a sick travel day with overlapping meals and active IOB, U_scalar typically reaches 2–3×, giving a ±40–50 mg/dL band at 4 hours.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Glucose Forecast — how the 4-hour prediction is modelled</div>
            <div className="sg">
              <SField label="G_prod — net glucose production (mg/dL/hr)" k="G_prod" s={sim} set={setSim} step="0.1" />
              <SField label="k_basal — pull toward target BG (hr⁻¹)" k="k_basal" s={sim} set={setSim} step="0.001" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Body Memory Decay — how long past exercise/lows/highs are remembered</div>
            <div className="sg">
              <SField label="τ_ex — exercise effect fades over (hr)" k="tau_ex" s={sim} set={setSim} step="0.5" />
              <SField label="τ_low — low-BG memory fades over (hr)" k="tau_low" s={sim} set={setSim} step="0.5" />
              <SField label="τ_high — high-BG memory fades over (hr)" k="tau_high" s={sim} set={setSim} step="0.5" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Fat &amp; Protein Delayed Glucose (2.1) — late BG rise from macronutrients</div>
            <div className="sg">
              <SField label="fat_factor — glucose-equiv per gram fat" k="fat_factor" s={sim} set={setSim} step="0.01" />
              <SField label="prot_factor — glucose-equiv per gram protein" k="prot_factor" s={sim} set={setSim} step="0.01" />
              <SField label="λ_FP — fat/protein release rate (hr⁻¹)" k="lambda_FP" s={sim} set={setSim} step="0.05" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Meal Type &amp; Fiber Slowing (2.2) — carb absorption speed multipliers</div>
            <div className="sg">
              <SField label="Fast carbs multiplier (1.0 = baseline)" k="meal_slow_fast" s={sim} set={setSim} step="0.05" />
              <SField label="Mixed meal multiplier" k="meal_slow_mixed" s={sim} set={setSim} step="0.05" />
              <SField label="High fat/protein multiplier" k="meal_slow_hfp" s={sim} set={setSim} step="0.05" />
              <SField label="Low fiber multiplier (1.0 = baseline)" k="fiber_slow_low" s={sim} set={setSim} step="0.05" />
              <SField label="Medium fiber multiplier" k="fiber_slow_med" s={sim} set={setSim} step="0.05" />
              <SField label="High fiber multiplier" k="fiber_slow_high" s={sim} set={setSim} step="0.05" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Gastric Emptying (2.3) — stomach→gut→blood carb transit</div>
            <div className="sg">
              <SField label="k_ge_base — base emptying rate (hr⁻¹)" k="k_ge_base" s={sim} set={setSim} step="0.1" />
              <SField label="k_ge_fat_factor — fat slowdown coefficient" k="k_ge_fat_factor" s={sim} set={setSim} step="0.05" />
              <SField label="k_ge_prot_factor — protein slowdown" k="k_ge_prot_factor" s={sim} set={setSim} step="0.05" />
              <SField label="k_carb_abs — gut→blood rate (mg/dL/g/hr)" k="k_carb_abs" s={sim} set={setSim} step="0.1" />
            </div>
          </>)}

          {/* CGM / Nightscout */}

          <div className="sg">

                  <input type="password" placeholder="yoursubject-xxxxxxxxxxxxxxxxxxxx"
