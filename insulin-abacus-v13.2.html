    // -- E5. BG + Insulin chart ----------------------------------------------------
    function ProjectionChart({ logs, projection, ui }) {
      const ref = useRef(null);
      const inst = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        const colors = getChartTheme(ui);
        const hist = [...logs].filter(l => l.bloodSugar != null)
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)).slice(-40);
        if (inst.current) { inst.current.destroy(); inst.current = null; }
        const now = new Date();
        const projLabels = projection.map(pt => {
          const d = new Date(now.getTime() + pt.t * 3_600_000);
          return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        });
        const histLabels = hist.map(l => fmtT(l.timestamp));
        const allLabels = [...histLabels, 'Now', ...projLabels.slice(1)];
        const histBG = hist.map(l => bgValueForDisplayNumber(l.bloodSugar, ui));
        const projBG = projection.map(p => bgValueForDisplayNumber(p.G, ui));
        const bridgePad = hist.length > 0
          ? [...new Array(hist.length - 1).fill(null), bgValueForDisplayNumber(hist.at(-1)?.bloodSugar ?? null, ui)]
          : [];
        const nullPad = new Array(hist.length).fill(null);

        // -- 5.1 Confidence band arrays -----------------------------------------
        // The first projection point (t=0) has u=0, so the band starts tight and
        // widens naturally as the √t horizon grows.
        const projUpper = projection.map(p => bgValueForDisplayNumber(p.band_upper ?? p.G, ui));
        const projLower = projection.map(p => bgValueForDisplayNumber(p.band_lower ?? p.G, ui));
        // Confidence band colour: last-point U_scalar drives the tint.
        const finalU = projection.at(-1)?.U_scalar ?? 1;
        const bandAlpha = Math.min(0.18, 0.06 + (finalU - 1) * 0.06);
        const bandColor = finalU < 1.4 ? colorWithAlpha(colors.accent, bandAlpha, '#00d4ff')
          : finalU < 1.8 ? colorWithAlpha(colors.warning, bandAlpha, '#fbbf24')
            : colorWithAlpha(colors.danger, bandAlpha, '#ff6b6b');

        inst.current = new Chart(ref.current.getContext('2d'), {
          data: {
            labels: allLabels,
            datasets: [
              {
                type: 'line', label: 'BG history',
                data: [...histBG, ...new Array(projection.length).fill(null)],
                borderColor: colors.accent, backgroundColor: colorWithAlpha(colors.accent, 0.05, '#00d4ff'), borderWidth: 2,
                pointRadius: 4, tension: .35, fill: true, yAxisID: 'yBG',
                pointBackgroundColor: hist.map(l => bgColor(l.bloodSugar)),
                pointBorderColor: colors.bg, pointBorderWidth: 2
              },

              // -- Upper CI band (fills down to the lower band dataset below it) --
              {
                type: 'line', label: 'Upper 90% CI',
                data: [...nullPad, ...projUpper],
                borderColor: 'transparent', backgroundColor: bandColor,
                fill: '+1',   // Chart.js 4: fill from this to the next dataset
                pointRadius: 0, tension: .3, yAxisID: 'yBG'
              },
              // -- Lower CI band --------------------------------------------------
              {
                type: 'line', label: 'Lower 90% CI',
                data: [...nullPad, ...projLower],
                borderColor: 'transparent', backgroundColor: 'transparent',
                fill: false, pointRadius: 0, tension: .3, yAxisID: 'yBG'
              },

              {
                type: 'line', label: 'BG projection',
                data: [...bridgePad, ...projBG],
                borderColor: colorWithAlpha(colors.accent, 0.7, '#00d4ff'), backgroundColor: 'transparent',
                borderWidth: 1.5, borderDash: [6, 4], pointRadius: 3,
                pointBackgroundColor: projection.map(p => bgColor(p.G)),
                tension: .3, fill: false, yAxisID: 'yBG'
              },

              {
                type: 'bar', label: 'Insulin (u)',
                data: [...hist.map(l => l.insulinDose || null), ...new Array(projection.length).fill(null)],
                backgroundColor: colorWithAlpha(colors.purple, 0.45, '#a78bfa'), borderColor: colors.purple, borderWidth: 1, yAxisID: 'yIns'
              },
              {
                type: 'line', label: 'Sensitivity %',
                data: [...hist.map(l => l.seff_mult != null ? Math.round(l.seff_mult * 100) : null),
                ...new Array(projection.length).fill(null)],
                borderColor: colors.orange, backgroundColor: 'transparent', borderWidth: 1.5,
                borderDash: [4, 3], pointRadius: 2, tension: .3, yAxisID: 'yPct'
              },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                labels: {
                  color: colors.muted, font: { family: 'Share Tech Mono', size: 10 }, boxWidth: 10,
                  filter: item => !item.text.includes('CI')
                }
              },
              tooltip: {
                backgroundColor: colors.surface, borderColor: colors.border, borderWidth: 1,
                titleColor: colors.text, bodyColor: colors.muted, titleFont: { family: 'Share Tech Mono' },
                filter: item => item.dataset.label !== 'Upper 90% CI' && item.dataset.label !== 'Lower 90% CI'
              },
            },
            scales: {
              x: { ticks: { color: colors.faint, font: { family: 'Share Tech Mono', size: 9 }, maxRotation: 45 }, grid: { color: colorWithAlpha(colors.border, 0.35, '#1e2d45') } },
              yBG: {
                position: 'left', ticks: { color: colors.faint, font: { family: 'Share Tech Mono', size: 9 }, callback: v => formatChartTick(v, ui) }, grid: { color: colorWithAlpha(colors.border, 0.35, '#1e2d45') },
                title: { display: true, text: glucoseAxisTitle(ui), color: colors.accent, font: { size: 9 } }
              },
              yIns: {
                position: 'right', ticks: { color: colors.faint, font: { family: 'Share Tech Mono', size: 9 } },
                grid: { drawOnChartArea: false }, title: { display: true, text: 'Units', color: colors.purple, font: { size: 9 } }
              },
              yPct: {
                position: 'right', min: 0, max: 180,
                ticks: { color: colors.faint, font: { family: 'Share Tech Mono', size: 9 }, callback: v => v + '%' },
                grid: { drawOnChartArea: false }, title: { display: true, text: 'Sensitivity%', color: colors.orange, font: { size: 9 } }
              },
            },
          },
        });
        return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
      }, [logs, projection, ui]);

      if (!logs.filter(l => l.bloodSugar != null).length)
        return <div className="es"><div className="ei">📈</div>Log readings to see graph</div>;
      return <div className="chwrap"><canvas ref={ref} /></div>;
    }

    // -- Canonical chart-source contracts ------------------------------------------
    // Ownership model:
    //   Chart 1 = meal contribution source
    //   Chart 2 = insulin contribution source
    //   Chart 3 = modifier source
    //   Chart 4 = actual glucose source
    //   Chart 5 = aggregator only
    //
    // Canonical contracts:
    //   Chart 1 -> [{ t, value, carbRate?, fpRate?, meta? }]
    //   Chart 2 -> [{ t, value, qp?, meta? }]
    //   Chart 3 -> [{ t, k_abs_mult, seff_mult, hepatic_factor, U_scalar }]
    //   Chart 4 -> fusedSeries = [{ t, glucose, type, iso? }]
    //           -> rawSeries = { cgm: [{ x, y }], fingerstick: [{ x, y }], manual: [{ x, y }] }
    //
    // Non-negotiable aggregator rule:
    //   Chart 5 must consume prepared Chart 1-4 outputs only.
    //   It must not call raw builders, fall back to stubs, or scan logs directly.
    //   Raw glucose extraction belongs to the Chart 4 source layer, not the aggregator.
    //
    // Current source-of-truth functions:
    //   Meal series source = c1_buildMealSeries(...), currently derived from c5_buildMealTimeline(...).
    //   Insulin-effect series source = c2_buildInsulinSeries(projection, profile, sim, liveMod).
    //   Modifier series source = c3_buildModifierSeries(logs, profile, sim, liveMod, timeWindow).
    //   Actual glucose fused source = c4_buildFusedSeries(logs).
    //   Actual glucose raw scatter source = c4_extractRaw(logs).
    //
    // Immediate refactor goal:
    //   Keep chart data derivation at the app/source layer and chart rendering in components.
    //   Prepared series are created upstream, then passed into charts as props.

    // -- E5a. Chart 1 · Meal contribution source ----------------------------------
    // Derives the carb-to-blood glucose contribution rate from logged meals using the
    // same two-compartment gastric emptying model as simulateProjection. No new math.

    function c5_mealTypeFactor(mealType, sim) {
      const idx = safeNum(mealType, 0);
      return [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][idx] ?? 1.0;
    }

    function c5_fiberFactor(fiberClass, sim) {
      const idx = safeNum(fiberClass, 0);
      return [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][idx] ?? 1.0;
    }

    function c5_buildMealParams(sim, meal) {
      const carbs_g = safeNum(meal.carbs, 0);
      const fat_g = safeNum(meal.fat_g, 0);
      const protein_g = safeNum(meal.protein_g, 0);
      const total = Math.max(1, carbs_g + fat_g + protein_g);

      return {
        k_ge_base: safeNum(sim.k_ge_base, 2.0) / 60,
        k_ge_min: 0.01 / 60,
        k_abs_c: safeNum(sim.k_carb_abs, 1.5) / 60,
        lambda_FP: safeNum(sim.lambda_FP, 0.30) / 60,
        c_g: 1.0,
        f_fat: safeNum(sim.k_ge_fat_factor, 0.3),
        f_prot: safeNum(sim.k_ge_prot_factor, 0.2),
        a_f: safeNum(sim.fat_factor, 0.10),
        a_p: safeNum(sim.prot_factor, 0.20),
        fat_fraction: fat_g / total,
        protein_fraction: protein_g / total,
      };
    }

    function c5_buildMealFactors(sim, meal) {
      const alcoholLevel = safeNum(meal.alcoholLevel, 0);
      const depressantLevel = safeNum(meal.depressantLevel, 0);
      const thcLevel = safeNum(meal.thcLevel, 0);

      return {
        meal_type_factor: c5_mealTypeFactor(meal.mealType, sim),
        fiber_factor: c5_fiberFactor(meal.fiberClass, sim),
        alcohol_gastric_factor: Math.max(0.05, 1 - safeNum(sim.alcohol_gastric_slow, 0.2) * alcoholLevel),
        depressant_gastric_factor: Math.max(0.05, 1 - safeNum(sim.depress_gastric_slow, 0.15) * depressantLevel),
        thc_gastric_factor: Math.max(0.05, 1 - safeNum(sim.thc_gastric_slow, 0.25) * thcLevel),
      };
    }

    function c5_buildMealTimeline(logs, sim, startMs, endMs, dtMin = 5) {
      const dtMs = dtMin * 60000;
      const mealLogs = (logs || [])
        .map(log => ({ log, tMs: getLogTimestampMs(log) }))
        .filter(({ log, tMs }) => Number.isFinite(tMs)
          && tMs <= endMs
          && tMs >= startMs - 12 * 3600000
          && (safeNum(log.carbs, 0) > 0 || safeNum(log.fat_g, 0) > 0 || safeNum(log.protein_g, 0) > 0))
        .sort((a, b) => a.tMs - b.tMs)
        .map(({ log: meal, tMs }) => {
          const carbs_g = safeNum(meal.carbs, 0);
          const fat_g = safeNum(meal.fat_g, 0);
          const protein_g = safeNum(meal.protein_g, 0);
          return {
            tMs,
            params: c5_buildMealParams(sim, meal),
            factors: c5_buildMealFactors(sim, meal),
            meal: { carbs_g, fat_g, protein_g },
            inputPoint: {
              ...normalizeTimePoint({
                x: tMs,
                y: carbs_g + fat_g + protein_g,
              }),
              carbs_g,
              fat_g,
              protein_g,
              total_g: carbs_g + fat_g + protein_g,
            },
            state: { D_g: 0, R_c: 0, F_P: 0 },
            active: false,
          };
        });

      if (!mealLogs.length) {
        const totalRate = [];
        const carbRate = [];
        const fpRate = [];
        const D_g = [];
        const R_c = [];
        for (let tMs = startMs; tMs <= endMs; tMs += dtMs) {
          totalRate.push({ x: tMs, y: 0 });
          carbRate.push({ x: tMs, y: 0 });
          fpRate.push({ x: tMs, y: 0 });
          D_g.push({ x: tMs, y: 0 });
          R_c.push({ x: tMs, y: 0 });
        }
        return {
          totalRate,
          carbRate,
          fpRate,
          D_g,
          R_c,
          inputPoints: [],
        };
      }

      const firstMealMs = mealLogs[0].tMs;
      const simStartMs = Math.min(startMs, firstMealMs);

      const totalRate = [];
      const carbRate = [];
      const fpRate = [];
      const D_g = [];
      const R_c = [];
      const inputPoints = mergeSeriesByTime(mealLogs
        .filter(model => model.tMs >= startMs && model.tMs <= endMs)
        .map(model => model.inputPoint)
        .sort((a, b) => a.x - b.x), 'x', (prev, next) => ({
          ...prev,
          y: prev.y + next.y,
          carbs_g: prev.carbs_g + next.carbs_g,
          fat_g: prev.fat_g + next.fat_g,
          protein_g: prev.protein_g + next.protein_g,
          total_g: prev.total_g + next.total_g,
        }));

      for (let tMs = simStartMs; tMs <= endMs; tMs += dtMs) {
        for (const model of mealLogs) {
          if (!model.active && model.tMs <= tMs) {
            model.state = addMealToState({ D_g: 0, R_c: 0, F_P: 0 }, model.meal, model.params);
            model.active = true;
          }
        }

        let totalMealRate = 0;
        let carbMealRate = 0;
        let fpMealRate = 0;
        let dgState = 0;
        let rcState = 0;

        for (const model of mealLogs) {
          if (!model.active) continue;
          const result = updateCarbModel(dtMin, model.state, model.params, model.factors);
          model.state = result.state;
          totalMealRate += result.totalMealRate;
          carbMealRate += result.carbRate;
          fpMealRate += result.fpRate;
          dgState += result.state.D_g;
          rcState += result.state.R_c;
        }

        if (tMs < startMs) continue;

        totalRate.push({ x: tMs, y: totalMealRate });
        carbRate.push({ x: tMs, y: carbMealRate });
        fpRate.push({ x: tMs, y: fpMealRate });
        D_g.push({ x: tMs, y: dgState });
        R_c.push({ x: tMs, y: rcState });
      }

      return { totalRate, carbRate, fpRate, D_g, R_c, inputPoints };
    }

    // Canonical Chart 1 source.
    // This is the current source of truth for meal contribution series; it wraps the
    // shared meal timeline builder so meal derivation stays outside the charts.
    function c1_buildMealSeries(logs, profile, sim, window = {}) {
      const now = window.nowMs ?? Date.now();
      const startMs = window.startMs ?? (now - CHART_WINDOW_MS);
      const endMs = window.endMs ?? (now + CHART_WINDOW_MS);
      const dtMin = window.dtMin ?? CHART_DT_MINUTES;
      const timeline = c5_buildMealTimeline(logs, sim, startMs, endMs, dtMin);
      const inputsByTime = new Map();
      timeline.inputPoints.forEach(pt => {
        if (!inputsByTime.has(pt.x)) inputsByTime.set(pt.x, []);
        inputsByTime.get(pt.x).push(pt);
      });
      return timeline.totalRate.map((pt, idx) => normalizeMetricTimePoint({
        t: pt.x,
        value: safeNum(pt.y, 0),
        carbRate: safeNum(timeline.carbRate[idx]?.y, 0),
        fpRate: safeNum(timeline.fpRate[idx]?.y, 0),
        meta: {
          D_g: safeNum(timeline.D_g[idx]?.y, 0),
          R_c: safeNum(timeline.R_c[idx]?.y, 0),
          mealInputs: inputsByTime.get(pt.x) || [],
        },
      }, {
        label: `chart1.series[${idx}]`,
        timeKey: 't',
        numericKeys: ['value', 'carbRate', 'fpRate'],
      }));
    }

    // -- E5_carb. Chart 1 · Meal model view ---------------------------------------

    function updateCarbModel(dtMinutes, state, params, factors) {
      const compositionFactorRaw = 1.0
        - (params.f_fat * params.fat_fraction)
        - (params.f_prot * params.protein_fraction);
      const compositionFactor = Math.max(0.05, compositionFactorRaw);
      let k_ge = params.k_ge_base * compositionFactor
        * factors.meal_type_factor
        * factors.fiber_factor
        * factors.alcohol_gastric_factor
        * factors.depressant_gastric_factor
        * factors.thc_gastric_factor;
      k_ge = Math.max(params.k_ge_min, k_ge);
      const dD_g = -k_ge * state.D_g;
      const dR_c = (k_ge * state.D_g) - (params.k_abs_c * state.R_c);
      const dF_P = -params.lambda_FP * state.F_P;
      const newD_g = Math.max(0, state.D_g + dD_g * dtMinutes);
      const newR_c = Math.max(0, state.R_c + dR_c * dtMinutes);
      const newF_P = Math.max(0, state.F_P + dF_P * dtMinutes);
      const carbRate = params.c_g * params.k_abs_c * newR_c;
      const fpRate = params.lambda_FP * newF_P;
      return {
        state: { D_g: newD_g, R_c: newR_c, F_P: newF_P },
        carbRate, fpRate,
        totalMealRate: carbRate + fpRate,
        k_ge,
      };
    }

    function addMealToState(state, meal, params) {
      return {
        D_g: state.D_g + meal.carbs_g,
        R_c: state.R_c,
        F_P: state.F_P + (params.a_f * meal.fat_g) + (params.a_p * meal.protein_g),
      };
    }

    // -- E5b. Chart 4 · Actual Glucose Measurements --------------------------------
    // Chart 4 owns raw glucose extraction and fused glucose reconstruction.
    // The aggregator consumes these prepared outputs; it never rebuilds them.

    // Priority: fingerstick > cgm > bloodSugar (manual/unspecified)
    function c4_buildFusedSeries(logs, timeWindow = null, minBG = 20, maxBG = 600) {
      if (!Array.isArray(logs) || !logs.length) return [];

      // Group by normalized timestamp so imported offsets and alternate string formats
      // collapse to one canonical observation bucket.
      const groups = new Map();
      for (const log of logs) {
        if (!log || !log.timestamp) continue;
        const tMs = getLogTimestampMs(log);
        if (!Number.isFinite(tMs)) continue;
        if (!groups.has(tMs)) groups.set(tMs, []);
        groups.get(tMs).push(log);
      }

      const sorted = Array.from(groups.keys()).sort((a, b) => a - b);

      const series = [];
      for (const tMs of sorted) {
        if (!isWithinChartWindow(tMs, timeWindow)) continue;
        let selected = null, type = 'manual';
        for (const log of groups.get(tMs)) {
          const fs = Number(log.fingerstick);
          const cgm = Number(log.cgm);
          const bs = Number(log.bloodSugar);
          if (selected === null && isFinite(fs) && fs >= minBG && fs <= maxBG) { selected = fs; type = 'fingerstick'; }
          if (selected === null && isFinite(cgm) && cgm >= minBG && cgm <= maxBG) { selected = cgm; type = 'cgm'; }
          if (selected === null && isFinite(bs) && bs >= minBG && bs <= maxBG) { selected = bs; type = 'manual'; }
        }
        if (selected !== null) {
          series.push(normalizeMetricTimePoint({
            t: tMs,
            glucose: selected,
            type,
            iso: new Date(tMs).toISOString(),
          }, {
            label: 'chart4.fusedSeries.point',
            timeKey: 't',
            numericKeys: ['glucose'],
          }));
        }
      }
      return series;
    }

    // Extracts raw scatter points per measurement type for the chart overlay.
    function c4_extractRaw(logs, timeWindow = null, minBG = 20, maxBG = 600) {
      const cgm = [], fingerstick = [], manual = [];
      for (const log of (logs || [])) {
        if (!log || !log.timestamp) continue;
        const x = getLogTimestampMs(log);
        if (!isFinite(x)) continue;
        if (!isWithinChartWindow(x, timeWindow)) continue;
        const fs = Number(log.fingerstick);
        const cv = Number(log.cgm);
        const bs = Number(log.bloodSugar);
        const hasCgm = isFinite(cv) && cv >= minBG && cv <= maxBG;
        const hasFs = isFinite(fs) && fs >= minBG && fs <= maxBG;
        if (hasFs) fingerstick.push(normalizeTimePoint({ x, y: fs }));
        if (hasCgm) cgm.push(normalizeTimePoint({ x, y: cv }));
        // manual: bloodSugar logged without a CGM or fingerstick value
        if (!hasCgm && !hasFs && isFinite(bs) && bs >= minBG && bs <= maxBG)
          manual.push(normalizeTimePoint({ x, y: bs }));
      }
      const byTime = (a, b) => a.x - b.x;
      return {
        cgm: mergeSeriesByTime(cgm.sort(byTime), 'x'),
        fingerstick: mergeSeriesByTime(fingerstick.sort(byTime), 'x'),
        manual: mergeSeriesByTime(manual.sort(byTime), 'x'),
      };
    }

    // Canonical Chart 4 source bundle: fused line + raw scatter series.
    function c4_buildActualGlucoseSource(logs, timeWindow = null, minBG = 20, maxBG = 600) {
      return {
        fusedSeries: c4_buildFusedSeries(logs, timeWindow, minBG, maxBG),
        rawSeries: c4_extractRaw(logs, timeWindow, minBG, maxBG),
      };
    }

                }}>
                  <input type="checkbox" checked={val} onChange={e => set(e.target.checked)}
                    style={{ accentColor: 'var(--ac)' }} />
                  {lbl}
                </label>
              ))}
              <span style={{ fontSize: '11px', color: 'var(--td)', marginLeft: 'auto' }}>{stats}</span>
            </div>
          </>)
        }
      </>);
    }

    // -- E5c. Chart 3 · Modifier Suite --------------------------------------------
    // Reconstructs k_abs_mult, seff_mult, hepaticOutputFactor, U_scalar at every
    // historical log point using the app's own computeModifiers + computeStateVars.
    // No new math — pure time-series reconstruction from real logged data.

    // Canonical Chart 3 source contract:
    //   [{ t, k_abs_mult, seff_mult, hepatic_factor, U_scalar }]
    function c3_buildModifierSeries(logs, profile, sim, liveMod = null, timeWindow = null) {
      const centerMs = timeWindow?.centerMs ?? Date.now();
      const sorted = [...logs]
        .map(log => ({ ...log, timestampMs: getLogTimestampMs(log) }))
        .filter(l => l.bloodSugar != null && Number.isFinite(l.timestampMs))
        .sort((a, b) => a.timestampMs - b.timestampMs);
      const series = [];
      sorted.forEach((log, i) => {
        const tMs = log.timestampMs;
        if (!isWithinChartWindow(tMs, timeWindow)) return;
        const tDate = new Date(tMs);
        const svAt = computeStateVars(sorted.slice(0, i + 1), profile, sim);
        const tHr = tDate.getHours() + tDate.getMinutes() / 60;
        const inpAt = {
          bmi: profile.bmi, hr: log.hr || profile.HR_ref,
          pa: log.pa || 0, sleep: log.sleep || 0, sleepQ: log.sleepQ ?? 4,
          stress: log.stress || 0, illness: log.illness || 0,
          hydration: log.hydration ?? 1, travelDay: log.travelDay || 0,
          alcoholLevel: log.alcoholLevel || 0, stimulantLevel: log.stimulantLevel || 0,
          depressantLevel: log.depressantLevel || 0, nicotineLevel: log.nicotineLevel || 0,
          thcLevel: log.thcLevel || 0, dawnEffect: 0,
          bg: log.bloodSugar, timeHour: tHr,
          carbs: log.carbs || 0, fat_g: log.fat_g || 0,
          protein_g: log.protein_g || 0, mealType: log.mealType || 0,
          fiberClass: log.fiberClass || 0,
        };
        const mod = computeModifiers(inpAt, svAt, profile, sim);
        series.push(normalizeMetricTimePoint({
          t: tMs,
          k_abs_mult: mod.kabs_mult ?? 1,
          seff_mult: mod.seff_mult ?? 1,
          hepatic_factor: mod.hepaticOutputFactor ?? 1,
          U_scalar: mod.U_scalar ?? 1,
          meta: { current: false },
        }, {
          label: `chart3.series[${i}]`,
          timeKey: 't',
          numericKeys: ['k_abs_mult', 'seff_mult', 'hepatic_factor', 'U_scalar'],
        }));
      });
      if (liveMod) {
        series.push(normalizeMetricTimePoint({
          t: centerMs,
          k_abs_mult: liveMod.kabs_mult ?? 1,
          seff_mult: liveMod.seff_mult ?? 1,
          hepatic_factor: liveMod.hepaticOutputFactor ?? 1,
          U_scalar: liveMod.U_scalar ?? 1,
          meta: { current: true },
        }, {
          label: 'chart3.series.current',
          timeKey: 't',
          numericKeys: ['k_abs_mult', 'seff_mult', 'hepatic_factor', 'U_scalar'],
        }));
      }
      return mergeSeriesByTime(series.sort((a, b) => a.t - b.t), 't', (prev, next) => (
        next?.meta?.current ? next : prev
      ));
    }

    function Chart3ModifierChart({ series, ui, timeWindow }) {

      useEffect(() => {

        inst.current = new Chart(ref.current.getContext('2d'), {

          },

      }, [series, timeWindow, ui]);

      if (!(series || []).length)

    // -- E5d. Chart 2 · Insulin Effect on Blood Glucose ----------------------------
    // Uses the app's existing projection (already computed via simulateProjection) plus
    // the log history. No PK re-implementation — all math already runs upstream.

    // Canonical Chart 2 source:
    // builds the prepared insulin-effect series used by both the insulin chart and
    // the aggregator. Values are mg/dL/min and negative when glucose is being lowered.
    function c2_buildInsulinSeries(projection, profile, sim, liveMod, nowMs = Date.now()) {
      if (!Array.isArray(projection) || !projection.length) return [];
      const kS = profile.corrFactor * kClearPerHour(sim); // mg/dL/U/hr
      const seff_mult = liveMod?.seff_mult ?? 1;
      return projection
        .filter(pt => pt.Qp != null)
        .map((pt, i) => normalizeMetricTimePoint({
          t: nowMs + pt.t * 3_600_000,                            // absolute ms
          value: -(kS * seff_mult * pt.Qp) / 60,                  // mg/dL/min, negative
          qp: pt.Qp ?? 0,
          meta: { glucose: pt.G ?? null },
        }, {
          label: `chart2.series[${i}]`,
          timeKey: 't',
          numericKeys: ['value', 'qp'],
        }));
    }

    function c2_buildInsulinChartData(logs, projection, series, timeWindow = null, nowMs = Date.now()) {
      const bgHistory = mergeSeriesByTime((logs || [])
        .map(log => {
          const x = getLogTimestampMs(log);
          const y = Number(log?.bloodSugar);
          if (!Number.isFinite(x) || !Number.isFinite(y) || !isWithinChartWindow(x, timeWindow)) return null;
          return { ...normalizeTimePoint({ x, y }), rawBg: y };
        })
        .filter(Boolean)
        .sort((a, b) => a.x - b.x), 'x');

      const doseBars = mergeSeriesByTime((logs || [])
        .map(log => {
          const x = getLogTimestampMs(log);
          const y = safeNum(log?.insulinDose, 0);
          if (!Number.isFinite(x) || y <= 0 || !isWithinChartWindow(x, timeWindow)) return null;
          return normalizeTimePoint({ x, y });
        })
        .filter(Boolean)
        .sort((a, b) => a.x - b.x), 'x');

      const projectedBgCore = mergeSeriesByTime((projection || [])
        .map(pt => {
          const x = nowMs + safeNum(pt?.t, 0) * MS_PER_HOUR;
          const y = Number(pt?.G);
          if (!Number.isFinite(x) || !Number.isFinite(y) || !isWithinChartWindow(x, timeWindow)) return null;
          return normalizeTimePoint({ x, y });
        })
        .filter(Boolean)
        .sort((a, b) => a.x - b.x), 'x');

      const projectedBg = [...projectedBgCore];
      const lastHistoryPoint = bgHistory.at(-1);
      const firstProjectionPoint = projectedBgCore[0];
      if (lastHistoryPoint && firstProjectionPoint) {
        if (lastHistoryPoint.x < firstProjectionPoint.x) {
          projectedBg.unshift({ x: lastHistoryPoint.x, y: lastHistoryPoint.y, rawBg: lastHistoryPoint.rawBg });
        } else if (lastHistoryPoint.x === firstProjectionPoint.x) {
          projectedBg[0] = { x: firstProjectionPoint.x, y: lastHistoryPoint.y, rawBg: lastHistoryPoint.rawBg };
        }
      }

      const seriesByTime = new Map((series || [])
        .map(pt => [Number(pt?.t), pt])
        .filter(([t]) => Number.isFinite(t)));

      const projectedQp = mergeSeriesByTime((projection || [])
        .map(pt => {
          const x = nowMs + safeNum(pt?.t, 0) * MS_PER_HOUR;
          const y = Number(seriesByTime.get(x)?.qp ?? pt?.Qp);
          if (!Number.isFinite(x) || !Number.isFinite(y) || !isWithinChartWindow(x, timeWindow)) return null;
          return normalizeTimePoint({ x, y });
        })
        .filter(Boolean)
        .sort((a, b) => a.x - b.x), 'x');

      const loweringRate = mergeSeriesByTime((series || [])
        .map(pt => {
          const x = Number(pt?.t);
          const y = Number(pt?.value);
          if (!Number.isFinite(x) || !Number.isFinite(y) || !isWithinChartWindow(x, timeWindow)) return null;
          return normalizeTimePoint({ x, y });
        })
        .filter(Boolean)
        .sort((a, b) => a.x - b.x), 'x');

      return { bgHistory, doseBars, projectedBg, projectedQp, loweringRate };
    }

    // -- E6. Chart 5 · Master Aggregator ------------------------------------------
    // Aggregator only: consumes prepared Chart 1-4 series, aligns them on a common
    // time base, and anchors its forecast to Chart 4 observations.
    // Pure utility functions — no React, no physiology, only data fusion.

    function c5_sampleSeries(series, t, key = 'value', def = 0) {
      if (!Array.isArray(series) || !series.length) return def;
      let last = def;
      for (const pt of series) {
        const ts = Number(pt.t);
        if (!isFinite(ts)) continue;
        if (ts > t) break;
        if (pt[key] != null && isFinite(pt[key])) last = Number(pt[key]);
      }
      return last;
    }

    function c5_sampleObserved(series, t, tolMs = 60000) {
      if (!Array.isArray(series)) return null;
      for (const pt of series) {
        const ts = Number(pt.t);
        if (!isFinite(ts)) continue;
        if (Math.abs(ts - t) <= tolMs && pt.glucose != null && isFinite(pt.glucose))
          return Number(pt.glucose);
      }
      return null;
    }

    function c5_initialGlucose(series, startTime) {
      if (!Array.isArray(series) || !series.length) return null;
      let best = null;
      for (const pt of series) {
        const ts = Number(pt.t);
        if (!isFinite(ts)) continue;
        if (ts <= startTime && pt.glucose != null && isFinite(pt.glucose)) best = Number(pt.glucose);
      }
      if (best !== null) return best;
      for (const pt of series) {
        if (pt.glucose != null && isFinite(pt.glucose)) return Number(pt.glucose);
      }
      return null;
    }

    function c5_buildAlignedTimes({ startTime, endTime, dtMinutes, seriesList = [] }) {
      const times = new Set();
      const dtMs = dtMinutes * 60000;
      for (let t = startTime; t <= endTime + 1; t += dtMs) times.add(t);
      seriesList.forEach(series => {
        (series || []).forEach(pt => {
          const ts = Number(pt?.t);
          if (isFinite(ts) && ts >= startTime && ts <= endTime) times.add(ts);
        });
      });
      return Array.from(times).sort((a, b) => a - b);
    }

    function c5_aggregate({ startTime, endTime, dtMinutes, chart1Series, chart2Series, chart3Series, chart4Series, cfg = {} }) {
      const G_prod_base = cfg.G_prod_base ?? 0.12;
      const k_basal = cfg.k_basal ?? 0.003;
      const targetBG = cfg.targetBG ?? 100;
      const u_base = cfg.u_base ?? 18;
      const clampMin = cfg.clampMin ?? 40;
      const clampMax = cfg.clampMax ?? 400;
      const actualTolMs = cfg.actualTolMs ?? 500;

      let G = c5_initialGlucose(chart4Series, startTime);
      if (G === null) return { error: 'No Chart 4 glucose at or before startTime.' };

      const combined = [], bands = [];
      const times = c5_buildAlignedTimes({
        startTime,
        endTime,
        dtMinutes,
        seriesList: [chart1Series, chart2Series, chart3Series, chart4Series],
      });
      let prevT = startTime;

      for (const t of times) {
        const stepMinutes = t === startTime ? 0 : Math.max(0, (t - prevT) / 60000);
        const mealRate = c5_sampleSeries(chart1Series, t, 'value', 0);
        const insulinRate = c5_sampleSeries(chart2Series, t, 'value', 0);
        const hepaticFac = c5_sampleSeries(chart3Series, t, 'hepatic_factor', 1.0);
        const UScalar = c5_sampleSeries(chart3Series, t, 'U_scalar', 1.0);

        const hepaticRate = G_prod_base * hepaticFac;
        const basalPull = k_basal * (G - targetBG);
        const netRate = mealRate + hepaticRate + insulinRate - basalPull;

        if (stepMinutes > 0)
          G = Math.min(clampMax, Math.max(clampMin, G + netRate * stepMinutes));

        const observed = c5_sampleObserved(chart4Series, t, actualTolMs);
        if (observed !== null) G = observed;

        const horizHr = Math.max((t - startTime) / 3600000, 0.001);
        const halfW = u_base * UScalar * Math.sqrt(horizHr);

        combined.push({ t, glucose: G, mealRate, insulinRate, netRate, observedGlucose: observed });
        bands.push({ t, lower: G - halfW, upper: G + halfW });
        prevT = t;
      }
      return { combined, bands };
    }

    function Chart5AggregatorChart({ chart1Series, chart2Series, chart3Series, chart4Series, chart4Raw, profile, sim, ui, timeWindow }) {
      const ref = useRef(null);
      const inst = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        const colors = getChartTheme(ui);
        const nowPlugin = createNowLinePlugin('nowLine_c5', timeWindow?.centerMs ?? Date.now(), colors);
        const start = timeWindow?.windowStartMs ?? (Date.now() - CHART_WINDOW_MS);
        const end = timeWindow?.windowEndMs ?? (Date.now() + CHART_WINDOW_MS);
        if (!chart1Series.length || !chart2Series.length || !chart3Series.length || !chart4Series.length) return;

        // Pull live values from profile/sim so the aggregator matches app settings.
        // sim.k_basal is hr⁻¹; c5_aggregate Euler step is in minutes, so convert.
        const targetBG = profile?.targetBG ?? 100;
        const k_basal = (sim?.k_basal ?? 0.008) / 60;   // hr⁻¹ → min⁻¹
        const u_base = sim?.u_base ?? 18;
        const clampMin = profile?.lowBG ?? 40;

        const result = c5_aggregate({
          startTime: start, endTime: end, dtMinutes: timeWindow?.dtMinutes ?? CHART_DT_MINUTES,
          chart1Series, chart2Series, chart3Series, chart4Series,
          cfg: {
            G_prod_base: 0.12, k_basal, targetBG,
            u_base, clampMin, clampMax: BG_ENTRY_MAX, actualTolMs: 60000
          },
        });
        if (result.error) { console.error('Chart5:', result.error); return; }

        const cgmDisplay = (chart4Raw?.cgm || []).map(p => ({ ...p, y: bgValueForDisplayNumber(p.y, ui) }));
        const fingerstickDisplay = (chart4Raw?.fingerstick || []).map(p => ({ ...p, y: bgValueForDisplayNumber(p.y, ui) }));
        const manualDisplay = (chart4Raw?.manual || []).map(p => ({ ...p, y: bgValueForDisplayNumber(p.y, ui) }));
        const bandUpper = result.bands.map(b => ({ x: b.t, y: bgValueForDisplayNumber(b.upper, ui) }));
        const bandLower = result.bands.map(b => ({ x: b.t, y: bgValueForDisplayNumber(b.lower, ui) }));
        const fusedDisplay = result.combined.map(p => ({ x: p.t, y: bgValueForDisplayNumber(p.glucose, ui) }));
        const mealRateDisplay = result.combined.map(p => ({ x: p.t, y: glucoseRateForDisplayNumber(p.mealRate, ui) }));
        const insulinRateDisplay = result.combined.map(p => ({ x: p.t, y: glucoseRateForDisplayNumber(p.insulinRate, ui) }));
        const bgBounds = computeBgAxisBounds([
          ...cgmDisplay.map(p => p.y),
          ...fingerstickDisplay.map(p => p.y),
          ...manualDisplay.map(p => p.y),
          ...bandUpper.map(p => p.y),
          ...bandLower.map(p => p.y),
          ...fusedDisplay.map(p => p.y),
        ], ui);
        const rateBounds = computeNumericAxisBounds([
          ...mealRateDisplay.map(p => p.y),
          ...insulinRateDisplay.map(p => p.y),
        ], {
          floor: glucoseRateForDisplayNumber(-2, ui),
          ceil: glucoseRateForDisplayNumber(2.5, ui),
          step: isMmol(ui) ? 0.05 : 0.5,
          pad: glucoseRateForDisplayNumber(0.15, ui) ?? 0,
          includeZero: true,
          minSpan: isMmol(ui) ? 0.2 : 1,
        });

        if (inst.current) { inst.current.destroy(); inst.current = null; }

        inst.current = new Chart(ref.current.getContext('2d'), {
          type: 'line',
          plugins: [nowPlugin],
          data: {
            datasets: [
              {
                label: 'CGM (Ch4)',
                data: cgmDisplay,
                type: 'scatter', backgroundColor: colors.info, pointRadius: 3,

                parsing: false,

                pointRadius: 0, fill: '+1', order: 4, yAxisID: 'yBG',

              },
              {
                label: 'Band lower',
                data: bandLower,
                borderColor: 'transparent', backgroundColor: 'transparent',
                pointRadius: 0, fill: false, order: 5, yAxisID: 'yBG',
                parsing: false,
              },
              {
                label: 'Fused BG (Ch5)',
                data: fusedDisplay,
                borderColor: colors.accent, borderWidth: 2.5, pointRadius: 0,
                tension: 0.25, order: 3, yAxisID: 'yBG',
                parsing: false,
              },
              {
                label: 'Meal rate (Ch1)',
                data: mealRateDisplay,
                borderColor: colors.success, backgroundColor: colorWithAlpha(colors.success, 0.08, '#4ade80'),
                borderWidth: 1.5, fill: true, pointRadius: 0,
                tension: 0.25, order: 6, yAxisID: 'yRate',
                parsing: false,
              },
              {
                label: 'Insulin rate (Ch2)',
                data: insulinRateDisplay,
                borderColor: colors.purple, backgroundColor: colorWithAlpha(colors.purple, 0.08, '#a78bfa'),
                borderWidth: 1.5, fill: true, pointRadius: 0,
                tension: 0.25, order: 7, yAxisID: 'yRate',
                parsing: false,
              },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            parsing: false,
            interaction: buildSharedTimeSeriesInteraction(),
            plugins: {
              legend: {
                labels: {
                  color: colors.muted, font: { family: 'Share Tech Mono', size: 10 }, boxWidth: 10,
                  filter: item => !item.text.includes('Band'),
                },
              },
              tooltip: {
                mode: 'x',
                intersect: false,
                backgroundColor: colors.surface, borderColor: colors.border, borderWidth: 1,
                titleColor: colors.text, bodyColor: colors.muted,
                titleFont: { family: 'Share Tech Mono' },
                filter: item => !item.dataset.label.includes('Band'),
                callbacks: {
                  label: ctx => {
                    const v = ctx.parsed.y;
                    if (v == null) return null;
                    if (ctx.dataset.yAxisID === 'yBG')
                      return `${ctx.dataset.label}: ${formatChartTick(v, ui)} ${bgUnitLabel(ui)}`;
                    return `${ctx.dataset.label}: ${formatRateTick(v, ui)} ${glucoseRateUnitLabel(ui)}`;

            },
            scales: {

        return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
      }, [chart1Series, chart2Series, chart3Series, chart4Series, chart4Raw, profile, sim, timeWindow, ui]);

      if (!chart4Series.length)
        return <div className="es"><div className="ei">📈</div>Need Chart 4 glucose observations to anchor forecast</div>;

      return (

    // ChartDataPipeline is the single immutable source snapshot for all chart consumers.
    // Source builders run once at app level.
    // Chart 1-4 render pipeline-owned series.
    // Chart 5 aggregates pipeline-owned series only.
    // -- E6b. Unified chart data pipeline -----------------------------------------
    function validateTimeSeries(series, label = 'series', {
      timeKey = 't',
      valueKeys = [],
    } = {}) {
      if (!Array.isArray(series)) throw new Error(`${label} must be an array`);

      let prevX = -Infinity;
      for (let i = 0; i < series.length; i++) {
        const pt = series[i];
        if (!isPlainObject(pt)) throw new Error(`${label}[${i}] must be an object`);

        const x = Number(pt[timeKey]);
        if (!Number.isFinite(x)) throw new Error(`${label}[${i}].${timeKey} is invalid`);

        valueKeys.forEach(key => {
          if (!Number.isFinite(Number(pt[key]))) {
            throw new Error(`${label}[${i}].${key} is invalid`);
          }
        });

        if (x < prevX) throw new Error(`${label} is not sorted ascending at index ${i}`);
        if (x === prevX) throw new Error(`${label} has duplicate ${timeKey} at index ${i}`);
        prevX = x;
      }

      return true;
    }

    function validateScatterSeries(series, label = 'series') {
      return validateTimeSeries(series, label, { timeKey: 'x', valueKeys: ['y'] });
    }

    function validateChartDataPipeline(pipeline) {
      validateTimeSeries(pipeline.chart1.series, 'chart1.series', {
        timeKey: 't',
        valueKeys: ['value', 'carbRate', 'fpRate'],
      });
      pipeline.chart1.series.forEach((pt, i) => {
        validateScatterSeries(pt?.meta?.mealInputs || [], `chart1.series[${i}].meta.mealInputs`);
      });

      validateTimeSeries(pipeline.chart2.series, 'chart2.series', {
        timeKey: 't',
        valueKeys: ['value', 'qp'],
      });
      validateScatterSeries(pipeline.chart2.chartData?.bgHistory || [], 'chart2.chartData.bgHistory');
      validateScatterSeries(pipeline.chart2.chartData?.doseBars || [], 'chart2.chartData.doseBars');
      validateScatterSeries(pipeline.chart2.chartData?.projectedBg || [], 'chart2.chartData.projectedBg');
      validateScatterSeries(pipeline.chart2.chartData?.projectedQp || [], 'chart2.chartData.projectedQp');
      validateScatterSeries(pipeline.chart2.chartData?.loweringRate || [], 'chart2.chartData.loweringRate');

      validateTimeSeries(pipeline.chart3.series, 'chart3.series', {
        timeKey: 't',
        valueKeys: ['k_abs_mult', 'seff_mult', 'hepatic_factor', 'U_scalar'],
      });
      validateTimeSeries(pipeline.chart4.fusedSeries, 'chart4.fusedSeries', {
        timeKey: 't',
        valueKeys: ['glucose'],
      });
      validateScatterSeries(pipeline.chart4.rawSeries.cgm, 'chart4.rawSeries.cgm');
      validateScatterSeries(pipeline.chart4.rawSeries.fingerstick, 'chart4.rawSeries.fingerstick');
      validateScatterSeries(pipeline.chart4.rawSeries.manual, 'chart4.rawSeries.manual');
    }

    // Keep wrapper objects immutable without touching the large series arrays.
    function finalizeChartRawSeries(raw) {
      return Object.freeze({
        cgm: Array.isArray(raw?.cgm) ? raw.cgm : [],
        fingerstick: Array.isArray(raw?.fingerstick) ? raw.fingerstick : [],
        manual: Array.isArray(raw?.manual) ? raw.manual : [],
      });
    }

    function finalizeChart2Data(data) {
      return Object.freeze({
        bgHistory: Array.isArray(data?.bgHistory) ? data.bgHistory : [],
        doseBars: Array.isArray(data?.doseBars) ? data.doseBars : [],
        projectedBg: Array.isArray(data?.projectedBg) ? data.projectedBg : [],
        projectedQp: Array.isArray(data?.projectedQp) ? data.projectedQp : [],
        loweringRate: Array.isArray(data?.loweringRate) ? data.loweringRate : [],
      });
    }

    function finalizeChartDataPipeline(pipeline) {
      const chart1Series = Array.isArray(pipeline.chart1?.series) ? pipeline.chart1.series : [];
      const chart2Series = Array.isArray(pipeline.chart2?.series) ? pipeline.chart2.series : [];
      const chart2Data = finalizeChart2Data(pipeline.chart2?.chartData);
      const chart3Series = Array.isArray(pipeline.chart3?.series) ? pipeline.chart3.series : [];
      const chart4Series = Array.isArray(pipeline.chart4?.fusedSeries) ? pipeline.chart4.fusedSeries : [];
      const chart4Raw = finalizeChartRawSeries(pipeline.chart4?.rawSeries || pipeline.aggregator?.chart4Raw);

      return Object.freeze({
        meta: Object.freeze({ ...(pipeline.meta || {}) }),
        chart1: Object.freeze({ series: chart1Series }),
        chart2: Object.freeze({ series: chart2Series, chartData: chart2Data }),
        chart3: Object.freeze({ series: chart3Series }),
        chart4: Object.freeze({
          fusedSeries: chart4Series,
          rawSeries: chart4Raw,
        }),
        aggregator: Object.freeze({
          chart1Series,
          chart2Series,
          chart3Series,
          chart4Series,
          chart4Raw,
        }),
      });
    }

    function emptyChartDataPipeline(nowMs = Date.now(), error = null) {
      const timeWindow = getChartTimeWindow(nowMs);
      return finalizeChartDataPipeline({
        meta: {
          ...timeWindow,
          nowMs,
          version: 1,
          error,
        },
        chart1: { series: [] },
        chart2: {
          series: [],
          chartData: {
            bgHistory: [],
            doseBars: [],
            projectedBg: [],
            projectedQp: [],
            loweringRate: [],
          },
        },
        chart3: { series: [] },
        chart4: {
          fusedSeries: [],
          rawSeries: { cgm: [], fingerstick: [], manual: [] },
        },
        aggregator: {
          chart1Series: [],
          chart2Series: [],
          chart3Series: [],
          chart4Series: [],
          chart4Raw: { cgm: [], fingerstick: [], manual: [] },
        },
      });
    }

    const EMPTY_CHART_PIPELINE = emptyChartDataPipeline(0);

    function buildChartDataPipeline({ logs, projection, profile, sim, liveMod, nowMs = Date.now() }) {
      try {
        // Capture the render-cycle time origin once so all source builders that depend on
        // "now" share the exact same timestamp and produce atomically aligned series.
        const timeWindow = getChartTimeWindow(nowMs);
        const { centerMs, windowStartMs, windowEndMs, dtMinutes, projectionHours } = timeWindow;
        const chart1Series = c1_buildMealSeries(logs, profile, sim, {
          nowMs: centerMs,
          startMs: windowStartMs,
          endMs: windowEndMs,
          dtMin: dtMinutes,
        });
        const chart2Series = c2_buildInsulinSeries(projection, profile, sim, liveMod, centerMs);
        const chart2Data = c2_buildInsulinChartData(logs, projection, chart2Series, timeWindow, centerMs);
        const chart3Series = c3_buildModifierSeries(logs, profile, sim, liveMod, timeWindow);
        const actualGlucoseSource = c4_buildActualGlucoseSource(logs, timeWindow);
        const chart4Raw = {
          cgm: actualGlucoseSource.rawSeries?.cgm || [],
          fingerstick: actualGlucoseSource.rawSeries?.fingerstick || [],
          manual: actualGlucoseSource.rawSeries?.manual || [],
        };
        const pipeline = {
          meta: {
            ...timeWindow,
            nowMs,
            centerMs,
            projectionHours,
            version: 1,
          },
          chart1: {
            series: chart1Series,
          },
          chart2: {
            series: chart2Series,
            chartData: chart2Data,
          },
          chart3: {
            series: chart3Series,
          },
          chart4: {
            fusedSeries: actualGlucoseSource.fusedSeries,
            rawSeries: chart4Raw,
          },
          aggregator: {
            chart1Series,
            chart2Series,
            chart3Series,
            chart4Series: actualGlucoseSource.fusedSeries,
            chart4Raw,
          },
        };

        validateChartDataPipeline(pipeline);
        if (CHART_PIPELINE_DEBUG) console.info('Chart pipeline validated', pipeline.meta);
        return finalizeChartDataPipeline(pipeline);
      } catch (err) {
        console.warn('Chart pipeline failed; falling back to empty chart state.', err);
        return emptyChartDataPipeline(nowMs, err?.message || 'chart-pipeline-failed');
      }
    }

    // -- E7. Log table -------------------------------------------------------------
    function LogTable({ logs, profile, onDelete, ui }) {
      if (!logs.length)
        return <div className="es"><div className="ei">📋</div>No entries yet</div>;
      return (
        <div className="lscroll">

            <tbody>
