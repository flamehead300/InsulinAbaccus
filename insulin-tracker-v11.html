<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>InsulinTrack · Insulin Action Model</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── Design tokens ─────────────────────────────────────────────────────────── */
:root{
  --bg:#0a0e1a; --s1:#111827; --s2:#1a2235; --bd:#1e2d45;
  --ac:#00d4ff; --r:#ff6b6b;  --g:#4ade80;  --y:#fbbf24;
  --p:#a78bfa;  --o:#fb923c; --tx:#e2e8f0; --td:#64748b; --tm:#334155;
  --mono:'Share Tech Mono',monospace; --sans:'DM Sans',sans-serif;
  --rad:12px; --glow:0 0 20px rgba(0,212,255,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 10%,rgba(0,212,255,.04) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 90%,rgba(255,107,107,.03) 0%,transparent 50%);
  pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;}
.app{max-width:900px;margin:0 auto;padding:16px;}

/* ── Header ────────────────────────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 0 22px;border-bottom:1px solid var(--bd);margin-bottom:18px;}
.hl{display:flex;align-items:center;gap:12px;}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--ac),#0077ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px rgba(0,212,255,.3);}
.at{font-family:var(--mono);font-size:18px;letter-spacing:.05em;color:var(--ac);}
.as{font-size:11px;color:var(--td);letter-spacing:.08em;text-transform:uppercase;}

/* ── Tabs ──────────────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:4px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);padding:4px;margin-bottom:18px;}
.tab{flex:1;padding:9px 8px;border:none;background:none;color:var(--td);font-family:var(--sans);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--s2);color:var(--ac);box-shadow:var(--glow);}
.tab:hover:not(.on){color:var(--tx);}

/* ── Card ──────────────────────────────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);padding:20px;margin-bottom:14px;}
.ct{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--td);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ct::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── Form fields ───────────────────────────────────────────────────────────── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.fg,.sg,.pag,.pal3,.pal4{grid-template-columns:1fr!important;}}
.fi{display:flex;flex-direction:column;gap:5px;}
.fi label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--td);font-weight:500;}
.fi input,.fi select{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:var(--mono);font-size:15px;padding:9px 12px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;-webkit-appearance:none;}
.fi input:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(0,212,255,.1);}
.fi input::placeholder{color:var(--tm);}

/* ── Button-group selectors (activity / stress / hydration) ────────────────── */
.pal4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.pal3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.pab{padding:7px 4px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);color:var(--td);font-family:var(--sans);font-size:11px;text-align:center;cursor:pointer;transition:all .15s;line-height:1.4;}
.pab i{font-size:16px;display:block;margin-bottom:2px;font-style:normal;}
.pab.on{border-color:var(--ac);color:var(--ac);background:rgba(0,212,255,.08);}
.pab.on-y{border-color:var(--y);color:var(--y);background:rgba(251,191,36,.08);}
.pab.on-r{border-color:var(--r);color:var(--r);background:rgba(255,107,107,.08);}

/* ── Toggle switches ───────────────────────────────────────────────────────── */
.slp{display:flex;align-items:center;gap:10px;padding:9px 13px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);cursor:pointer;transition:all .2s;}
.slp.on{border-color:var(--p);background:rgba(167,139,250,.08);}
.slp.blue-on.on{border-color:var(--ac);background:rgba(0,212,255,.08);}
.trk{width:36px;height:20px;border-radius:10px;background:var(--bd);position:relative;transition:background .2s;flex-shrink:0;}
.trk.on{background:var(--p);}
.trk.blue-on.on{background:var(--ac);}
.thm{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;}
.trk.on .thm{transform:translateX(16px);}
.slplbl{font-size:13px;color:var(--td);}
.slp.on .slplbl{color:var(--p);}
.slp.blue-on.on .slplbl{color:var(--ac);}

/* ── Sleep quality slider ──────────────────────────────────────────────────── */
.sq-wrap{margin-top:8px;padding:9px 13px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);}
.sq-row{display:flex;align-items:center;gap:10px;}
.sq-row input[type=range]{flex:1;accent-color:var(--p);}
.sq-lbl{font-size:11px;color:var(--p);font-family:var(--mono);min-width:44px;text-align:right;}

/* ── BG Zone banner ────────────────────────────────────────────────────────── */
.bgz{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:8px;border:1px solid var(--bd);margin-top:11px;}
.bgz.low {border-color:#ff6b6b44;background:#ff6b6b0a;}
.bgz.ok  {border-color:#4ade8044;background:#4ade800a;}
.bgz.high{border-color:#fbbf2444;background:#fbbf240a;}
.bgdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.bgz.low .bgdot{background:var(--r);}
.bgz.ok  .bgdot{background:var(--g);}
.bgz.high .bgdot{background:var(--y);}
.bgztxt{font-size:12px;color:var(--td);flex:1;}
.bgzv{font-family:var(--mono);color:var(--tx);}

/* ── Dose result box ───────────────────────────────────────────────────────── */
.rbox{background:var(--s2);border:1px solid var(--ac);border-radius:var(--rad);padding:15px 18px;margin:13px 0;box-shadow:var(--glow);}
.rtop{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;}
.rv{font-family:var(--mono);font-size:40px;color:var(--ac);text-shadow:0 0 20px rgba(0,212,255,.4);line-height:1;}
.rl{font-size:11px;color:var(--td);margin-bottom:3px;}
.rb{flex:1;font-size:11px;color:var(--td);line-height:2;font-family:var(--mono);}
.rmn{font-size:10px;color:var(--tm);font-family:var(--mono);margin-top:7px;padding-top:7px;border-top:1px solid var(--bd);}

/* ── Modifier panel ────────────────────────────────────────────────────────── */
.mp .mst{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);margin:9px 0 5px;}
.mr{display:flex;align-items:center;gap:8px;margin:3px 0;}
.mlbl{font-size:10px;color:var(--td);min-width:96px;font-family:var(--mono);}
.mbar{flex:1;position:relative;}
.mbg{height:5px;background:var(--bg);border-radius:3px;border:1px solid var(--bd);position:relative;overflow:visible;}
.mfill{height:100%;border-radius:3px;transition:width .35s ease;}
.mctr{position:absolute;left:50%;top:-2px;width:1px;height:9px;background:rgba(255,255,255,.12);z-index:1;pointer-events:none;}
.mv{font-family:var(--mono);font-size:10px;min-width:32px;text-align:right;}
.msum{display:flex;gap:14px;flex-wrap:wrap;padding:9px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--bd);margin-bottom:8px;}
.msi{font-size:11px;font-family:var(--mono);color:var(--td);}
.msi strong{color:var(--tx);}

/* ── Active Insulin (IOB) ──────────────────────────────────────────────────── */
.iobh{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.iobv{font-family:var(--mono);font-size:50px;line-height:1;color:var(--ac);text-shadow:0 0 30px rgba(0,212,255,.4);}
.iobu{font-size:12px;color:var(--td);}
.iobb{flex:1;min-width:130px;display:flex;flex-direction:column;gap:5px;}
.iobbl{display:flex;justify-content:space-between;font-size:11px;color:var(--td);font-family:var(--mono);}
.iobbt{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;border:1px solid var(--bd);}
.iobbf{height:100%;background:linear-gradient(90deg,var(--ac),#0077ff);border-radius:4px;transition:width .6s;box-shadow:0 0 8px rgba(0,212,255,.5);}
.iobd{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto;}
.iobdr{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--td);font-family:var(--mono);padding:6px 10px;background:var(--s2);border-radius:6px;border:1px solid var(--bd);}

/* ── Body memory state variables ───────────────────────────────────────────── */
.svg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
.svc{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px;text-align:center;}
.svv{font-family:var(--mono);font-size:22px;margin-bottom:2px;}
.svl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--td);}
.svb{height:4px;border-radius:2px;margin-top:7px;background:var(--bd);}
.svbf{height:100%;border-radius:2px;transition:width .5s;}

/* ── Forecast tiles ────────────────────────────────────────────────────────── */
.projg{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0;}
.projgi{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);min-width:80px;}
.projgt{font-family:var(--mono);font-size:20px;}
.projgl{font-size:10px;color:var(--td);text-align:center;}

/* ── Chart ─────────────────────────────────────────────────────────────────── */
.chwrap{position:relative;height:260px;}

/* ── Log table ─────────────────────────────────────────────────────────────── */
.lt{width:100%;border-collapse:collapse;font-size:12px;}
.lt th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--td);padding:7px 10px;border-bottom:1px solid var(--bd);}
.lt td{padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:11px;}
.lt tr:last-child td{border-bottom:none;}
.lt tr:hover td{background:var(--s2);}
.lscroll{max-height:300px;overflow-y:auto;}

/* ── Settings ──────────────────────────────────────────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sst{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ac);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.avt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--td);padding:7px 0;user-select:none;}
.avt:hover{color:var(--tx);}

/* ── BPM Monitor modal ──────────────────────────────────────────────────────── */
.bpm-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(10,14,26,.75);backdrop-filter:blur(4px);animation:tIn .2s ease;}
.bpm-modal{background:#111827;border:1px solid var(--bd);border-radius:18px;width:100%;max-width:360px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.bpm-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);}
.bpm-hdr-title{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:14px;letter-spacing:.06em;color:var(--tx);}
.bpm-close{background:none;border:none;color:var(--td);cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .15s;}
.bpm-close:hover{color:var(--tx);}
.bpm-body{padding:24px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;}
.bpm-info{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:12px;padding:14px 16px;font-size:12px;color:var(--td);line-height:1.8;margin-bottom:20px;display:flex;flex-direction:column;gap:10px;}
.bpm-info-row{display:flex;gap:10px;align-items:flex-start;}
.bpm-info-icon{flex-shrink:0;margin-top:1px;color:var(--ac);}
.bpm-countdown-num{font-family:var(--mono);font-size:84px;font-weight:900;color:var(--r);line-height:1;animation:bpmPulse 1s ease-in-out infinite;}
.bpm-countdown-lbl{font-size:13px;color:var(--td);margin-bottom:16px;}
.bpm-rec-stats{display:flex;justify-content:space-between;width:100%;margin-bottom:20px;}
.bpm-stat{font-size:12px;font-family:var(--mono);padding:5px 12px;border-radius:20px;background:var(--s2);border:1px solid var(--bd);}
.bpm-stat.beats{color:var(--r);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.07);}
.bpm-heart-btn{width:148px;height:148px;border-radius:50%;background:rgba(255,107,107,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--r);transition:transform .1s ease,background .1s ease;-webkit-tap-highlight-color:transparent;user-select:none;}
.bpm-heart-btn:active,.bpm-heart-btn.pop{transform:scale(.87);background:rgba(255,107,107,.25);}
.bpm-heart-btn svg{width:64px;height:64px;fill:currentColor;}
.bpm-tap-hint{margin-top:16px;font-size:12px;color:var(--tm);}
.bpm-result-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:8px;}
.bpm-result-val{font-family:var(--mono);font-size:64px;font-weight:900;color:var(--ac);text-shadow:0 0 30px rgba(0,212,255,.4);line-height:1;}
.bpm-result-unit{font-size:20px;color:var(--td);margin-left:4px;}
.bpm-result-note{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--g);font-family:var(--mono);margin-top:16px;text-align:center;}
.bpm-ftr{padding:14px 18px;background:var(--bg);border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px;}
.hr-field-wrap{display:flex;gap:6px;align-items:stretch;}
.hr-field-wrap input{flex:1;}
.bpm-trigger{flex-shrink:0;padding:0 12px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);border-radius:8px;color:var(--r);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);letter-spacing:.04em;transition:all .15s;white-space:nowrap;}
.bpm-trigger:hover{background:rgba(255,107,107,.2);border-color:rgba(255,107,107,.45);}
.bpm-trigger svg{width:13px;height:13px;fill:currentColor;}
@keyframes bpmPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.7;transform:scale(.94);}}

.upl{border:2px dashed var(--bd);border-radius:var(--rad);padding:26px;text-align:center;cursor:pointer;transition:all .2s;display:block;}
.upl:hover{border-color:var(--ac);background:rgba(0,212,255,.03);}

/* ── Buttons ───────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;border:none;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.bp{background:linear-gradient(135deg,var(--ac),#0077ff);color:#000;box-shadow:0 0 16px rgba(0,212,255,.3);}
.bp:hover{box-shadow:0 0 24px rgba(0,212,255,.5);transform:translateY(-1px);}
.bg_{background:var(--s2);color:var(--td);border:1px solid var(--bd);}
.bg_:hover{color:var(--tx);}
.bd_{background:rgba(255,107,107,.1);color:var(--r);border:1px solid rgba(255,107,107,.2);}
.bd_:hover{background:rgba(255,107,107,.2);}
.bsm{padding:5px 11px;font-size:12px;}
.bfw{width:100%;justify-content:center;}

/* ── Status tags ───────────────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono);}
.tl{background:rgba(255,107,107,.15);color:var(--r);}
.tn{background:rgba(74,222,128,.15);color:var(--g);}
.th{background:rgba(251,191,36,.15);color:var(--y);}

/* ── Toast ─────────────────────────────────────────────────────────────────── */
.tst{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--tx);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:1000;animation:tIn .25s ease;max-width:300px;}
.tst.ok {border-color:rgba(74,222,128,.4);color:var(--g);}
.tst.err{border-color:rgba(255,107,107,.4);color:var(--r);}
@keyframes tIn{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── Misc helpers ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
.div{height:1px;background:var(--bd);margin:14px 0;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sp{flex:1;}
.es{text-align:center;padding:30px;color:var(--tm);font-size:13px;}
.es .ei{font-size:34px;margin-bottom:8px;}
.note{font-size:11px;color:var(--td);font-family:var(--mono);line-height:1.8;}
.fl-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--td);font-weight:500;display:block;margin-bottom:5px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════════════════
//  A.  CONSTANTS / DEFAULTS
//
//  Three flat objects — profile (slower-moving clinical/demographic settings),
//  sim params (physiologic coefficients), and ui prefs (display toggles).
//  Each new feature adds keys here first, then flows through the vertical slice.
// ═══════════════════════════════════════════════════════════════════════════════

// Clinical and demographic profile — things a care team would adjust.
const DEFAULT_PROFILE = {
  // Dosing
  carbRatio:   12,    // g carbs per unit of insulin
  corrFactor:  50,    // mg/dL blood sugar drop per unit (correction factor)
  targetBG:   100,    // target blood sugar, mg/dL
  insulinDur:   4,    // base insulin duration, hours
  lowBG:       70,    // low threshold, mg/dL
  highBG:     180,    // high threshold, mg/dL
  basalRate:  0.8,    // basal insulin rate, units/hr (pump or long-acting background)
  // Injection site absorption multipliers — per-dose, stored per log entry.
  // Abdomen = fastest; thigh = slowest due to lower local blood flow.
  siteMult_abdomen: 1.00,
  siteMult_thigh:   0.75,
  siteMult_arm:     0.85,
  siteMult_other:   0.90,
  // Demographics (affect η₀ baseline sensitivity)
  bmi:         22,    // body mass index, kg/m²
  BMI_ref:     22,    // reference BMI for penalty calculations
  HR_ref:      70,    // reference resting heart rate, bpm
  age:         35,    // years — older age gradually reduces insulin sensitivity
  sex:        'other',// 'M' | 'F' | 'other' — sex-based sensitivity offset
};

// Physiologic model coefficients — advanced / for clinicians.
const DEFAULT_SIM_PARAMS = {
  // ── Absorption (k_abs) ─────────────────────────────────────────────────────
  k_abs0:     0.80,   // hr⁻¹  baseline absorption rate constant
  alpha:      0.05,   // BMI absorption penalty (how much extra BMI slows absorption)
  beta:       0.50,   // HR boost coefficient (faster pulse → faster absorption)
  beta_max:   0.60,   // ceiling on the HR effect (prevents runaway)
  gamma:      0.08,   // activity boost per MET
  delta:      0.30,   // sleep absorption slowdown (0 = no effect, 1 = maximum)
  // ── Clearance (PK) ────────────────────────────────────────────────────────
  k_clear:    0.50,   // hr⁻¹  plasma clearance rate
  // ── Sensitivity (S_eff) ───────────────────────────────────────────────────
  theta:      0.07,   // BMI sensitivity penalty
  sigma_bg:   80,     // mg/dL  width of the BG→sensitivity Gaussian curve
  kappa:      0.05,   // exercise sensitivity boost per MET
  d_dawn:     0.30,   // dawn effect strength (0–1) — applied when user flags dawn phenomenon
  rho:        0.05,   // how much a recent low blunts insulin response
  sigma_h:    0.025,  // how much a recent high reduces insulin response
  eta:        0.20,   // sleep sensitivity reduction (0 = none, 1 = maximum)
  eta_q:      0.50,   // sleep quality amplifier (poor quality makes eta worse)
  // ── Age & sex baseline adjustments (3.1) ──────────────────────────────────
  age_penalty:  0.07, // sensitivity lost per decade over age 30 (0–1 scale)
  sex_factor_F: 0.95, // baseline sensitivity multiplier for female sex (< 1 = more sensitive)
  // ── Travel / routine disruption (3.2) ─────────────────────────────────────
  travel_sens_penalty: 0.20, // fractional sensitivity reduction during travel/disruption
  travel_uncertainty:  0.30, // uncertainty band growth rate (mg/dL per hour of projection)
  // ── Alcohol (4.1) ─────────────────────────────────────────────────────────
  alcohol_hep_suppress: 0.30, // fraction by which alcohol suppresses hepatic glucose output
  alcohol_gastric_slow: 0.20, // fraction by which alcohol slows gastric emptying rate
  alcohol_sens_effect:  0.10, // direct sensitivity perturbation (slight reduction at level 1)
  // ── Stimulants (4.2) ──────────────────────────────────────────────────────
  stim_sens_penalty:    0.20, // adenosine-antagonism / epinephrine → reduces insulin sensitivity
  stim_hep_boost:       0.10, // glycogenolysis from mild adrenaline → transient G_prod increase
  // ── Depressants (4.3) ─────────────────────────────────────────────────────
  depress_sleep_amplify:0.30, // amplifies sleep-related sensitivity reduction
  depress_gastric_slow: 0.15, // CNS/smooth-muscle relaxation slows gastric emptying
  // ── Nicotine (4.4) ────────────────────────────────────────────────────────
  nicotine_util_penalty:0.15, // vasoconstriction → impairs peripheral glucose disposal
  // ── THC / Cannabis (4.5) ──────────────────────────────────────────────────
  thc_gastric_slow:     0.25, // CB1 receptor activation in ENS → slows gastric motility
  // ── Stress & illness (NEW — Tier 1) ───────────────────────────────────────
  h_U:        0.15,   // stress → counterregulatory pressure on sensitivity
  h_K:        0.25,   // illness → counterregulatory pressure on sensitivity
  // ── Hydration (NEW — Tier 1) ──────────────────────────────────────────────
  h_hd:       0.08,   // dehydration → reduced absorption reliability
  // ── Glucose dynamics (projection) ─────────────────────────────────────────
  G_prod:     0.0,    // mg/dL/hr net glucose production (0 = basal is covered)
  k_basal:    0.008,  // hr⁻¹  pull toward target BG (mean reversion)
  // ── State variable decay constants (hours) ────────────────────────────────
  tau_ex:     3,      // exercise effect half-life
  tau_low:    4,      // low-BG memory half-life
  tau_high:   6,      // high-BG memory half-life
  // ── Fat & protein delayed glucose (2.1) ───────────────────────────────────
  fat_factor:   0.10, // mg/dL-equivalent glucose per gram fat
  prot_factor:  0.20, // mg/dL-equivalent glucose per gram protein
  lambda_FP:    0.30, // hr⁻¹  decay/release rate of fat-protein glucose reservoir
  // ── Meal type & fiber absorption slowing (2.2) ────────────────────────────
  meal_slow_fast: 1.0,  // carb absorption multiplier — fast carbs
  meal_slow_mixed: 0.7, // carb absorption multiplier — mixed meal
  meal_slow_hfp:  0.4,  // carb absorption multiplier — high fat/protein
  fiber_slow_low:  1.0, // fiber absorption multiplier — low fiber
  fiber_slow_med:  0.8, // fiber absorption multiplier — medium fiber
  fiber_slow_high: 0.6, // fiber absorption multiplier — high fiber
  // ── Uncertainty scoring (5.1) ────────────────────────────────────────────
  // U(t) = (1 + Σ wᵢ·Sᵢ) · u_base · √t  — widens the confidence band
  u_base:       18,   // base ±mg/dL band width per √hour at U_scalar=1
  u_stress:     0.30, // stress (0–3, normalised to 0–1) contribution
  u_illness:    0.50, // illness toggle contribution
  u_travel:     0.40, // travel-day contribution (circadian misalignment)
  u_overlap:    0.25, // each active meal reservoir adds this to the scalar
  u_substances: 0.15, // per unit of summed substance level
  u_iob:        0.10, // per unit of plasma insulin (Q_p, capped at 5u)
  // ── Gastric emptying reservoir (2.3) ─────────────────────────────────────
  k_ge_base:       2.0, // hr⁻¹  base gastric emptying rate
  k_ge_fat_factor: 0.3, // fat fraction penalty on gastric emptying
  k_ge_prot_factor:0.2, // protein fraction penalty on gastric emptying
  k_ge_fiber_factor:0.2,// (reserved) fiber penalty on gastric emptying
  k_carb_abs:      1.5, // mg/dL/g/hr  gut→blood glucose absorption rate
};

//  B.  UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

// Clamp a number between lo and hi.
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

// Linear interpolation between a and b by factor t ∈ [0,1].
function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }

// Gaussian bell curve: 1 at x=mu, falls off with width sigma.
function gauss(x, mu, sigma) { return Math.exp(-Math.pow(x - mu, 2) / (2 * sigma * sigma)); }

// Parse a number safely; return fallback if the result is NaN or ≤ 0.
function safeNum(v, fallback = 0) { const n = parseFloat(v); return isNaN(n) ? fallback : n; }

// Hours elapsed between two ISO timestamps (positive = log is in the past).
function hoursBetween(isoA, isoB) {
  return (new Date(isoB).getTime() - new Date(isoA).getTime()) / 3_600_000;
}

// Exponential decay: value * e^(-hours / tau).
// Used to compute how much a past event still matters right now.
function rollingDecay(value, hoursAgo, tau) {
  return value * Math.exp(-hoursAgo / tau);
}

// Convert a 0–N enum index to a normalised 0–1 scalar.
function enumToScalar(index, max) { return clamp(index / max, 0, 1); }

// Colour for a modifier bar (green = normal, red/purple = far from 1.0).
function modColor(v) {
  if (v < 0.60) return '#ef4444';
  if (v < 0.80) return '#f97316';
  if (v < 0.92) return '#fbbf24';
  if (v <= 1.08) return '#4ade80';
  if (v <= 1.25) return '#38bdf8';
  return '#a78bfa';
}

// BG-value colour (red/yellow/green).
function bgColor(bg) { return bg < 70 ? '#ef4444' : bg > 180 ? '#fbbf24' : '#4ade80'; }

// BG zone string.
function zone(bg, p) { return bg < p.lowBG ? 'low' : bg > p.highBG ? 'high' : 'ok'; }

// Forecast risk label for the end of the projection.
function projLabel(bg, p) {
  return bg < p.lowBG ? '🔴 Hypo risk' : bg > p.highBG ? '🟡 Elevated' : '🟢 In range';
}

// Format an ISO timestamp as "HH:MM".
function fmtT(iso)  { return new Date(iso).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
// Format as "Mon D".
function fmtD(iso)  { return new Date(iso).toLocaleDateString([], { month:'short', day:'numeric' }); }
// Format as "Mon D HH:MM".
function fmtDT(iso) { return `${fmtD(iso)} ${fmtT(iso)}`; }
// Current time as ISO string.
function nowISO()   { return new Date().toISOString(); }


// ═══════════════════════════════════════════════════════════════════════════════
//  C.  PHYSIOLOGIC MODEL FUNCTIONS
//
//  Each function is a pure computation — no React, no side effects.
//  Input objects carry exactly the fields each function needs.
// ═══════════════════════════════════════════════════════════════════════════════

// ── C1. Absorption modifier k_abs(t) ─────────────────────────────────────────
// Returns how fast insulin will be absorbed given current conditions.
// Result > 1 = faster than baseline; result < 1 = slower.
// mealType (0–2) and fiberClass (0–2) are optional; when carbs > 0 they
// further slow the effective absorption via gastric content feedback.
function calcKabs(inp, profile, sim) {
  const { bmi, hr, pa, sleep, sleepQ, hydration, carbs = 0, mealType = 0, fiberClass = 0 } = inp;

  // BMI penalty: extra body mass slows subcutaneous absorption.
  const fBMI   = Math.exp(-sim.alpha * Math.max(0, bmi - profile.BMI_ref));

  // Heart rate boost: elevated pulse increases blood flow to the injection site.
  const rawHR  = 1 + sim.beta * (hr - profile.HR_ref) / profile.HR_ref;
  const fHR    = clamp(rawHR, 1 - sim.beta_max, 1 + sim.beta_max);

  // Activity boost: movement drives faster absorption.
  const fPA    = 1 + sim.gamma * Math.max(0, pa);

  // Sleep penalty: absorption slows during sleep; poor quality deepens the effect.
  const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
  const fSleep = Math.max(0.05, 1 - sim.delta * sleep * qualityAmplifier);

  // Hydration: dehydration reduces reliability of absorption.
  const fHydration = 1 - sim.h_hd * hydration;

  // Meal type & fiber slow factors (2.2): when a meal is present, the gastric
  // content slows effective insulin–glucose interplay in the absorption window.
  const mealSlowLookup  = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp];
  const fiberSlowLookup = [sim.fiber_slow_low,  sim.fiber_slow_med,  sim.fiber_slow_high];
  const fMealSlow  = carbs > 0 ? (mealSlowLookup[mealType]  ?? 1.0) : 1.0;
  const fFiberSlow = carbs > 0 ? (fiberSlowLookup[fiberClass] ?? 1.0) : 1.0;

  const mult = fBMI * fHR * fPA * fSleep * fHydration * fMealSlow * fFiberSlow;
  return {
    kabs:      sim.k_abs0 * mult,
    kabs_mult: mult,
    fBMI, fHR, fPA, fSleep, fHydration, fMealSlow, fFiberSlow,
  };
}

// ── C2. Sensitivity multiplier S_eff(t) ──────────────────────────────────────
// Returns how strongly 1 unit of insulin lowers blood sugar right now.
//
// η₀ — demographic baseline: age and sex are slow-moving profile constants
// that set the ceiling for how sensitive the patient can ever be.
// Dynamic factors then modulate η₀ up or down in real time.
//
// Model:
//   η₀ = corrFactor · fBMI · fAge · fSex
//   S_eff = η₀ · fBG · fEx · fDawn · fLow · fHigh · fSlp · fStress · fIllness · fTravel
function calcSeff(inp, sv, profile, sim) {
  const { bmi, bg, sleep, sleepQ, stress, illness, travelDay = 0 } = inp;
  const { E_ex, L, H } = sv;

  // ── Demographic baseline (η₀ factors) ────────────────────────────────────
  // BMI penalty: excess adiposity reduces receptor-level sensitivity.
  const fBMI   = Math.exp(-sim.theta * Math.max(0, bmi - profile.BMI_ref));

  // Age penalty: ~0.07 per decade after 30 — reflects declining muscle mass
  // and intracellular lipid accumulation independent of BMI.
  const fAge   = Math.max(0.1, 1 - sim.age_penalty * Math.max(0, profile.age - 30) / 10);

  // Sex-based offset: females tend toward slightly higher peripheral sensitivity
  // (sex_factor_F < 1 means more sensitive → requires less correction insulin).
  const fSex   = profile.sex === 'F' ? sim.sex_factor_F : 1.0;

  // Composite demographic baseline.
  const eta0   = profile.corrFactor * fBMI * fAge * fSex;

  // ── Dynamic real-time factors ─────────────────────────────────────────────
  // BG-level effect: sensitivity peaks near target BG, falls on both sides.
  const fBG    = gauss(bg, profile.targetBG, sim.sigma_bg);

  // Exercise boost from accumulated activity memory.
  const fEx    = 1 + sim.kappa * E_ex;

  // Dawn phenomenon (5.1 manual): user explicitly flags that they are waking from sleep
  // and experiencing the cortisol/GH surge. Replaces the old time-of-day cosine model.
  const fDawn = inp.dawnEffect ? (1 - sim.d_dawn) : 1.0;

  // Recent-low memory: a prior hypo blunts the next insulin dose.
  const fLow   = 1 / (1 + sim.rho * L);

  // Recent-high memory: persistent hyperglycemia reduces insulin effectiveness.
  const fHigh  = 1 / (1 + sim.sigma_h * H);

  // Sleep: reduces sensitivity; poor quality amplifies the reduction.
  // Depressants (4.3) further amplify the sleep effect via deepened CNS depression.
  const depressantLevel = inp.depressantLevel ?? 0;
  const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
  const depressAmp = 1 + (sim.depress_sleep_amplify ?? 0) * depressantLevel;
  const fSlp   = Math.max(0.05, 1 - sim.eta * sleep * qualityAmplifier * depressAmp);

  // Stress counterregulatory pressure (U).
  const fStress  = 1 / (1 + sim.h_U * stress);

  // Illness counterregulatory pressure (K).
  const fIllness = 1 / (1 + sim.h_K * illness);

  // Travel / routine disruption (3.2).
  const fTravel  = 1 / (1 + sim.travel_sens_penalty * travelDay);

  // Alcohol (4.1): at moderate to heavy intake, peripheral glucose utilisation is
  // partially blunted (reduced muscle uptake) while hepatic output is suppressed
  // separately in the ODE. The net sensitivity effect is a small direct reduction.
  const alcoholLevel = inp.alcoholLevel ?? 0;
  const fAlcohol = 1 - sim.alcohol_sens_effect * alcoholLevel;

  // Stimulants (4.2): caffeine / prescribed stimulants trigger epinephrine release via
  // adenosine receptor antagonism, acutely reducing insulin sensitivity 15–30%.
  const stimulantLevel = inp.stimulantLevel ?? 0;
  const fStimulant = 1 / (1 + sim.stim_sens_penalty * stimulantLevel);

  // Nicotine (4.4): vasoconstriction impairs peripheral glucose disposal at the
  // receptor level — studies show ~15–20% reduction in insulin-mediated uptake.
  const nicotineLevel = inp.nicotineLevel ?? 0;
  const fNicotine = 1 / (1 + sim.nicotine_util_penalty * nicotineLevel);

  const dynamicMult = fBG * fEx * fDawn * fLow * fHigh * fSlp * fStress * fIllness * fTravel * fAlcohol * fStimulant * fNicotine;
  // seff_mult includes all factors so the displayed percentage is complete.
  const seff_mult   = fBMI * fAge * fSex * dynamicMult;

  return {
    seff: eta0 * dynamicMult,
    seff_mult,
    eta0,
    fBMI, fAge, fSex,
    fBG, fEx, fDawn, fLow, fHigh, fSlp, fStress, fIllness, fTravel, fAlcohol,
    fStimulant, fNicotine,
  };
}

// ── C3. Combined modifier snapshot ───────────────────────────────────────────
// Merges absorption and sensitivity into one object for display.
// extra = { pkState, mealState, totalIOB } for full uncertainty calculation.
function computeModifiers(inp, sv, profile, sim, extra = {}) {
  const k = calcKabs(inp, profile, sim);
  const s = calcSeff(inp, sv, profile, sim);
  const carbs     = inp.carbs     || 0;
  const travelDay = inp.travelDay || 0;

  const alcoholLevel    = inp.alcoholLevel    ?? 0;
  const stimulantLevel  = inp.stimulantLevel  ?? 0;
  const depressantLevel = inp.depressantLevel ?? 0;
  const nicotineLevel   = inp.nicotineLevel   ?? 0;
  const thcLevel        = inp.thcLevel        ?? 0;

  const absorption = {
    'BMI':        k.fBMI,
    'HR/Pulse':   k.fHR,
    'Activity':   k.fPA,
    'Sleep':      k.fSleep,
    'Hydration':  k.fHydration,
  };
  if (carbs > 0) {
    absorption['Meal Type'] = k.fMealSlow;
    absorption['Fiber']     = k.fFiberSlow;
  }
  const sensitivity = {
    'Age':        s.fAge,
    'Sex':        s.fSex,
    'BMI':        s.fBMI,
    'Blood Sugar':s.fBG,
    'Exercise':   s.fEx,
    'Dawn':       s.fDawn,
    'Prev Lows':  s.fLow,
    'Prev Highs': s.fHigh,
    'Sleep':      s.fSlp,
    'Stress':     s.fStress,
    'Illness':    s.fIllness,
  };
  if (travelDay) sensitivity['Travel'] = s.fTravel;

  // ── 4.x Substance sensitivity factors ────────────────────────────────────
  const metabolic = {};
  if (alcoholLevel    > 0) metabolic['Alcohol']    = s.fAlcohol;
  if (stimulantLevel  > 0) metabolic['Stimulants'] = s.fStimulant;
  if (nicotineLevel   > 0) metabolic['Nicotine']   = s.fNicotine;

  // ── 5.2 Physiologic output factors ───────────────────────────────────────
  // Hepatic output: 1.0 = baseline, < 1 = suppressed (alcohol),
  //                 > 1 = boosted (stimulant-driven glycogenolysis).
  // Stimulant boost is expressed relative to a reference absolute of 0.5 mg/dL/hr
  // so the multiplicative display makes sense alongside the suppression term.
  const hepaticOutputFactor = Math.max(0.02,
    (1 - sim.alcohol_hep_suppress * alcoholLevel) *
    (1 + (sim.stim_hep_boost / 0.5) * stimulantLevel)
  );

  // Gastric emptying factor: k_ge / k_ge_base — substance and meal composition effects.
  const fat_g      = inp.fat_g      ?? 0;
  const protein_g  = inp.protein_g  ?? 0;
  const carbs_g    = inp.carbs      ?? 0;
  const totalMacro = fat_g + protein_g + carbs_g;
  const fatNorm    = fat_g      / (totalMacro + 1);
  const protNorm   = protein_g  / (totalMacro + 1);
  const mealTF     = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][inp.mealType    ?? 0] ?? 1.0;
  const fiberF     = [sim.fiber_slow_low, sim.fiber_slow_med,  sim.fiber_slow_high][inp.fiberClass ?? 0] ?? 1.0;
  const gastricEmptyingFactor = Math.max(0.05,
    mealTF * fiberF *
    (1 - sim.k_ge_fat_factor  * fatNorm) *
    (1 - sim.k_ge_prot_factor * protNorm) *
    (1 - sim.alcohol_gastric_slow  * alcoholLevel) *
    (1 - sim.depress_gastric_slow  * depressantLevel) *
    (1 - sim.thc_gastric_slow      * thcLevel)
  );

  // ── 5.1 Uncertainty scalar ────────────────────────────────────────────────
  // Base scalar from inp-level stressors; IOB and meal overlap added if extra provided.
  const substanceSum = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
  const { pkState = {}, mealState = {} } = extra;
  const overlapScore = ((mealState.D_g        ?? 0) > 5 ? 1   : 0)
                     + ((mealState.R_c         ?? 0) > 5 ? 0.5 : 0)
                     + ((mealState.delayedMeal ?? 0) > 5 ? 0.5 : 0);
  const iobContrib   = Math.min(pkState.Q_p ?? 0, 5);
  const U_scalar = 1
    + (sim.u_stress     ?? 0.30) * ((inp.stress  ?? 0) / 3)
    + (sim.u_illness    ?? 0.50) *  (inp.illness ?? 0)
    + (sim.u_travel     ?? 0.40) *   travelDay
    + (sim.u_overlap    ?? 0.25) *   overlapScore
    + (sim.u_substances ?? 0.15) *   substanceSum
    + (sim.u_iob        ?? 0.10) *   iobContrib;
  // Confidence: inverse of U_scalar, clamped to [0.05, 1].
  const confidenceFactor = Math.max(0.05, 1 / U_scalar);

  return {
    ...k, ...s,
    absorption, sensitivity, metabolic,
    // 5.2 output section
    hepaticOutputFactor,
    gastricEmptyingFactor,
    U_scalar,
    confidenceFactor,
  };
}

// ── C4. State variables (body memory) ────────────────────────────────────────
// Integrates log history to compute E_ex (exercise), L (low memory), H (high memory).
function computeStateVars(logs, profile, sim) {
  const nowMs = Date.now();
  let E_ex = 0, L = 0, H = 0;
  logs.forEach(log => {
    const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
    if (hrs < 0 || hrs > 24) return;
    const pa = safeNum(log.pa, 0);
    if (pa > 0) E_ex += rollingDecay(pa, hrs, sim.tau_ex);
    const bg = safeNum(log.bloodSugar, 0);
    if (bg > 0 && bg < profile.lowBG)  L += rollingDecay(profile.lowBG  - bg, hrs, sim.tau_low);
    if (bg > profile.highBG)            H += rollingDecay(bg - profile.highBG, hrs, sim.tau_high);
  });
  return { E_ex, L, H };
}

// ── C5. Two-compartment PK reconstruction ────────────────────────────────────
// Reconstructs the current subcutaneous (Q_sc) and plasma (Q_p) insulin pools
// from logged dose history.
// kabs_rel captures continuous modifiers (BMI, HR, activity, sleep, hydration).
// siteMultiplier is stored separately and applied here as a per-dose factor,
// so the two can be tuned independently without double-counting.
function reconstructPK(logs, profile, sim) {
  const nowMs = Date.now();
  let Q_sc = 0, Q_p = 0;
  logs.filter(l => l.insulinDose > 0).forEach(log => {
    const tau = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
    if (tau < 0 || tau > profile.insulinDur * 2.5) return;
    const D      = safeNum(log.insulinDose);
    const contM  = safeNum(log.kabs_rel, 1.0);     // continuous modifier at log time
    const siteM  = safeNum(log.siteMultiplier, 1.0); // per-dose site factor
    const ka     = sim.k_abs0 * contM * siteM;
    const kc     = sim.k_clear;
    Q_sc += D * Math.exp(-ka * tau);
    if (Math.abs(ka - kc) > 1e-3) {
      Q_p += D * ka / (ka - kc) * (Math.exp(-kc * tau) - Math.exp(-ka * tau));
    } else {
      Q_p += D * ka * tau * Math.exp(-ka * tau);
    }
  });
  return { Q_sc: Math.max(0, Q_sc), Q_p: Math.max(0, Q_p) };
}

// ── C5b. Meal state reconstruction ───────────────────────────────────────────
// Reconstructs the current state of the three meal-absorption reservoirs:
//   delayedMeal — fat/protein glucose-equivalent still pending release (2.1)
//   D_g         — carbs still in the stomach (grams) (2.3)
//   R_c         — carbs in the gut, ready for blood absorption (grams) (2.3)
// Each reservoir is initialised by forward-integrating the ODE from each
// recent meal's timestamp to now, so the projection starts with accurate IC.
function reconstructMealState(logs, profile, sim) {
  const nowMs = Date.now();
  let delayedMeal = 0;
  let D_g = 0;
  let R_c  = 0;

  logs.forEach(log => {
    const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
    if (hrs < 0 || hrs > 10) return; // only consider meals from the past 10 h

    const fat_g     = safeNum(log.fat_g,     0);
    const protein_g = safeNum(log.protein_g, 0);
    const carbs_g   = safeNum(log.carbs,     0);
    const mealType  = safeNum(log.mealType,  0);
    const fiberClass= safeNum(log.fiberClass, 0);

    // 2.1 Fat/protein reservoir — simple exponential decay from meal time.
    delayedMeal += (fat_g * sim.fat_factor + protein_g * sim.prot_factor) *
                   Math.exp(-sim.lambda_FP * hrs);

    // 2.3 Gastric emptying — forward-integrate the two-compartment ODE from
    // meal time to now in 1-minute steps.
    if (carbs_g > 0) {
      const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mealType] ?? 1.0;
      const fiberFactor    = [sim.fiber_slow_low,  sim.fiber_slow_med,  sim.fiber_slow_high][fiberClass] ?? 1.0;
      const total   = fat_g + protein_g + carbs_g;
      const fatNorm = fat_g    / (total + 1);
      const protNorm= protein_g / (total + 1);
      const k_ge    = sim.k_ge_base * mealTypeFactor * fiberFactor *
                      (1 - sim.k_ge_fat_factor  * fatNorm) *
                      (1 - sim.k_ge_prot_factor * protNorm);

      const DT    = 1 / 60;  // 1-minute integration step
      const steps = Math.round(hrs / DT);
      let dg = carbs_g, rc = 0;
      for (let i = 0; i < steps; i++) {
        const ddg = -k_ge * dg;
        const drc =  k_ge * dg - sim.k_carb_abs * rc;
        dg = Math.max(0, dg + ddg * DT);
        rc = Math.max(0, rc + drc * DT);
      }
      D_g += dg;
      R_c += rc;
    }
  });

  return { delayedMeal, D_g, R_c };
}

// ── C6. IOB for a single logged dose ─────────────────────────────────────────
// Estimates how many units from a past dose are still active.
// Effective duration is shortened by faster absorption (high ka_rel) and
// lengthened by slower absorption (e.g. thigh site, low siteMultiplier).
function iobForDose(log, profile, sim) {
  const elapsed   = (Date.now() - new Date(log.timestamp).getTime()) / 3_600_000;
  const ka_rel    = safeNum(log.kabs_rel, 1.0);
  const siteM     = safeNum(log.siteMultiplier, 1.0);
  const effDur    = profile.insulinDur / Math.max(0.3, ka_rel * siteM);
  if (elapsed >= effDur) return 0;
  return Math.max(0, Math.round(log.insulinDose * (1 - elapsed / effDur) * 100) / 100);
}

// ── C7. Dose calculation ──────────────────────────────────────────────────────
// Suggests a bolus dose based on current BG, carbs, and sensitivity.
function calcDose(bg, carbs, sv, inp, profile, sim) {
  const sm = calcSeff(inp, sv, profile, sim);
  // Sensitivity for dosing purposes: omits the BG-level factor (fBG) because
  // that factor already accounts for the current BG in the correction formula.
  // Age and sex are now embedded in sm.eta0, so we use that as the base rather
  // than reconstructing from corrFactor alone.
  const seffDose = sm.eta0 *
    sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness;
  const corrDose = bg > profile.targetBG ? (bg - profile.targetBG) / Math.max(1, seffDose) : 0;
  // Effective carb ratio scales inversely with all sensitivity factors (inc. age/sex via eta0).
  const allDynamic = sm.fBMI * sm.fAge * sm.fSex *
    sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness;
  const effCR    = profile.carbRatio / Math.max(0.05, allDynamic);
  const carbDose = carbs > 0 ? carbs / Math.max(0.5, effCR) : 0;
  return {
    corrDose:  Math.round(corrDose * 100) / 100,
    carbDose:  Math.round(carbDose * 100) / 100,
    total:     Math.round((corrDose + carbDose) * 100) / 100,
    effCR:     Math.round(effCR * 10) / 10,
    seffDose:  Math.round(seffDose),
  };
}

// ── C8. Forward glucose simulation ───────────────────────────────────────────
// Euler-integrates the glucose ODE 4 hours ahead at 5-minute steps.
// Now includes:
//   • ongoing basal insulin delivery (B_bas)
//   • gastric emptying two-compartment model (D_g → R_c → G)  [2.3]
//   • fat/protein delayed glucose release (delayedMeal → G)   [2.1]
//   • travel uncertainty band (grows linearly over projection) [3.2]
function simulateProjection(startG, pkState, sv0, currentInputs, profile, sim, hoursAhead = 4, mealState = {}) {
  const DT    = 5 / 60;
  const steps = Math.round(hoursAhead / DT);
  const tNow  = new Date().getHours() + new Date().getMinutes() / 60;
  const kS    = profile.corrFactor * sim.k_clear;

  let { Q_sc, Q_p } = pkState;
  let { E_ex, L, H } = sv0;
  let G = startG;

  // Initialise meal absorption state (2.1 + 2.3).
  let delayedMeal = mealState.delayedMeal ?? 0;
  let D_g         = mealState.D_g         ?? 0;
  let R_c         = mealState.R_c         ?? 0;

  const travelDay      = currentInputs.travelDay      ?? 0;
  const alcoholLevel   = currentInputs.alcoholLevel   ?? 0;
  const stimulantLevel = currentInputs.stimulantLevel ?? 0;
  const depressantLevel= currentInputs.depressantLevel?? 0;
  const nicotineLevel  = currentInputs.nicotineLevel  ?? 0;
  const thcLevel       = currentInputs.thcLevel       ?? 0;

  // Gastric-emptying rate for the current meal context (constant over projection).
  const mT = currentInputs.mealType  ?? 0;
  const fC = currentInputs.fiberClass ?? 0;
  const fat_g      = currentInputs.fat_g      ?? 0;
  const protein_g  = currentInputs.protein_g  ?? 0;
  const carbs_ctx  = currentInputs.carbs      ?? 0;
  const totalMacro = fat_g + protein_g + carbs_ctx;
  const fatNorm    = fat_g    / (totalMacro + 1);
  const protNorm   = protein_g / (totalMacro + 1);
  const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mT] ?? 1.0;
  const fiberFactor    = [sim.fiber_slow_low,  sim.fiber_slow_med, sim.fiber_slow_high][fC] ?? 1.0;
  const k_ge = sim.k_ge_base * mealTypeFactor * fiberFactor *
               (1 - sim.k_ge_fat_factor  * fatNorm) *
               (1 - sim.k_ge_prot_factor * protNorm) *
               (1 - sim.alcohol_gastric_slow   * alcoholLevel)    // 4.1 alcohol slows gastric emptying
             * (1 - sim.depress_gastric_slow  * depressantLevel)  // 4.3 CNS relaxation
             * (1 - sim.thc_gastric_slow      * thcLevel);        // 4.5 CB1 activation slows motility

  // 4.1 Hepatic glucose output is suppressed by alcohol: the liver prioritises
  // ethanol metabolism over gluconeogenesis, removing the background glucose drip.
  // 4.2 Stimulants transiently boost G_prod via glycogenolysis (mild adrenaline surge).
  const G_prod_eff = sim.G_prod * (1 - sim.alcohol_hep_suppress * alcoholLevel)
                   - sim.alcohol_hep_suppress * alcoholLevel * 0.4  // net negative contribution
                   + sim.stim_hep_boost * stimulantLevel;            // 4.2 glycogenolysis boost

  // ── 5.1 Uncertainty scalar U — weighted sum of all active stressors ─────
  // U_scalar is time-invariant; the band width grows as U_scalar · u_base · √t
  // so compounding errors widen exponentially with horizon, as they do clinically.
  const substanceSum     = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
  const overlapScore     = ((mealState.D_g         ?? 0) > 5 ? 1   : 0)
                         + ((mealState.R_c          ?? 0) > 5 ? 0.5 : 0)
                         + ((mealState.delayedMeal  ?? 0) > 5 ? 0.5 : 0);
  const iobContrib       = Math.min(pkState.Q_p ?? 0, 5);
  const U_scalar = 1
    + (sim.u_stress     ?? 0.30) * ((currentInputs.stress  ?? 0) / 3)
    + (sim.u_illness    ?? 0.50) *  (currentInputs.illness ?? 0)
    + (sim.u_travel     ?? 0.40) *   travelDay
    + (sim.u_overlap    ?? 0.25) *   overlapScore
    + (sim.u_substances ?? 0.15) *   substanceSum
    + (sim.u_iob        ?? 0.10) *   iobContrib;

  const pts = [{ t: 0, G: Math.round(G), Qp: Math.round(Q_p * 100) / 100, u: 0,
                 band_upper: Math.round(G), band_lower: Math.round(G) }];

  for (let i = 1; i <= steps; i++) {
    const tHr = ((tNow + i * DT) % 24 + 24) % 24;
    const inp = {
      bmi:        currentInputs.bmi,
      hr:         currentInputs.hr,
      pa:         currentInputs.pa,
      sleep:      currentInputs.sleep,
      sleepQ:     currentInputs.sleepQ,
      hydration:  currentInputs.hydration,
      stress:     currentInputs.stress,
      illness:    currentInputs.illness,
      travelDay,                            // 3.2
      alcoholLevel,                         // 4.1
      stimulantLevel,                       // 4.2
      depressantLevel,                      // 4.3
      nicotineLevel,                        // 4.4
      thcLevel,                             // 4.5
      bg:         G,
      timeHour:   tHr,
    };

    const km = calcKabs(inp, profile, sim);
    const sm = calcSeff(inp, { E_ex, L, H }, profile, sim);
    const ka = km.kabs;

    // Basal delivery adds a small continuous input to the subcutaneous pool.
    const basalInput = profile.basalRate * DT;

    // Insulin PK.
    const dQsc = -ka * Q_sc + basalInput;
    const dQp  =  ka * Q_sc - sim.k_clear * Q_p;
    const insulinEffect = kS * sm.seff_mult * Q_p;

    // 2.1 Fat/protein delayed release — reservoir decays into glucose.
    const fpRelease  = delayedMeal * (1 - Math.exp(-sim.lambda_FP * DT));

    // 2.3 Gastric emptying — stomach→gut→blood.
    const dDg = -k_ge * D_g;
    const dRc =  k_ge * D_g - sim.k_carb_abs * R_c;
    const carbGlucoseRate = sim.k_carb_abs * R_c;

    // Net glucose rate.
    const dG = G_prod_eff
              - insulinEffect
              - sim.k_basal * (G - profile.targetBG)
              + carbGlucoseRate
              + fpRelease / DT;

    const dEex = (currentInputs.pa - E_ex) / sim.tau_ex;
    const dL   = (Math.max(0, profile.lowBG  - G) - L) / sim.tau_low;
    const dH   = (Math.max(0, G - profile.highBG)  - H) / sim.tau_high;

    // Euler update.
    Q_sc        = Math.max(0, Q_sc + dQsc * DT);
    Q_p         = Math.max(0, Q_p  + dQp  * DT);
    G           = clamp(G + dG * DT, 40, 500);
    E_ex        = Math.max(0, E_ex + dEex * DT);
    L           = Math.max(0, L    + dL   * DT);
    H           = Math.max(0, H    + dH   * DT);
    delayedMeal = Math.max(0, delayedMeal - fpRelease);
    D_g         = Math.max(0, D_g + dDg * DT);
    R_c         = Math.max(0, R_c + dRc * DT);

    if (i % 6 === 0) {
      // 5.1 Uncertainty band grows as U_scalar · u_base · √tElapsed.
      // A √t profile matches the diffusion-like compounding of prediction error
      // (biologically: each uncertain step adds variance, not a fixed offset).
      const tElapsed = i * DT;
      const u = Math.round(U_scalar * (sim.u_base ?? 18) * Math.sqrt(tElapsed));
      pts.push({
        t:          i * DT,
        G:          Math.round(G),
        Qp:         Math.round(Q_p * 100) / 100,
        u,
        band_upper: Math.min(500, Math.round(G + u)),
        band_lower: Math.max(40,  Math.round(G - u)),
        U_scalar,
      });
    }
  }
  return { pts, U_scalar };
}

//  D.  LOG / PERSISTENCE FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

// Build a complete, normalised log entry from raw form state.
// This is the single place that knows the log schema.
function makeLogEntry(formState, dose, liveMod) {
  const { bgV, fsV, cV, hrNum, paNum, slp, sleepQ, stress, illness, hydration,
          site, siteMultiplier, fatV, proteinV, mealType, fiberClass,
          travelDay, alcoholLevel, stimulantLevel, depressantLevel, nicotineLevel, thcLevel, not } = formState;
  return {
    id:             Date.now().toString(),
    timestamp:      nowISO(),
    // BG
    bloodSugar:     fsV || bgV,
    cgm:            bgV,
    fingerstick:    fsV,
    // Nutrition
    carbs:          cV,
    fat_g:          fatV,       // 2.1
    protein_g:      proteinV,   // 2.1
    mealType:       mealType,   // 2.2
    fiberClass:     fiberClass, // 2.2
    // Dosing
    insulinDose:    dose.total,
    // Physiologic context
    hr:             hrNum,
    pa:             paNum,
    sleep:          slp,
    sleepQ:         sleepQ,
    stress:         stress,
    illness:        illness,
    hydration:      hydration,
    travelDay:      travelDay,   // 3.2
    alcoholLevel:   alcoholLevel, // 4.1
    stimulantLevel: stimulantLevel ?? 0, // 4.2
    depressantLevel:depressantLevel ?? 0, // 4.3
    nicotineLevel:  nicotineLevel ?? 0,  // 4.4
    thcLevel:       thcLevel ?? 0,       // 4.5
    // Injection site — stored per-dose; used in reconstructPK and iobForDose
    site:           site,
    siteMultiplier: siteMultiplier,
    // Computed at log time (continuous modifiers only — does NOT include site)
    kabs_rel:       Math.round(liveMod.kabs_mult * 100) / 100,
    seff_mult:      Math.round(liveMod.seff_mult * 1000) / 1000,
    notes:          not.trim(),
  };
}

// Normalise an imported or old log entry so all fields exist with safe types.
// This is where forward-compatibility lives: old logs missing new fields get defaults.
function normalizeLogEntry(raw, i) {
  const numFields = [
    'bloodSugar','cgm','fingerstick','carbs','insulinDose',
    'hr','pa','sleep','sleepQ','stress','illness','hydration',
    'travelDay','alcoholLevel',                // 3.2 / 4.1
    'stimulantLevel','depressantLevel','nicotineLevel','thcLevel', // 4.2–4.5
    'siteMultiplier',
    'fat_g','protein_g','mealType','fiberClass',
    'kabs_rel','seff_mult',
  ];
  const out = { id: raw.id || `i${i}`, ...raw };
  numFields.forEach(k => {
    out[k] = raw[k] !== '' && raw[k] != null ? parseFloat(raw[k]) : null;
  });
  // Defaults for fields that didn't exist in older log versions.
  if (out.sleepQ      == null) out.sleepQ      = 4;
  if (out.stress      == null) out.stress      = 0;
  if (out.illness     == null) out.illness     = 0;
  if (out.hydration   == null) out.hydration   = 0;
  if (out.travelDay   == null) out.travelDay   = 0;
  if (out.alcoholLevel == null) out.alcoholLevel = 0; // 4.1 — off by default for old logs
  if (out.stimulantLevel  == null) out.stimulantLevel  = 0; // 4.2
  if (out.depressantLevel == null) out.depressantLevel = 0; // 4.3
  if (out.nicotineLevel   == null) out.nicotineLevel   = 0; // 4.4
  if (out.thcLevel        == null) out.thcLevel        = 0; // 4.5
  // Fat/protein/meal fields default to 0 so old logs still simulate correctly.
  if (out.fat_g       == null) out.fat_g       = 0;
  if (out.protein_g   == null) out.protein_g   = 0;
  if (out.mealType    == null) out.mealType    = 0;
  if (out.fiberClass  == null) out.fiberClass  = 0;
  // Site: string field with its own default path.
  if (!out.site)               out.site        = 'abdomen';
  if (out.siteMultiplier == null) out.siteMultiplier = 1.0;
  return out;
}

// Validate a single imported row. Returns an error string or null if valid.
function validateImportedRow(row) {
  if (!row.timestamp) return 'missing timestamp';
  if (isNaN(new Date(row.timestamp).getTime())) return 'invalid timestamp';
  if (row.bloodSugar != null && (row.bloodSugar < 20 || row.bloodSugar > 800))
    return `BG value out of range: ${row.bloodSugar}`;
  return null;
}

// Serialise logs to CSV text.
function toCSV(logs) {
  const rows = logs.map(l =>
    CSV_COLUMNS.map(k => {
      const v = l[k];
      if (v == null) return '';
      if (typeof v === 'string') return `"${v.replace(/"/g,'""')}"`;
      return v;
    }).join(',')
  );
  return [CSV_COLUMNS.join(','), ...rows].join('\n');
}

// Parse CSV text back into normalised log entries.
function fromCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  const results = [];
  lines.slice(1).forEach((line, i) => {
    const vals = line.split(',');
    const raw  = {};
    headers.forEach((h, j) => { raw[h] = (vals[j] || '').trim().replace(/^"|"$/g, ''); });
    const err = validateImportedRow(raw);
    if (!err) results.push(normalizeLogEntry(raw, i));
  });
  return results;
}

// Trigger a CSV file download.
function dlCSV(logs) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([toCSV(logs)], { type: 'text/csv' }));
  a.download = `insulin-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Load a stored JSON value from localStorage; return fallback on error.
function loadStored(key, fallback) {
  try { return { ...fallback, ...JSON.parse(localStorage.getItem(key) || '{}') }; }
  catch { return fallback; }
}

// ── E0. Toast notification ────────────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className={`tst ${type}`}>{msg}</div>;
}

// ── E1. Modifier bar (single row in the modifier panel) ───────────────────────
function ModBar({ label, value }) {
  const c = modColor(value);
  return (
    <div className="mr">
      <div className="mlbl">{label}</div>
      <div className="mbar">
        <div className="mbg">
          <div className="mfill" style={{ width: `${Math.min(100, (value / 2) * 100)}%`, background: c }}/>
          <div className="mctr"/>
        </div>
      </div>
      <div className="mv" style={{ color: c }}>{value.toFixed(2)}×</div>
    </div>
  );
}

// ── E2. Modifier panel (absorption + sensitivity + metabolic output) ──────────
function ModPanel({ mod }) {
  const hasMetabolic = mod.metabolic && Object.keys(mod.metabolic).length > 0;
  const confidencePct = Math.round((mod.confidenceFactor ?? 1) * 100);
  const uScalar       = mod.U_scalar ?? 1;
  const confColor     = modColor(mod.confidenceFactor ?? 1);

  // Confidence label: maps the scalar to a human word.
  const confLabel = uScalar < 1.15 ? 'High'
                  : uScalar < 1.4  ? 'Good'
                  : uScalar < 1.7  ? 'Fair'
                  : uScalar < 2.2  ? 'Low'
                  : 'Very Low';

  return (
    <div className="mp">
      <div style={{ fontSize:'11px', color:'var(--td)', marginBottom:'6px', fontFamily:'var(--sans)' }}>
        What affects insulin right now:
      </div>
      <div className="msum">
        <span className="msi"
          title="Absorption rate — how fast insulin gets into your bloodstream">
          Absorption: <strong style={{ color: modColor(mod.kabs_mult) }}>{mod.kabs.toFixed(2)} hr⁻¹</strong>
          <span style={{ color:'var(--tm)' }}> ({Math.round(mod.kabs_mult * 100)}%)</span>
        </span>
        <span className="msi"
          title="Sensitivity — how far 1 unit of insulin drops your blood sugar">
          Sensitivity: <strong style={{ color: modColor(mod.seff_mult) }}>{Math.round(mod.seff)} mg/dL/u</strong>
          <span style={{ color:'var(--tm)' }}> ({Math.round(mod.seff_mult * 100)}%)</span>
        </span>
        <span className="msi"
          title="Model confidence — how reliable the 4-hour forecast is given current stressors">
          Confidence: <strong style={{ color: confColor }}>{confLabel}</strong>
          <span style={{ color:'var(--tm)' }}> ({confidencePct}%)</span>
        </span>
      </div>

      <div className="mst">Absorption speed factors</div>
      {Object.entries(mod.absorption).map(([k, v]) => <ModBar key={k} label={k} value={v}/>)}

      <div className="mst">Sensitivity factors</div>
      {Object.entries(mod.sensitivity).map(([k, v]) => <ModBar key={k} label={k} value={v}/>)}

      {/* ── 5.2 Metabolic output section — always rendered ── */}
      <div className="mst" style={{ color:'var(--ac)' }}>Metabolic output &amp; confidence</div>
      <ModBar label="Hepatic Output"    value={mod.hepaticOutputFactor    ?? 1}/>
      <ModBar label="Gastric Emptying"  value={mod.gastricEmptyingFactor  ?? 1}/>
      {/* Confidence bar: 1/U_scalar, where lower = less confident */}
      <ModBar label="Model Confidence"  value={mod.confidenceFactor       ?? 1}/>

      {hasMetabolic && (<>
        <div className="mst" style={{ color:'var(--o)' }}>Substance sensitivity effects</div>
        {Object.entries(mod.metabolic).map(([k, v]) => <ModBar key={k} label={k} value={v}/>)}
      </>)}
    </div>
  );
}

// ── E3a. BPM Monitor modal ─────────────────────────────────────────────────────
// Four-phase heart rate measurement: idle → countdown → recording → result.
// onConfirm(bpm) writes the measured value back into the HR field.
function BpmMonitor({ onConfirm, onClose }) {
  const [phase,       setPhase]       = useState('idle');   // idle|countdown|recording|result
  const [countdown,   setCountdown]   = useState(3);
  const [timeLeft,    setTimeLeft]    = useState(30);
  const [beatCount,   setBeatCount]   = useState(0);
  const [bpm,         setBpm]         = useState(0);
  const [popping,     setPopping]     = useState(false);

  // Countdown phase: tick from 3 → 0 then hand off to recording.
  useEffect(() => {
    if (phase !== 'countdown') return;
    if (countdown > 0) {
      const t = setTimeout(() => setCountdown(c => c - 1), 1000);
      return () => clearTimeout(t);
    }
    setPhase('recording');
    setTimeLeft(30);
  }, [phase, countdown]);

  // Recording phase: 30-second timer; when it hits 0, compute BPM and advance.
  useEffect(() => {
    if (phase !== 'recording') return;
    if (timeLeft > 0) {
      const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
      return () => clearTimeout(t);
    }
    setBpm(beatCount * 2);  // 30-s window → × 2 = per-minute rate
    setPhase('result');
  }, [phase, timeLeft, beatCount]);

  const reset = () => { setPhase('idle'); setCountdown(3); setTimeLeft(30); setBeatCount(0); setBpm(0); };

  const handleHeartClick = () => {
    if (phase !== 'recording') return;
    setBeatCount(c => c + 1);
    setPopping(true);
    setTimeout(() => setPopping(false), 150);
  };

  const handleConfirm = () => { onConfirm(bpm); onClose(); };

  // Heart-beat SVG path (standard filled heart shape)
  const HeartPath = () => (
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402
               0-3.791 3.068-5.191 5.281-5.191
               1.312 0 4.151.501 5.719 4.457
               1.59-3.968 4.464-4.447 5.726-4.447
               2.54 0 5.274 1.621 5.274 5.181
               0 4.069-5.136 8.625-11 14.402z"/>
    </svg>
  );

  // Zone label for the final BPM result
  const hrZone = bpm < 60  ? { label:'Below normal', c:'var(--ac)' }
               : bpm <= 100 ? { label:'Normal range',  c:'var(--g)' }
               : bpm <= 120 ? { label:'Elevated',       c:'var(--y)' }
               :               { label:'High',           c:'var(--r)' };

  return (
    <div className="bpm-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bpm-modal">

        {/* Header */}
        <div className="bpm-hdr">
          <div className="bpm-hdr-title">
            <span style={{ color:'var(--r)', fontSize:'16px' }}>♥</span>
            BPM Monitor
          </div>
          <button className="bpm-close" onClick={onClose}>✕</button>
        </div>

        {/* Body */}
        <div className="bpm-body">

          {/* ── IDLE ── */}
          {phase === 'idle' && (
            <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:'16px' }}>
              <div className="bpm-info">
                <div className="bpm-info-row">
                  <span className="bpm-info-icon">ⓘ</span>
                  <span>With one hand, feel your pulse by placing your index and middle fingers on the side of your lower neck, next to the windpipe. Press lightly until you feel a beat.</span>
                </div>
                <div className="bpm-info-row">
                  <span className="bpm-info-icon" style={{ color:'var(--r)' }}>♥</span>
                  <span>With your other hand, tap the heart button each time you feel a beat. A 30-second timer will count your taps and calculate your BPM.</span>
                </div>
              </div>
              <button className="btn bp bfw" onClick={() => setPhase('countdown')}>
                I'm ready — start timer
              </button>
            </div>
          )}

          {/* ── COUNTDOWN ── */}
          {phase === 'countdown' && (
            <div style={{ textAlign:'center' }}>
              <div className="bpm-countdown-lbl">Get ready to tap…</div>
              <div className="bpm-countdown-num">{countdown}</div>
            </div>
          )}

          {/* ── RECORDING ── */}
          {phase === 'recording' && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:'100%' }}>
              <div className="bpm-rec-stats">
                <span className="bpm-stat" style={{ color:'var(--td)' }}>⏱ {timeLeft}s left</span>
                <span className="bpm-stat beats">♥ {beatCount} beats</span>
              </div>
              <button
                className={`bpm-heart-btn${popping ? ' pop' : ''}`}
                onClick={handleHeartClick}
              >
                <HeartPath/>
              </button>
              <div className="bpm-tap-hint">Tap once for every heartbeat you feel</div>
            </div>
          )}

          {/* ── RESULT ── */}
          {phase === 'result' && (
            <div style={{ textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
              <div className="bpm-result-lbl">Your heart rate</div>
              <div>
                <span className="bpm-result-val" style={{ color: hrZone.c }}>{bpm}</span>
                <span className="bpm-result-unit">BPM</span>
              </div>
              <div className="bpm-result-note">
                {beatCount} beats in 30 seconds · {hrZone.label}
              </div>
              <button className="btn bg_ bfw" style={{ marginTop:'14px' }} onClick={reset}>
                ↺ Measure again
              </button>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="bpm-ftr">
          {phase === 'result' && (
            <button className="btn bp bfw" onClick={handleConfirm}>
              ✓ Use this value ({bpm} BPM)
            </button>
          )}
          <button className="btn bg_ bfw" onClick={onClose}
            style={{ fontSize:'12px', padding:'7px' }}>
            Cancel &amp; close
          </button>
        </div>

      </div>
    </div>
  );
}

              {doseRes.carbDose > 0 && <>{`Carbs: ${crbs}g ÷ ${doseRes.effCR}g/u (adjusted ratio) = +${doseRes.carbDose}u`}<br/></>}

          </div>
          <ModPanel mod={liveMod}/>
        </div>
      ) : (
        <div style={{ marginTop:'13px' }}>
          <div className="ct" style={{ marginBottom:'8px' }}>📡 Current Modifiers</div>
          <ModPanel mod={liveMod}/>
        </div>
      )}

      <button className="btn bp bfw" style={{ marginTop:'13px' }} onClick={onLog}>
        + Log Entry
      </button>
    </div>
  );
}

        <div className="ct">☕ Stimulants (Caffeine / Prescribed)</div>
        <div className="note" style={{ marginBottom:'12px', color:'var(--y)', borderLeft:'2px solid var(--y)', paddingLeft:'10px' }}>
          Caffeine acts as an adenosine receptor antagonist, triggering epinephrine release. Studies (Lane et al.) show acute caffeine reduces insulin sensitivity by 15–30% and elevates postprandial blood glucose. Prescribed stimulants (e.g. amphetamines for ADHD) produce a similar, often sustained, effect.
        </div>

        <div className="fi" style={{ marginBottom:'14px' }}>
          <label>Stimulant Level <span title="Maps to a sensitivity penalty via epinephrine release and a transient hepatic glucose boost from mild glycogenolysis." style={{ cursor:'help', opacity:.7 }}>ⓘ</span></label>
          <div className="pal4">
            {STIMULANT_LEVELS.map((s) => (
              <button key={s.value}
                className={`pab ${stimulantLevel === s.value
                  ? (s.value === 0 ? 'on' : s.value <= 0.3 ? 'on-y on' : 'on-r on')
                  : ''}`}
                style={stimulantLevel === s.value && s.value > 0 ? {
                  borderColor: s.value <= 0.3 ? 'var(--y)' : 'var(--r)',
                  color:       s.value <= 0.3 ? 'var(--y)' : 'var(--r)',
                  background:  s.value <= 0.3 ? 'rgba(251,191,36,.08)' : 'rgba(255,107,107,.08)',
                } : {}}
                onClick={() => setStimulantLevel(s.value)}>
                <i>{s.icon}</i>{s.label}
              </button>
            ))}
          </div>
        </div>

        {stimulantLevel > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
            <div className="bgz" style={{
              borderColor: stimulantLevel >= 0.7 ? 'rgba(255,107,107,.4)' : 'rgba(251,191,36,.4)',
              background:  stimulantLevel >= 0.7 ? 'rgba(255,107,107,.06)' : 'rgba(251,191,36,.06)',
            }}>
              <div className="bgdot" style={{ background: stimulantLevel >= 0.7 ? 'var(--r)' : 'var(--y)' }}/>
              <div className="bgztxt">
                {stimulantLevel >= 0.7
                  ? '💊 Prescribed stimulant — sustained epinephrine elevation. Insulin may be significantly less effective. Monitor closely.'
                  : '☕ Caffeine active — expect mildly elevated postprandial BG and a small hepatic glucose boost.'}
              </div>
            </div>
            <div className="note" style={{ fontFamily:'var(--mono)', color:'var(--td)' }}>
              Sensitivity penalty: <strong style={{ color:'var(--r)' }}>÷{(1 + 0.2 * stimulantLevel).toFixed(2)}×</strong>
              &nbsp;·&nbsp; Hepatic boost: <strong style={{ color:'var(--y)' }}>+{(0.1 * stimulantLevel).toFixed(2)} mg/dL/hr</strong> G_prod
              {liveMod.fStimulant != null && <>&nbsp;·&nbsp; Model factor: <strong style={{ color:'var(--ac)' }}>{(liveMod.fStimulant * 100).toFixed(0)}%</strong></>}
            </div>
          </div>
        )}
      </div>

      {/* ── Depressants (4.3) ── */}
      <div className="card">
        <div className="ct">💤 Depressants (Benzodiazepines / Sleep Aids)</div>
        <div className="note" style={{ marginBottom:'12px', color:'var(--p)', borderLeft:'2px solid var(--p)', paddingLeft:'10px' }}>
          Direct glycemic impact is modest compared to stimulants. However, deep CNS depression alters growth hormone secretion (which peaks in deep sleep and causes resistance) and causes smooth-muscle relaxation that slows gastric emptying. The chief clinical risk is behavioural: diminished hypoglycemia awareness.
        </div>

        <div className="fi" style={{ marginBottom:'14px' }}>
          <label>Depressant Level <span title="Amplifies sleep-related sensitivity reduction and slows gastric emptying via CNS and smooth-muscle relaxation." style={{ cursor:'help', opacity:.7 }}>ⓘ</span></label>
          <div className="pal3">
            {DEPRESSANT_LEVELS.map((d) => (
              <button key={d.value}
                className={`pab ${depressantLevel === d.value
                  ? (d.value === 0 ? 'on' : 'on-y on')
                  : ''}`}
                style={depressantLevel === d.value && d.value > 0 ? {
                  borderColor:'var(--p)', color:'var(--p)', background:'rgba(167,139,250,.08)',
                } : {}}
                onClick={() => setDepressantLevel(d.value)}>
                <i>{d.icon}</i>{d.label}
              </button>
            ))}
          </div>
        </div>

        {depressantLevel > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
            <div className="bgz" style={{ borderColor:'rgba(167,139,250,.4)', background:'rgba(167,139,250,.06)' }}>
              <div className="bgdot" style={{ background:'var(--p)' }}/>
              <div className="bgztxt">
                💤 Depressant active — sleep sensitivity effect amplified and gastric motility reduced. Hypo-awareness may be blunted.
              </div>
            </div>
            <div className="note" style={{ fontFamily:'var(--mono)', color:'var(--td)' }}>
              Sleep effect amplified by <strong style={{ color:'var(--p)' }}>+{Math.round(30 * depressantLevel)}%</strong>
              &nbsp;·&nbsp; Gastric emptying slowed by <strong style={{ color:'var(--y)' }}>{Math.round(15 * depressantLevel)}%</strong>
            </div>
          </div>
        )}
      </div>

      {/* ── Nicotine (4.4) ── */}
      <div className="card">
        <div className="ct">🚬 Nicotine</div>
        <div className="note" style={{ marginBottom:'12px', color:'var(--o)', borderLeft:'2px solid var(--o)', paddingLeft:'10px' }}>
          Smoking is a known cause of insulin resistance. Studies (Eliasson et al.) demonstrate acute smoking impairs insulin-mediated glucose disposal by up to 20%. Nicotine-driven vasoconstriction also reduces peripheral blood flow, potentially slowing subcutaneous insulin absorption and extending the active IOB curve.
        </div>

        <div className="fi" style={{ marginBottom:'14px' }}>
          <label>Nicotine Level <span title="Vasoconstriction impairs peripheral glucose disposal at the receptor level, reducing insulin-mediated muscle uptake by ~15–20%." style={{ cursor:'help', opacity:.7 }}>ⓘ</span></label>
          <div className="pal3">
            {NICOTINE_LEVELS.map((n) => (
              <button key={n.value}
                className={`pab ${nicotineLevel === n.value
                  ? (n.value === 0 ? 'on' : n.value < 1 ? 'on-y on' : 'on-r on')
                  : ''}`}
                style={nicotineLevel === n.value && n.value > 0 ? {
                  borderColor:'var(--o)', color:'var(--o)', background:'rgba(251,146,60,.08)',
                } : {}}
                onClick={() => setNicotineLevel(n.value)}>
                <i>{n.icon}</i>{n.label}
              </button>
            ))}
          </div>
        </div>

        {nicotineLevel > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
            <div className="bgz" style={{
              borderColor:'rgba(251,146,60,.4)', background:'rgba(251,146,60,.06)',
            }}>
              <div className="bgdot" style={{ background:'var(--o)' }}/>
              <div className="bgztxt">
                🚬 Nicotine active — peripheral glucose utilisation reduced via vasoconstriction. Insulin correction may be less effective than expected.
              </div>
            </div>
            <div className="note" style={{ fontFamily:'var(--mono)', color:'var(--td)' }}>
              Peripheral disposal penalty: <strong style={{ color:'var(--o)' }}>÷{(1 + 0.15 * nicotineLevel).toFixed(2)}×</strong>
              {liveMod.fNicotine != null && <>&nbsp;·&nbsp; Model factor: <strong style={{ color:'var(--ac)' }}>{(liveMod.fNicotine * 100).toFixed(0)}%</strong></>}
            </div>
          </div>
        )}
      </div>

      {/* ── THC / Cannabis (4.5) ── */}
      <div className="card">
        <div className="ct">🌿 THC / Cannabis</div>
        <div className="note" style={{ marginBottom:'12px', color:'var(--g)', borderLeft:'2px solid var(--g)', paddingLeft:'10px' }}>
          Endocannabinoid receptors (CB1) are densely expressed in the enteric nervous system. Acute activation significantly slows gastric motility. The primary glycemic risk is a flattened but extended meal absorption curve — creating an early post-bolus low followed by a stubborn late high.
        </div>

        <div className="fi" style={{ marginBottom:'14px' }}>
          <label>THC Level <span title="CB1 activation slows gastric emptying (k_ge) by 20–30%, delaying carbohydrate absorption and increasing late hyperglycemia risk." style={{ cursor:'help', opacity:.7 }}>ⓘ</span></label>
          <div className="pal3">
            {THC_LEVELS.map((t) => (
              <button key={t.value}
                className={`pab ${thcLevel === t.value
                  ? (t.value === 0 ? 'on' : 'on-y on')
                  : ''}`}
                style={thcLevel === t.value && t.value > 0 ? {
                  borderColor:'var(--g)', color:'var(--g)', background:'rgba(74,222,128,.08)',
                } : {}}
                onClick={() => setThcLevel(t.value)}>
                <i>{t.icon}</i>{t.label}
              </button>
            ))}
          </div>
        </div>

        {thcLevel > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
            <div className="bgz" style={{ borderColor:'rgba(74,222,128,.4)', background:'rgba(74,222,128,.06)' }}>
              <div className="bgdot" style={{ background:'var(--g)' }}/>
              <div className="bgztxt">
                🌿 THC active — gastric motility slowed. Meal BG rise will be delayed and prolonged. Early post-bolus low is possible, followed by a late elevated plateau.
              </div>
            </div>
            <div className="note" style={{ fontFamily:'var(--mono)', color:'var(--td)' }}>
              Gastric emptying slowed by <strong style={{ color:'var(--g)' }}>{Math.round(25 * thcLevel)}%</strong>
              &nbsp;·&nbsp; k_ge multiplier: <strong style={{ color:'var(--ac)' }}>{(1 - 0.25 * thcLevel).toFixed(2)}×</strong>
            </div>
          </div>
        )}
      </div>

      {/* Current modifiers panel so user can see combined effect */}
      <div className="card">
        <div className="ct">📡 Current Modifiers (with active substances)</div>
        <ModPanel mod={liveMod}/>
      </div>
    </div>
  );
}

// ── E4. Settings panel ────────────────────────────────────────────────────────
function SField({ label, k, s, set, step = 'any' }) {
  return (
    <div className="fi">
      <label>{label}</label>
      <input type="number" inputMode="decimal" step={step} value={s[k]}
        onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) set(x => ({ ...x, [k]: v })); }}/>
    </div>
  );
}

function SettingsPanel({ profile, setProfile, sim, setSim, ui, setUi, logs, showT }) {
  const [showAdv, setAdv] = useState(false);

  return (
    <div className="card">
      {/* UI prefs */}

          onClick={() => setUi(x => ({ ...x, showAdvancedModifiers: !x.showAdvancedModifiers }))}>
