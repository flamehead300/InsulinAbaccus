    // ── E5. BG + Insulin chart ────────────────────────────────────────────────────
    function ProjectionChart({ logs, projection }) {
      const ref = useRef(null);
      const inst = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        const hist = [...logs].filter(l => l.bloodSugar != null)
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)).slice(-40);
        if (inst.current) inst.current.destroy();
        const now = new Date();
        const projLabels = projection.map(pt => {
          const d = new Date(now.getTime() + pt.t * 3_600_000);
          return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        });
        const histLabels = hist.map(l => fmtT(l.timestamp));
        const allLabels = [...histLabels, 'Now', ...projLabels.slice(1)];
        const histBG = hist.map(l => l.bloodSugar);
        const projBG = projection.map(p => p.G);
        const bridgePad = hist.length > 0
          ? [...new Array(hist.length - 1).fill(null), hist.at(-1)?.bloodSugar ?? null]
          : [];
        const nullPad = new Array(hist.length).fill(null);

        // ── 5.1 Confidence band arrays ─────────────────────────────────────────
        // The first projection point (t=0) has u=0, so the band starts tight and
        // widens naturally as the √t horizon grows.
        const projUpper = projection.map(p => p.band_upper ?? p.G);
        const projLower = projection.map(p => p.band_lower ?? p.G);
        // Confidence band colour: last-point U_scalar drives the tint.
        const finalU = projection.at(-1)?.U_scalar ?? 1;
        const bandAlpha = Math.min(0.18, 0.06 + (finalU - 1) * 0.06);
        const bandColor = finalU < 1.4 ? `rgba(0,212,255,${bandAlpha})`
          : finalU < 1.8 ? `rgba(251,191,36,${bandAlpha})`
            : `rgba(255,107,107,${bandAlpha})`;

        inst.current = new Chart(ref.current.getContext('2d'), {
          data: {
            labels: allLabels,
            datasets: [
              {
                type: 'line', label: 'BG history',
                data: [...histBG, ...new Array(projection.length).fill(null)],
                borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,.05)', borderWidth: 2,
                pointRadius: 4, tension: .35, fill: true, yAxisID: 'yBG',
                pointBackgroundColor: hist.map(l => bgColor(l.bloodSugar)),
                pointBorderColor: '#0a0e1a', pointBorderWidth: 2
              },

              // ── Upper CI band (fills down to the lower band dataset below it) ──
              {
                type: 'line', label: 'Upper 90% CI',
                data: [...nullPad, ...projUpper],
                borderColor: 'transparent', backgroundColor: bandColor,
                fill: '+1',   // Chart.js 4: fill from this to the next dataset
                pointRadius: 0, tension: .3, yAxisID: 'yBG'
              },
              // ── Lower CI band ──────────────────────────────────────────────────
              {
                type: 'line', label: 'Lower 90% CI',
                data: [...nullPad, ...projLower],
                borderColor: 'transparent', backgroundColor: 'transparent',
                fill: false, pointRadius: 0, tension: .3, yAxisID: 'yBG'
              },

              {
                type: 'line', label: 'BG projection',
                data: [...bridgePad, ...projBG],
                borderColor: 'rgba(0,212,255,.7)', backgroundColor: 'transparent',
                borderWidth: 1.5, borderDash: [6, 4], pointRadius: 3,
                pointBackgroundColor: projection.map(p => bgColor(p.G)),
                tension: .3, fill: false, yAxisID: 'yBG'
              },

              {
                type: 'bar', label: 'Insulin (u)',
                data: [...hist.map(l => l.insulinDose || null), ...new Array(projection.length).fill(null)],
                backgroundColor: 'rgba(167,139,250,.45)', borderColor: '#a78bfa', borderWidth: 1, yAxisID: 'yIns'
              },
              {
                type: 'line', label: 'Sensitivity %',
                data: [...hist.map(l => l.seff_mult != null ? Math.round(l.seff_mult * 100) : null),
                ...new Array(projection.length).fill(null)],
                borderColor: '#fb923c', backgroundColor: 'transparent', borderWidth: 1.5,
                borderDash: [4, 3], pointRadius: 2, tension: .3, yAxisID: 'yPct'
              },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                labels: {
                  color: '#64748b', font: { family: 'Share Tech Mono', size: 10 }, boxWidth: 10,
                  filter: item => !item.text.includes('CI')
                }
              },
              tooltip: {
                backgroundColor: '#111827', borderColor: '#1e2d45', borderWidth: 1,
                titleColor: '#e2e8f0', bodyColor: '#94a3b8', titleFont: { family: 'Share Tech Mono' },
                filter: item => item.dataset.label !== 'Upper 90% CI' && item.dataset.label !== 'Lower 90% CI'
              },
            },
            scales: {
              x: { ticks: { color: '#334155', font: { family: 'Share Tech Mono', size: 9 }, maxRotation: 45 }, grid: { color: '#1e2d45' } },
              yBG: {
                position: 'left', ticks: { color: '#334155', font: { family: 'Share Tech Mono', size: 9 } }, grid: { color: '#1e2d45' },
                title: { display: true, text: 'mg/dL', color: '#00d4ff', font: { size: 9 } }
              },
              yIns: {
                position: 'right', ticks: { color: '#334155', font: { family: 'Share Tech Mono', size: 9 } },
                grid: { drawOnChartArea: false }, title: { display: true, text: 'Units', color: '#a78bfa', font: { size: 9 } }
              },
              yPct: {
                position: 'right', min: 0, max: 180,
                ticks: { color: '#334155', font: { family: 'Share Tech Mono', size: 9 }, callback: v => v + '%' },
                grid: { drawOnChartArea: false }, title: { display: true, text: 'Sensitivity%', color: '#fb923c', font: { size: 9 } }
              },
            },
          },
        });
        return () => { if (inst.current) inst.current.destroy(); };
      }, [logs, projection]);

      if (!logs.filter(l => l.bloodSugar != null).length)
        return <div className="es"><div className="ei">📈</div>Log readings to see graph</div>;
      return <div className="chwrap"><canvas ref={ref} /></div>;
    }

    // ── E6. Log table ─────────────────────────────────────────────────────────────
    function LogTable({ logs, profile, onDelete }) {
      if (!logs.length)
        return <div className="es"><div className="ei">📋</div>No entries yet</div>;
      return (
        <div className="lscroll">
          <table className="lt">
            <thead>

                <th>Carbs</th>

                    {l.cgm && l.fingerstick && <span style={{ fontSize: '10px', color: 'var(--tm)', marginLeft: '4px' }}>({l.cgm})</span>}
                  </td>
                  <td>{l.carbs ? `${l.carbs}g` : '—'}</td>

                  <td style={{ color: 'var(--o)' }}>{l.seff_mult != null ? `${Math.round(l.seff_mult * 100)}%` : '—'}</td>
                  <td style={{ color: l.kabs_rel ? modColor(l.kabs_rel) : 'var(--td)' }}>{l.kabs_rel ? `${l.kabs_rel}×` : '—'}</td>

                      </span>

                  <td style={{ color: 'var(--td)' }}>{l.pa != null ? `${l.pa}M` : '—'}</td>

                  <td><button className="btn bd_ bsm" onClick={() => onDelete(l.id)}>✕</button></td>

      );

    // ═══════════════════════════════════════════════════════════════════════════════
    //  F.  APP — STATE + ORCHESTRATION
    //
    //  App owns all persisted state. It derives computed values (modifiers,
    //  projection, IOB) and passes them down into pure components.
    //  No physiologic logic lives here — App only wires things together.
    // ═══════════════════════════════════════════════════════════════════════════════
    function App() {
      // ── Persisted state ──────────────────────────────────────────────────────────
      const [profile, setProfile] = useState(() => loadStored(STORE_PROFILE, DEFAULT_PROFILE));
      const [sim, setSim] = useState(() => loadStored(STORE_SIM, DEFAULT_SIM_PARAMS));
      const [ui, setUi] = useState(() => loadStored(STORE_UI, DEFAULT_UI_STATE));
      const [logs, setLogs] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORE_LOGS) || '[]').map((l, i) => normalizeLogEntry(l, i)); }
        catch { return []; }
      });
      const [cgmCfg, setCgmCfg] = useState(() => loadStored(STORE_CGM, DEFAULT_CGM_CONFIG));

      // ── UI state ─────────────────────────────────────────────────────────────────
      const [tab, setTab] = useState('log');
      const [toast, setToast] = useState(null);
      // CGM runtime state (not persisted)
      const [cgmStatus, setCgmStatus] = useState('idle'); // idle|polling|live|stale|error
      const [cgmReading, setCgmReading] = useState(null); // latest reading object
      const [cgmHistory, setCgmHistory] = useState([]);   // last ~12 readings for mini-trend

      // ── Entry form state (one state var per form field) ───────────────────────────
      const [bg, setBg] = useState('');
      const [fs, setFs] = useState('');
      const [crbs, setCrbs] = useState('');
      const [entryTime, setEntryTime] = useState('');
      const [hr, setHr] = useState('');
      const [fat, setFat] = useState('');      // 2.1 fat grams
      const [protein, setProtein] = useState('');      // 2.1 protein grams
      const [mealType, setMealType] = useState(0);       // 2.2 meal type index
      const [fiberClass, setFiberClass] = useState(0);       // 2.2 fiber class index
      const [paiX, setPaiX] = useState(0);       // activity index
      const [slp, setSlp] = useState(0);       // 0=awake, 1=asleep
      const [sleepQ, setSleepQ] = useState(4);       // 0–4 quality
      const [stress, setStress] = useState(0);       // 0–3
      const [illness, setIllness] = useState(0);       // 0/1
      const [hydration, setHydration] = useState(0);       // 0/0.5/1
      const [travelDay, setTravelDay] = useState(0);       // 0/1 — 3.2 travel flag
      const [dawnEffect, setDawnEffect] = useState(0);     // 0/1 — manual dawn phenomenon flag
      const [alcoholLevel, setAlcoholLevel] = useState(0); // 0/0.5/1 — 4.1 alcohol
      const [stimulantLevel, setStimulantLevel] = useState(0); // 0/0.3/0.7/1 — 4.2 stimulants
      const [depressantLevel, setDepressantLevel] = useState(0); // 0/0.5/1 — 4.3 depressants
      const [nicotineLevel, setNicotineLevel] = useState(0); // 0/0.5/1 — 4.4 nicotine
      const [thcLevel, setThcLevel] = useState(0); // 0/0.5/1 — 4.5 THC
      const [siteIdx, setSiteIdx] = useState(0);       // 0=abdomen
      const [not, setNot] = useState('');

      // ── Persistence effects ───────────────────────────────────────────────────────
      useEffect(() => { localStorage.setItem(STORE_PROFILE, JSON.stringify(profile)); }, [profile]);
      useEffect(() => { localStorage.setItem(STORE_SIM, JSON.stringify(sim)); }, [sim]);
      useEffect(() => { localStorage.setItem(STORE_UI, JSON.stringify(ui)); }, [ui]);
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', ui.theme || 'dark');
      }, [ui.theme]);
      useEffect(() => { localStorage.setItem(STORE_LOGS, JSON.stringify(logs)); }, [logs]);
      useEffect(() => { localStorage.setItem(STORE_CGM, JSON.stringify(cgmCfg)); }, [cgmCfg]);
      useEffect(() => {
        const h = () => { if (logs.length > 0) dlCSV(logs); };
        window.addEventListener('beforeunload', h);
        return () => window.removeEventListener('beforeunload', h);
      }, [logs]);

      // ── CGM polling effect ────────────────────────────────────────────────────────
      useEffect(() => {
        if (!cgmCfg.enabled || !cgmCfg.url) { setCgmStatus('idle'); return; }

        async function poll() {
          setCgmStatus('polling');
          try {
            const reading = await fetchNSLatest(cgmCfg);
            setCgmReading(reading);
            // Stale if reading is >15 min old
            const ageMin = (Date.now() - reading.mills) / 60_000;
            setCgmStatus(ageMin > 15 ? 'stale' : 'live');
            // Auto-fill BG field if enabled and field is empty
            if (cgmCfg.autoFill) setBg(prev => prev === '' ? String(reading.sgv) : prev);
            // Fetch history for mini-trend (non-fatal)
            fetchNSHistory(cgmCfg, 12).then(h => setCgmHistory(h)).catch(() => { });
          } catch (err) {
            setCgmStatus('error');
          }
        }

        poll(); // immediate first fetch
        const intervalMs = Math.max(1, cgmCfg.pollMins) * 60_000;
        const id = setInterval(poll, intervalMs);
        return () => clearInterval(id);
      }, [cgmCfg.enabled, cgmCfg.url, cgmCfg.authMethod, cgmCfg.apiSecret, cgmCfg.token, cgmCfg.pollMins, cgmCfg.autoFill]);

      const showT = (msg, type = 'ok') => setToast({ msg, type, id: Date.now() });

      // ── Derived physiologic state (memoised) ──────────────────────────────────────
      const sv = useMemo(() => computeStateVars(logs, profile, sim), [logs, profile, sim]);
      const pkState = useMemo(() => reconstructPK(logs, profile, sim), [logs, profile, sim]);
      const mealState = useMemo(() => reconstructMealState(logs, profile, sim), [logs, profile, sim]);
      const timeHour = useMemo(() => new Date().getHours() + new Date().getMinutes() / 60, []);

      const hrNum = safeNum(hr, profile.HR_ref);
      const paNum = ACTIVITY_LEVELS[paiX].mets;
      const effBgNum = safeNum(fs) || safeNum(bg) || profile.targetBG;

      // Injection site — per-dose factor derived from siteIdx and current profile multipliers.
      // NOTE: site does NOT feed into inp / calcKabs — it is per-dose, not a continuous modifier.
      // It goes into makeLogEntry and is used by reconstructPK and iobForDose.
      const siteName = INJECTION_SITES[siteIdx].label;
      const siteMultiplier = profile[INJECTION_SITES[siteIdx].profileKey];

      // Canonical input object — what the model functions receive.
      // Fat, protein, mealType, fiberClass are included so calcKabs can apply
      // meal-speed factors and computeModifiers can show Meal Type / Fiber bars.
      const inp = useMemo(() => ({
        bmi: profile.bmi,
        hr: hrNum,
        pa: paNum,
        sleep: slp,
        sleepQ: sleepQ,
        stress: stress,
        illness: illness,
        hydration: hydration,
        travelDay,
        alcoholLevel,                          // 4.1 — flows into calcSeff and projection
        stimulantLevel,                        // 4.2
        depressantLevel,                       // 4.3
        nicotineLevel,                         // 4.4
        thcLevel,                              // 4.5
        dawnEffect,                            // manual dawn phenomenon flag
        bg: effBgNum,
        timeHour,
        carbs: safeNum(crbs, 0),
        fat_g: safeNum(fat, 0),
        protein_g: safeNum(protein, 0),
        mealType,
        fiberClass,
      }), [profile.bmi, hrNum, paNum, slp, sleepQ, stress, illness, hydration, travelDay,
        alcoholLevel, stimulantLevel, depressantLevel, nicotineLevel, thcLevel, dawnEffect,
        effBgNum, timeHour, crbs, fat, protein, mealType, fiberClass]);

      const liveMod = useMemo(() => computeModifiers(inp, sv, profile, sim, { pkState, mealState }), [inp, sv, profile, sim, pkState, mealState]);
      const bgZone = (effBgNum > 0 && effBgNum !== profile.targetBG) ? zone(effBgNum, profile) : null;

      // ── PK model state (BloodGlucoseInsulinModel) ─────────────────────────────
      // Rebuilt whenever logs, profile, sim, or the live modifier snapshot changes.
      // effectiveSubqIob = physically-grounded IOB credit used for dose correction.
      const pkModelState = useMemo(() => {
        const model = buildPkModel(logs, profile, sim);
        model.setSensitivityFactors(Date.now(), mapModifiersToSensFactors(liveMod));
        return model.getState();
      }, [logs, profile, sim, liveMod]);

      const pkCorrRec = useMemo(() => {
        if (!effBgNum || effBgNum <= 0) return null;
        const model = buildPkModel(logs, profile, sim);
        model.setSensitivityFactors(Date.now(), mapModifiersToSensFactors(liveMod));
        return model.getCorrectionRecommendation(effBgNum, Date.now(), profile.targetBG, 'effectiveSubq');
      }, [logs, profile, sim, liveMod, effBgNum]);
      const doseRes = useMemo(() => {
        if (isNaN(effBgNum) || effBgNum <= 0) return null;
        return calcDose(effBgNum, safeNum(crbs), sv, inp, profile, sim, pkCorrRec);
      }, [effBgNum, crbs, sv, inp, profile, sim, pkCorrRec]);

      // ── IOB (polled every 30 s) ───────────────────────────────────────────────────
      const [iobList, setIobList] = useState([]);
      const [totalIOB, setTIOB] = useState(0);
      useEffect(() => {
        const run = () => {
          const list = logs.filter(l => l.insulinDose > 0)
            .map(l => ({ ...l, rem: iobForDose(l, profile, sim) }))
            .filter(l => l.rem > 0);
          setIobList(list);
          setTIOB(Math.round(list.reduce((a, l) => a + l.rem, 0) * 100) / 100);
        };
        run();
        const id = setInterval(run, 30_000);
        return () => clearInterval(id);
      }, [logs, profile, sim]);

      // ── Forward projection ────────────────────────────────────────────────────────
      const { pts: projection, U_scalar: projUScalar } = useMemo(() => {
        const startG = effBgNum !== profile.targetBG ? effBgNum : (logs[0]?.bloodSugar || profile.targetBG);
        return simulateProjection(startG, pkState, sv, inp, profile, sim, 4, mealState);
      }, [effBgNum, pkState, sv, inp, profile, sim, logs, mealState]);

      // ── Event handlers ────────────────────────────────────────────────────────────
      const handleLog = () => {
        const bgV = safeNum(bg, null);
        const fsV = safeNum(fs, null);
        const effBg = fsV || bgV;
        if (!effBg || effBg <= 0) { showT('Enter a valid blood sugar reading', 'err'); return; }
        const timestampIso = localInputToISO(entryTime);
        if (!timestampIso) { showT('Enter a valid entry time', 'err'); return; }
        const cV = safeNum(crbs, 0);
        const fatV = safeNum(fat, 0);
        const proteinV = safeNum(protein, 0);
        const dose = doseRes || calcDose(effBg, cV, sv, inp, profile, sim, pkCorrRec);
        const entry = makeLogEntry({
          bgV, fsV, cV, hrNum, paNum, slp, sleepQ, stress, illness, hydration,
          site: INJECTION_SITES[siteIdx].profileKey.replace('siteMult_', ''),
          siteMultiplier,
          fatV, proteinV, mealType, fiberClass,
          travelDay, alcoholLevel,
          stimulantLevel, depressantLevel, nicotineLevel, thcLevel,
          timestampIso,
          not,
        }, dose, liveMod);
        setLogs(prev => [entry, ...prev]);
        setBg(''); setFs(''); setCrbs(''); setEntryTime(''); setHr(''); setFat(''); setProtein(''); setNot('');
        showT(`Logged ${dose.total}u · sensitivity ${dose.seffDose} mg/dL/u`);
      };

      const handleCSV = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
          try {
            const imp = fromCSV(ev.target.result);
            if (!imp.length) { showT('No valid records found', 'err'); return; }
            setLogs(prev => {
              const seen = new Set(prev.map(l => l.timestamp));
              return [...imp.filter(l => !seen.has(l.timestamp)), ...prev]
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            });
            showT(`Imported ${imp.length} records`);
          } catch { showT('Failed to parse CSV', 'err'); }
        };
        r.readAsText(f); e.target.value = '';
      };

      const handleDelete = id => setLogs(prev => prev.filter(x => x.id !== id));

      const projEnd = projection.at(-1);
      const projBgEnd = projEnd?.G;

      // ── Render ────────────────────────────────────────────────────────────────────
      return (
        <div className={`app${ui.simpleMode ? ' simple' : ''}`}>

          {/* Header */}
          <div className="hdr">
            <div className="hl">
              <div className="logo">💉</div>
              <div>
                <div className="at">InsulinAbacus</div>
                <div className="as">Insulin Action Model</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
              {/* CGM badge — only when enabled */}
              {cgmCfg.enabled && cgmCfg.url && (
                <div className={`cgm-badge ${cgmStatus === 'live' ? 'live' : cgmStatus === 'stale' ? 'stale' : cgmStatus === 'error' ? 'error' : 'polling'}`}
                  title={cgmReading ? `${deviceLabel(cgmReading.device)} · ${Math.round((Date.now() - cgmReading.mills) / 60_000)} min ago` : 'Waiting for CGM data…'}>
                  <span className="cgm-dot" style={{ background: cgmStatus === 'live' ? '#00d4ff' : cgmStatus === 'stale' ? '#fbbf24' : cgmStatus === 'error' ? '#ff6b6b' : '#64748b' }} />
                  {cgmReading ? (
                    <>
                      <span style={{ color: cgmStatus === 'live' ? 'var(--ac)' : cgmStatus === 'stale' ? 'var(--y)' : 'var(--td)', fontWeight: 600 }}>{cgmReading.sgv}</span>
                      <span style={{ color: NS_ARROW_CLR[cgmReading.direction] || 'var(--td)' }}>{NS_ARROW[cgmReading.direction] || '→'}</span>
                      {cgmHistory.length > 1 && (
                        <div className="cgm-trend-bar-wrap">
                          {cgmHistory.slice(-8).map((pt, i) => {
                            const lo = Math.min(...cgmHistory.slice(-8).map(x => x.sgv));
                            const hi = Math.max(...cgmHistory.slice(-8).map(x => x.sgv));
                            const range = Math.max(hi - lo, 20);
                            const h = Math.round(4 + ((pt.sgv - lo) / range) * 20);
                            return <div key={i} className="cgm-trend-bar" style={{ width: '4px', height: `${h}px`, background: bgColor(pt.sgv) }} />;
                          })}
                        </div>
                      )}
                    </>
                  ) : (
                    <span style={{ color: 'var(--td)' }}>📡 {cgmStatus === 'polling' ? 'Connecting…' : cgmStatus === 'error' ? 'Error' : '—'}</span>
                  )}
                </div>
              )}
              <button
                className="mode-btn"
                onClick={() => setUi(x => {
                  const next = { dark: 'light', light: 'high-vis', 'high-vis': 'dark' };
                  return { ...x, theme: next[x.theme || 'dark'] };
                })}
                title="Cycle display theme: Dark → Light → High Visibility"
              >
                {ui.theme === 'light' ? '☀ Light' : ui.theme === 'high-vis' ? '🔆 Hi-Vis' : '🌙 Dark'}
              </button>
              <button
                className={`mode-btn${ui.simpleMode ? ' is-simple' : ''}`}
                onClick={() => setUi(x => ({ ...x, simpleMode: !x.simpleMode }))}
                title={ui.simpleMode ? 'Switch to advanced view — show all fields' : 'Switch to simple view — BG, Carbs, HR only'}
              >
                {ui.simpleMode ? '⚙ Advanced' : '◻ Simple'}
              </button>
              <button className="btn bg_ bsm"
                onClick={() => { if (logs.length) dlCSV(logs); else showT('No data', 'err'); }}>
                ⬇ Export CSV
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div className="tabs">
            {[
              ['log', '📋 Log'],
              ['iob', '⏱ Active Insulin'],
              ['history', '📊 Logs & Charts'],
              ...(ui.showAdvancedModifiers ? [['advanced', '🧪 Advanced']] : []),
              ['settings', '⚙️ Settings'],
            ].map(([id, lbl]) => (
              <button key={id} className={`tab ${tab === id ? 'on' : ''}`}
                style={id === 'advanced' ? { color: tab === 'advanced' ? 'var(--o)' : undefined } : {}}
                onClick={() => setTab(id)}>{lbl}</button>
            ))}
          </div>

          {/* ══════ LOG TAB ══════════════════════════════════════════════════════════ */}
          {tab === 'log' && (<>
            <EntryForm
              bg={bg} setBg={setBg}
              fs={fs} setFs={setFs}
              crbs={crbs} setCrbs={setCrbs}
              hr={hr} setHr={setHr}
              fat={fat} setFat={setFat}
              protein={protein} setProtein={setProtein}
              mealType={mealType} setMealType={setMealType}
              fiberClass={fiberClass} setFiberClass={setFiberClass}
              paiX={paiX} setPaiX={setPaiX}
              slp={slp} setSlp={setSlp}
              sleepQ={sleepQ} setSleepQ={setSleepQ}
              stress={stress} setStress={setStress}
              illness={illness} setIllness={setIllness}
              hydration={hydration} setHydration={setHydration}
              travelDay={travelDay} setTravelDay={setTravelDay}
              dawnEffect={dawnEffect} setDawnEffect={setDawnEffect}
              siteIdx={siteIdx} setSiteIdx={setSiteIdx}
              siteName={siteName} siteMultiplier={siteMultiplier}
              entryTime={entryTime} setEntryTime={setEntryTime}
              not={not} setNot={setNot}
              dualBg={ui.dualBg} HR_ref={profile.HR_ref}
              targetBG={profile.targetBG}
              bgZone={bgZone} effBgNum={effBgNum}
              doseRes={doseRes} liveMod={liveMod} totalIOB={totalIOB}
              cgmReading={cgmReading}
              onLog={handleLog}
            />

            {logs.slice(0, 3).length > 0 && (
              <div className="card">
                <div className="ct">📌 Recent</div>
                <table className="lt">
                  <thead>
                    <tr>
                      <th>Time</th><th>BG</th><th>Carbs</th><th>Dose</th>
                      <th title="Insulin sensitivity as % of baseline">Sensitivity %</th>
                      <th title="Absorption speed relative to baseline">Absorption ×</th>
                      <th>PA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {logs.slice(0, 3).map(l => (
                      <tr key={l.id}>
                        <td>{fmtT(l.timestamp)}</td>
                        <td>
                          {l.bloodSugar != null ? (
                            <span className={`tag t${zone(l.bloodSugar, profile)[0]}`}
                              title={l.fingerstick ? 'Fingerstick' : 'CGM'}>
                              {l.fingerstick ? '🩸 ' : (l.cgm ? '📡 ' : '')}{l.bloodSugar}
                            </span>
                          ) : '—'}
                        </td>
                        <td>{l.carbs ? `${l.carbs}g` : '—'}</td>
                        <td style={{ color: 'var(--ac)' }}>{l.insulinDose ? `${l.insulinDose}u` : '—'}</td>
                        <td style={{ color: 'var(--o)' }}>{l.seff_mult != null ? `${Math.round(l.seff_mult * 100)}%` : '—'}</td>
                        <td style={{ color: l.kabs_rel ? modColor(l.kabs_rel) : 'var(--td)' }}>{l.kabs_rel ? `${l.kabs_rel}×` : '—'}</td>
                        <td style={{ color: 'var(--td)' }}>{l.pa != null ? `${l.pa}M` : '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </>)}

          {/* ══════ ACTIVE INSULIN TAB ═══════════════════════════════════════════════ */}
          {tab === 'iob' && (<>
            <div className="card">
              <div className="ct">⏱ Active Insulin</div>
              <div className="iobh">
                <div>
                  <div className="iobv">{totalIOB}</div>
                  <div className="iobu">units still working in your body</div>
                </div>
                <div className="iobb">
                  <div className="iobbl"><span>Active</span><span>adjusted duration</span></div>
                  <div className="iobbt">
                    <div className="iobbf" style={{ width: `${Math.min(100, (totalIOB / Math.max(1, iobList.reduce((a, l) => a + l.insulinDose, 0))) * 100)}%` }} />
                  </div>
                  <div className="note">Duration changes with activity — faster if you're active, slower if resting.</div>
                </div>
              </div>
              {iobList.length > 0 && (<>
                <div className="div" />
                <div className="ct">Doses still working</div>
                <div className="iobd">
                  {iobList.map(l => {
                    const kr = safeNum(l.kabs_rel, 1);
                    const ed = Math.round((profile.insulinDur / Math.max(0.3, kr)) * 10) / 10;
                    const el = (Date.now() - new Date(l.timestamp).getTime()) / 3_600_000;
                    return (
                      <div className="iobdr" key={l.id}>
                        <span>{fmtDT(l.timestamp)}</span>
                        <span style={{ color: 'var(--td)' }}>{l.insulinDose}u · {ed}h eff.</span>
                        <span style={{ color: 'var(--ac)' }}>{l.rem}u ({Math.max(0, Math.round((1 - el / ed) * 100))}%)</span>
                      </div>
                    );
                  })}
                </div>
              </>)}
              {!iobList.length && <div className="es" style={{ paddingTop: '22px' }}><div className="ei">✅</div>No active insulin</div>}
            </div>

            {/* ── PK Model state card ── */}
            <div className="card">
              <div className="ct">🔬 Two-Compartment PK State</div>
              <div className="note" style={{ marginBottom: '12px' }}>
                Nonlinear saturable absorption model (Michaelis-Menten). Separates depot (subcutaneous) from plasma insulin for more accurate IOB credit calculation.
              </div>
              <div className="svg" style={{ gridTemplateColumns: 'repeat(2,1fr)' }}>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--p)' }}>{pkModelState.physical.depot.toFixed(2)}</div>
                  <div className="svl">Depot D (U)</div>
                  <div className="note" style={{ marginTop: '4px' }}>Subcutaneous<br />still absorbing</div>
                  <div className="svb"><div className="svbf" style={{ width: `${Math.min(100, (pkModelState.physical.depot / 10) * 100)}%`, background: 'var(--p)' }} /></div>
                </div>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--ac)' }}>{pkModelState.physical.plasma.toFixed(2)}</div>
                  <div className="svl">Plasma P (U)</div>
                  <div className="note" style={{ marginTop: '4px' }}>Circulating<br />active insulin</div>
                  <div className="svb"><div className="svbf" style={{ width: `${Math.min(100, (pkModelState.physical.plasma / 10) * 100)}%`, background: 'var(--ac)' }} /></div>
                </div>
              </div>
              <div className="div" />
              <div className="svg" style={{ gridTemplateColumns: 'repeat(2,1fr)', marginTop: '4px' }}>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--ac)', fontSize: '18px' }}>{pkModelState.clinical.effectiveSubqIob.toFixed(2)}u</div>
                  <div className="svl">Effective IOB</div>
                  <div className="note" style={{ marginTop: '4px' }}>Future-equivalent<br />subQ credit</div>
                </div>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--td)', fontSize: '18px' }}>{pkModelState.clinical.weightedIobCredit.toFixed(2)}u</div>
                  <div className="svl">Weighted IOB</div>
                  <div className="note" style={{ marginTop: '4px' }}>Heuristic<br />comparison</div>
                </div>
              </div>
              <div className="div" />
              <div style={{ display: 'flex', gap: '14px', flexWrap: 'wrap', padding: '9px 0' }}>
                <span className="msi">
                  S<sub>active</sub>: <strong style={{ color: pkModelState.clinical.S_active < 0.8 ? 'var(--r)' : pkModelState.clinical.S_active > 1.2 ? 'var(--g)' : 'var(--tx)' }}>
                    {pkModelState.clinical.S_active.toFixed(2)}×
                  </strong>
                  <span style={{ color: 'var(--tm)', fontSize: '10px' }}> (now)</span>
                </span>
                <span className="msi">
                  S<sub>future</sub>: <strong style={{ color: 'var(--ac)' }}>{pkModelState.clinical.S_future.toFixed(2)}×</strong>
                  <span style={{ color: 'var(--tm)', fontSize: '10px' }}> (circadian baseline)</span>
                </span>
              </div>
              <div className="note">
                <strong style={{ color: 'var(--ac)' }}>Effective IOB</strong> = D + P × (S_active / S_future) — adjusts plasma credit for the gap between current and expected future sensitivity. Used to subtract from correction dose.
                &nbsp;<strong style={{ color: 'var(--td)' }}>Weighted IOB</strong> = {`(${pkModelState.physical.depot.toFixed(2)} × 0.4 + ${pkModelState.physical.plasma.toFixed(2)} × 1.0) × S_active`} — heuristic comparison.
              </div>
            </div>

            {/* Body memory */}
            <div className="card">
              <div className="ct">🔬 Body Memory (State Variables)</div>
              <div className="svg">
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--g)' }}>{sv.E_ex.toFixed(2)}</div>
                  <div className="svl">Exercise Effect</div>
                  <div className="note" style={{ marginTop: '4px' }}>From recent activity<br />Fades over ~{sim.tau_ex}h</div>
                  <div className="svb"><div className="svbf" style={{ width: `${Math.min(100, (sv.E_ex / 8) * 100)}%`, background: 'var(--g)' }} /></div>
                </div>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--r)' }}>{sv.L.toFixed(1)}</div>
                  <div className="svl">Low BG Memory</div>
                  <div className="note" style={{ marginTop: '4px' }}>From recent lows<br />Fades over ~{sim.tau_low}h</div>
                  <div className="svb"><div className="svbf" style={{ width: `${Math.min(100, (sv.L / 50) * 100)}%`, background: 'var(--r)' }} /></div>
                </div>
                <div className="svc">
                  <div className="svv" style={{ color: 'var(--y)' }}>{sv.H.toFixed(1)}</div>
                  <div className="svl">High BG Memory</div>
                  <div className="note" style={{ marginTop: '4px' }}>From recent highs<br />Fades over ~{sim.tau_high}h</div>
                  <div className="svb"><div className="svbf" style={{ width: `${Math.min(100, (sv.H / 100) * 100)}%`, background: 'var(--y)' }} /></div>
                </div>
              </div>
              <div className="note" style={{ marginTop: '6px' }}>
                These values are calculated from your recent entries and decay over time. They help the model account for how your body remembers past lows, highs, and exercise.
              </div>
            </div>

            {/* 4-hour forecast */}
            <div className="card">
              <div className="ct">
                📉 4-Hour BG Forecast
                {projUScalar != null && (() => {
                  const conf = projUScalar < 1.15 ? { label: 'High Confidence', c: 'var(--g)' }
                    : projUScalar < 1.4 ? { label: 'Good Confidence', c: 'var(--g)' }
                      : projUScalar < 1.7 ? { label: 'Fair Confidence', c: 'var(--y)' }
                        : projUScalar < 2.2 ? { label: 'Low Confidence', c: 'var(--o)' }
                          : { label: 'Very Low', c: 'var(--r)' };
                  return (
                    <span style={{
                      marginLeft: '10px', fontSize: '10px', fontFamily: 'var(--mono)',
                      padding: '2px 8px', borderRadius: '4px', border: `1px solid ${conf.c}44`,
                      background: `${conf.c}11`, color: conf.c,
                    }}>
                      🎯 {conf.label}
                    </span>
                  );
                })()}
              </div>
              <div className="note" style={{ marginBottom: '12px' }}>
                Estimated based on your active insulin, current sensitivity, and recent activity. The shaded band represents the ±90% uncertainty range — wider bands indicate less reliable predictions.
              </div>
              <div className="projg">
                {projection.filter((_, i) => i % 2 === 0 || i === projection.length - 1).map((pt, i) => (
                  <div className="projgi" key={i}
                    style={{ borderColor: bgColor(pt.G) + '44', background: bgColor(pt.G) + '0a' }}>
                    <div className="projgt" style={{ color: bgColor(pt.G) }}>{pt.G}</div>
                    {pt.u > 0 && (
                      <div style={{
                        fontSize: '9px', fontFamily: 'var(--mono)', letterSpacing: '.04em',
                        color: pt.u < 10 ? 'var(--g)' : pt.u < 22 ? 'var(--y)' : pt.u < 38 ? 'var(--o)' : 'var(--r)'
                      }}>
                        ±{pt.u}
                      </div>
                    )}
                    <div className="projgl">{pt.t === 0 ? 'Now' : `+${Math.round(pt.t * 60)}min`}<br />mg/dL</div>
                  </div>
                ))}
              </div>
              {projBgEnd != null && (
                <div style={{ marginTop: '10px', fontSize: '12px', color: 'var(--td)', fontFamily: 'var(--mono)' }}>
                  Projected in 4h: <strong style={{ color: bgColor(projBgEnd) }}>{projBgEnd} mg/dL</strong>
                  &nbsp; {projLabel(projBgEnd, profile)}
                  {(projection.at(-1)?.u ?? 0) > 0 && (
                    <span style={{
                      marginLeft: '8px',
                      color: (projection.at(-1).u < 22) ? 'var(--y)' : 'var(--o)',
                    }}>
                      ±{projection.at(-1).u} mg/dL band
                    </span>
                  )}
                </div>
              )}
            </div>

            {/* Current modifiers */}
            <div className="card">
              <div className="ct">📡 Current Modifiers</div>
              <ModPanel mod={liveMod} />
            </div>
          </>)}

          {/* ══════ LOGS & CHARTS TAB ════════════════════════════════════════════════ */}
          {tab === 'history' && (<>
            <div className="card">
              <div className="ct">📈 Blood Sugar, Insulin & Forecast</div>
              <ProjectionChart logs={logs} projection={projection} />
              <div className="note" style={{ marginTop: '8px' }}>
                Dashed line = prediction based on your current insulin and activity. Orange = sensitivity %. Purple bars = doses.
              </div>
            </div>
            <div className="card">
              <div className="ct">📋 Full Log</div>
              <div className="row" style={{ marginBottom: '11px' }}>
                <label className="btn bg_ bsm" style={{ cursor: 'pointer' }}>
                  ⬆ Import CSV
                  <input type="file" accept=".csv" style={{ display: 'none' }} onChange={handleCSV} />
                </label>
                <span style={{ fontSize: '11px', color: 'var(--td)' }}>{logs.length} entries</span>
                <div className="sp" />
                {logs.length > 0 && (
                  <button className="btn bd_ bsm"
                    onClick={() => { if (confirm('Clear all logs?')) { setLogs([]); showT('Logs cleared'); } }}>
                    🗑 Clear
                  </button>
                )}
              </div>
              <LogTable logs={logs} profile={profile} onDelete={handleDelete} />
            </div>
            <div className="card">
              <div className="ct">📂 Import From Device</div>
              <label className="upl">
                <div style={{ fontSize: '32px', marginBottom: '8px' }}>📁</div>
                <div style={{ fontSize: '13px', color: 'var(--td)' }}>
                  <strong style={{ color: 'var(--ac)' }}>Tap to open a CSV</strong> from your phone<br />
                  Previously saved logs are merged without duplicates
                </div>
                <input type="file" accept=".csv" style={{ display: 'none' }} onChange={handleCSV} />
              </label>
            </div>
          </>)}

          {/* ══════ ADVANCED DAILY MODIFIERS TAB ════════════════════════════════════ */}
          {tab === 'advanced' && (
            <AdvancedModifiersTab
              alcoholLevel={alcoholLevel} setAlcoholLevel={setAlcoholLevel}
              stimulantLevel={stimulantLevel} setStimulantLevel={setStimulantLevel}
              depressantLevel={depressantLevel} setDepressantLevel={setDepressantLevel}
              nicotineLevel={nicotineLevel} setNicotineLevel={setNicotineLevel}
              thcLevel={thcLevel} setThcLevel={setThcLevel}
              liveMod={liveMod}
            />
          )}

          {/* ══════ SETTINGS TAB ═════════════════════════════════════════════════════ */}
          {tab === 'settings' && (
            <SettingsPanel
              profile={profile} setProfile={setProfile}
              sim={sim} setSim={setSim}
              ui={ui} setUi={setUi}
              logs={logs} showT={showT}
              cgmCfg={cgmCfg} setCgmCfg={setCgmCfg}
            />
          )}

          {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
