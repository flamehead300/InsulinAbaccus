<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>InsulinAbacus · Insulin Action Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────────── */
    :root {
      --bg: #0a0e1a;
      --s1: #111827;
      --s2: #1a2235;
      --bd: #1e2d45;
      --ac: #00d4ff;
      --r: #ff6b6b;
      --g: #4ade80;
      --y: #fbbf24;
      --p: #a78bfa;
      --o: #fb923c;
      --tx: #e2e8f0;
      --td: #64748b;
      --tm: #334155;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --rad: 12px;
      --glow: 0 0 20px rgba(0, 212, 255, .15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 10%, rgba(0, 212, 255, .04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(255, 107, 107, .03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── Header ────────────────────────────────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 22px;
      border-bottom: 1px solid var(--bd);
      margin-bottom: 18px;
    }

    .hl {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--ac), #0077ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(0, 212, 255, .3);
    }

    .at {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .05em;
      color: var(--ac);
    }

    .as {
      font-size: 11px;
      color: var(--td);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Tabs ──────────────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rad);
      padding: 4px;
      margin-bottom: 18px;
    }

    .tab {
      flex: 1;
      padding: 9px 8px;
      border: none;
      background: none;
      color: var(--td);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }

    .tab.on {
      background: var(--s2);
      color: var(--ac);
      box-shadow: var(--glow);
    }

    .tab:hover:not(.on) {
      color: var(--tx);
    }

    /* ── Card ──────────────────────────────────────────────────────────────────── */
    .card {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rad);
      padding: 20px;
      margin-bottom: 14px;
    }

    .ct {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--td);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ct::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bd);
    }

    /* ── Form fields ───────────────────────────────────────────────────────────── */
    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media(max-width:520px) {

      .fg,
      .sg,
      .pag,
      .pal3,
      .pal4 {
        grid-template-columns: 1fr !important;
      }
    }

    .fi {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fi label {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--td);
      font-weight: 500;
    }

    .fi input,
    .fi select {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      color: var(--tx);
      font-family: var(--mono);
      font-size: 15px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
      -webkit-appearance: none;
    }

    .fi input:focus {
      border-color: var(--ac);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, .1);
    }

    .fi input::placeholder {
      color: var(--tm);
    }

    /* ── Button-group selectors (activity / stress / hydration) ────────────────── */
    .pal4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .pal3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .pab {
      padding: 7px 4px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
      color: var(--td);
      font-family: var(--sans);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      line-height: 1.4;
    }

    .pab i {
      font-size: 16px;
      display: block;
      margin-bottom: 2px;
      font-style: normal;
    }

    .pab.on {
      border-color: var(--ac);
      color: var(--ac);
      background: rgba(0, 212, 255, .08);
    }

    .pab.on-y {
      border-color: var(--y);
      color: var(--y);
      background: rgba(251, 191, 36, .08);
    }

    .pab.on-r {
      border-color: var(--r);
      color: var(--r);
      background: rgba(255, 107, 107, .08);
    }

    /* ── Toggle switches ───────────────────────────────────────────────────────── */
    .slp {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
      cursor: pointer;
      transition: all .2s;
    }

    .slp.on {
      border-color: var(--p);
      background: rgba(167, 139, 250, .08);
    }

    .slp.blue-on.on {
      border-color: var(--ac);
      background: rgba(0, 212, 255, .08);
    }

    .trk {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--bd);
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }

    .trk.on {
      background: var(--p);
    }

    .trk.blue-on.on {
      background: var(--ac);
    }

    .thm {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform .2s;
    }

    .trk.on .thm {
      transform: translateX(16px);
    }

    .slplbl {
      font-size: 13px;
      color: var(--td);
    }

    .slp.on .slplbl {
      color: var(--p);
    }

    .slp.blue-on.on .slplbl {
      color: var(--ac);
    }

    /* ── Sleep quality slider ──────────────────────────────────────────────────── */
    .sq-wrap {
      margin-top: 8px;
      padding: 9px 13px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      background: var(--s2);
    }

    .sq-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sq-row input[type=range] {
      flex: 1;
      accent-color: var(--p);
    }

    .sq-lbl {
      font-size: 11px;
      color: var(--p);
      font-family: var(--mono);
      min-width: 44px;
      text-align: right;
    }

    /* ── BG Zone banner ────────────────────────────────────────────────────────── */
    .bgz {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid var(--bd);
      margin-top: 11px;
    }

    .bgz.low {
      border-color: #ff6b6b44;
      background: #ff6b6b0a;
    }

    .bgz.ok {
      border-color: #4ade8044;
      background: #4ade800a;
    }

    .bgz.high {
      border-color: #fbbf2444;
      background: #fbbf240a;
    }

    .bgdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bgz.low .bgdot {
      background: var(--r);
    }

    .bgz.ok .bgdot {
      background: var(--g);
    }

    .bgz.high .bgdot {
      background: var(--y);
    }

    .bgztxt {
      font-size: 12px;
      color: var(--td);
      flex: 1;
    }

    .bgzv {
      font-family: var(--mono);
      color: var(--tx);
    }

    /* ── Dose result box ───────────────────────────────────────────────────────── */
    .rbox {
      background: var(--s2);
      border: 1px solid var(--ac);
      border-radius: var(--rad);
      padding: 15px 18px;
      margin: 13px 0;
      box-shadow: var(--glow);
    }

    .rtop {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .rv {
      font-family: var(--mono);
      font-size: 40px;
      color: var(--ac);
      text-shadow: 0 0 20px rgba(0, 212, 255, .4);
      line-height: 1;
    }

    .rl {
      font-size: 11px;
      color: var(--td);
      margin-bottom: 3px;
    }

    .rb {
      flex: 1;
      font-size: 11px;
      color: var(--td);
      line-height: 2;
      font-family: var(--mono);
    }

    .rmn {
      font-size: 10px;
      color: var(--tm);
      font-family: var(--mono);
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--bd);
    }

    /* ── Modifier panel ────────────────────────────────────────────────────────── */
    .mp .mst {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--tm);
      margin: 9px 0 5px;
    }

    .mr {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 3px 0;
    }

    .mlbl {
      font-size: 10px;
      color: var(--td);
      min-width: 96px;
      font-family: var(--mono);
    }

    .mbar {
      flex: 1;
      position: relative;
    }

    .mbg {
      height: 5px;
      background: var(--bg);
      border-radius: 3px;
      border: 1px solid var(--bd);
      position: relative;
      overflow: visible;
    }

    .mfill {
      height: 100%;
      border-radius: 3px;
      transition: width .35s ease;
    }

    .mctr {
      position: absolute;
      left: 50%;
      top: -2px;
      width: 1px;
      height: 9px;
      background: rgba(255, 255, 255, .12);
      z-index: 1;
      pointer-events: none;
    }

    .mv {
      font-family: var(--mono);
      font-size: 10px;
      min-width: 32px;
      text-align: right;
    }

    .msum {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      padding: 9px 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--bd);
      margin-bottom: 8px;
    }

    .msi {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--td);
    }

    .msi strong {
      color: var(--tx);
    }

    /* ── Active Insulin (IOB) ──────────────────────────────────────────────────── */
    .iobh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .iobv {
      font-family: var(--mono);
      font-size: 50px;
      line-height: 1;
      color: var(--ac);
      text-shadow: 0 0 30px rgba(0, 212, 255, .4);
    }

    .iobu {
      font-size: 12px;
      color: var(--td);
    }

    .iobb {
      flex: 1;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .iobbl {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--td);
      font-family: var(--mono);
    }

    .iobbt {
      height: 8px;
      background: var(--s2);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--bd);
    }

    .iobbf {
      height: 100%;
      background: linear-gradient(90deg, var(--ac), #0077ff);
      border-radius: 4px;
      transition: width .6s;
      box-shadow: 0 0 8px rgba(0, 212, 255, .5);
    }

    .iobd {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 150px;
      overflow-y: auto;
    }

    .iobdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--td);
      font-family: var(--mono);
      padding: 6px 10px;
      background: var(--s2);
      border-radius: 6px;
      border: 1px solid var(--bd);
    }

    /* ── Body memory state variables ───────────────────────────────────────────── */
    .svg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0;
    }

    .svc {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 11px;
      text-align: center;
    }

    .svv {
      font-family: var(--mono);
      font-size: 22px;
      margin-bottom: 2px;
    }

    .svl {
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--td);
    }

    .svb {
      height: 4px;
      border-radius: 2px;
      margin-top: 7px;
      background: var(--bd);
    }

    .svbf {
      height: 100%;
      border-radius: 2px;
      transition: width .5s;
    }

    /* ── Forecast tiles ────────────────────────────────────────────────────────── */
    .projg {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .projgi {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--bd);
      background: var(--s2);
      min-width: 80px;
    }

    .projgt {
      font-family: var(--mono);
      font-size: 20px;
    }

    .projgl {
      font-size: 10px;
      color: var(--td);
      text-align: center;
    }

    /* ── Chart ─────────────────────────────────────────────────────────────────── */
    .chwrap {
      position: relative;
      height: 260px;
    }

    /* ── Log table ─────────────────────────────────────────────────────────────── */
    .lt {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .lt th {
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--td);
      padding: 7px 10px;
      border-bottom: 1px solid var(--bd);
    }

    .lt td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--bd);
      color: var(--tx);
      font-family: var(--mono);
      font-size: 11px;
    }

    .lt tr:last-child td {
      border-bottom: none;
    }

    .lt tr:hover td {
      background: var(--s2);
    }

    .lscroll {
      max-height: 300px;
      overflow-y: auto;
    }

    /* ── Settings ──────────────────────────────────────────────────────────────── */
    .sg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sst {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ac);
      margin: 16px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--bd);
    }

    .avt {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--td);
      padding: 7px 0;
      user-select: none;
    }

    .avt:hover {
      color: var(--tx);
    }

    /* ── BPM Monitor modal ──────────────────────────────────────────────────────── */
    .bpm-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(10, 14, 26, .75);
      backdrop-filter: blur(4px);
      animation: tIn .2s ease;
    }

    .bpm-modal {
      background: #111827;
      border: 1px solid var(--bd);
      border-radius: 18px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
    }

    .bpm-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--bd);
    }

    .bpm-hdr-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: .06em;
      color: var(--tx);
    }

    .bpm-close {
      background: none;
      border: none;
      color: var(--td);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      transition: color .15s;
    }

    .bpm-close:hover {
      color: var(--tx);
    }

    .bpm-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }

    .bpm-info {
      background: rgba(0, 212, 255, .06);
      border: 1px solid rgba(0, 212, 255, .15);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 12px;
      color: var(--td);
      line-height: 1.8;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bpm-info-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .bpm-info-icon {
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--ac);
    }

    .bpm-countdown-num {
      font-family: var(--mono);
      font-size: 84px;
      font-weight: 900;
      color: var(--r);
      line-height: 1;
      animation: bpmPulse 1s ease-in-out infinite;
    }

    .bpm-countdown-lbl {
      font-size: 13px;
      color: var(--td);
      margin-bottom: 16px;
    }

    .bpm-rec-stats {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
    }

    .bpm-stat {
      font-size: 12px;
      font-family: var(--mono);
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--s2);
      border: 1px solid var(--bd);
    }

    .bpm-stat.beats {
      color: var(--r);
      border-color: rgba(255, 107, 107, .3);
      background: rgba(255, 107, 107, .07);
    }

    .bpm-heart-btn {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: rgba(255, 107, 107, .1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--r);
      transition: transform .1s ease, background .1s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .bpm-heart-btn:active,
    .bpm-heart-btn.pop {
      transform: scale(.87);
      background: rgba(255, 107, 107, .25);
    }

    .bpm-heart-btn svg {
      width: 64px;
      height: 64px;
      fill: currentColor;
    }

    .bpm-tap-hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--tm);
    }

    .bpm-result-lbl {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--td);
      margin-bottom: 8px;
    }

    .bpm-result-val {
      font-family: var(--mono);
      font-size: 64px;
      font-weight: 900;
      color: var(--ac);
      text-shadow: 0 0 30px rgba(0, 212, 255, .4);
      line-height: 1;
    }

    .bpm-result-unit {
      font-size: 20px;
      color: var(--td);
      margin-left: 4px;
    }

    .bpm-result-note {
      background: rgba(74, 222, 128, .08);

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════════════════════
    //  A.  CONSTANTS / DEFAULTS
    //
    //  Three flat objects — profile (slower-moving clinical/demographic settings),
    //  sim params (physiologic coefficients), and ui prefs (display toggles).
    //  Each new feature adds keys here first, then flows through the vertical slice.
    // ═══════════════════════════════════════════════════════════════════════════════

    // Clinical and demographic profile — things a care team would adjust.
    const DEFAULT_PROFILE = {
      // Dosing
      carbRatio: 12,    // g carbs per unit of insulin
      corrFactor: 50,    // mg/dL blood sugar drop per unit (correction factor)
      targetBG: 100,    // target blood sugar, mg/dL
      insulinDur: 4,    // base insulin duration, hours
      lowBG: 70,    // low threshold, mg/dL
      highBG: 180,    // high threshold, mg/dL
      basalRate: 0.8,    // basal insulin rate, units/hr (pump or long-acting background)
      // Injection site absorption multipliers — per-dose, stored per log entry.
      // Abdomen = fastest; thigh = slowest due to lower local blood flow.
      siteMult_abdomen: 1.00,
      siteMult_thigh: 0.75,
      siteMult_arm: 0.85,
      siteMult_other: 0.90,
      // Demographics (affect η₀ baseline sensitivity)
      bmi: 22,    // body mass index, kg/m²
      BMI_ref: 22,    // reference BMI for penalty calculations
      HR_ref: 70,    // reference resting heart rate, bpm
      age: 35,    // years — older age gradually reduces insulin sensitivity
      sex: 'other',// 'M' | 'F' | 'other' — sex-based sensitivity offset
    };

    // Physiologic model coefficients — advanced / for clinicians.
    const DEFAULT_SIM_PARAMS = {
      // ── Absorption (k_abs) ─────────────────────────────────────────────────────
      k_abs0: 0.80,   // hr⁻¹  baseline absorption rate constant
      alpha: 0.05,   // BMI absorption penalty (how much extra BMI slows absorption)
      beta: 0.50,   // HR boost coefficient (faster pulse → faster absorption)
      beta_max: 0.60,   // ceiling on the HR effect (prevents runaway)
      gamma: 0.08,   // activity boost per MET
      delta: 0.30,   // sleep absorption slowdown (0 = no effect, 1 = maximum)
      // ── Clearance (PK) ────────────────────────────────────────────────────────
      k_clear: 0.50,   // hr⁻¹  plasma clearance rate
      // ── Sensitivity (S_eff) ───────────────────────────────────────────────────
      theta: 0.07,   // BMI sensitivity penalty
      sigma_bg: 80,     // mg/dL  width of the BG→sensitivity Gaussian curve
      kappa: 0.05,   // exercise sensitivity boost per MET
      d_dawn: 0.30,   // dawn effect strength (0–1) — applied when user flags dawn phenomenon
      rho: 0.05,   // how much a recent low blunts insulin response
      sigma_h: 0.025,  // how much a recent high reduces insulin response
      eta: 0.20,   // sleep sensitivity reduction (0 = none, 1 = maximum)
      eta_q: 0.50,   // sleep quality amplifier (poor quality makes eta worse)
      // ── Age & sex baseline adjustments (3.1) ──────────────────────────────────
      age_penalty: 0.07, // sensitivity lost per decade over age 30 (0–1 scale)
      sex_factor_F: 0.95, // baseline sensitivity multiplier for female sex (< 1 = more sensitive)
      // ── Travel / routine disruption (3.2) ─────────────────────────────────────
      travel_sens_penalty: 0.20, // fractional sensitivity reduction during travel/disruption
      travel_uncertainty: 0.30, // uncertainty band growth rate (mg/dL per hour of projection)
      // ── Alcohol (4.1) ─────────────────────────────────────────────────────────
      alcohol_hep_suppress: 0.30, // fraction by which alcohol suppresses hepatic glucose output
      alcohol_gastric_slow: 0.20, // fraction by which alcohol slows gastric emptying rate
      alcohol_sens_effect: 0.10, // direct sensitivity perturbation (slight reduction at level 1)
      // ── Stimulants (4.2) ──────────────────────────────────────────────────────
      stim_sens_penalty: 0.20, // adenosine-antagonism / epinephrine → reduces insulin sensitivity
      stim_hep_boost: 0.10, // glycogenolysis from mild adrenaline → transient G_prod increase
      // ── Depressants (4.3) ─────────────────────────────────────────────────────
      depress_sleep_amplify: 0.30, // amplifies sleep-related sensitivity reduction
      depress_gastric_slow: 0.15, // CNS/smooth-muscle relaxation slows gastric emptying
      // ── Nicotine (4.4) ────────────────────────────────────────────────────────
      nicotine_util_penalty: 0.15, // vasoconstriction → impairs peripheral glucose disposal
      // ── THC / Cannabis (4.5) ──────────────────────────────────────────────────
      thc_gastric_slow: 0.25, // CB1 receptor activation in ENS → slows gastric motility
      // ── Stress & illness (NEW — Tier 1) ───────────────────────────────────────
      h_U: 0.15,   // stress → counterregulatory pressure on sensitivity
      h_K: 0.25,   // illness → counterregulatory pressure on sensitivity
      // ── Hydration (NEW — Tier 1) ──────────────────────────────────────────────
      h_hd: 0.08,   // dehydration → reduced absorption reliability
      // ── Glucose dynamics (projection) ─────────────────────────────────────────
      G_prod: 0.0,    // mg/dL/hr net glucose production (0 = basal is covered)
      k_basal: 0.008,  // hr⁻¹  pull toward target BG (mean reversion)
      // ── State variable decay constants (hours) ────────────────────────────────
      tau_ex: 3,      // exercise effect half-life
      tau_low: 4,      // low-BG memory half-life
      tau_high: 6,      // high-BG memory half-life
      // ── Fat & protein delayed glucose (2.1) ───────────────────────────────────
      fat_factor: 0.10, // mg/dL-equivalent glucose per gram fat
      prot_factor: 0.20, // mg/dL-equivalent glucose per gram protein
      lambda_FP: 0.30, // hr⁻¹  decay/release rate of fat-protein glucose reservoir
      // ── Meal type & fiber absorption slowing (2.2) ────────────────────────────
      meal_slow_fast: 1.0,  // carb absorption multiplier — fast carbs
      meal_slow_mixed: 0.7, // carb absorption multiplier — mixed meal
      meal_slow_hfp: 0.4,  // carb absorption multiplier — high fat/protein
      fiber_slow_low: 1.0, // fiber absorption multiplier — low fiber
      fiber_slow_med: 0.8, // fiber absorption multiplier — medium fiber
      fiber_slow_high: 0.6, // fiber absorption multiplier — high fiber
      // ── Uncertainty scoring (5.1) ────────────────────────────────────────────
      // U(t) = (1 + Σ wᵢ·Sᵢ) · u_base · √t  — widens the confidence band
      u_base: 18,   // base ±mg/dL band width per √hour at U_scalar=1
      u_stress: 0.30, // stress (0–3, normalised to 0–1) contribution
      u_illness: 0.50, // illness toggle contribution
      u_travel: 0.40, // travel-day contribution (circadian misalignment)
      u_overlap: 0.25, // each active meal reservoir adds this to the scalar
      u_substances: 0.15, // per unit of summed substance level
      u_iob: 0.10, // per unit of plasma insulin (Q_p, capped at 5u)
      // ── Gastric emptying reservoir (2.3) ─────────────────────────────────────
      k_ge_base: 2.0, // hr⁻¹  base gastric emptying rate
      k_ge_fat_factor: 0.3, // fat fraction penalty on gastric emptying
      k_ge_prot_factor: 0.2, // protein fraction penalty on gastric emptying
      k_ge_fiber_factor: 0.2,// (reserved) fiber penalty on gastric emptying

      // ── Nonlinear PK model (BloodGlucoseInsulinModel) ────────────────────────────
      k_a_max: 0.03, // min⁻¹  max saturable subcutaneous absorption rate
      K_M: 5.0,  // U      Michaelis-Menten half-saturation constant
    };

    // UI display preferences — things the user controls.
    const DEFAULT_UI_STATE = {
      dualBg: false, // show separate CGM + fingerstick inputs
      showAdvancedModifiers: false, // enable the Advanced Daily Modifiers tab (4.x features)

      theme: 'dark',    // 'dark' | 'light' | 'high-vis'

    // Activity levels shown in the entry form.
    const ACTIVITY_LEVELS = [

      { label: 'Moderate', icon: '🚴', mets: 5 },

    // Stress levels shown in the entry form.
    const STRESS_LEVELS = [
      { label: 'None', icon: '😌', value: 0 },
      { label: 'Mild', icon: '😐', value: 1 },
      { label: 'Moderate', icon: '😟', value: 2 },
      { label: 'High', icon: '😰', value: 3 },

    // Hydration levels shown in the entry form.
    const HYDRATION_LEVELS = [
      { label: 'Well', icon: '💧', value: 0 },
      { label: 'OK', icon: '🫗', value: 0.5 },
      { label: 'Dry', icon: '🏜', value: 1 },

    // Injection sites — each maps to a per-dose absorption multiplier stored in profile.
    // Site is per-dose (not continuous), so it lives in the log, not in calcKabs.
    const INJECTION_SITES = [
      { label: 'Abdomen', icon: '🫃', profileKey: 'siteMult_abdomen' },
      { label: 'Thigh', icon: '🦵', profileKey: 'siteMult_thigh' },
      { label: 'Arm', icon: '💪', profileKey: 'siteMult_arm' },
      { label: 'Other', icon: '📍', profileKey: 'siteMult_other' },
    ];

    // Sleep quality labels (maps 0–4 slider to a word).
    const SLEEP_QUALITY_LABELS = ['Poor', 'Light', 'Fair', 'Good', 'Deep'];

    // Meal composition type — affects carb absorption speed via gastric emptying.
    const MEAL_TYPES = [
      { label: 'Fast carbs', icon: '🍬', value: 0 },
      { label: 'Mixed', icon: '🍱', value: 1 },
      { label: 'High fat/prot', icon: '🥩', value: 2 },
    ];

    // Fiber content class — further slows carb absorption.
    const FIBER_CLASSES = [
      { label: 'Low', icon: '🌾', value: 0 },
      { label: 'Medium', icon: '🥦', value: 1 },
      { label: 'High', icon: '🫘', value: 2 },
    ];

    // Alcohol intake — maps to a 0–1 scalar fed into the hepatic suppression model (4.1).
    const ALCOHOL_LEVELS = [
      { label: 'None', icon: '🚫', value: 0 },
      { label: 'Some', icon: '🍷', value: 0.5 },
      { label: 'Heavy', icon: '🍻', value: 1 },
    ];

    // Stimulant intake — maps to a 0–1 scalar (4.2). Caffeine/prescribed stimulants.
    const STIMULANT_LEVELS = [
      { label: 'None', icon: '🚫', value: 0 },
      { label: 'Caffeine', icon: '☕', value: 0.3 },
      { label: 'Prescribed', icon: '💊', value: 0.7 },
      { label: 'Heavy', icon: '⚡', value: 1 },

    // Depressant intake — maps to a 0–1 scalar (4.3). Benzodiazepines / sleep aids.

    // ═══════════════════════════════════════════════════════════════════════════════
    //  A2. GLUCOSE–INSULIN SIMULATION MODULE
    //
    //  Subsystem classes (each owns one concern):
    //    InsulinPK          — two-compartment subcutaneous depot → plasma PK
    //    SensitivityModel   — 4 sensitivity factors, S_active vs S_future
    //    PDLayer            — PD: effect and IOB from PK state + sensitivity
    //    CorrectionEngine   — stateless correction-dose calculations (consumes PD outputs)
    //    CarbAbsorption     — gut reservoir → blood glucose transfer
    //    BasalModel         — continuous basal infusion into depot
    //    GlucoseSimulator   — glucose state variable with Euler integration
    //
    //  BloodGlucoseInsulinModel — orchestrator.
    //  Public API preserved from v1; new methods added below.
    // ═══════════════════════════════════════════════════════════════════════════════

    // ── InsulinPK ──────────────────────────────────────────────────────────────────
    // Two-compartment model: subcutaneous depot D (U) → plasma P (U).
    // Absorption uses Michaelis-Menten saturable kinetics:
    //   k_a(D) = k_a_max × D / (K_M + D)   [min⁻¹]
    //   dD/dt  = –k_a(D) × D
    //   dP/dt  =  k_a(D) × D – k_e × P
    // Simultaneous Euler: both ODEs use D_old to avoid order-of-update bias.
    class InsulinPK {
      constructor({ k_a_max = 0.03, K_M = 5.0, k_e = 0.01 } = {}) {
        this.k_a_max = k_a_max; // min⁻¹  max saturable absorption rate
        this.K_M = K_M;     // U      Michaelis-Menten half-saturation
        this.k_e = k_e;     // min⁻¹  plasma elimination rate
        this.D = 0;             // U  subcutaneous depot
        this.P = 0;             // U  plasma compartment
      }

      addBolus(amount) { this.D += Math.max(0, Number(amount) || 0); }

      // Advance by dtMin minutes. Returns absorption flux (U/min) for glucose coupling.
      step(dtMin) {
        const D0 = this.D;
        const k_a = this.k_a_max * D0 / (this.K_M + D0 + 1e-9); // min⁻¹
        const flux = k_a * D0;                                     // U/min leaving depot
        this.D = Math.max(0, D0 - flux * dtMin);
        this.P = Math.max(0, this.P + (flux - this.k_e * this.P) * dtMin);
        return flux;
      }

      get totalInsulin() { return this.D + this.P; }

      getState() { return { depot: this.D, plasma: this.P, totalInsulin: this.totalInsulin }; }

      clone() {
        const c = new InsulinPK({ k_a_max: this.k_a_max, K_M: this.K_M, k_e: this.k_e });
        c.D = this.D; c.P = this.P;
        return c;
      }
    }

    // ── SensitivityModel ───────────────────────────────────────────────────────────
    // Manages four orthogonal insulin sensitivity factors.
    //
    // S_active = product of ALL four factors (sensitivity right now).
    // S_future = configurable subset of factors, each with an optional weight.
    //            Answers: "what sensitivity should I expect when bolus insulin peaks?"
    //
    // Default: only circadianSensitivityFactor contributes at weight 1.
    // Example overrides:
    //   model.setFutureFactorNames(['circadianSensitivityFactor','exerciseSensitivityFactor'])
    //   model.setFutureFactorWeights({ exercise: 0.6 })  // expect 60% of exercise uplift to persist
    //
    // Weight formula: blended = 1 + w × (factor − 1)
    //   w=1 → full factor preserved; w=0 → excluded (contributes 1.0); w=0.5 → half of deviation
    //   This is linear interpolation from the neutral baseline of 1, symmetric for both
    //   upward (exercise boost) and downward (stress penalty) factors.
    class SensitivityModel {
      constructor({ minSensitivity = 0.1, maxSensitivity = 3.0,
        futureFactorNames = null, futureFactorWeights = null } = {}) {
        this.minSensitivity = minSensitivity;
        this.maxSensitivity = maxSensitivity;
        this.factors = {
          circadianSensitivityFactor: 1.0, // age, sex, sleep, dawn — slow-moving baseline
          exerciseSensitivityFactor: 1.0, // acute exercise window
          stressSensitivityFactor: 1.0, // stress, illness, travel, substances
          glucoseSensitivityFactor: 1.0, // current BG level, recent lows/highs, BMI
        };
        // Per-factor physiologic clamp bounds
        this._bounds = {
          circadianSensitivityFactor: [0.3, 2.0],
          exerciseSensitivityFactor: [0.2, 2.5],
          stressSensitivityFactor: [0.2, 2.0],
          glucoseSensitivityFactor: [0.3, 2.0],
        };
        // Which factors contribute to S_future (default: circadian only)
        this._futureNames = futureFactorNames ?? ['circadianSensitivityFactor'];
        // Per-factor weights for S_future (default: all included names at weight 1)
        // Key can be full name or short alias (circadian / exercise / stress / glucose)
        this._futureWeights = futureFactorWeights ?? {};
      }

      // ── Factor updates ────────────────────────────────────────────────────────────
      setFactors(newFactors = {}) {
        for (const [key, [lo, hi]] of Object.entries(this._bounds)) {
          const shortKey = key.replace('SensitivityFactor', '');
          const val = newFactors[key] ?? newFactors[shortKey] ?? this.factors[key];
          this.factors[key] = Math.min(hi, Math.max(lo, Number(val) || 1));
        }
      }

      // ── Future sensitivity configuration (2.3) ────────────────────────────────────
      // Set which factors contribute to S_future.
      // names: array of full factor names or short aliases.
      // e.g. ['circadian', 'exercise']
      setFutureFactorNames(names) {
        this._futureNames = names.map(n =>
          n.endsWith('SensitivityFactor') ? n : `${n}SensitivityFactor`
        ).filter(n => n in this._bounds);
      }

      // Set per-factor weights for S_future (2.4 — linear interpolation).
      // weights: { circadian: 1, exercise: 0.4, stress: 0.2 }
      // A factor not listed uses weight 1.0 if in futureNames, or is excluded.
      setFutureFactorWeights(weights = {}) {
        // Normalise short aliases to full names
        const normalised = {};
        for (const [k, v] of Object.entries(weights)) {
          const fullKey = k.endsWith('SensitivityFactor') ? k : `${k}SensitivityFactor`;
          normalised[fullKey] = Math.max(0, Math.min(1, Number(v) || 0));
        }
        this._futureWeights = normalised;
      }

      // ── Computed sensitivities ────────────────────────────────────────────────────
      get S_active() {
        const raw = this.factors.circadianSensitivityFactor
          * this.factors.exerciseSensitivityFactor
          * this.factors.stressSensitivityFactor
          * this.factors.glucoseSensitivityFactor;
        return Math.min(this.maxSensitivity, Math.max(this.minSensitivity, raw));
      }

      // S_future: product of weighted blends of the configured future factors.
      // blended(factor, weight) = 1 + weight × (factor − 1)
      get S_future() {
        let product = 1;
        for (const name of this._futureNames) {
          const f = this.factors[name] ?? 1;
          const w = this._futureWeights[name] ?? 1;
          product *= 1 + w * (f - 1); // linear blend from neutral baseline
        }
        return Math.min(this.maxSensitivity, Math.max(this.minSensitivity, product));
      }

      getState() {
        return {
          ...this.factors,
          S_active: this.S_active,
          S_future: this.S_future,
          futureFactorNames: [...this._futureNames],
          futureFactorWeights: { ...this._futureWeights },
        };
      }
    }

    // ── PDLayer ────────────────────────────────────────────────────────────────────
    // Pharmacodynamics: maps PK state (D, P) + sensitivity to insulin effect and IOB.
    // All methods are pure/stateless. PK knows nothing about sensitivity — that boundary
    // is enforced here.
    class PDLayer {
      // Current insulin effect: plasma concentration scaled by active sensitivity.
      // Units: U·(sensitivity) — fed into GlucoseSimulator as the disposal driver.
      static currentEffect(P, S_active) {
        return P * S_active;
      }

      // Physically interpretable IOB credit.
      // Re-expresses plasma in subq-equivalent units: if future sensitivity is lower
      // than current, plasma insulin is worth proportionally more right now.
      static effectiveSubqIob(D, P, S_active, S_future) {
        const plasmaSubqEquiv = P * (S_active / Math.max(0.01, S_future));
        return Math.max(0, D + plasmaSubqEquiv);
      }

      // Heuristic weighted IOB credit.
      // Depot is partially credited (40% by default) because it has not yet reached plasma.
      static weightedIobCredit(D, P, S_active, depotWeight = 0.4, plasmaWeight = 1.0) {
        return (depotWeight * D + plasmaWeight * P) * S_active;
      }
    }

    // ── CorrectionEngine ───────────────────────────────────────────────────────────
    // Stateless correction-dose calculations — pure functions, no instance needed.
    // Consumes pre-computed PD outputs; never touches raw PK values (D, P) directly.
    class CorrectionEngine {
      // Recommend a correction dose.
      // expectedFutureISF: baseISF / S_future — computed by the orchestrator before calling here.
      // iobCredit: U from PDLayer.effectiveSubqIob or PDLayer.weightedIobCredit.
      static recommend(glucose, target, expectedFutureISF, iobCredit) {
        const rawCorrection = Math.max(0, (glucose - target) / Math.max(0.1, expectedFutureISF));
        const recommendedCorrection = Math.max(0, rawCorrection - iobCredit);
        // Keep dynamicISF as a backward-compatible alias for existing consumers.
        return { expectedFutureISF, dynamicISF: expectedFutureISF, rawCorrection, iobCredit, recommendedCorrection };
      }
    }

    // ── CarbAbsorption ─────────────────────────────────────────────────────────────
    // Two-compartment gut model: D_g (gut reservoir, g) → R_c (transit, g) → blood.
    //   dD_g/dt = –k_ge × D_g
    //   dR_c/dt =  k_ge × D_g – k_abs × R_c
    // Returns blood glucose flux (g/hr) at each step for coupling to GlucoseSimulator.
    class CarbAbsorption {
      constructor({ k_ge = 2.0, k_abs = 1.5 } = {}) {
        this.k_ge = k_ge;  // hr⁻¹ gastric emptying rate
        this.k_abs = k_abs; // hr⁻¹ gut→blood transfer rate
        this.D_g = 0;       // g   food in stomach/gut
        this.R_c = 0;       // g   glucose in transit to blood
      }

      addMeal(carbs_g, k_ge = null) {
        this.D_g += Math.max(0, carbs_g);
        if (k_ge != null) this.k_ge = k_ge;
      }

      // Advance by dtMin minutes. Returns blood glucose flux (g/hr).
      step(dtMin) {
        const dtHr = dtMin / 60;
        const emptying = this.k_ge * this.D_g;
        const transfer = this.k_abs * this.R_c;
        this.D_g = Math.max(0, this.D_g + (-emptying) * dtHr);
        this.R_c = Math.max(0, this.R_c + (emptying - transfer) * dtHr);
        return transfer; // g/hr entering blood
      }

      getState() { return { gut: this.D_g, transit: this.R_c, total: this.D_g + this.R_c }; }

      clone() {
        const c = new CarbAbsorption({ k_ge: this.k_ge, k_abs: this.k_abs });
        c.D_g = this.D_g; c.R_c = this.R_c;
        return c;
      }
    }

    // ── BasalModel ─────────────────────────────────────────────────────────────────
    // Continuous basal insulin infusion. Adds a steady trickle to the depot each step.
    class BasalModel {
      constructor({ basalRate = 0.0 } = {}) {
        this.basalRate = basalRate; // U/hr
      }
      // Returns U to add to depot over dtMin.
      step(dtMin) { return this.basalRate * (dtMin / 60); }
    }

    // ── GlucoseSimulator ───────────────────────────────────────────────────────────
    // Single-compartment glucose model for forward projection simulations.
    // Not used during IOB credit calculation (live BG comes from CGM/log entries).
    //   dG/dt = G_prod – ISF × k_e × P × S_active – k_basal × (G – G_target) + carb_effect
    class GlucoseSimulator {
      constructor({ targetGlucose = 100, baseISF = 40, k_e = 0.01,
        G_prod = 0.0, k_basal = 0.008 } = {}) {
        this.targetGlucose = targetGlucose;
        this.baseISF = baseISF;   // mg/dL per U
        this.k_e = k_e;      // plasma elimination (min⁻¹ — same as InsulinPK)
        this.G_prod = G_prod;   // mg/dL/hr hepatic output
        this.k_basal = k_basal;  // hr⁻¹ mean reversion toward target
        this.G = targetGlucose;  // mg/dL current glucose
      }

      // Advance by dtMin.
      // insulinEffect = PDLayer.currentEffect(P, S_active) — passed in by the orchestrator.
      // carbFlux_gPerHr = g/hr of glucose entering from gut.
      step(dtMin, { insulinEffect, carbFlux_gPerHr = 0 }) {
        const dtHr = dtMin / 60;
        // Insulin-mediated disposal: ISF × k_e × insulinEffect  (mg/dL / hr)
        const disposal = this.baseISF * this.k_e * insulinEffect * 60;
        // Mean reversion toward target
        const reversion = this.k_basal * (this.G - this.targetGlucose);
        // Carb absorption (g/hr × ~18 mg/dL per g for 5L glucose volume of distribution)
        const carbEffect = carbFlux_gPerHr * 18;
        const dG = (this.G_prod - disposal - reversion + carbEffect) * dtHr;
        this.G = Math.min(500, Math.max(40, this.G + dG));
        return this.G;
      }

      getState() { return { glucose: this.G }; }

      clone() {
        const c = new GlucoseSimulator({
          targetGlucose: this.targetGlucose, baseISF: this.baseISF,
          k_e: this.k_e, G_prod: this.G_prod, k_basal: this.k_basal,
        });
        c.G = this.G;
        return c;
      }
    }

    // ── BloodGlucoseInsulinModel (orchestrator) ────────────────────────────────────
    //
    //  Wires all subsystems behind a single event-driven API.
    //
    //  Preserved API (v1 compatible):
    //    addBolus(amount, time)
    //    setSensitivityFactors(time, factors)
    //    getState(time)               → { physical, clinical, factors, ... }
    //    getCorrectionRecommendation  → { expectedFutureISF, rawCorrection, ... }
    //
    //  New API (Phase 1 additions):
    //    addMeal(carbs_g, k_ge, time)              — queue carb absorption event
    //    project(durationMin, opts)                — non-mutating forward simulation trace
    //    snapshot()                                — serialise full state to plain object
    //    restore(snap)                             — restore from snapshot
    //    reset()                                   — zero all compartments
    //    setFutureFactorNames(['circadian','exercise'])
    //    setFutureFactorWeights({ exercise: 0.6 }) — partial contribution to S_future
    class BloodGlucoseInsulinModel {
      constructor(params = {}) {
        this.baseISF = params.baseISF ?? 40;
        this.targetGlucose = params.targetGlucose ?? 100;
        this.depotWeight = params.depotWeight ?? 0.4;
        this.plasmaWeight = params.plasmaWeight ?? 1.0;

        this._pk = new InsulinPK({
          k_a_max: params.k_a_max ?? 0.03,
          K_M: params.K_M ?? 5.0,
          k_e: params.k_e ?? 0.01,
        });
        this._sens = new SensitivityModel({
          minSensitivity: params.minSensitivity ?? 0.1,
          maxSensitivity: params.maxSensitivity ?? 3.0,
        });
        this._carbs = new CarbAbsorption({
          k_ge: params.k_ge ?? 2.0,
          k_abs: params.k_abs ?? 1.5,
        });
        this._basal = new BasalModel({ basalRate: params.basalRate ?? 0.0 });
        this._glucose = new GlucoseSimulator({
          targetGlucose: this.targetGlucose,
          baseISF: this.baseISF,
          k_e: params.k_e ?? 0.01,
          G_prod: params.G_prod ?? 0.0,
          k_basal: params.k_basal ?? 0.008,
        });

        this.lastUpdateTime = Date.now();
      }

      // ── Event-driven API ────────────────────────────────────────────────────────
      addBolus(amount, time = Date.now()) {
        this._advanceTo(time);
        this._pk.addBolus(amount);
      }

      // NEW: add a carbohydrate meal event.
      // k_ge overrides gastric emptying rate for this meal (null = use current default).
      addMeal(carbs_g, k_ge = null, time = Date.now()) {
        this._advanceTo(time);
        this._carbs.addMeal(carbs_g, k_ge);
      }

      setSensitivityFactors(time, newFactors = {}) {
        this._advanceTo(time);
        this._sens.setFactors(newFactors);
      }

      // ── Query API ───────────────────────────────────────────────────────────────
      // Returns the same shape as v1 for backward compatibility + glucose/carbs fields.
      getState(time = Date.now()) {
        this._advanceTo(time);
        const pkS = this._pk.getState();
        const { S_active, S_future } = this._sens;
        const currentEffect = PDLayer.currentEffect(pkS.plasma, S_active);
        const effectiveSubqIob = PDLayer.effectiveSubqIob(pkS.depot, pkS.plasma, S_active, S_future);
        const weightedIobCredit = PDLayer.weightedIobCredit(pkS.depot, pkS.plasma, S_active, this.depotWeight, this.plasmaWeight);
        const expectedFutureISF = this.baseISF / Math.max(0.1, S_future);
        return {
          timestamp: this.lastUpdateTime,
          physical: pkS,
          clinical: { S_active, S_future, expectedFutureISF, currentEffect, weightedIobCredit, effectiveSubqIob },
          factors: { ...this._sens.factors },
          glucose: this._glucose.getState(),
          carbs: this._carbs.getState(),
        };
      }

      getCorrectionRecommendation(glucose, time = Date.now(), target = this.targetGlucose, method = 'effectiveSubq') {
        const state = this.getState(time);
        const { expectedFutureISF, weightedIobCredit, effectiveSubqIob } = state.clinical;
        // Consume PD-layer outputs only; no raw PK values in correction logic.
        const iobCredit = method === 'weighted'
          ? weightedIobCredit
          : effectiveSubqIob;
        const rec = CorrectionEngine.recommend(glucose, target, expectedFutureISF, iobCredit);
        return { glucose, target, creditMethod: method, state, ...rec };
      }

      // ── Simulation layer ────────────────────────────────────────────────────────
      // Forward projection — does NOT mutate the current instance.
      // Returns an array of snapshot objects at intervalMin resolution.
      // opts.glucoseStart: override starting glucose (default: last known G)
      // opts.stepMin:      Euler step size in minutes (default: 1)
      // opts.intervalMin:  output resolution in minutes (default: 5)
      project(durationMin = 240, { intervalMin = 5, stepMin = 1, glucoseStart = null } = {}) {
        // Clone all mutable subsystems so this instance is untouched
        const pk = this._pk.clone();
        const carbs = this._carbs.clone();
        const glucose = this._glucose.clone();
        const basal = new BasalModel({ basalRate: this._basal.basalRate });
        if (glucoseStart != null) glucose.G = glucoseStart;
        const { S_active, S_future } = this._sens; // sensitivity is assumed constant over projection

        const pts = [{
          t: 0, G: glucose.G, depot: pk.D, plasma: pk.P,
          iob: PDLayer.effectiveSubqIob(pk.D, pk.P, S_active, S_future),
        }];

        let elapsed = 0;
        let nextOutput = intervalMin;
        while (elapsed < durationMin) {
          const dt = Math.min(stepMin, durationMin - elapsed);
          pk.D += basal.step(dt);                                         // basal trickle into depot
          pk.step(dt);                                                     // insulin PK (pure)
          const carbFlux = carbs.step(dt) * 60;                           // g/min → g/hr
          const insulinEffect = PDLayer.currentEffect(pk.P, S_active);    // PD: effect = P × S_active
          glucose.step(dt, { insulinEffect, carbFlux_gPerHr: carbFlux });
          elapsed += dt;
          if (elapsed >= nextOutput || elapsed >= durationMin) {
            pts.push({
              t: Math.round(elapsed), G: glucose.G, depot: pk.D, plasma: pk.P,
              iob: PDLayer.effectiveSubqIob(pk.D, pk.P, S_active, S_future),
            });
            nextOutput += intervalMin;
          }
        }
        return pts;
      }

      // ── State persistence ───────────────────────────────────────────────────────
      snapshot() {
        return {
          time: this.lastUpdateTime,
          pk: { D: this._pk.D, P: this._pk.P },
          factors: { ...this._sens.factors },
          carbs: { D_g: this._carbs.D_g, R_c: this._carbs.R_c },
          glucose: { G: this._glucose.G },
        };
      }

      restore(snap) {
        this.lastUpdateTime = snap.time ?? Date.now();
        this._pk.D = snap.pk?.D ?? 0;
        this._pk.P = snap.pk?.P ?? 0;
        if (snap.factors) this._sens.setFactors(snap.factors);
        this._carbs.D_g = snap.carbs?.D_g ?? 0;
        this._carbs.R_c = snap.carbs?.R_c ?? 0;
        if (snap.glucose?.G != null) this._glucose.G = snap.glucose.G;
      }

      reset() {
        this._pk.D = 0; this._pk.P = 0;
        this._carbs.D_g = 0; this._carbs.R_c = 0;
        this._glucose.G = this.targetGlucose;
        this.lastUpdateTime = Date.now();
      }

      // ── Configurable future sensitivity (delegated to SensitivityModel) ──────────
      setFutureFactorNames(names) { this._sens.setFutureFactorNames(names); }
      setFutureFactorWeights(weights) { this._sens.setFutureFactorWeights(weights); }

      // ── Backward-compatibility static ───────────────────────────────────────────
      static defaultGlucoseSensitivityFactor(glucose, glucoseRate) {
        if (glucose < 70 && glucoseRate < -1) return 0.8;
        if (glucose > 180 && glucoseRate > 0) return 1.2;
        return 1.0;
      }

      // ── Internal ────────────────────────────────────────────────────────────────
      // Advance PK and CarbAbsorption subsystems to targetTime.
      // GlucoseSimulator is NOT advanced here — live BG readings drive glucose,
      // not the model (callers pass measured values into getCorrectionRecommendation).
      // Use project() when you want a fully integrated glucose trajectory.
      _advanceTo(targetTime) {
        if (targetTime <= this.lastUpdateTime) return;
        let remaining = (targetTime - this.lastUpdateTime) / 60_000;
        const step = 1.0; // 1-minute Euler steps
        while (remaining > 1e-6) {
          const dt = Math.min(step, remaining);
          this._pk.step(dt);
          this._carbs.step(dt);
          remaining -= dt;
        }
        this.lastUpdateTime = targetTime;
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    //  B.  UTILITY FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════════════════

    // Clamp a number between lo and hi.
    function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

    // Linear interpolation between a and b by factor t ∈ [0,1].
    function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }

    // Gaussian bell curve: 1 at x=mu, falls off with width sigma.
    function gauss(x, mu, sigma) { return Math.exp(-Math.pow(x - mu, 2) / (2 * sigma * sigma)); }

    // Parse a number safely; return fallback if the result is NaN or ≤ 0.
    function safeNum(v, fallback = 0) { const n = parseFloat(v); return isNaN(n) ? fallback : n; }

    // Hours elapsed between two ISO timestamps (positive = log is in the past).
    function hoursBetween(isoA, isoB) {
      return (new Date(isoB).getTime() - new Date(isoA).getTime()) / 3_600_000;
    }

    // Exponential decay: value * e^(-hours / tau).
    // Used to compute how much a past event still matters right now.
    function rollingDecay(value, hoursAgo, tau) {
      return value * Math.exp(-hoursAgo / tau);
    }

    // Convert a 0–N enum index to a normalised 0–1 scalar.
    function enumToScalar(index, max) { return clamp(index / max, 0, 1); }

    // Colour for a modifier bar (green = normal, red/purple = far from 1.0).
    function modColor(v) {
      if (v < 0.60) return '#ef4444';
      if (v < 0.80) return '#f97316';
      if (v < 0.92) return '#fbbf24';
      if (v <= 1.08) return '#4ade80';
      if (v <= 1.25) return '#38bdf8';
      return '#a78bfa';
    }

    // BG-value colour (red/yellow/green).
    function bgColor(bg) { return bg < 70 ? '#ef4444' : bg > 180 ? '#fbbf24' : '#4ade80'; }

    // BG zone string.
    function zone(bg, p) { return bg < p.lowBG ? 'low' : bg > p.highBG ? 'high' : 'ok'; }

    // Forecast risk label for the end of the projection.
    function projLabel(bg, p) {
      return bg < p.lowBG ? '🔴 Hypo risk' : bg > p.highBG ? '🟡 Elevated' : '🟢 In range';
    }

    // Format an ISO timestamp as "HH:MM".
    function fmtT(iso) { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    // Format as "Mon D".
    function fmtD(iso) { return new Date(iso).toLocaleDateString([], { month: 'short', day: 'numeric' }); }
    // Format as "Mon D HH:MM".
    function fmtDT(iso) { return `${fmtD(iso)} ${fmtT(iso)}`; }
    // Current time as ISO string.
    function nowISO() { return new Date().toISOString(); }
    // Current local time as YYYY-MM-DDTHH:mm for <input type="datetime-local">.
    function nowLocalInput() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    // Parse datetime-local string to ISO; returns null if invalid.
    function localInputToISO(v) {
      if (!v) return nowISO();
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d.toISOString();
    }

    // ── Nightscout / CGM utilities ────────────────────────────────────────────────

    // SHA-1 hex digest — required by Nightscout API-secret header spec.
    // Uses Web Crypto API (SubtleCrypto), available in all modern browsers.
    async function sha1Hex(str) {
      const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Build auth headers / URL for a Nightscout request.
    async function buildNSAuth(cfg, url) {
      const headers = {};
      let finalUrl = url;
      if (cfg.authMethod === 'secret' && cfg.apiSecret) {
        headers['api-secret'] = await sha1Hex(cfg.apiSecret);
      } else if (cfg.authMethod === 'token' && cfg.token) {
        const sep = finalUrl.includes('?') ? '&' : '?';
        finalUrl += `${sep}token=${encodeURIComponent(cfg.token)}`;
      }
      return { finalUrl, headers };
    }

    // Fetch the most-recent CGM entry from Nightscout.
    async function fetchNSLatest(cfg) {
      const base = cfg.url.replace(/\/+$/, '');
      const { finalUrl, headers } = await buildNSAuth(cfg, `${base}/api/v1/entries/current.json`);
      let res;
      try {
        res = await fetch(finalUrl, { headers, mode: 'cors' });
      } catch (netErr) {
        const msg = netErr.message || '';
        if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('network')) {
          throw new Error('cors_or_network');
        }
        throw new Error(netErr.message || 'Network error');
      }
      if (res.status === 401) throw new Error('Auth failed — check your API secret or token');
      if (res.status === 403) throw new Error('Forbidden — API secret may be wrong');
      if (res.status === 404) throw new Error('Not found — check the Nightscout URL');
      if (!res.ok) throw new Error(`Server error (HTTP ${res.status})`);
      const raw = await res.json();
      const e = Array.isArray(raw) ? raw[0] : raw;
      if (!e || !e.sgv) throw new Error('No CGM reading in response');
      const mills = e.mills || e.date || Date.now();
      return {
        sgv: Math.round(e.sgv),
        direction: e.direction || 'Flat',
        device: (e.device || 'cgm').toLowerCase(),
        noise: e.noise ?? 0,
        timestamp: e.dateString || new Date(mills).toISOString(),
        mills,
      };
    }

    // Fetch last N CGM entries for the mini-trend display (non-fatal on error).
    async function fetchNSHistory(cfg, count = 12) {
      const base = cfg.url.replace(/\/+$/, '');
      const { finalUrl, headers } = await buildNSAuth(cfg, `${base}/api/v1/entries.json?count=${count}`);
      const res = await fetch(finalUrl, { headers, mode: 'cors' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      return (Array.isArray(raw) ? raw : [raw])
        .filter(e => e && e.sgv)
        .map(e => ({
          sgv: Math.round(e.sgv),
          direction: e.direction || 'Flat',
          mills: e.mills || e.date || Date.now(),
          timestamp: e.dateString || new Date(e.mills || e.date).toISOString(),
        }))
        .sort((a, b) => a.mills - b.mills);
    }

    // Friendly device label from the raw Nightscout device string.
    function deviceLabel(device = '') {
      const d = device.toLowerCase();
      if (d.includes('libre')) return '🩺 FreeStyle Libre';
      if (d.includes('dexcom')) return '🟢 Dexcom';
      if (d.includes('medtronic')) return '🔵 Medtronic';
      if (d.includes('xdrip') || d.includes('xdripjs')) return '📱 xDrip+';
      if (d.includes('spike')) return '📱 Spike';
      if (d.includes('tidepool')) return '🌊 Tidepool';
      if (d) return `📡 ${device}`;
      return '📡 CGM';
    }


    // ═══════════════════════════════════════════════════════════════════════════════
    //  C.  PHYSIOLOGIC MODEL FUNCTIONS
    //
    //  Each function is a pure computation — no React, no side effects.
    //  Input objects carry exactly the fields each function needs.
    // ═══════════════════════════════════════════════════════════════════════════════

    // ── C1. Absorption modifier k_abs(t) ─────────────────────────────────────────
    // Returns how fast insulin will be absorbed given current conditions.
    // Result > 1 = faster than baseline; result < 1 = slower.
    // mealType (0–2) and fiberClass (0–2) are optional; when carbs > 0 they
    // further slow the effective absorption via gastric content feedback.
    function calcKabs(inp, profile, sim) {
      const { bmi, hr, pa, sleep, sleepQ, hydration, carbs = 0, mealType = 0, fiberClass = 0 } = inp;

      // BMI penalty: extra body mass slows subcutaneous absorption.
      const fBMI = Math.exp(-sim.alpha * Math.max(0, bmi - profile.BMI_ref));

      // Heart rate boost: elevated pulse increases blood flow to the injection site.
      const rawHR = 1 + sim.beta * (hr - profile.HR_ref) / profile.HR_ref;
      const fHR = clamp(rawHR, 1 - sim.beta_max, 1 + sim.beta_max);

      // Activity boost: movement drives faster absorption.
      const fPA = 1 + sim.gamma * Math.max(0, pa);

      // Sleep penalty: absorption slows during sleep; poor quality deepens the effect.
      const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
      const fSleep = Math.max(0.05, 1 - sim.delta * sleep * qualityAmplifier);

      // Hydration: dehydration reduces reliability of absorption.
      const fHydration = 1 - sim.h_hd * hydration;

      // Meal type & fiber slow factors (2.2): when a meal is present, the gastric
      // content slows effective insulin–glucose interplay in the absorption window.
      const mealSlowLookup = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp];
      const fiberSlowLookup = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high];
      const fMealSlow = carbs > 0 ? (mealSlowLookup[mealType] ?? 1.0) : 1.0;
      const fFiberSlow = carbs > 0 ? (fiberSlowLookup[fiberClass] ?? 1.0) : 1.0;

      const mult = fBMI * fHR * fPA * fSleep * fHydration * fMealSlow * fFiberSlow;
      return {
        kabs: sim.k_abs0 * mult,
        kabs_mult: mult,
        fBMI, fHR, fPA, fSleep, fHydration, fMealSlow, fFiberSlow,
      };
    }

    // ── C2. Sensitivity multiplier S_eff(t) ──────────────────────────────────────
    // Returns how strongly 1 unit of insulin lowers blood sugar right now.
    //
    // η₀ — demographic baseline: age and sex are slow-moving profile constants
    // that set the ceiling for how sensitive the patient can ever be.
    // Dynamic factors then modulate η₀ up or down in real time.
    //
    // Model:
    //   η₀ = corrFactor · fBMI · fAge · fSex
    //   S_eff = η₀ · fBG · fEx · fDawn · fLow · fHigh · fSlp · fStress · fIllness · fTravel
    function calcSeff(inp, sv, profile, sim) {
      const { bmi, bg, sleep, sleepQ, stress, illness, travelDay = 0 } = inp;
      const { E_ex, L, H } = sv;

      // ── Demographic baseline (η₀ factors) ────────────────────────────────────
      // BMI penalty: excess adiposity reduces receptor-level sensitivity.
      const fBMI = Math.exp(-sim.theta * Math.max(0, bmi - profile.BMI_ref));

      // Age penalty: ~0.07 per decade after 30 — reflects declining muscle mass
      // and intracellular lipid accumulation independent of BMI.
      const fAge = Math.max(0.1, 1 - sim.age_penalty * Math.max(0, profile.age - 30) / 10);

      // Sex-based offset: females tend toward slightly higher peripheral sensitivity
      // (sex_factor_F < 1 means more sensitive → requires less correction insulin).
      const fSex = profile.sex === 'F' ? sim.sex_factor_F : 1.0;

      // Composite demographic baseline.
      const eta0 = profile.corrFactor * fBMI * fAge * fSex;

      // ── Dynamic real-time factors ─────────────────────────────────────────────
      // BG-level effect: sensitivity peaks near target BG, falls on both sides.
      const fBG = gauss(bg, profile.targetBG, sim.sigma_bg);

      // Exercise boost from accumulated activity memory.
      const fEx = 1 + sim.kappa * E_ex;

      // Dawn phenomenon (5.1 manual): user explicitly flags that they are waking from sleep
      // and experiencing the cortisol/GH surge. Replaces the old time-of-day cosine model.
      const fDawn = inp.dawnEffect ? (1 - sim.d_dawn) : 1.0;

      // Recent-low memory: a prior hypo blunts the next insulin dose.
      const fLow = 1 / (1 + sim.rho * L);

      // Recent-high memory: persistent hyperglycemia reduces insulin effectiveness.
      const fHigh = 1 / (1 + sim.sigma_h * H);

      // Sleep: reduces sensitivity; poor quality amplifies the reduction.
      // Depressants (4.3) further amplify the sleep effect via deepened CNS depression.
      const depressantLevel = inp.depressantLevel ?? 0;
      const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
      const depressAmp = 1 + (sim.depress_sleep_amplify ?? 0) * depressantLevel;
      const fSlp = Math.max(0.05, 1 - sim.eta * sleep * qualityAmplifier * depressAmp);

      // Stress counterregulatory pressure (U).
      const fStress = 1 / (1 + sim.h_U * stress);

      // Illness counterregulatory pressure (K).
      const fIllness = 1 / (1 + sim.h_K * illness);

      // Travel / routine disruption (3.2).
      const fTravel = 1 / (1 + sim.travel_sens_penalty * travelDay);

      // Alcohol (4.1): at moderate to heavy intake, peripheral glucose utilisation is
      // partially blunted (reduced muscle uptake) while hepatic output is suppressed
      // separately in the ODE. The net sensitivity effect is a small direct reduction.
      const alcoholLevel = inp.alcoholLevel ?? 0;
      const fAlcohol = 1 - sim.alcohol_sens_effect * alcoholLevel;

      // Stimulants (4.2): caffeine / prescribed stimulants trigger epinephrine release via
      // adenosine receptor antagonism, acutely reducing insulin sensitivity 15–30%.
      const stimulantLevel = inp.stimulantLevel ?? 0;
      const fStimulant = 1 / (1 + sim.stim_sens_penalty * stimulantLevel);

      // Nicotine (4.4): vasoconstriction impairs peripheral glucose disposal at the
      // receptor level — studies show ~15–20% reduction in insulin-mediated uptake.
      const nicotineLevel = inp.nicotineLevel ?? 0;
      const fNicotine = 1 / (1 + sim.nicotine_util_penalty * nicotineLevel);

      const dynamicMult = fBG * fEx * fDawn * fLow * fHigh * fSlp * fStress * fIllness * fTravel * fAlcohol * fStimulant * fNicotine;
      // seff_mult includes all factors so the displayed percentage is complete.
      const seff_mult = fBMI * fAge * fSex * dynamicMult;

      return {
        seff: eta0 * dynamicMult,
        seff_mult,
        eta0,
        fBMI, fAge, fSex,
        fBG, fEx, fDawn, fLow, fHigh, fSlp, fStress, fIllness, fTravel, fAlcohol,
        fStimulant, fNicotine,
      };
    }

    // ── C3. Combined modifier snapshot ───────────────────────────────────────────
    // Merges absorption and sensitivity into one object for display.
    // extra = { pkState, mealState, totalIOB } for full uncertainty calculation.
    function computeModifiers(inp, sv, profile, sim, extra = {}) {
      const k = calcKabs(inp, profile, sim);
      const s = calcSeff(inp, sv, profile, sim);
      const carbs = inp.carbs || 0;
      const travelDay = inp.travelDay || 0;

      const alcoholLevel = inp.alcoholLevel ?? 0;
      const stimulantLevel = inp.stimulantLevel ?? 0;
      const depressantLevel = inp.depressantLevel ?? 0;
      const nicotineLevel = inp.nicotineLevel ?? 0;
      const thcLevel = inp.thcLevel ?? 0;

      const absorption = {
        'BMI': k.fBMI,
        'HR/Pulse': k.fHR,
        'Activity': k.fPA,
        'Sleep': k.fSleep,
        'Hydration': k.fHydration,
      };
      if (carbs > 0) {
        absorption['Meal Type'] = k.fMealSlow;
        absorption['Fiber'] = k.fFiberSlow;
      }
      const sensitivity = {
        'Age': s.fAge,
        'Sex': s.fSex,
        'BMI': s.fBMI,
        'Blood Sugar': s.fBG,
        'Exercise': s.fEx,
        'Dawn': s.fDawn,
        'Prev Lows': s.fLow,
        'Prev Highs': s.fHigh,
        'Sleep': s.fSlp,
        'Stress': s.fStress,
        'Illness': s.fIllness,
      };
      if (travelDay) sensitivity['Travel'] = s.fTravel;

      // ── 4.x Substance sensitivity factors ────────────────────────────────────
      const metabolic = {};
      if (alcoholLevel > 0) metabolic['Alcohol'] = s.fAlcohol;
      if (stimulantLevel > 0) metabolic['Stimulants'] = s.fStimulant;
      if (nicotineLevel > 0) metabolic['Nicotine'] = s.fNicotine;

      // ── 5.2 Physiologic output factors ───────────────────────────────────────
      // Hepatic output: 1.0 = baseline, < 1 = suppressed (alcohol),
      //                 > 1 = boosted (stimulant-driven glycogenolysis).
      // Stimulant boost is expressed relative to a reference absolute of 0.5 mg/dL/hr
      // so the multiplicative display makes sense alongside the suppression term.
      const hepaticOutputFactor = Math.max(0.02,
        (1 - sim.alcohol_hep_suppress * alcoholLevel) *
        (1 + (sim.stim_hep_boost / 0.5) * stimulantLevel)
      );

      // Gastric emptying factor: k_ge / k_ge_base — substance and meal composition effects.
      const fat_g = inp.fat_g ?? 0;
      const protein_g = inp.protein_g ?? 0;
      const carbs_g = inp.carbs ?? 0;
      const totalMacro = fat_g + protein_g + carbs_g;
      const fatNorm = fat_g / (totalMacro + 1);
      const protNorm = protein_g / (totalMacro + 1);
      const mealTF = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][inp.mealType ?? 0] ?? 1.0;
      const fiberF = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][inp.fiberClass ?? 0] ?? 1.0;
      const gastricEmptyingFactor = Math.max(0.05,
        mealTF * fiberF *
        (1 - sim.k_ge_fat_factor * fatNorm) *
        (1 - sim.k_ge_prot_factor * protNorm) *
        (1 - sim.alcohol_gastric_slow * alcoholLevel) *
        (1 - sim.depress_gastric_slow * depressantLevel) *
        (1 - sim.thc_gastric_slow * thcLevel)
      );

      // ── 5.1 Uncertainty scalar ────────────────────────────────────────────────
      // Base scalar from inp-level stressors; IOB and meal overlap added if extra provided.
      const substanceSum = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
      const { pkState = {}, mealState = {} } = extra;
      const overlapScore = ((mealState.D_g ?? 0) > 5 ? 1 : 0)
        + ((mealState.R_c ?? 0) > 5 ? 0.5 : 0)
        + ((mealState.delayedMeal ?? 0) > 5 ? 0.5 : 0);
      const iobContrib = Math.min(pkState.Q_p ?? 0, 5);
      const U_scalar = 1
        + (sim.u_stress ?? 0.30) * ((inp.stress ?? 0) / 3)
        + (sim.u_illness ?? 0.50) * (inp.illness ?? 0)
        + (sim.u_travel ?? 0.40) * travelDay
        + (sim.u_overlap ?? 0.25) * overlapScore
        + (sim.u_substances ?? 0.15) * substanceSum
        + (sim.u_iob ?? 0.10) * iobContrib;
      // Confidence: inverse of U_scalar, clamped to [0.05, 1].
      const confidenceFactor = Math.max(0.05, 1 / U_scalar);

      return {
        ...k, ...s,
        absorption, sensitivity, metabolic,
        // 5.2 output section
        hepaticOutputFactor,
        gastricEmptyingFactor,
        U_scalar,
        confidenceFactor,
      };
    }

    // ── C3b. Build PK model from log history ─────────────────────────────────────
    // Creates a BloodGlucoseInsulinModel, replays logged doses chronologically,
    // and returns the model ready for getState() / getCorrectionRecommendation().
    // k_e is converted from hr⁻¹ (stored in sim) to min⁻¹ (used internally).
    function buildPkModel(logs, profile, sim) {
      const model = new BloodGlucoseInsulinModel({
        k_a_max: sim.k_a_max ?? 0.03,
        K_M: sim.K_M ?? 5.0,
        k_e: (sim.k_clear ?? 0.5) / 60,
        baseISF: profile.corrFactor,
        targetGlucose: profile.targetBG,
      });
      const cutoffMs = Date.now() - (profile.insulinDur ?? 4) * 2.5 * 3_600_000;
      [...logs]
        .filter(l => l.insulinDose > 0 && new Date(l.timestamp).getTime() >= cutoffMs)
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        .forEach(log => model.addBolus(log.insulinDose, new Date(log.timestamp).getTime()));
      return model;
    }

    // Maps computeModifiers() output to BloodGlucoseInsulinModel's four sensitivity factors.
    // Circadian = slow demographic/sleep baseline (what to expect when new insulin acts).
    // Acute factors (exercise, stress+substances, glucose-level) adjust the current credit.
    function mapModifiersToSensFactors(mod) {
      return {
        circadianSensitivityFactor: (mod.fAge ?? 1) * (mod.fSex ?? 1) * (mod.fSlp ?? 1) * (mod.fDawn ?? 1),
        exerciseSensitivityFactor: mod.fEx ?? 1,
        stressSensitivityFactor: (mod.fStress ?? 1) * (mod.fIllness ?? 1) *
          (mod.fTravel ?? 1) * (mod.fAlcohol ?? 1) *
          (mod.fStimulant ?? 1) * (mod.fNicotine ?? 1),
        glucoseSensitivityFactor: (mod.fBG ?? 1) * (mod.fLow ?? 1) * (mod.fHigh ?? 1) * (mod.fBMI ?? 1),
      };
    }

    // ── C4. State variables (body memory) ────────────────────────────────────────
    // Integrates log history to compute E_ex (exercise), L (low memory), H (high memory).
    function computeStateVars(logs, profile, sim) {
      const nowMs = Date.now();
      let E_ex = 0, L = 0, H = 0;
      logs.forEach(log => {
        const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (hrs < 0 || hrs > 24) return;
        const pa = safeNum(log.pa, 0);
        if (pa > 0) E_ex += rollingDecay(pa, hrs, sim.tau_ex);
        const bg = safeNum(log.bloodSugar, 0);
        if (bg > 0 && bg < profile.lowBG) L += rollingDecay(profile.lowBG - bg, hrs, sim.tau_low);
        if (bg > profile.highBG) H += rollingDecay(bg - profile.highBG, hrs, sim.tau_high);
      });
      return { E_ex, L, H };
    }

    // ── C5. Two-compartment PK reconstruction ────────────────────────────────────
    // Reconstructs the current subcutaneous (Q_sc) and plasma (Q_p) insulin pools
    // from logged dose history.
    // kabs_rel captures continuous modifiers (BMI, HR, activity, sleep, hydration).
    // siteMultiplier is stored separately and applied here as a per-dose factor,
    // so the two can be tuned independently without double-counting.
    function reconstructPK(logs, profile, sim) {
      const nowMs = Date.now();
      let Q_sc = 0, Q_p = 0;
      logs.filter(l => l.insulinDose > 0).forEach(log => {
        const tau = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (tau < 0 || tau > profile.insulinDur * 2.5) return;
        const D = safeNum(log.insulinDose);
        const contM = safeNum(log.kabs_rel, 1.0);     // continuous modifier at log time
        const siteM = safeNum(log.siteMultiplier, 1.0); // per-dose site factor
        const ka = sim.k_abs0 * contM * siteM;
        const kc = sim.k_clear;
        Q_sc += D * Math.exp(-ka * tau);
        if (Math.abs(ka - kc) > 1e-3) {
          Q_p += D * ka / (ka - kc) * (Math.exp(-kc * tau) - Math.exp(-ka * tau));
        } else {
          Q_p += D * ka * tau * Math.exp(-ka * tau);
        }
      });
      return { Q_sc: Math.max(0, Q_sc), Q_p: Math.max(0, Q_p) };
    }

    // ── C5b. Meal state reconstruction ───────────────────────────────────────────
    // Reconstructs the current state of the three meal-absorption reservoirs:
    //   delayedMeal — fat/protein glucose-equivalent still pending release (2.1)
    //   D_g         — carbs still in the stomach (grams) (2.3)
    //   R_c         — carbs in the gut, ready for blood absorption (grams) (2.3)
    // Each reservoir is initialised by forward-integrating the ODE from each
    // recent meal's timestamp to now, so the projection starts with accurate IC.
    function reconstructMealState(logs, profile, sim) {
      const nowMs = Date.now();
      let delayedMeal = 0;
      let D_g = 0;
      let R_c = 0;

      logs.forEach(log => {
        const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (hrs < 0 || hrs > 10) return; // only consider meals from the past 10 h

        const fat_g = safeNum(log.fat_g, 0);
        const protein_g = safeNum(log.protein_g, 0);
        const carbs_g = safeNum(log.carbs, 0);
        const mealType = safeNum(log.mealType, 0);
        const fiberClass = safeNum(log.fiberClass, 0);

        // 2.1 Fat/protein reservoir — simple exponential decay from meal time.
        delayedMeal += (fat_g * sim.fat_factor + protein_g * sim.prot_factor) *
          Math.exp(-sim.lambda_FP * hrs);

        // 2.3 Gastric emptying — forward-integrate the two-compartment ODE from
        // meal time to now in 1-minute steps.
        if (carbs_g > 0) {
          const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mealType] ?? 1.0;
          const fiberFactor = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][fiberClass] ?? 1.0;
          const total = fat_g + protein_g + carbs_g;
          const fatNorm = fat_g / (total + 1);
          const protNorm = protein_g / (total + 1);
          const k_ge = sim.k_ge_base * mealTypeFactor * fiberFactor *
            (1 - sim.k_ge_fat_factor * fatNorm) *
            (1 - sim.k_ge_prot_factor * protNorm);

          const DT = 1 / 60;  // 1-minute integration step
          const steps = Math.round(hrs / DT);
          let dg = carbs_g, rc = 0;
          for (let i = 0; i < steps; i++) {
            const ddg = -k_ge * dg;
            const drc = k_ge * dg - sim.k_carb_abs * rc;
            dg = Math.max(0, dg + ddg * DT);
            rc = Math.max(0, rc + drc * DT);
          }
          D_g += dg;
          R_c += rc;
        }
      });

      return { delayedMeal, D_g, R_c };
    }

    // ── C6. IOB for a single logged dose ─────────────────────────────────────────
    // Estimates how many units from a past dose are still active.
    // Effective duration is shortened by faster absorption (high ka_rel) and
    // lengthened by slower absorption (e.g. thigh site, low siteMultiplier).
    function iobForDose(log, profile, sim) {
      const elapsed = (Date.now() - new Date(log.timestamp).getTime()) / 3_600_000;
      const ka_rel = safeNum(log.kabs_rel, 1.0);
      const siteM = safeNum(log.siteMultiplier, 1.0);
      const effDur = profile.insulinDur / Math.max(0.3, ka_rel * siteM);
      if (elapsed >= effDur) return 0;
      return Math.max(0, Math.round(log.insulinDose * (1 - elapsed / effDur) * 100) / 100);
    }

    // ── C7. Dose calculation ──────────────────────────────────────────────────────
    // Suggests a bolus dose based on current BG, carbs, and sensitivity.
    function calcDose(bg, carbs, sv, inp, profile, sim, pkCorrRec = null) {
      const sm = calcSeff(inp, sv, profile, sim);
      // Sensitivity for dosing purposes: omits the BG-level factor (fBG) because
