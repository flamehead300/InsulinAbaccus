      // Sex-based offset: females tend toward slightly higher peripheral sensitivity.
      // sex_factor_F is configured as insulin need (< 1 = less insulin needed), so
      // sensitivity moves in the opposite direction.
      const fSex = profile.sex === 'F' ? 1 / Math.max(0.01, sim.sex_factor_F) : 1.0;

      // Composite demographic baseline.
      const eta0 = profile.corrFactor * fBMI * fAge * fSex;

      // -- Dynamic real-time factors ---------------------------------------------
      // BG-level effect: sensitivity peaks near target BG, falls on both sides.
      const fBG = gauss(bg, profile.targetBG, sim.sigma_bg);

      // Exercise boost from accumulated activity memory.
      const fEx = 1 + sim.kappa * E_ex;

      // Dawn phenomenon (5.1 manual): user explicitly flags that they are waking from sleep
      // and experiencing the cortisol/GH surge. Replaces the old time-of-day cosine model.
      const fDawn = inp.dawnEffect ? (1 - sim.d_dawn) : 1.0;

      // Recent-low memory: a prior hypo blunts the next insulin dose.
      const fLow = 1 / (1 + sim.rho * L);

      // Recent-high memory: persistent hyperglycemia reduces insulin effectiveness.
      const fHigh = 1 / (1 + sim.sigma_h * H);

      // Sleep: reduces sensitivity; poor quality amplifies the reduction.
      // Depressants (4.3) further amplify the sleep effect via deepened CNS depression.
      const depressantLevel = inp.depressantLevel ?? 0;
      const qualityAmplifier = sleep ? (1 + sim.eta_q * (1 - sleepQ / 4)) : 1;
      const depressAmp = 1 + (sim.depress_sleep_amplify ?? 0) * depressantLevel;
      const fSlp = Math.max(0.05, 1 - sim.eta * sleep * qualityAmplifier * depressAmp);

      // Stress counterregulatory pressure (U).
      const fStress = 1 / (1 + sim.h_U * stress);

      // Illness counterregulatory pressure (K).
      const fIllness = 1 / (1 + sim.h_K * illness);

      // Travel / routine disruption (3.2).
      const fTravel = 1 / (1 + sim.travel_sens_penalty * travelDay);

      // Alcohol (4.1): at moderate to heavy intake, peripheral glucose utilisation is
      // partially blunted (reduced muscle uptake) while hepatic output is suppressed
      // separately in the ODE. The net sensitivity effect is a small direct reduction.
      const alcoholLevel = inp.alcoholLevel ?? 0;
      const fAlcohol = 1 - sim.alcohol_sens_effect * alcoholLevel;

      // Stimulants (4.2): caffeine / prescribed stimulants trigger epinephrine release via
      // adenosine receptor antagonism, acutely reducing insulin sensitivity 15–30%.
      const stimulantLevel = inp.stimulantLevel ?? 0;
      const fStimulant = 1 / (1 + sim.stim_sens_penalty * stimulantLevel);

      // Nicotine (4.4): vasoconstriction impairs peripheral glucose disposal at the
      // receptor level — studies show ~15–20% reduction in insulin-mediated uptake.
      const nicotineLevel = inp.nicotineLevel ?? 0;
      const fNicotine = 1 / (1 + sim.nicotine_util_penalty * nicotineLevel);

      const dynamicMult = fBG * fEx * fDawn * fLow * fHigh * fSlp * fStress * fIllness * fTravel * fAlcohol * fStimulant * fNicotine;
      // seff_mult includes all factors so the displayed percentage is complete.
      const seff_mult = fBMI * fAge * fSex * dynamicMult;

      return {
        seff: eta0 * dynamicMult,
        seff_mult,
        eta0,
        fBMI, fAge, fSex,
        fBG, fEx, fDawn, fLow, fHigh, fSlp, fStress, fIllness, fTravel, fAlcohol,
        fStimulant, fNicotine,
      };
    }

    // -- C3. Combined modifier snapshot -------------------------------------------
    // Merges absorption and sensitivity into one object for display.
    // extra = { pkState, mealState, totalIOB } for full uncertainty calculation.
    function computeModifiers(inp, sv, profile, sim, extra = {}) {
      const k = calcKabs(inp, profile, sim);
      const s = calcSeff(inp, sv, profile, sim);
      const carbs = inp.carbs || 0;
      const travelDay = inp.travelDay || 0;

      const alcoholLevel = inp.alcoholLevel ?? 0;
      const stimulantLevel = inp.stimulantLevel ?? 0;
      const depressantLevel = inp.depressantLevel ?? 0;
      const nicotineLevel = inp.nicotineLevel ?? 0;
      const thcLevel = inp.thcLevel ?? 0;

      const absorption = {
        'BMI': k.fBMI,
        'HR/Pulse': k.fHR,
        'Activity': k.fPA,
        'Sleep': k.fSleep,
        'Hydration': k.fHydration,
      };
      if (carbs > 0) {
        absorption['Meal Type'] = k.fMealSlow;
        absorption['Fiber'] = k.fFiberSlow;
      }
      const sensitivity = {
        'Age': s.fAge,
        'Sex': s.fSex,
        'BMI': s.fBMI,
        'Blood Sugar': s.fBG,
        'Exercise': s.fEx,
        'Dawn': s.fDawn,
        'Prev Lows': s.fLow,
        'Prev Highs': s.fHigh,
        'Sleep': s.fSlp,
        'Stress': s.fStress,
        'Illness': s.fIllness,
      };
      if (travelDay) sensitivity['Travel'] = s.fTravel;

      // -- 4.x Substance sensitivity factors ------------------------------------
      const metabolic = {};
      if (alcoholLevel > 0) metabolic['Alcohol'] = s.fAlcohol;
      if (stimulantLevel > 0) metabolic['Stimulants'] = s.fStimulant;
      if (nicotineLevel > 0) metabolic['Nicotine'] = s.fNicotine;

      // -- 5.2 Physiologic output factors ---------------------------------------
      // Hepatic output: 1.0 = baseline, < 1 = suppressed (alcohol),
      //                 > 1 = boosted (stimulant-driven glycogenolysis).
      // Stimulant boost is expressed relative to a reference absolute of 0.5 mg/dL/hr
      // so the multiplicative display makes sense alongside the suppression term.
      const hepaticOutputFactor = Math.max(0.02,
        (1 - sim.alcohol_hep_suppress * alcoholLevel) *
        (1 + (sim.stim_hep_boost / 0.5) * stimulantLevel)
      );

      // Gastric emptying factor: k_ge / k_ge_base — substance and meal composition effects.
      const fat_g = inp.fat_g ?? 0;
      const protein_g = inp.protein_g ?? 0;
      const carbs_g = inp.carbs ?? 0;
      const totalMacro = fat_g + protein_g + carbs_g;
      const fatNorm = fat_g / (totalMacro + 1);
      const protNorm = protein_g / (totalMacro + 1);
      const mealTF = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][inp.mealType ?? 0] ?? 1.0;
      const fiberF = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][inp.fiberClass ?? 0] ?? 1.0;
      const gastricEmptyingFactor = Math.max(0.05,
        mealTF * fiberF *
        (1 - sim.k_ge_fat_factor * fatNorm) *
        (1 - sim.k_ge_prot_factor * protNorm) *
        (1 - sim.alcohol_gastric_slow * alcoholLevel) *
        (1 - sim.depress_gastric_slow * depressantLevel) *
        (1 - sim.thc_gastric_slow * thcLevel)
      );

      // -- 5.1 Uncertainty scalar ------------------------------------------------
      // Base scalar from inp-level stressors; IOB and meal overlap added if extra provided.
      const substanceSum = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
      const { pkState = {}, mealState = {} } = extra;
      const overlapScore = ((mealState.D_g ?? 0) > 5 ? 1 : 0)
        + ((mealState.R_c ?? 0) > 5 ? 0.5 : 0)
        + ((mealState.delayedMeal ?? 0) > 5 ? 0.5 : 0);
      const iobContrib = Math.min(pkState.Q_p ?? 0, 5);
      const U_scalar = 1
        + (sim.u_stress ?? 0.30) * ((inp.stress ?? 0) / 3)
        + (sim.u_illness ?? 0.50) * (inp.illness ?? 0)
        + (sim.u_travel ?? 0.40) * travelDay
        + (sim.u_overlap ?? 0.25) * overlapScore
        + (sim.u_substances ?? 0.15) * substanceSum
        + (sim.u_iob ?? 0.10) * iobContrib;
      // Confidence: inverse of U_scalar, clamped to [0.05, 1].
      const confidenceFactor = Math.max(0.05, 1 / U_scalar);

      return {
        ...k, ...s,
        absorption, sensitivity, metabolic,
        // 5.2 output section
        hepaticOutputFactor,
        gastricEmptyingFactor,
        U_scalar,
        confidenceFactor,
      };
    }

    // -- C3b. Build PK model from log history -------------------------------------
    // Creates a BloodGlucoseInsulinModel, replays logged doses chronologically,
    // and returns the model ready for getState() / getCorrectionRecommendation().
    // k_e is converted from hr⁻¹ (stored in sim) to min⁻¹ (used internally).
    function buildPkModel(logs, profile, sim) {
      const model = new BloodGlucoseInsulinModel({
        k_a_max: sim.k_a_max ?? 0.03,
        K_M: sim.K_M ?? 5.0,
        k_e: kClearPerMinute(sim),
        baseISF: profile.corrFactor,
        targetGlucose: profile.targetBG,
      });
      const cutoffMs = Date.now() - (profile.insulinDur ?? 4) * 2.5 * 3_600_000;
      [...logs]
        .filter(l => l.insulinDose > 0 && new Date(l.timestamp).getTime() >= cutoffMs)
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        .forEach(log => model.addBolus(log.insulinDose, new Date(log.timestamp).getTime()));
      return model;
    }

    // Maps computeModifiers() output to BloodGlucoseInsulinModel's four sensitivity factors.
    // Circadian = slow demographic/sleep baseline (what to expect when new insulin acts).
    // Acute factors (exercise, stress+substances, glucose-level) adjust the current credit.
    function mapModifiersToSensFactors(mod) {
      return {
        circadianSensitivityFactor: (mod.fAge ?? 1) * (mod.fSex ?? 1) * (mod.fSlp ?? 1) * (mod.fDawn ?? 1),
        exerciseSensitivityFactor: mod.fEx ?? 1,
        stressSensitivityFactor: (mod.fStress ?? 1) * (mod.fIllness ?? 1) *
          (mod.fTravel ?? 1) * (mod.fAlcohol ?? 1) *
          (mod.fStimulant ?? 1) * (mod.fNicotine ?? 1),
        glucoseSensitivityFactor: (mod.fBG ?? 1) * (mod.fLow ?? 1) * (mod.fHigh ?? 1) * (mod.fBMI ?? 1),
      };
    }

    // -- C4. State variables (body memory) ----------------------------------------
    // Integrates log history to compute E_ex (exercise), L (low memory), H (high memory).
    function computeStateVars(logs, profile, sim) {
      const nowMs = Date.now();
      let E_ex = 0, L = 0, H = 0;
      logs.forEach(log => {
        const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (hrs < 0 || hrs > 24) return;
        const pa = safeNum(log.pa, 0);
        if (pa > 0) E_ex += rollingDecay(pa, hrs, sim.tau_ex);
        const bg = safeNum(log.bloodSugar, 0);
        if (bg > 0 && bg < profile.lowBG) L += rollingDecay(profile.lowBG - bg, hrs, sim.tau_low);
        if (bg > profile.highBG) H += rollingDecay(bg - profile.highBG, hrs, sim.tau_high);
      });
      return { E_ex, L, H };
    }

    // -- C5. Two-compartment PK reconstruction ------------------------------------
    // Reconstructs the current subcutaneous (Q_sc) and plasma (Q_p) insulin pools
    // from logged dose history.
    // kabs_rel captures continuous modifiers (BMI, HR, activity, sleep, hydration).
    // siteMultiplier is stored separately and applied here as a per-dose factor,
    // so the two can be tuned independently without double-counting.
    function reconstructPK(logs, profile, sim) {
      const nowMs = Date.now();
      let Q_sc = 0, Q_p = 0;
      logs.filter(l => l.insulinDose > 0).forEach(log => {
        const tau = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (tau < 0 || tau > profile.insulinDur * 2.5) return;
        const D = safeNum(log.insulinDose);
        const contM = safeNum(log.kabs_rel, 1.0);     // continuous modifier at log time
        const siteM = safeNum(log.siteMultiplier, 1.0); // per-dose site factor
        const ka = sim.k_abs0 * contM * siteM;
        const kc = kClearPerHour(sim);
        Q_sc += D * Math.exp(-ka * tau);
        if (Math.abs(ka - kc) > 1e-3) {
          Q_p += D * ka / (ka - kc) * (Math.exp(-kc * tau) - Math.exp(-ka * tau));
        } else {
          Q_p += D * ka * tau * Math.exp(-ka * tau);
        }
      });
      return { Q_sc: Math.max(0, Q_sc), Q_p: Math.max(0, Q_p) };
    }

    // -- C5b. Meal state reconstruction -------------------------------------------
    // Reconstructs the current state of the three meal-absorption reservoirs:
    //   delayedMeal — fat/protein glucose-equivalent still pending release (2.1)
    //   D_g         — carbs still in the stomach (grams) (2.3)
    //   R_c         — carbs in the gut, ready for blood absorption (grams) (2.3)
    // Each reservoir is initialised by forward-integrating the ODE from each
    // recent meal's timestamp to now, so the projection starts with accurate IC.
    function reconstructMealState(logs, profile, sim) {
      const nowMs = Date.now();
      let delayedMeal = 0;
      let D_g = 0;
      let R_c = 0;

      logs.forEach(log => {
        const hrs = (nowMs - new Date(log.timestamp).getTime()) / 3_600_000;
        if (hrs < 0 || hrs > 10) return; // only consider meals from the past 10 h

        const fat_g = safeNum(log.fat_g, 0);
        const protein_g = safeNum(log.protein_g, 0);
        const carbs_g = safeNum(log.carbs, 0);
        const mealType = safeNum(log.mealType, 0);
        const fiberClass = safeNum(log.fiberClass, 0);

        // 2.1 Fat/protein reservoir — simple exponential decay from meal time.
        delayedMeal += (fat_g * sim.fat_factor + protein_g * sim.prot_factor) *
          Math.exp(-sim.lambda_FP * hrs);

        // 2.3 Gastric emptying — forward-integrate the two-compartment ODE from
        // meal time to now in 1-minute steps.
        if (carbs_g > 0) {
          const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mealType] ?? 1.0;
          const fiberFactor = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][fiberClass] ?? 1.0;
          const total = fat_g + protein_g + carbs_g;
          const fatNorm = fat_g / (total + 1);
          const protNorm = protein_g / (total + 1);
          const k_ge = sim.k_ge_base * mealTypeFactor * fiberFactor *
            (1 - sim.k_ge_fat_factor * fatNorm) *
            (1 - sim.k_ge_prot_factor * protNorm);

          const DT = 1 / 60;  // 1-minute integration step
          const steps = Math.round(hrs / DT);
          let dg = carbs_g, rc = 0;
          for (let i = 0; i < steps; i++) {
            const ddg = -k_ge * dg;
            const drc = k_ge * dg - sim.k_carb_abs * rc;
            dg = Math.max(0, dg + ddg * DT);
            rc = Math.max(0, rc + drc * DT);
          }
          D_g += dg;
          R_c += rc;
        }
      });

      return { delayedMeal, D_g, R_c };
    }

    // -- C6. IOB for a single logged dose -----------------------------------------
    // Estimates how many units from a past dose are still active.
    // Effective duration is shortened by faster absorption (high ka_rel) and
    // lengthened by slower absorption (e.g. thigh site, low siteMultiplier).
    function iobForDose(log, profile, sim) {
      const elapsed = (Date.now() - new Date(log.timestamp).getTime()) / 3_600_000;
      const ka_rel = safeNum(log.kabs_rel, 1.0);
      const siteM = safeNum(log.siteMultiplier, 1.0);
      const effDur = profile.insulinDur / Math.max(0.3, ka_rel * siteM);
      if (elapsed >= effDur) return 0;
      return Math.max(0, Math.round(log.insulinDose * (1 - elapsed / effDur) * 100) / 100);
    }

    // -- C7. Dose calculation ------------------------------------------------------
    // Suggests a bolus dose based on current BG, carbs, and sensitivity.
    function calcDose(bg, carbs, sv, inp, profile, sim, pkCorrRec = null) {
      if (!isFinite(bg) || bg <= 0 || bg > BG_DOSING_MAX) return null;
      if (!isFinite(carbs) || carbs < CARB_ENTRY_MIN || carbs > CARB_ENTRY_MAX) return null;

      const sm = calcSeff(inp, sv, profile, sim);
      // Sensitivity for dosing purposes: omits the BG-level factor (fBG) because
      // that factor already accounts for the current BG in the correction formula.
      // Age and sex are now embedded in sm.eta0, so we use that as the base rather
      // than reconstructing from corrFactor alone.
      const seffDose = sm.eta0 *
        sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness *
        sm.fTravel * sm.fAlcohol * sm.fStimulant * sm.fNicotine;
      const corrDoseBase = bg > profile.targetBG ? (bg - profile.targetBG) / Math.max(1, seffDose) : 0;
      const pkIobCredit = Math.max(0, Number(pkCorrRec?.iobCredit) || 0);
      const pkExpectedFutureISF = Number(pkCorrRec?.expectedFutureISF);
      // Safe correction path: apply PK-derived IOB credit whenever available.
      const corrDoseSafe = (pkCorrRec && bg > profile.targetBG)
        ? Math.max(0, (Number(pkCorrRec.rawCorrection) || 0) - pkIobCredit)
        : corrDoseBase;
      const corrDose = Math.min(corrDoseBase, corrDoseSafe);
      // Effective carb ratio scales with sensitivity factors: more sensitive means
      // more grams are covered per unit; more resistant means fewer grams per unit.
      const allDynamic = sm.fBMI * sm.fAge * sm.fSex *
        sm.fEx * sm.fDawn * sm.fLow * sm.fHigh * sm.fSlp * sm.fStress * sm.fIllness *
        sm.fTravel * sm.fAlcohol * sm.fStimulant * sm.fNicotine;
      const effCR = profile.carbRatio * Math.max(0.05, allDynamic);
      const carbDose = carbs > 0 ? carbs / Math.max(0.5, effCR) : 0;
      const uncappedTotal = Math.max(0, corrDose + carbDose);
      const maxDose = Math.max(0.5, safeNum(profile.maxDose, 50));
      const capped = uncappedTotal > maxDose;
      const total = Math.min(maxDose, uncappedTotal);
      return {
        corrDoseBase: Math.round(corrDoseBase * 100) / 100,
        corrDose: Math.round(corrDose * 100) / 100,
        carbDose: Math.round(carbDose * 100) / 100,
        total: Math.round(total * 100) / 100,
        uncappedTotal: Math.round(uncappedTotal * 100) / 100,
        capped,
        maxDose: Math.round(maxDose * 100) / 100,
        effCR: Math.round(effCR * 10) / 10,
        seffDose: Math.round(seffDose),
        corrSensitivity: Math.round(((pkExpectedFutureISF > 0 ? pkExpectedFutureISF : seffDose)) * 10) / 10,
        iobCredit: Math.round(pkIobCredit * 100) / 100,
        correctionBlockedByIob: corrDoseBase > 0 && corrDose <= 0 && pkIobCredit > 0,
      };
    }

    // -- C8. Forward glucose simulation -------------------------------------------
    // Euler-integrates the glucose ODE 4 hours ahead at 5-minute steps.
    // Now includes:
    //   • ongoing basal insulin delivery (B_bas)
    //   • gastric emptying two-compartment model (D_g → R_c → G)  [2.3]
    //   • fat/protein delayed glucose release (delayedMeal → G)   [2.1]
    //   • travel uncertainty band (grows linearly over projection) [3.2]
    function simulateProjection(startG, pkState, sv0, currentInputs, profile, sim, hoursAhead = 4, mealState = {}) {
      const DT = 5 / 60;
      const steps = Math.round(hoursAhead / DT);
      const tNow = new Date().getHours() + new Date().getMinutes() / 60;
      const kS = profile.corrFactor * kClearPerHour(sim);

      let { Q_sc, Q_p } = pkState;
      let { E_ex, L, H } = sv0;
      let G = startG;

      // Initialise meal absorption state (2.1 + 2.3).
      let delayedMeal = mealState.delayedMeal ?? 0;
      let D_g = mealState.D_g ?? 0;
      let R_c = mealState.R_c ?? 0;

      const travelDay = currentInputs.travelDay ?? 0;
      const alcoholLevel = currentInputs.alcoholLevel ?? 0;
      const stimulantLevel = currentInputs.stimulantLevel ?? 0;
      const depressantLevel = currentInputs.depressantLevel ?? 0;
      const nicotineLevel = currentInputs.nicotineLevel ?? 0;
      const thcLevel = currentInputs.thcLevel ?? 0;

      // Gastric-emptying rate for the current meal context (constant over projection).
      const mT = currentInputs.mealType ?? 0;
      const fC = currentInputs.fiberClass ?? 0;
      const fat_g = currentInputs.fat_g ?? 0;
      const protein_g = currentInputs.protein_g ?? 0;
      const carbs_ctx = currentInputs.carbs ?? 0;
      const totalMacro = fat_g + protein_g + carbs_ctx;
      const fatNorm = fat_g / (totalMacro + 1);
      const protNorm = protein_g / (totalMacro + 1);
      const mealTypeFactor = [sim.meal_slow_fast, sim.meal_slow_mixed, sim.meal_slow_hfp][mT] ?? 1.0;
      const fiberFactor = [sim.fiber_slow_low, sim.fiber_slow_med, sim.fiber_slow_high][fC] ?? 1.0;
      const k_ge = sim.k_ge_base * mealTypeFactor * fiberFactor *
        (1 - sim.k_ge_fat_factor * fatNorm) *
        (1 - sim.k_ge_prot_factor * protNorm) *
        (1 - sim.alcohol_gastric_slow * alcoholLevel)    // 4.1 alcohol slows gastric emptying
        * (1 - sim.depress_gastric_slow * depressantLevel)  // 4.3 CNS relaxation
        * (1 - sim.thc_gastric_slow * thcLevel);        // 4.5 CB1 activation slows motility

      // 4.1 Hepatic glucose output is suppressed by alcohol: the liver prioritises
      // ethanol metabolism over gluconeogenesis, removing the background glucose drip.
      // 4.2 Stimulants transiently boost G_prod via glycogenolysis (mild adrenaline surge).
      const G_prod_eff = sim.G_prod * (1 - sim.alcohol_hep_suppress * alcoholLevel)
        - sim.alcohol_hep_suppress * alcoholLevel * 0.4  // net negative contribution
        + sim.stim_hep_boost * stimulantLevel;            // 4.2 glycogenolysis boost

      // -- 5.1 Uncertainty scalar U — weighted sum of all active stressors -----
      // U_scalar is time-invariant; the band width grows as U_scalar * u_base * sqrt(t)
      // so compounding errors widen exponentially with horizon, as they do clinically.
      const substanceSum = alcoholLevel + stimulantLevel + depressantLevel + nicotineLevel + thcLevel;
      const overlapScore = ((mealState.D_g ?? 0) > 5 ? 1 : 0)
        + ((mealState.R_c ?? 0) > 5 ? 0.5 : 0)
        + ((mealState.delayedMeal ?? 0) > 5 ? 0.5 : 0);
      const iobContrib = Math.min(pkState.Q_p ?? 0, 5);
      const U_scalar = 1
        + (sim.u_stress ?? 0.30) * ((currentInputs.stress ?? 0) / 3)
        + (sim.u_illness ?? 0.50) * (currentInputs.illness ?? 0)
        + (sim.u_travel ?? 0.40) * travelDay
        + (sim.u_overlap ?? 0.25) * overlapScore
        + (sim.u_substances ?? 0.15) * substanceSum
        + (sim.u_iob ?? 0.10) * iobContrib;

      const pts = [{
        t: 0, G: Math.round(G), Qp: Math.round(Q_p * 100) / 100, u: 0,
        band_upper: Math.round(G), band_lower: Math.round(G)
      }];

      for (let i = 1; i <= steps; i++) {
        const tHr = ((tNow + i * DT) % 24 + 24) % 24;
        const inp = {
          bmi: currentInputs.bmi,
          hr: currentInputs.hr,
          pa: currentInputs.pa,
          sleep: currentInputs.sleep,
          sleepQ: currentInputs.sleepQ,
          hydration: currentInputs.hydration,
          stress: currentInputs.stress,
          illness: currentInputs.illness,
          travelDay,                            // 3.2
          alcoholLevel,                         // 4.1
          stimulantLevel,                       // 4.2
          depressantLevel,                      // 4.3
          nicotineLevel,                        // 4.4
          thcLevel,                             // 4.5
          bg: G,
          timeHour: tHr,
        };

        const km = calcKabs(inp, profile, sim);
        const sm = calcSeff(inp, { E_ex, L, H }, profile, sim);
        const ka = km.kabs;

        // Basal delivery adds a small continuous input to the subcutaneous pool.
        const basalInput = profile.basalRate;

        // Insulin PK.
        const dQsc = -ka * Q_sc + basalInput;
        const dQp = ka * Q_sc - kClearPerHour(sim) * Q_p;
        const insulinEffect = kS * sm.seff_mult * Q_p;

        // 2.1 Fat/protein delayed release — reservoir decays into glucose.
        const fpRelease = delayedMeal * (1 - Math.exp(-sim.lambda_FP * DT));

        // 2.3 Gastric emptying — stomach→gut→blood.
        const dDg = -k_ge * D_g;
        const dRc = k_ge * D_g - sim.k_carb_abs * R_c;
        const carbGlucoseRate = sim.k_carb_abs * R_c;

        // Net glucose rate.
        const dG = G_prod_eff
          - insulinEffect
          - sim.k_basal * (G - profile.targetBG)
          + carbGlucoseRate
          + fpRelease / DT;

        const dEex = (currentInputs.pa - E_ex) / sim.tau_ex;
        const dL = (Math.max(0, profile.lowBG - G) - L) / sim.tau_low;
        const dH = (Math.max(0, G - profile.highBG) - H) / sim.tau_high;

        // Euler update.
        Q_sc = Math.max(0, Q_sc + dQsc * DT);
        Q_p = Math.max(0, Q_p + dQp * DT);
        G = clamp(G + dG * DT, 40, 500);
        E_ex = Math.max(0, E_ex + dEex * DT);
        L = Math.max(0, L + dL * DT);
        H = Math.max(0, H + dH * DT);
        delayedMeal = Math.max(0, delayedMeal - fpRelease);
        D_g = Math.max(0, D_g + dDg * DT);
        R_c = Math.max(0, R_c + dRc * DT);

        if (i % 6 === 0) {
          // 5.1 Uncertainty band grows as U_scalar * u_base * sqrt(tElapsed).
          // A √t profile matches the diffusion-like compounding of prediction error
          // (biologically: each uncertain step adds variance, not a fixed offset).
          const tElapsed = i * DT;
          const u = Math.round(U_scalar * (sim.u_base ?? 18) * Math.sqrt(tElapsed));
          pts.push({
            t: i * DT,
            G: Math.round(G),
            Qp: Math.round(Q_p * 100) / 100,
            u,
            band_upper: Math.min(500, Math.round(G + u)),
            band_lower: Math.max(40, Math.round(G - u)),
            U_scalar,
          });
        }
      }
      return { pts, U_scalar };
    }


    // -------------------------------------------------------------------------------
    //  D.  LOG / PERSISTENCE FUNCTIONS
    // -------------------------------------------------------------------------------

    // Build a complete, normalised log entry from raw form state.
    // This is the single place that knows the log schema.
    function makeLogEntry(formState, dose, liveMod) {
      const { bgV, fsV, cV, hrNum, paNum, slp, sleepQ, stress, illness, hydration,
        site, siteMultiplier, fatV, proteinV, mealType, fiberClass,
        travelDay, alcoholLevel, stimulantLevel, depressantLevel, nicotineLevel, thcLevel,
        timestampIso, not } = formState;
      return {
        id: Date.now().toString(),
        timestamp: timestampIso || nowISO(),
        // BG
        bloodSugar: fsV || bgV,
        cgm: bgV,
        fingerstick: fsV,
        // Nutrition
        carbs: cV,
        fat_g: fatV,       // 2.1
        protein_g: proteinV,   // 2.1
        mealType: mealType,   // 2.2
        fiberClass: fiberClass, // 2.2
        // Dosing
        insulinDose: dose.total,
        // Physiologic context
        hr: hrNum,
        pa: paNum,
        sleep: slp,
        sleepQ: sleepQ,
        stress: stress,
        illness: illness,
        hydration: hydration,
        travelDay: travelDay,   // 3.2
        alcoholLevel: alcoholLevel, // 4.1
        stimulantLevel: stimulantLevel ?? 0, // 4.2
        depressantLevel: depressantLevel ?? 0, // 4.3
        nicotineLevel: nicotineLevel ?? 0,  // 4.4
        thcLevel: thcLevel ?? 0,       // 4.5
        // Injection site — stored per-dose; used in reconstructPK and iobForDose
        site: site,
        siteMultiplier: siteMultiplier,
        // Computed at log time (continuous modifiers only — does NOT include site)
        kabs_rel: Math.round(liveMod.kabs_mult * 100) / 100,
        seff_mult: Math.round(liveMod.seff_mult * 1000) / 1000,
        notes: not.trim(),
      };
    }

    // Normalise an imported or old log entry so all fields exist with safe types.
    // This is where forward-compatibility lives: old logs missing new fields get defaults.
    function normalizeLogEntry(raw, i) {
      const timestampMs = toEpochMs(raw?.timestamp, 'timestamp');
      const numFields = [
        'bloodSugar', 'cgm', 'fingerstick', 'carbs', 'insulinDose',
        'hr', 'pa', 'sleep', 'sleepQ', 'stress', 'illness', 'hydration',
        'travelDay', 'alcoholLevel',                // 3.2 / 4.1
        'stimulantLevel', 'depressantLevel', 'nicotineLevel', 'thcLevel', // 4.2–4.5
        'siteMultiplier',
        'fat_g', 'protein_g', 'mealType', 'fiberClass',
        'kabs_rel', 'seff_mult',
      ];
      const out = {
        id: raw.id || `i${i}`,
        ...raw,
        timestamp: new Date(timestampMs).toISOString(),
        timestampMs,
      };
      numFields.forEach(k => {
        out[k] = raw[k] !== '' && raw[k] != null ? parseFloat(raw[k]) : null;
      });
      // Defaults for fields that didn't exist in older log versions.
      if (out.sleepQ == null) out.sleepQ = 4;
      if (out.stress == null) out.stress = 0;
      if (out.illness == null) out.illness = 0;
      if (out.hydration == null) out.hydration = 0;
      if (out.travelDay == null) out.travelDay = 0;
      if (out.alcoholLevel == null) out.alcoholLevel = 0; // 4.1 — off by default for old logs
      if (out.stimulantLevel == null) out.stimulantLevel = 0; // 4.2
      if (out.depressantLevel == null) out.depressantLevel = 0; // 4.3
      if (out.nicotineLevel == null) out.nicotineLevel = 0; // 4.4
      if (out.thcLevel == null) out.thcLevel = 0; // 4.5
      // Fat/protein/meal fields default to 0 so old logs still simulate correctly.
      if (out.fat_g == null) out.fat_g = 0;
      if (out.protein_g == null) out.protein_g = 0;
      if (out.mealType == null) out.mealType = 0;
      if (out.fiberClass == null) out.fiberClass = 0;
      // Site: string field with its own default path.
      if (!out.site) out.site = 'abdomen';
      if (out.siteMultiplier == null) out.siteMultiplier = 1.0;
      return out;
    }

    function normalizeLogCollection(rawLogs, sourceLabel = 'log') {
      if (!Array.isArray(rawLogs)) return [];
      return rawLogs.map((raw, i) => {
        try {
          return normalizeLogEntry(raw, i);
        } catch (err) {
          console.warn(`Skipping invalid ${sourceLabel}[${i}]`, err);
          return null;
        }
      }).filter(Boolean);
    }

    // Validate a single imported row. Returns an error string or null if valid.
    function validateImportedRow(row) {
      if (!row.timestamp) return 'missing timestamp';
      try { toEpochMs(row.timestamp, 'timestamp'); }
      catch { return 'invalid timestamp'; }
      if (row.bloodSugar != null && (row.bloodSugar < 20 || row.bloodSugar > 800))
        return `BG value out of range: ${row.bloodSugar}`;
      return null;
    }

    // Serialise logs to CSV text.
    function toCSV(logs) {
      const rows = logs.map(l =>
        CSV_COLUMNS.map(k => {
          const v = l[k];
          if (v == null) return '';
          if (typeof v === 'string') return `"${v.replace(/"/g, '""')}"`;
          return v;
        }).join(',')
      );
      return [CSV_COLUMNS.join(','), ...rows].join('\n');
    }

    // Parse CSV text safely, including quoted commas, escaped quotes, CRLF, and BOM.
    function parseCSVRows(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;
      const src = String(text || '').replace(/^\uFEFF/, '');

      for (let i = 0; i < src.length; i++) {
        const ch = src[i];
        if (inQuotes) {
          if (ch === '"') {
            if (src[i + 1] === '"') {
              field += '"';
              i += 1;
            } else {
              inQuotes = false;
            }
          } else {
            field += ch;
          }
          continue;
        }

        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          row.push(field);
          field = '';
        } else if (ch === '\r') {
          continue;
        } else if (ch === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else {
          field += ch;
        }
      }

      row.push(field);
      if (row.length > 1 || row[0] !== '') rows.push(row);
      return rows;
    }

    // Parse CSV text back into normalised log entries.
    function fromCSV(text) {
      const rows = parseCSVRows(text);
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => h.trim());
      const results = [];
      rows.slice(1).forEach((vals, i) => {
        const raw = {};
        headers.forEach((h, j) => { raw[h] = (vals[j] || '').trim(); });
        const err = validateImportedRow(raw);
        if (!err) results.push(raw);
      });
      return normalizeLogCollection(results, 'csv-row');
    }

    // Trigger a CSV file download.
    function dlCSV(logs) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([toCSV(logs)], { type: 'text/csv' }));
      a.download = `insulin-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Load a stored JSON value from localStorage; return fallback on error.
    function loadStored(key, fallback) {
      try { return { ...fallback, ...JSON.parse(localStorage.getItem(key) || '{}') }; }
      catch { return fallback; }
    }

    function normalizeCustomColors(customColors) {
      if (!customColors || typeof customColors !== 'object') return {};
      const out = {};
      CUSTOM_UI_KEYS.forEach(key => {
        const value = customColors[key];
        if (typeof value === 'string' && /^#[0-9a-fA-F]{6}$/.test(value)) out[key] = value.toLowerCase();
      });
      return out;
    }

    function effectiveCustomColors(theme, customColors) {
      return {
        ...(THEME_COLOR_PRESETS[theme] || THEME_COLOR_PRESETS.dark),
        ...normalizeCustomColors(customColors),
      };
    }

    function diffCustomColors(colors, theme) {
      const base = THEME_COLOR_PRESETS[theme] || THEME_COLOR_PRESETS.dark;
      const normalized = normalizeCustomColors(colors);
      const out = {};
      CUSTOM_UI_KEYS.forEach(key => {
        if (normalized[key] && normalized[key] !== String(base[key] || '').toLowerCase()) out[key] = normalized[key];
      });
      return out;
    }

    function hexToRgb(hex) {
      const value = String(hex || '').replace('#', '');
      if (!/^[0-9a-fA-F]{6}$/.test(value)) return null;
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16),
      };
    }

    function glowForAccent(hex, theme) {
      const rgb = hexToRgb(hex);
      if (!rgb) return null;
      const spread = theme === 'high-vis' ? 24 : 20;
      const alpha = theme === 'high-vis' ? 0.3 : 0.15;
      return `0 0 ${spread}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
    }

    function bgValueForDisplayNumber(mgdl, ui) {
      if (mgdl == null || !Number.isFinite(Number(mgdl))) return null;
      return isMmol(ui) ? Number(mgdl) / MGDL_PER_MMOL : Number(mgdl);
    }

    function glucoseRateForDisplayNumber(mgdlPerMin, ui) {
      return bgValueForDisplayNumber(mgdlPerMin, ui);
    }

    function formatBgDeltaForDisplay(mgdl, ui, digits = 1) {
      const value = bgValueForDisplayNumber(mgdl, ui);
      if (value == null) return '';
      return isMmol(ui) ? value.toFixed(digits) : value.toFixed(digits).replace(/\.0$/, '');
    }

    function formatChartTick(value, ui, digits = 1) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      return isMmol(ui) ? n.toFixed(digits) : String(Math.round(n));
    }

    function formatRateTick(value, ui, digits = 2) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      return n.toFixed(digits).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
    }

    function glucoseAxisTitle(ui) {
      return `Glucose (${bgUnitLabel(ui)})`;
    }

    function glucoseRateUnitLabel(ui) {
      return isMmol(ui) ? 'mmol/L/min' : 'mg/dL/min';
    }

    function glucoseRateAxisTitle(ui) {
      return `Rate (${glucoseRateUnitLabel(ui)})`;
    }

    function colorWithAlpha(color, alpha, fallback = '#000000') {
      const rgb = hexToRgb(color) || hexToRgb(fallback);
      if (!rgb) return color;
      return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
    }

    function getChartTheme(ui) {
      const theme = ui?.theme || 'dark';
      const colors = effectiveCustomColors(theme, ui?.customColors);
      const info = theme === 'high-vis' ? '#7dd3fc' : theme === 'light' ? '#2563eb' : '#3b82f6';
      const teal = theme === 'high-vis' ? '#5eead4' : theme === 'light' ? '#0f766e' : '#14b8a6';
      return {
        bg: colors.bg,
        surface: colors.s1,
        surfaceAlt: colors.s2,
        border: colors.bd,
        accent: colors.ac,
        danger: colors.r,
        success: colors.g,
        warning: colors.y,
        purple: colors.p,
        orange: colors.o,
        text: colors.tx,
        muted: colors.td,
        faint: colors.tm,
        info,
        teal,
      };
    }

    function computeNumericAxisBounds(values, {
      floor = null, ceil = null, step = 1, pad = 0, includeZero = false, minSpan = step,
    } = {}) {
      const nums = (values || []).map(Number).filter(Number.isFinite);
      if (!nums.length) {
        const baseMin = floor ?? 0;
        const baseMax = ceil ?? (baseMin + minSpan);
        return { min: baseMin, max: Math.max(baseMax, baseMin + minSpan) };
      }

      let lo = Math.min(...nums);
      let hi = Math.max(...nums);
      if (includeZero) {
        lo = Math.min(lo, 0);
        hi = Math.max(hi, 0);
      }

      lo -= pad;
      hi += pad;
      if (floor != null) lo = Math.max(lo, floor);
      if (ceil != null) hi = Math.min(hi, ceil);
      lo = Math.floor(lo / step) * step;
      hi = Math.ceil(hi / step) * step;

      if (hi - lo < minSpan) {
        hi = lo + minSpan;
        if (ceil != null && hi > ceil) {
          hi = ceil;
          lo = hi - minSpan;
        }
      }

      return { min: lo, max: hi };
    }

    function computeBgAxisBounds(values, ui, {
      minMgdl = 40, maxMgdl = BG_ENTRY_MAX, padMgdl = 20,
    } = {}) {
      const step = isMmol(ui) ? 0.5 : 10;
      return computeNumericAxisBounds(values, {
        floor: bgValueForDisplayNumber(minMgdl, ui),
        ceil: bgValueForDisplayNumber(maxMgdl, ui),
        step,
        pad: bgValueForDisplayNumber(padMgdl, ui) ?? 0,
        minSpan: step * 4,
      });
    }

    function getChartTimeWindow(centerMs = Date.now()) {
      return {
        centerMs,
        windowStartMs: centerMs - CHART_WINDOW_MS,
        windowEndMs: centerMs + CHART_WINDOW_MS,
        projectionHours: CHART_PROJECTION_HOURS,
        dtMinutes: CHART_DT_MINUTES,
      };
    }

    function isWithinChartWindow(timestampMs, timeWindow) {
      if (!Number.isFinite(timestampMs)) return false;
      if (!timeWindow) return true;
      const startMs = Number(timeWindow.windowStartMs);
      const endMs = Number(timeWindow.windowEndMs);
      if (Number.isFinite(startMs) && timestampMs < startMs) return false;
      if (Number.isFinite(endMs) && timestampMs > endMs) return false;
      return true;
    }

    function buildSharedChartTimeScale(colors, timeWindow, {
      maxTicksLimit = 8,
      unit = 'hour',
      displayFormats = { hour: 'HH:mm' },
      tooltipFormat = 'yyyy-MM-dd HH:mm',
    } = {}) {
      return {
        type: 'time',
        min: timeWindow?.windowStartMs,
        max: timeWindow?.windowEndMs,
        time: { unit, displayFormats, tooltipFormat },
        ticks: {
          color: colors.faint,
          font: { family: 'Share Tech Mono', size: 9 },
          maxRotation: 45,
          maxTicksLimit,
        },
        grid: { color: colorWithAlpha(colors.border, 0.35, '#1e2d45') },
      };
    }

    function buildSharedTimeSeriesInteraction() {
      // Time-scale charts in this app often mix sparse logged events with denser
      // derived series. Group tooltip items by actual x-position, not dataset index.
      return { mode: 'x', axis: 'x', intersect: false };
    }

    function createNowLinePlugin(id, centerMs, colors) {
      return {
        id,
        afterDraw(chart) {
          const xScale = chart?.scales?.x;
          if (!xScale) return;
          const x = xScale.getPixelForValue(centerMs);
          if (!Number.isFinite(x)) return;
          const { left, right, top, bottom } = chart.chartArea || {};
          if (![left, right, top, bottom].every(Number.isFinite)) return;
          if (x < left || x > right) return;
          const ctx = chart.ctx;
          ctx.save();
          ctx.strokeStyle = colorWithAlpha(colors.warning, 0.7, '#fbbf24');
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(x, top);
          ctx.lineTo(x, bottom);
          ctx.stroke();
          ctx.fillStyle = colorWithAlpha(colors.warning, 0.9, '#fbbf24');
          ctx.font = '10px "Share Tech Mono", monospace';
          ctx.fillText('Now', Math.min(x + 4, right - 24), top + 14);
          ctx.restore();
        },
      };
    }


    // -------------------------------------------------------------------------------
    //  E.  UI COMPONENTS
    //
    //  Each component receives exactly what it needs via props — no global reads.
    // -------------------------------------------------------------------------------

    // -- E0. Toast notification ----------------------------------------------------
    function Toast({ msg, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, [onDone]);
      return <div className={`tst ${type}`}>{msg}</div>;
    }

    function CustomUIColorRow({ option, value, onChange }) {
      const display = String(value || '').toUpperCase();
      return (
        <div className="cui-row">
          <div className="cui-meta">
            <div className="cui-label">{option.label}</div>
            <div className="cui-help">{option.help}</div>
          </div>
          <div className="cui-picker">
            <div className="cui-swatch" style={{ background: value }} />
            <span className="cui-hex">{display}</span>
            <input
              type="color"
              value={value}
              onChange={e => onChange(option.key, e.target.value)}
              title={`Choose ${option.label} color`}
            />
          </div>
        </div>
      );
    }

    function CustomUiModal({ ui, setUi, onClose }) {
      const [draftColors, setDraftColors] = useState(() => effectiveCustomColors(ui.theme || 'dark', ui.customColors));
      const customCount = Object.keys(normalizeCustomColors(ui.customColors)).length;

      useEffect(() => {
        setDraftColors(effectiveCustomColors(ui.theme || 'dark', ui.customColors));
      }, [ui.theme, ui.customColors]);

      useEffect(() => {
        const onKeyDown = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [onClose]);

      const handleColorChange = (key, value) => {
        setDraftColors(prev => ({ ...prev, [key]: value }));
      };

      const handleReset = () => {
        setDraftColors({ ...(THEME_COLOR_PRESETS[ui.theme || 'dark'] || THEME_COLOR_PRESETS.dark) });
      };

      const handleApply = () => {
        setUi(prev => ({
          ...prev,
          customColors: diffCustomColors(draftColors, prev.theme || 'dark'),
        }));
        onClose();
      };

      return (
        <div className="cui-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="cui-modal">
            <div className="cui-hdr">
              <div className="cui-title-wrap">

                <div className="cui-sub">

              </div>
              <button className="cui-close" onClick={onClose} aria-label="Close Custom UI dialog">×</button>

            <div className="cui-body">

    // -- E2. Modifier panel (absorption + sensitivity + metabolic output) ----------
    function ModPanel({ mod, ui }) {
      const hasMetabolic = mod.metabolic && Object.keys(mod.metabolic).length > 0;
      const confidencePct = Math.round((mod.confidenceFactor ?? 1) * 100);
      const uScalar = mod.U_scalar ?? 1;
      const confColor = modColor(mod.confidenceFactor ?? 1);

      // Confidence label: maps the scalar to a human word.
      const confLabel = uScalar < 1.15 ? 'High'
        : uScalar < 1.4 ? 'Good'
          : uScalar < 1.7 ? 'Fair'
            : uScalar < 2.2 ? 'Low'
              : 'Very Low';

      return (
        <div className="mp">
          <div style={{ fontSize: '11px', color: 'var(--td)', marginBottom: '6px', fontFamily: 'var(--sans)' }}>
            What affects insulin right now:
          </div>
          <div className="msum">
            <span className="msi"
              title="Absorption rate — how fast insulin gets into your bloodstream">
              Absorption: <strong style={{ color: modColor(mod.kabs_mult) }}>{mod.kabs.toFixed(2)} hr⁻¹</strong>
              <span style={{ color: 'var(--tm)' }}> ({Math.round(mod.kabs_mult * 100)}%)</span>
            </span>
            <span className="msi"
              title="Sensitivity — how far 1 unit of insulin drops your blood sugar">
              Sensitivity: <strong style={{ color: modColor(mod.seff_mult) }}>{formatCorrFactorForDisplay(mod.seff, ui)} {corrUnitLabel(ui)}</strong>
              <span style={{ color: 'var(--tm)' }}> ({Math.round(mod.seff_mult * 100)}%)</span>
            </span>
            <span className="msi"
              title="Model confidence — how reliable the 8-hour forecast is given current stressors">
              Confidence: <strong style={{ color: confColor }}>{confLabel}</strong>
              <span style={{ color: 'var(--tm)' }}> ({confidencePct}%)</span>
            </span>
          </div>

          <div className="mst">Absorption speed factors</div>
          {Object.entries(mod.absorption).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}

          <div className="mst">Sensitivity factors</div>
          {Object.entries(mod.sensitivity).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}

          {/* -- 5.2 Metabolic output section — always rendered -- */}
          <div className="mst" style={{ color: 'var(--ac)' }}>Metabolic output &amp; confidence</div>
          <ModBar label="Hepatic Output" value={mod.hepaticOutputFactor ?? 1} />
          <ModBar label="Gastric Emptying" value={mod.gastricEmptyingFactor ?? 1} />
          {/* Confidence bar: 1/U_scalar, where lower = less confident */}
          <ModBar label="Model Confidence" value={mod.confidenceFactor ?? 1} />

          {hasMetabolic && (<>
            <div className="mst" style={{ color: 'var(--o)' }}>Substance sensitivity effects</div>
            {Object.entries(mod.metabolic).map(([k, v]) => <ModBar key={k} label={k} value={v} />)}
          </>)}
        </div>
      );
    }

    // -- E3a. BPM Monitor modal -----------------------------------------------------
    // Four-phase heart rate measurement: idle → countdown → recording → result.
    // onConfirm(bpm) writes the measured value back into the HR field.
    function BpmMonitor({ onConfirm, onClose }) {
      const [phase, setPhase] = useState('idle');   // idle|countdown|recording|result
      const [countdown, setCountdown] = useState(3);
      const [timeLeft, setTimeLeft] = useState(30);
      const [beatCount, setBeatCount] = useState(0);  // display only
      const beatRef = useRef(0);                       // authoritative count (no re-render side-effects)
      const [bpm, setBpm] = useState(0);
      const [popping, setPopping] = useState(false);

      // Countdown phase: tick from 3 → 0 then hand off to recording.
      useEffect(() => {
        if (phase !== 'countdown') return;
        if (countdown > 0) {
          const t = setTimeout(() => setCountdown(c => c - 1), 1000);
          return () => clearTimeout(t);
        }
        setPhase('recording');
        setTimeLeft(30);
      }, [phase, countdown]);

      // Recording phase: 30-second timer; when it hits 0, compute BPM and advance.
      // beatCount is intentionally NOT a dependency — taps must not reset the timer.
      useEffect(() => {
        if (phase !== 'recording') return;
        if (timeLeft > 0) {
          const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
          return () => clearTimeout(t);
        }
        setBpm(beatRef.current * 2);  // 30-s window → × 2 = per-minute rate
        setPhase('result');
      }, [phase, timeLeft]); // eslint-disable-line react-hooks/exhaustive-deps

      const reset = () => {
        setPhase('idle'); setCountdown(3); setTimeLeft(30);
        setBeatCount(0); beatRef.current = 0; setBpm(0);
      };

      const handleHeartClick = () => {
        if (phase !== 'recording') return;
        beatRef.current += 1;
        setBeatCount(beatRef.current);  // update display counter
        setPopping(true);
        setTimeout(() => setPopping(false), 150);
      };

      const handleConfirm = () => { onConfirm(bpm); onClose(); };

      // Heart-beat SVG path (standard filled heart shape)
      const HeartPath = () => (
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402
               0-3.791 3.068-5.191 5.281-5.191
               1.312 0 4.151.501 5.719 4.457
               1.59-3.968 4.464-4.447 5.726-4.447
               2.54 0 5.274 1.621 5.274 5.181
               0 4.069-5.136 8.625-11 14.402z"/>
        </svg>
      );

      // Zone label for the final BPM result
      const hrZone = bpm < 60 ? { label: 'Below normal', c: 'var(--ac)' }
        : bpm <= 100 ? { label: 'Normal range', c: 'var(--g)' }
          : bpm <= 120 ? { label: 'Elevated', c: 'var(--y)' }
            : { label: 'High', c: 'var(--r)' };

      return (
        <div className="bpm-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="bpm-modal">

            {/* Header */}
            <div className="bpm-hdr">
              <div className="bpm-hdr-title">
                <span style={{ color: 'var(--r)', fontSize: '16px' }}>♥</span>
                BPM Monitor
              </div>
              <button className="bpm-close" onClick={onClose}>✕</button>
            </div>

            {/* Body */}
            <div className="bpm-body">

              {/* -- IDLE -- */}
              {phase === 'idle' && (
                <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  <div className="bpm-info">
                    <div className="bpm-info-row">
                      <span className="bpm-info-icon">?</span>
                      <span>With one hand, feel your pulse by placing your index and middle fingers on the side of your lower neck, next to the windpipe. Press lightly until you feel a beat.</span>
                    </div>
                    <div className="bpm-info-row">
                      <span className="bpm-info-icon" style={{ color: 'var(--r)' }}>♥</span>
                      <span>With your other hand, tap the heart button each time you feel a beat. A 30-second timer will count your taps and calculate your BPM.</span>
                    </div>
                  </div>
                  <button className="btn bp bfw" onClick={() => setPhase('countdown')}>
                    I'm ready — start timer
                  </button>
                </div>
              )}

              {/* -- COUNTDOWN -- */}
              {phase === 'countdown' && (
                <div style={{ textAlign: 'center' }}>
                  <div className="bpm-countdown-lbl">Get ready to tap…</div>
                  <div className="bpm-countdown-num">{countdown}</div>
                </div>
              )}

              {/* -- RECORDING -- */}
              {phase === 'recording' && (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%' }}>
                  <div className="bpm-rec-stats">
                    <span className="bpm-stat" style={{ color: 'var(--td)' }}>⏱ {timeLeft}s left</span>
                    <span className="bpm-stat beats">♥ {beatCount} beats</span>
                  </div>
                  <button
                    className={`bpm-heart-btn${popping ? ' pop' : ''}`}
                    onClick={handleHeartClick}
                  >
                    <HeartPath />
                  </button>
                  <div className="bpm-tap-hint">Tap once for every heartbeat you feel</div>
                </div>
              )}

              {/* -- RESULT -- */}
              {phase === 'result' && (
                <div style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                  <div className="bpm-result-lbl">Your heart rate</div>
                  <div>
                    <span className="bpm-result-val" style={{ color: hrZone.c }}>{bpm}</span>
                    <span className="bpm-result-unit">BPM</span>
                  </div>
                  <div className="bpm-result-note">
                    {beatCount} beats in 30 seconds - {hrZone.label}
                  </div>
                  <button className="btn bg_ bfw" style={{ marginTop: '14px' }} onClick={reset}>
                    ↺ Measure again
                  </button>
                </div>
              )}
            </div>

            {/* Footer */}
            <div className="bpm-ftr">
              {phase === 'result' && (
                <button className="btn bp bfw" onClick={handleConfirm}>
                  ✓ Use this value ({bpm} BPM)
                </button>
              )}
              <button className="btn bg_ bfw" onClick={onClose}
                style={{ fontSize: '12px', padding: '7px' }}>
                Cancel &amp; close
              </button>
            </div>

          </div>
        </div>
      );
    }

    function calibrationInputFromLog(log, profile) {
      const t = new Date(log.timestamp);
      const timeHour = t.getHours() + t.getMinutes() / 60;
      return {
        bmi: safeNum(profile.bmi, DEFAULT_PROFILE.bmi),
        hr: safeNum(log.hr, profile.HR_ref),
        pa: safeNum(log.pa, 0),
        sleep: safeNum(log.sleep, 0),
        sleepQ: safeNum(log.sleepQ, 4),
        stress: safeNum(log.stress, 0),
        illness: safeNum(log.illness, 0),
        hydration: safeNum(log.hydration, 0),
        travelDay: safeNum(log.travelDay, 0),
        alcoholLevel: safeNum(log.alcoholLevel, 0),
        stimulantLevel: safeNum(log.stimulantLevel, 0),
        depressantLevel: safeNum(log.depressantLevel, 0),
        nicotineLevel: safeNum(log.nicotineLevel, 0),
        thcLevel: safeNum(log.thcLevel, 0),
        dawnEffect: safeNum(log.dawnEffect, 0),
        bg: safeNum(log.bloodSugar, profile.targetBG),
        timeHour,
        carbs: safeNum(log.carbs, 0),
        fat_g: safeNum(log.fat_g, 0),
        protein_g: safeNum(log.protein_g, 0),
        mealType: safeNum(log.mealType, 0),
        fiberClass: safeNum(log.fiberClass, 0),
      };
    }

    function buildCalibrationComparisons(logs, profile, sim, windowN = 8) {
      const sorted = [...logs]
        .filter(l => l.bloodSugar != null && !isNaN(new Date(l.timestamp).getTime()))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      if (sorted.length < 3) return [];

      const take = Math.max(4, windowN + 1);
      const recent = sorted.slice(-take);
      const rows = [];

      for (let i = 1; i < recent.length; i++) {
        const prev = recent[i - 1];
        const cur = recent[i];
        const dtHours = hoursBetween(prev.timestamp, cur.timestamp);
        if (!isFinite(dtHours) || dtHours <= 0 || dtHours > 6) continue;

        const histAtPrev = sorted.filter(x => new Date(x.timestamp) <= new Date(prev.timestamp));
        if (!histAtPrev.length) continue;

        // Shift timestamps so "prev.timestamp" is treated as now for deterministic reconstruction.
        const shiftMs = Date.now() - new Date(prev.timestamp).getTime();
        const shifted = histAtPrev.map(x => ({
          ...x,
          timestamp: new Date(new Date(x.timestamp).getTime() + shiftMs).toISOString(),
        }));

        const sv = computeStateVars(shifted, profile, sim);
        const pkState = reconstructPK(shifted, profile, sim);
        const mealState = reconstructMealState(shifted, profile, sim);
        const inp = calibrationInputFromLog(prev, profile);
        const startG = safeNum(prev.bloodSugar, profile.targetBG);
        const simOut = simulateProjection(startG, pkState, sv, inp, profile, sim, dtHours, mealState);
        const predicted = simOut.pts.at(-1)?.G;
        const actual = safeNum(cur.bloodSugar, null);
        if (!isFinite(predicted) || !isFinite(actual)) continue;

        const err = predicted - actual;
        rows.push({
          timestamp: cur.timestamp,
          horizonHr: Math.round(dtHours * 100) / 100,
          predicted: Math.round(predicted),
          actual: Math.round(actual),
          err: Math.round(err * 10) / 10,
        });
      }

      return rows.slice(-windowN);
    }

    function runCoreModelUnitTests() {
      const results = [];
      const push = (name, ok, detail) => results.push({ name, ok: !!ok, detail });

      const tProfile = {
        ...DEFAULT_PROFILE,
        age: 30,
        sex: 'other',
        bmi: DEFAULT_PROFILE.BMI_ref,
        corrFactor: 50,
        targetBG: 100,
        maxDose: 10,
      };
      const tSim = { ...DEFAULT_SIM_PARAMS };
      const sv = { E_ex: 0, L: 0, H: 0 };
      const inp = {
        bmi: tProfile.bmi, hr: tProfile.HR_ref, pa: 0,
        sleep: 0, sleepQ: 4, stress: 0, illness: 0, hydration: 0,
        travelDay: 0, alcoholLevel: 0, stimulantLevel: 0, depressantLevel: 0, nicotineLevel: 0, thcLevel: 0,
        dawnEffect: 0, bg: tProfile.targetBG, timeHour: 12, carbs: 0, fat_g: 0, protein_g: 0, mealType: 0, fiberClass: 0,
      };

      const k = calcKabs(inp, tProfile, tSim);
      push('calcKabs', isFinite(k.kabs) && Math.abs(k.kabs - tSim.k_abs0) < 1e-6, `kabs=${k.kabs.toFixed(4)}`);

      const s = calcSeff(inp, sv, tProfile, tSim);
      push('calcSeff', isFinite(s.seff) && s.seff > 30 && s.seff < 60, `seff=${s.seff.toFixed(2)}`);

      const dose = calcDose(420, 350, sv, { ...inp, bg: 420, carbs: 350 }, tProfile, tSim, null);
      push('calcDose', !!dose && dose.capped && dose.total === tProfile.maxDose, dose ? `total=${dose.total}, uncapped=${dose.uncappedTotal}` : 'null');

      const blockedDose = calcDose(550, 30, sv, { ...inp, bg: 550, carbs: 30 }, tProfile, tSim, null);
      push('calcDose bounds', blockedDose === null, blockedDose === null ? 'blocked as expected' : 'unexpected non-null');

      const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
      const testLogs = [normalizeLogEntry({
        id: 'u1',
        timestamp: oneHourAgo,
        bloodSugar: 180,
        carbs: 30,
        insulinDose: 6,
        hr: tProfile.HR_ref,
        pa: 0,
        sleep: 0,
        sleepQ: 4,
        stress: 0,
        illness: 0,
        hydration: 0,
        travelDay: 0,
        alcoholLevel: 0,
        stimulantLevel: 0,
        depressantLevel: 0,
        nicotineLevel: 0,
        thcLevel: 0,
        site: 'abdomen',
        siteMultiplier: 1,
        fat_g: 0,
        protein_g: 0,
        mealType: 0,
        fiberClass: 0,
        kabs_rel: 1,
        seff_mult: 1,
        notes: '',
      }, 0)];

      const pk = reconstructPK(testLogs, tProfile, tSim);
      push('reconstructPK', isFinite(pk.Q_sc) && isFinite(pk.Q_p) && pk.Q_sc >= 0 && pk.Q_p >= 0, `Q_sc=${pk.Q_sc.toFixed(2)}, Q_p=${pk.Q_p.toFixed(2)}`);

      const mealState = reconstructMealState(testLogs, tProfile, tSim);
      const proj = simulateProjection(180, pk, sv, inp, tProfile, tSim, 2, mealState);
      const bounded = proj.pts.every(p => p.G >= 40 && p.G <= 500);
      const outputCadenceHr = 6 * (5 / 60); // simulateProjection records every 6 x 5-min steps = 30 min
      const expectedPts = Math.floor(2 / outputCadenceHr) + 1; // include t=0
      const endPt = proj.pts.at(-1);
      const cadenceOk = proj.pts.length === expectedPts
        && proj.pts[0]?.t === 0
        && Math.abs((endPt?.t ?? 0) - 2) < 1e-9;
      push('simulateProjection', cadenceOk && bounded, `pts=${proj.pts.length}/${expectedPts}, end=${endPt?.G}, t_end=${endPt?.t}`);

      return results;
    }

    function CalibrationTab({ logs, profile, sim, setProfile, setSim, showT, ui }) {
      const [windowN, setWindowN] = useState(8);
      const [tests, setTests] = useState([]);

      const rows = useMemo(() => buildCalibrationComparisons(logs, profile, sim, windowN), [logs, profile, sim, windowN]);
      const stats = useMemo(() => {
        if (!rows.length) return null;
        const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
        const errs = rows.map(r => r.err);
        const meanErr = avg(errs);
        const mae = avg(errs.map(e => Math.abs(e)));
        const rmse = Math.sqrt(avg(errs.map(e => e * e)));
        const short = rows.filter(r => r.horizonHr <= 1.5).map(r => r.err);
        const long = rows.filter(r => r.horizonHr > 1.5).map(r => r.err);
        return {
          meanErr: Math.round(meanErr * 10) / 10,
          mae: Math.round(mae * 10) / 10,
          rmse: Math.round(rmse * 10) / 10,
          shortErr: Math.round(avg(short) * 10) / 10,
          longErr: Math.round(avg(long) * 10) / 10,
        };
      }, [rows]);

      const suggestion = useMemo(() => {
        if (!stats) return null;
        const corrFactor = Math.round(profile.corrFactor * clamp(1 + stats.meanErr / 300, 0.85, 1.15) * 10) / 10;
        const kAbs0 = Math.round(sim.k_abs0 * clamp(1 + stats.shortErr / 400, 0.85, 1.15) * 1000) / 1000;
        const kBasal = Math.round(sim.k_basal * clamp(1 + stats.longErr / 500, 0.8, 1.2) * 10000) / 10000;
        return { corrFactor, kAbs0, kBasal };
      }, [stats, profile.corrFactor, sim.k_abs0, sim.k_basal]);

      const applySuggestion = () => {
        if (!suggestion) return;
        setProfile(p => ({ ...p, corrFactor: suggestion.corrFactor }));
        setSim(s => ({ ...s, k_abs0: suggestion.kAbs0, k_basal: suggestion.kBasal }));
        showT('Applied calibration nudges to corrFactor, k_abs0, and k_basal.');
      };

      const passCount = tests.filter(t => t.ok).length;

      return (
        <>
          <div className="card">
            <div className="ct">Calibration Mode</div>
            <div className="note" style={{ marginBottom: '12px' }}>
              Compares recent real BG readings against retrospective model predictions, then suggests small parameter nudges.
              Use this as guidance and review clinically.
            </div>
            <div className="sg">
              <div className="fi">
                <label>Comparison window (N)</label>
                <input type="number" min="3" max="20" step="1" value={windowN}
                  onChange={e => setWindowN(clamp(parseInt(e.target.value) || 8, 3, 20))} />
              </div>
              <div className="fi" style={{ justifyContent: 'flex-end', display: 'flex' }}>
                <button className="btn bg_ bsm" onClick={() => setTests(runCoreModelUnitTests())}>Run Core Model Tests</button>
              </div>
            </div>

            {!rows.length && (
              <div className="es" style={{ padding: '14px 0' }}>
                <div className="ei">...</div>
                Need at least 3 timed BG entries for calibration comparisons.
              </div>
            )}

            {stats && (
              <>
                <div className="svg" style={{ marginTop: '10px' }}>
                  <div className="svc">
                    <div className="svv" style={{ color: stats.meanErr > 0 ? 'var(--y)' : 'var(--g)' }}>{formatBgDeltaForDisplay(stats.meanErr, ui)}</div>
                    <div className="svl">Mean Error</div>
                    <div className="note">pred - actual ({bgUnitLabel(ui)})</div>
                  </div>
                  <div className="svc">
                    <div className="svv" style={{ color: 'var(--ac)' }}>{formatBgDeltaForDisplay(stats.mae, ui)}</div>
                    <div className="svl">MAE</div>
                    <div className="note">absolute error ({bgUnitLabel(ui)})</div>
                  </div>
                  <div className="svc">
                    <div className="svv" style={{ color: 'var(--o)' }}>{formatBgDeltaForDisplay(stats.rmse, ui)}</div>
                    <div className="svl">RMSE</div>
                    <div className="note">root mean square error ({bgUnitLabel(ui)})</div>
                  </div>
                </div>

                {suggestion && (
                  <div className="warn-full">
                    Suggested nudges:
                    {' '}corrFactor {profile.corrFactor} {'>'} <strong>{suggestion.corrFactor}</strong>,
                    {' '}k_abs0 {sim.k_abs0} {'>'} <strong>{suggestion.kAbs0}</strong>,
                    {' '}k_basal {sim.k_basal} {'>'} <strong>{suggestion.kBasal}</strong>
                    <div style={{ marginTop: '8px' }}>
                      <button className="btn bp bsm" onClick={applySuggestion}>Apply Suggested Nudges</button>
                    </div>
                  </div>
                )}

                <div className="div" />
                <div className="table-scroll">
                  <table className="lt">
                    <thead>
                      <tr><th>Time</th><th>Horizon</th><th>Pred</th><th>Actual</th><th>Error</th></tr>
                    </thead>
                    <tbody>
                      {rows.map((r, i) => (
                        <tr key={i}>
                          <td>{fmtDT(r.timestamp)}</td>
                          <td>{r.horizonHr}h</td>
                          <td>{formatBgForDisplay(r.predicted, ui, isMmol(ui) ? 1 : 0)}</td>
                          <td>{formatBgForDisplay(r.actual, ui, isMmol(ui) ? 1 : 0)}</td>
                          <td style={{ color: r.err > 0 ? 'var(--y)' : 'var(--g)' }}>{formatBgDeltaForDisplay(r.err, ui)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}
          </div>

          <div className="card">
            <div className="ct">Core Function Unit Tests</div>
            {!tests.length && <div className="es"><div className="ei">...</div>Run tests to validate model core functions.</div>}
            {tests.length > 0 && (
              <>
                <div className="note" style={{ marginBottom: '8px' }}>{passCount}/{tests.length} tests passing</div>
                <div className="table-scroll">
                  <table className="lt">
                    <thead>
                      <tr><th>Test</th><th>Status</th><th>Detail</th></tr>

                    <tbody>

                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}
          </div>
        </>
      );
    }

              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  travel_sens_penalty of 0.20 reduces effective sensitivity by ~17% when active — consistent with acute cortisol and epinephrine elevation observed in jet-lag studies.
                  travel_uncertainty widens the forecast band with horizon: at 0.30, an 8-hour projection shows a meaningfully broader band than a short forecast.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Alcohol — Hepatic Suppression (4.1)</div>
            <div className="sg">
              <SField label="alcohol_hep_suppress — hepatic output reduction (fraction)" k="alcohol_hep_suppress" s={sim} set={setSim} step="0.05" />
              <SField label="alcohol_gastric_slow — gastric emptying slowdown (fraction)" k="alcohol_gastric_slow" s={sim} set={setSim} step="0.05" />
              <SField label="alcohol_sens_effect — direct sensitivity perturbation" k="alcohol_sens_effect" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  alcohol_hep_suppress of 0.30 represents ~30% suppression of hepatic gluconeogenesis at heavy intake — consistent with literature on acute ethanol effects. Heavy drinking can reach 50%+.
                  alcohol_gastric_slow of 0.20 delays gut delivery of carbs, flattening post-meal peaks but extending the absorption window.
                  alcohol_sens_effect of 0.10 models a mild direct reduction in peripheral insulin action at the receptor level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Stimulants — Epinephrine / Counter-Regulation (4.2)</div>
            <div className="sg">
              <SField label="stim_sens_penalty — sensitivity reduction per level" k="stim_sens_penalty" s={sim} set={setSim} step="0.01" />
              <SField label="stim_hep_boost — hepatic G_prod increase per level" k="stim_hep_boost" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  stim_sens_penalty of 0.20 is calibrated to the Lane et al. caffeine studies showing 15–30% acute insulin sensitivity reduction.
                  stim_hep_boost of 0.10 represents mild glycogenolysis from the adrenaline surge — adds ~0.1 mg/dL/hr to net glucose production per unit of stimulant level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Depressants — CNS / Gastric Slowing (4.3)</div>
            <div className="sg">
              <SField label="depress_sleep_amplify — amplifies sleep sensitivity effect" k="depress_sleep_amplify" s={sim} set={setSim} step="0.05" />
              <SField label="depress_gastric_slow — gastric emptying slowdown" k="depress_gastric_slow" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  Keep these coefficients subtle. depress_gastric_slow of 0.10–0.15 is realistic — reflects general CNS and smooth-muscle relaxation rather than a direct glucose pathway effect.
                  depress_sleep_amplify of 0.30 amplifies the sleep η factor when depressants are active, modelling deepened GH-mediated resistance.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Nicotine — Peripheral Disposal Penalty (4.4)</div>
            <div className="sg">
              <SField label="nicotine_util_penalty — peripheral glucose disposal reduction" k="nicotine_util_penalty" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  nicotine_util_penalty of 0.15 aligns with Eliasson et al. data: acute smoking impairs insulin-mediated glucose disposal by ~15–20% via vasoconstriction at both the receptor and absorption level.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>THC / Cannabis — Gastric Motility (4.5)</div>
            <div className="sg">
              <SField label="thc_gastric_slow — gastric emptying reduction per level" k="thc_gastric_slow" s={sim} set={setSim} step="0.01" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  thc_gastric_slow of 0.20–0.30 is highly realistic given CB1 receptor density in the enteric nervous system.
                  This flattens the meal absorption curve, raising early post-bolus hypo risk followed by a stubborn late hyperglycemic plateau.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Uncertainty Scoring (5.1) — confidence band coefficients</div>
            <div className="sg">
              <SField label="u_base — base band (±mg/dL per √hr at U=1)" k="u_base" s={sim} set={setSim} step="1" />
              <SField label="u_stress — stress contribution to scalar" k="u_stress" s={sim} set={setSim} step="0.05" />
              <SField label="u_illness — illness contribution to scalar" k="u_illness" s={sim} set={setSim} step="0.05" />
              <SField label="u_travel — travel/disruption contribution" k="u_travel" s={sim} set={setSim} step="0.05" />
              <SField label="u_overlap — per active meal reservoir" k="u_overlap" s={sim} set={setSim} step="0.05" />
              <SField label="u_substances — per unit of total substance level" k="u_substances" s={sim} set={setSim} step="0.05" />
              <SField label="u_iob — per unit of active plasma insulin (Q_p)" k="u_iob" s={sim} set={setSim} step="0.02" />
              <div style={{ gridColumn: '1/-1' }}>
                <span className="note">
                  Band formula: ±(U_scalar × u_base × √t) mg/dL at horizon t hours.
                  The √t growth matches clinical prediction error, which compounds like a random walk rather than growing linearly.
                  On a sick travel day with overlapping meals and active IOB, U_scalar typically reaches 2–3×, giving a much wider band by 8 hours than at the near-term horizon.
                </span>
              </div>
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Glucose Forecast — how the 8-hour prediction is modelled</div>
            <div className="sg">
              <SField label="G_prod — net glucose production (mg/dL/hr)" k="G_prod" s={sim} set={setSim} step="0.1" />
              <SField label="k_basal — pull toward target BG (hr⁻¹)" k="k_basal" s={sim} set={setSim} step="0.001" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Body Memory Decay — how long past exercise/lows/highs are remembered</div>
            <div className="sg">
              <SField label="τ_ex — exercise effect fades over (hr)" k="tau_ex" s={sim} set={setSim} step="0.5" />
              <SField label="τ_low — low-BG memory fades over (hr)" k="tau_low" s={sim} set={setSim} step="0.5" />

            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Fat &amp; Protein Delayed Glucose (2.1) — late BG rise from macronutrients</div>
            <div className="sg">

              <SField label="prot_factor — glucose-equiv per gram protein" k="prot_factor" s={sim} set={setSim} step="0.01" />

              <SField label="Mixed meal multiplier" k="meal_slow_mixed" s={sim} set={setSim} step="0.05" />
              <SField label="High fat/protein multiplier" k="meal_slow_hfp" s={sim} set={setSim} step="0.05" />
              <SField label="Low fiber multiplier (1.0 = baseline)" k="fiber_slow_low" s={sim} set={setSim} step="0.05" />
              <SField label="Medium fiber multiplier" k="fiber_slow_med" s={sim} set={setSim} step="0.05" />
              <SField label="High fiber multiplier" k="fiber_slow_high" s={sim} set={setSim} step="0.05" />
            </div>
            <div className="sst" style={{ fontSize: '10px', marginTop: '6px' }}>Gastric Emptying (2.3) — stomach→gut→blood carb transit</div>
            <div className="sg">
              <SField label="k_ge_base — base emptying rate (hr⁻¹)" k="k_ge_base" s={sim} set={setSim} step="0.1" />
              <SField label="k_ge_fat_factor — fat slowdown coefficient" k="k_ge_fat_factor" s={sim} set={setSim} step="0.05" />
              <SField label="k_ge_prot_factor — protein slowdown" k="k_ge_prot_factor" s={sim} set={setSim} step="0.05" />
              <SField label="k_carb_abs — gut→blood rate (mg/dL/g/hr)" k="k_carb_abs" s={sim} set={setSim} step="0.1" />
            </div>
          </>)}

          {/* CGM / Nightscout */}
          <div className="sst">📡 CGM Live Feed - Nightscout REST</div>
